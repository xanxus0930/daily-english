<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>單字庫生成器</title>
<style>
:root{--bg:#0f1117;--bg2:#181c25;--bg3:#1f2433;--border:#2a2f3d;--text:#e8eaf0;--t2:#a0a8c0;--t3:#5a6180;--green:#4ade80;--gl:rgba(74,222,128,.13);--gb:rgba(74,222,128,.3);--amber:#fbbf24;--al:rgba(251,191,36,.13);--ab:rgba(251,191,36,.3);--blue:#60a5fa;--bl:rgba(96,165,250,.13);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;padding:20px;max-width:820px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px;color:var(--green);font-style:italic}
.sub{color:var(--t3);font-size:13px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h2{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
label{font-size:12px;color:var(--t3);min-width:70px}
select,input{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;outline:none}
button{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:all .15s}
button:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#0f1117}
.btn-amber{background:var(--al);color:var(--amber);border:1px solid var(--ab)}
.btn-blue{background:var(--bl);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.btn-red{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.progress-bar{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s}
.log{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;color:var(--t3);height:160px;overflow-y:auto;font-family:monospace;line-height:1.6;white-space:pre-wrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:24px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.word-preview{max-height:250px;overflow-y:auto}
.word-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.word-en{font-style:italic;min-width:110px;color:var(--text)}
.word-zh{color:var(--t2);flex:1}
.lv-tag{font-size:10px;padding:2px 8px;border-radius:99px;min-width:36px;text-align:center;flex-shrink:0}
.lv-b{background:var(--gl);color:var(--green)}
.lv-i{background:var(--al);color:var(--amber)}
.lv-a{background:var(--bl);color:var(--blue)}
textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;font-family:monospace;resize:vertical;min-height:180px;line-height:1.5;outline:none}
.warn{background:var(--al);color:var(--amber);border:1px solid var(--ab);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;line-height:1.6}
.steps{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.step{padding:5px 12px;border-radius:99px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--t3)}
.step.done{background:var(--gl);border-color:var(--gb);color:var(--green)}
.step.active{background:var(--bl);border-color:rgba(96,165,250,.3);color:var(--blue)}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
</style>
</head>
<body>
<h1>📚 單字庫生成器</h1>
<p class="sub">使用 Claude API 自動生成 7000 個英語單字，每個附帶例句、片語、故事和中文翻譯</p>

<div class="steps">
  <div class="step active" id="s1">① 設定</div>
  <div class="step" id="s2">② 生成中</div>
  <div class="step" id="s3">③ 輸出完成</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="cnt-b" style="color:var(--green)">0</div><div class="stat-lbl">初級 B</div></div>
  <div class="stat"><div class="stat-val" id="cnt-i" style="color:var(--amber)">0</div><div class="stat-lbl">中級 I</div></div>
  <div class="stat"><div class="stat-val" id="cnt-a" style="color:var(--blue)">0</div><div class="stat-lbl">高級 A</div></div>
  <div class="stat"><div class="stat-val" id="cnt-t">0</div><div class="stat-lbl">總計</div></div>
</div>

<div class="card">
  <h2>⚙ 設定</h2>
  <div class="row">
    <label>目標等級</label>
    <select id="sel-lv">
      <option value="b">初級 B — 日常生活（目標 4500）</option>
      <option value="i">中級 I — 職場商業（目標 1800）</option>
      <option value="a">高級 A — 學術專業（目標 700）</option>
    </select>
  </div>
  <div class="row">
    <label>每批數量</label>
    <select id="sel-batch">
      <option value="30">30個（測試）</option>
      <option value="50" selected>50個（建議）</option>
      <option value="70">70個（加速）</option>
    </select>
  </div>
  <div class="btns">
    <button class="btn-green" onclick="startSingle()">▶ 生成選定等級</button>
    <button class="btn-amber" onclick="startAll()">⚡ 全自動（全部7000）</button>
    <button class="btn-blue" onclick="continueGen()" id="btn-cont" style="display:none">↻ 繼續</button>
    <button class="btn-red" onclick="doStop()" id="btn-stop" style="display:none">■ 停止</button>
  </div>
</div>

<div class="card">
  <h2>📊 進度</h2>
  <div id="prog-lbl" style="font-size:12px;color:var(--t3);margin-bottom:6px">等待開始...</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="log" id="log">等待開始...\n</div>
</div>

<div class="card">
  <h2>👁 最近生成</h2>
  <div class="word-preview" id="preview"><div style="color:var(--t3);text-align:center;padding:20px">尚無資料</div></div>
</div>

<div class="card">
  <h2>📤 輸出</h2>
  <div class="warn">⚠️ 生成完成後點「注入並下載 HTML」，會自動把單字注入 daily-english.html 並讓你下載新版本。</div>
  <div class="btns">
    <button class="btn-green" onclick="injectDownload()">🔨 注入並下載 daily-english.html</button>
    <button class="btn-blue" onclick="copyOut()">📋 複製 JS</button>
    <button class="btn-amber" onclick="dlJS()">⬇ 下載 words.js</button>
    <button class="btn-red" onclick="clearAll()">🗑 清除</button>
  </div>
  <textarea id="output" readonly placeholder="生成完成後顯示..."></textarea>
</div>

<script>
var DATA = {b:[],i:[],a:[]};
var RUNNING = false, STOP = false;
var TIDX = {b:0,i:0,a:0};

var EXISTING = "ability,able,about,abroad,absence,absent,abundant,abuse,accept,acceptable,access,accident,accomplish,accomplishment,account,accumulate,accurate,achieve,acquire,act,active,adapt,address,adequate,adjust,admire,adopt,adult,advance,advantage,advice,affect,afford,afraid,after,age,agency,agenda,aggressive,agile,agree,ahead,aim,air,alarm,alert,allocate,allow,alone,alter,alternative,always,ambiguous,ambition,analytical,analyze,ancient,angle,angry,animal,announce,annual,answer,anticipate,anxiety,appear,appetite,appreciate,approach,appropriate,approve,area,argue,arise,arm,arrange,arrangement,arrive,articulate,ask,aspect,assert,assess,assessment,asset,assign,assist,associate,assume,assumption,atmosphere,attach,attempt,attention,attitude,attract,attribute,authentic,authority,autonomous,available,avoid,aware,baby,background,bad,balance,bank,barrier,basis,bathroom,battle,beach,beautiful,beauty,become,begin,behavior,believe,belong,benchmark,benefit,beyond,big,bind,birthday,bite,blame,blind,block,bold,bond,book,boost,borrow,bottom,boundary,brand,break,breathe,brief,bring,broad,budget,build,busy,buy,call,calm,candidate,capable,capacity,capture,career,careful,catalyst,category,cause,celebrate,challenge,change,channel,chapter,character,characteristic,charge,chart,chase,check,choice,choose,circumstance,circumvent,city,civil,claim,clarify,clarity,clean,clear,clever,client,close,cloud,coherent,cold,collaborate,colleague,collect,combine,come,comfortable,comment,commit,common,communicate,community,company,compelling,compete,competency,competitive,complete,complex,concentrate,concern,conclusion,confidence,confident,confirm,conflict,connect,connection,consensus,consequence,consistent,consolidate,constant,constraint,consume,contemplate,context,continue,contract,contradictory,contribute,control,convenience,convenient,conviction,convince,cook,coordinate,cope,core,corporate,correct,cost,count,country,courage,craft,create,creative,credible,crisis,criteria,critical,crowd,crucial,cultivate,culture,curious,current,daily,damage,dark,date,day,deadline,debate,debt,decide,decision,decline,dedicate,dedicated,deep,define,delay,delegate,deliberate,deliver,demand,demographic,demonstrate,depend,deserve,design,desire,despite,detail,determine,determined,develop,devote,difference,different,differentiate,difficult,dilemma,diligent,dinner,direct,direction,disability,disagree,discern,discipline,discourse,discover,discuss,disrupt,distance,diverse,document,dominant,dominate,doubt,dramatic,dream,drive,durable,earn,easy,eat,educate,education,effective,efficient,effort,eliminate,eloquent,embrace,emerge,emotion,empirical,empower,enable,encourage,endure,energy,engage,enhance,enjoy,enough,ensure,enthusiasm,environment,epistemology,equal,equity,error,escape,essential,establish,estimate,ethical,evaluate,event,evolve,exacerbate,exact,examine,example,exceed,excel,exchange,execute,exercise,exhaust,exhausted,exist,expand,expect,expectation,experience,expert,expertise,explain,explore,express,extend,extra,extraordinary,eye,face,facilitate,fact,fail,failure,fair,faith,fall,familiar,family,famous,far,fast,feature,feedback,feel,fierce,figure,finally,finance,find,finish,fire,fit,fix,flexible,floor,fly,focus,follow,food,force,forecast,forget,form,formal,forward,found,foundation,free,fresh,friend,fulfill,fun,function,fundamental,gain,game,garden,gather,general,generate,generous,genuine,gift,give,global,go,goal,goal-oriented,good,grade,grateful,great,ground,group,grow,growth,guess,guide,habit,handle,hang,happen,happy,hard,harm,health,healthy,heart,help,hesitate,hide,high,hill,history,hobby,home,honest,honor,hope,hotel,hour,house,human,humble,hungry,hurt,idea,identify,ideology,imagine,impact,implement,implicit,important,improve,incentive,include,increase,individual,industry,inevitable,influence,information,inherent,initiative,innovate,innovation,innovative,inside,insight,inspire,instead,integrity,intention,interdisciplinary,interview,invest,invite,involve,issue,job,join,journey,judge,just,justify,keep,key,kick,kind,know,land,language,last,later,laugh,launch,layer,lead,leadership,lean,learn,leave,legacy,lesson,letter,level,leverage,life,light,like,likely,limit,link,listen,live,local,lonely,long,long-term,look,lose,loud,love,loyal,luck,lucky,maintain,make,manage,manifestation,market,master,match,matter,maximize,meal,meaningful,measure,meet,mentor,message,method,meticulous,milestone,mind,minimal,miss,mistake,model,moment,momentum,money,morning,motivate,motivation,move,music,name,narrative,natural,need,negotiate,network,never,night,note,notice,nuance,objective,obstacle,offer,ontology,open,opinion,opportunity,optimize,order,organize,outcome,outsource,overcome,own,pain,paper,paradigm,park,party,pass,passionate,patient,pause,pay,people,perfect,perform,performance,perpetuate,persevere,persist,person,perspective,philosophical,phone,picture,pipeline,pitch,place,plan,polarization,positive,possible,potential,practice,pragmatic,precedent,preconceived,prepare,present,pressure,price,principle,priority,problem,process,produce,productive,productivity,professional,profile,profound,progress,project,proliferate,propose,protect,prototype,prove,pull,push,quality,question,reach,read,ready,real,realistic,reason,receive,recognize,recommend,reconcile,reflect,relate,relevant,reliable,rely,remember,repeat,resilient,resolve,resource,respect,responsible,restaurant,result,return,revenue,rhetoric,ride,right,risk,road,role,room,routine,rule,run,sacrifice,safe,satisfaction,save,scalable,schedule,school,scrutinize,seat,seek,send,sense,serious,serve,set,share,short,show,sign,simple,since,sit,situation,skill,sleep,slow,smile,so,solid,solution,solve,soon,sophisticated,sort,speak,special,speed,spend,spot,spread,stakeholder,stand,standard,start,step,stick,stop,story,strategy,street,strength,strong,struggle,student,study,succeed,success,suddenly,suggest,support,suppose,sure,surprise,surprised,sustainable,system,systemic,table,tactical,take,talent,talk,target,tax,teach,team,technology,tell,tenacious,tend,test,than,think,though,throw,time,today,together,tough,toward,train,transform,transparent,travel,tremendous,trust,truth,try,turn,understand,unique,unprecedented,until,update,upgrade,urgent,use,vacation,validate,valuable,value,venture,versatile,vision,visit,voice,volunteer,vulnerable,wait,wake,walk,want,warm,watch,wave,weak,wealth,wear,weather,week,welcome,whatever,whole,why,win,wisdom,wonder,wonderful,work,workshop,world,worry,worth,write,year,yet,young,zero".split(',');

var TOPICS = {
  b:["日常家居,家庭關係,飲食烹飪","天氣季節,衣物服飾,交通出行","購物消費,學校教育,身體健康","情緒感受,娛樂休閒,職業工作","社交朋友,旅遊景點,節日慶典","自然動物,科技網路,城市生活","基本動詞,時間數字,顏色形狀","運動健身,音樂藝術,閱讀寫作","醫療保健,住房環境,金錢財務","夢想目標,個人成長,日常習慣"],
  i:["職場管理,商業談判,財務金融","市場行銷,人力資源,科技創新","數據分析,專案管理,客戶服務","社會議題,政治經濟,文化藝術","環境保護,醫療健康,心理學術","教育理論,法律常識,新聞媒體","創業投資,品牌建立,供應鏈","企業文化,數位轉型,全球商業","領導力,創新思維,溝通技巧","危機管理,永續發展,組織行為"],
  a:["學術寫作,哲學思辨,科學研究","語言學,認知心理,政策分析","社會學術,文學批評,藝術評論","神經科學,生態系統,倫理道德","全球化,公共政策,批判思維","人工智能倫理,量子理論,認識論","修辭學,跨文化,複雜系統","社會運動,後殖民,存在主義","媒體批判,演化生物,環境倫理","符號學,現象學,政治哲學"]
};

function addLog(msg){
  var el=document.getElementById('log');
  el.textContent+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}

function refresh(){
  var t=DATA.b.length+DATA.i.length+DATA.a.length;
  document.getElementById('cnt-b').textContent=DATA.b.length;
  document.getElementById('cnt-i').textContent=DATA.i.length;
  document.getElementById('cnt-a').textContent=DATA.a.length;
  document.getElementById('cnt-t').textContent=t;
  var pct=Math.min(100,Math.round(t/7000*100));
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=t+' / 7000 ('+pct+'%)';
  buildOutput();
}

function buildOutput(){
  var lines=['var WORDS = {','b: ['];
  DATA.b.forEach(function(w){lines.push(JSON.stringify(w)+',');});
  lines.push('],\ni: [');
  DATA.i.forEach(function(w){lines.push(JSON.stringify(w)+',');});
  lines.push('],\na: [');
  DATA.a.forEach(function(w){lines.push(JSON.stringify(w)+',');});
  lines.push(']\n};');
  document.getElementById('output').value=lines.join('\n');
}

function showPreview(lv){
  var el=document.getElementById('preview');
  var recent=DATA[lv].slice(-15).reverse();
  if(!recent.length){el.innerHTML='<div style="color:var(--t3);text-align:center;padding:20px">尚無資料</div>';return;}
  el.innerHTML=recent.map(function(w){
    return '<div class="word-row"><span class="lv-tag lv-'+lv+'">{lv}</span><span class="word-en">'+w[0]+'</span><span class="word-zh">'+w[3]+'</span></div>'.replace('{lv}',{b:'初級',i:'中級',a:'高級'}[lv]);
  }).join('');
}

async function callAPI(prompt){
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content:prompt}]})
  });
  var d=await r.json();
  if(!d.content) throw new Error(d.error?d.error.message:JSON.stringify(d));
  return d.content.map(function(c){return c.text||'';}).join('');
}

function makePrompt(lv,n){
  var lvmap={b:'初級 A1-B1（日常生活常用）',i:'中級 B2（職場商業社交）',a:'高級 C1-C2（學術專業）'};
  var topic=TOPICS[lv][TIDX[lv]%TOPICS[lv].length];
  TIDX[lv]++;
  var avoidStr=EXISTING.concat(DATA[lv].map(function(w){return w[0];})).slice(0,300).join(',');
  return '生成'+n+'個英語單字。等級：'+lvmap[lv]+'。主題：'+topic+'\n\n'+
'格式：每行一個JSON陣列，共10欄位，不要任何說明文字:\n'+
'["英文","音標","詞性","中文","英文例句","例句中文","記憶技巧","片語(英=中/英2=中2)","故事(2-3句英文)","標籤(中文,用逗號)"]\n\n'+
'必須避免重複：'+avoidStr.slice(0,500)+'...（等更多）\n\n'+
'範例：\n'+
'["accept","əkˈsɛpt","v.","接受","She accepted the job offer without hesitation.","她毫不猶豫地接受了那份工作邀約。","Accept強調主動接受。Accept an apology=接受道歉。","accept an offer=接受邀約/accept responsibility=承擔責任/widely accepted=廣泛認可","After weeks of interviews, David got the call. He took a breath and said, \'I accept.\' Deciding was the hardest part.","職場,商業,激勵"]\n\n'+
'現在請輸出'+n+'個全新的JSON陣列（每行一個）：';
}

function parseResp(text,lv){
  var words=[];
  var lines=text.split('\n');
  var existSet=new Set(EXISTING.concat(DATA[lv].map(function(w){return w[0].toLowerCase();})));
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim().replace(/,$/,'');
    if(!line.startsWith('[')) continue;
    try{
      var w=JSON.parse(line);
      if(Array.isArray(w)&&w.length>=4&&typeof w[0]==='string'){
        while(w.length<10) w.push('');
        var en=w[0].toLowerCase().trim();
        if(en&&!existSet.has(en)){words.push(w);existSet.add(en);}
      }
    }catch(e){}
  }
  return words;
}

async function runBatch(lv,n){
  var prompt=makePrompt(lv,n);
  addLog('📡 '+{b:'初級',i:'中級',a:'高級'}[lv]+' 請求'+n+'個...');
  var text=await callAPI(prompt);
  var words=parseResp(text,lv);
  words.forEach(function(w){DATA[lv].push(w);});
  addLog('✅ 得到'+words.length+'個 ('+lv+':'+DATA[lv].length+')');
  refresh();
  showPreview(lv);
  return words.length;
}

async function runLevel(lv,target){
  var batchSize=parseInt(document.getElementById('sel-batch').value);
  addLog('\n═══ '+{b:'初級',i:'中級',a:'高級'}[lv]+' 目標:'+target+' ═══');
  while(!STOP&&DATA[lv].length<target){
    var rem=target-DATA[lv].length;
    await runBatch(lv,Math.min(batchSize,rem,70));
    if(!STOP) await new Promise(function(r){setTimeout(r,900);});
  }
  if(!STOP) addLog('🎉 '+{b:'初級',i:'中級',a:'高級'}[lv]+' 完成！'+DATA[lv].length+'個');
}

async function startSingle(){
  if(RUNNING) return;
  RUNNING=true; STOP=false;
  document.getElementById('btn-stop').style.display='';
  document.getElementById('btn-cont').style.display='none';
  document.getElementById('s1').className='step done';
  document.getElementById('s2').className='step active';
  var lv=document.getElementById('sel-lv').value;
  var targets={b:4500,i:1800,a:700};
  try{ await runLevel(lv,targets[lv]); }
  catch(e){ addLog('❌ 錯誤:'+e.message); }
  RUNNING=false; STOP=false;
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-cont').style.display='';
  document.getElementById('s2').className='step done';
  document.getElementById('s3').className='step active';
}

async function startAll(){
  if(RUNNING) return;
  RUNNING=true; STOP=false;
  document.getElementById('btn-stop').style.display='';
  document.getElementById('btn-cont').style.display='none';
  document.getElementById('s1').className='step done';
  document.getElementById('s2').className='step active';
  addLog('⚡ 全自動：初級4500 + 中級1800 + 高級700');
  try{
    await runLevel('b',4500);
    if(!STOP) await runLevel('i',1800);
    if(!STOP) await runLevel('a',700);
    if(!STOP) addLog('\n🎉🎉 全部完成！'+(DATA.b.length+DATA.i.length+DATA.a.length)+'個單字！');
  }catch(e){ addLog('❌ 錯誤:'+e.message+'\n💡 點「繼續」重試'); }
  RUNNING=false; STOP=false;
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-cont').style.display='';
  document.getElementById('s2').className='step done';
  document.getElementById('s3').className='step active';
}

function continueGen(){
  var lv=document.getElementById('sel-lv').value;
  addLog('\n↻ 繼續生成 '+{b:'初級',i:'中級',a:'高級'}[lv]+'...');
  startSingle();
}

function doStop(){ STOP=true; addLog('⏹ 已請求停止...'); }

function copyOut(){
  var ta=document.getElementById('output');
  ta.select();
  try{ document.execCommand('copy'); alert('已複製！'); }
  catch(e){ alert('請手動全選複製'); }
}

function dlJS(){
  var c=document.getElementById('output').value;
  if(!c.trim()||c.includes('生成完成')){ alert('尚未生成'); return; }
  var b=new Blob([c],{type:'text/javascript'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='words.js';
  a.click();
}

async function injectDownload(){
  var wordsJs=document.getElementById('output').value;
  if(!wordsJs.trim()){ alert('請先生成單字資料'); return; }
  addLog('🔨 正在載入 daily-english.html...');
  try{
    var resp=await fetch('daily-english.html');
    var html=await resp.text();
    var newHtml=html.replace(/var WORDS = \{[\s\S]*?\n\};/,wordsJs);
    if(newHtml===html){ addLog('⚠️ 找不到替換位置，改下載 words.js'); dlJS(); return; }
    var b=new Blob([newHtml],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='daily-english.html';
    a.click();
    addLog('✅ 下載完成！含'+(DATA.b.length+DATA.i.length+DATA.a.length)+'個單字');
  }catch(e){
    addLog('❌ 無法載入 daily-english.html（需在同一目錄）');
    addLog('💡 改下載 words.js，再手動替換');
    dlJS();
  }
}

function clearAll(){
  if(!confirm('確定清除所有已生成的單字？')) return;
  DATA={b:[],i:[],a:[]};
  refresh();
  document.getElementById('preview').innerHTML='<div style="color:var(--t3);text-align:center;padding:20px">尚無資料</div>';
  document.getElementById('log').textContent='已清除。等待開始...\n';
  try{ localStorage.removeItem('wgen'); }catch(e){}
}

// Auto-save
setInterval(function(){
  try{ if(DATA.b.length+DATA.i.length+DATA.a.length>0) localStorage.setItem('wgen',JSON.stringify(DATA)); }catch(e){}
},20000);

// Load saved
try{
  var sv=localStorage.getItem('wgen');
  if(sv){ DATA=JSON.parse(sv); refresh(); addLog('📂 載入上次進度：b='+DATA.b.length+' i='+DATA.i.length+' a='+DATA.a.length); }
}catch(e){}
</script>
</body>
</html>
