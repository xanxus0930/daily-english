["lead", "liːd", "v.", "領導", "Lead by making others better, not by making yourself look better.", "通過讓他人更好來領導，而不是讓自己看起來更好。", "Leader=領導者（名詞）。Leadership=領導力。Take the lead=帶頭。", "leader=領導者/leadership=領導力/take the lead=帶頭/lead by example=以身作則", "She led from behind — putting her team in front to receive credit, standing behind them to absorb accountability. That inversion of the usual leadership arrangement produced the most loyal team she had ever led.", "職場,激勵"],
["legacy", "ˈlɛɡəsi", "n.", "遺產；影響", "Build a legacy of service, not just success.", "建立服務的遺產，而不只是成功的遺產。", "Leave a legacy=留下遺產。Legacy thinking=遺產思維。Professional legacy=職業遺產。", "leave a legacy=留下遺產/legacy thinking=遺產思維/professional legacy=職業遺產/lasting legacy=持久的遺產", "She began thinking about legacy not at the end of her career but at the beginning. What impact do I want to have made when I look back? That forward vision oriented every present decision.", "激勵,哲學,社會"],
["lesson", "ˈlɛsn", "n.", "教訓；課程", "Extract the lesson from every difficulty — it is the payment for the pain.", "從每一個困難中提取教訓——那是對痛苦的償還。", "Hard lesson=嚴酷的教訓。Learn a lesson=學到教訓。Life lessons=人生教訓。", "hard lesson=嚴酷的教訓/learn a lesson=學到教訓/life lessons=人生教訓/teach a lesson=教一個教訓", "She mined every failure for its lesson — not to feel better about the failure, but because the lesson was the only valuable thing the failure produced. Extracting it made the cost worthwhile.", "激勵,教育"],
["meaningful", "ˈmiːnɪŋfʊl", "adj.", "有意義的", "Do meaningful work and everything else in life gains meaning too.", "做有意義的工作，生活中的其他一切也會獲得意義。", "Meaningful relationship=有意義的關係。Make it meaningful=使它有意義。Truly meaningful=真正有意義的。", "meaningful relationship=有意義的關係/make it meaningful=使有意義/truly meaningful=真正有意義/create meaning=創造意義", "She designed her work to be meaningful to herself first. When the work had meaning for her, it invariably produced meaning for others. Meaningful work is self-generating: it creates meaning in those who receive it.", "激勵,哲學"],
["mistake", "mɪˈsteɪk", "n.", "錯誤", "A mistake learned from is just tuition for education you cannot buy.", "從中學到的錯誤只是你無法購買的教育的學費。", "Make a mistake=犯錯誤。Costly mistake=代價高昂的錯誤。Honest mistake=無意的錯誤。", "make a mistake=犯錯誤/costly mistake=代價高昂的錯誤/honest mistake=無意的錯誤/learn from mistake=從錯誤中學習", "She had a policy: any mistake, admitted immediately and learned from, was acceptable. A mistake covered up was unacceptable. That policy created an honest culture where small mistakes were fixed before they became large ones.", "激勵,職場,教育"],
["absorb", "əbˈzɔːrb", "v.", "吸收", "She absorbed new information like a sponge.", "她像海綿一樣吸收新資訊。", "Absorption=吸收。Be absorbed in=沉浸在。Absorbing=引人入勝的。", "be absorbed in=沉浸在/absorb information=吸收資訊/fully absorbed=完全沉浸/shock absorber=緩衝器", "He sat in the garden for an hour just absorbing the quiet. No phone, no tasks. He returned to work refreshed in a way that sleep alone never produced.", "學習,日常,健康"],
["add", "æd", "v.", "添加", "Add value to every interaction and you will always be welcome.", "在每次互動中增加價值，你將永遠受到歡迎。", "Addition=加法。Add up=加總。Add value=增加價值。", "addition=加法/add up=加總/add value=增加價值/in addition=另外", "She arrived early and always added one useful idea. Not to impress—because she had done the preparation. People started saving her a seat at the front.", "職場,溝通,激勵"],
["anger", "ˈæŋɡər", "n.", "憤怒", "Anger is useful information if you don't let it make decisions.", "如果你不讓它做決定，憤怒是有用的資訊。", "Angry=憤怒的。Anger management=憤怒管理。Express anger=表達憤怒。", "angry=憤怒的/anger management=憤怒管理/express anger=表達憤怒/channel anger=引導憤怒", "She felt the anger rise and breathed through it before responding. The email she wrote an hour later was completely different from the one she would have sent immediately. The pause was everything.", "心理,溝通,激勵"],
["apply", "əˈplaɪ", "v.", "申請；應用", "Apply what you learn immediately or you will forget it.", "立即應用你學到的東西，否則你會忘記它。", "Application=申請。Applied=應用的。Apply for=申請。", "application=申請/applied=應用的/apply for=申請/apply pressure=施加壓力", "She applied for the job on the last day before the deadline, half expecting rejection. The position changed her entire career. Applying is always worth the risk of a no.", "職場,教育,激勵"],
["art", "ɑːrt", "n.", "藝術；技巧", "There is an art to listening that most people never master.", "傾聽是一門技巧，大多數人從未掌握。", "Art form=藝術形式。State of the art=最先進的。Artful=巧妙的。", "art form=藝術形式/state of the art=最先進的/artful=巧妙的/work of art=藝術作品", "She treated every conversation as an art form—choosing words the way a painter chooses colors. Not to perform but because she believed people deserved language that honored them.", "藝術,溝通,哲學"],
["average", "ˈævərɪdʒ", "adj./n.", "平均的", "The gap between average and excellent is consistent effort.", "平均和優秀之間的差距是持之以恆的努力。", "Above average=高於平均。On average=平均而言。Average out=平均起來。", "above average=高於平均/on average=平均而言/average out=平均起來/below average=低於平均", "She refused to accept average as a destination. Not from ego—she simply found mediocrity uncomfortable. Every day she asked: is this my best? If yes enough. If no one more effort.", "激勵,教育,哲學"],
["body", "ˈbɒdi", "n.", "身體", "Your body remembers what your mind tries to forget.", "你的身體記住了你的思維試圖忘記的東西。", "Body language=肢體語言。Body of work=作品集。Mind and body=身心。", "body language=肢體語言/body of work=作品集/mind and body=身心/body clock=生理時鐘", "She noticed her body tightened every time she walked into that meeting room. The signal was clearer than any thought. She had learned to read her physical reactions as honest advisors.", "健康,心理,哲學"],
["bright", "braɪt", "adj.", "明亮的；聰明的", "Look on the bright side—not to deny difficulty but to find the path.", "往好的方面看——不是否認困難，而是找到路徑。", "Brightly=明亮地。Brighten=使明亮。Bright idea=好主意。", "brightly=明亮地/brighten=使明亮/bright idea=好主意/look on the bright side=往好處看", "Her room had no natural light. She hung mirrors everywhere to move the light around. She was that way in meetings too—finding the brightness in problems and reflecting it back.", "激勵,日常,哲學"],
["care", "kɛər", "v./n.", "關心", "Care deeply about what you do and who you do it for.", "深切關心你做什麼以及為誰而做。", "Carefree=無憂無慮的。Careful=小心的。Take care=保重。", "carefree=無憂無慮/careful=小心的/take care=保重/care about=在乎", "She cared so visibly about her work that clients felt it before they could name it. Care is detectable. It shows up in the details no one asked for and the effort no one required.", "職場,哲學,激勵"],
["catch", "kætʃ", "v.", "抓住；趕上", "Catch yourself in old patterns before they catch you.", "在舊的模式抓住你之前先抓住自己。", "Catch up=趕上。Catch a break=得到機會。Catch on=理解。", "catch up=趕上/catch a break=得到機會/catch on=理解/catch your breath=喘口氣", "He noticed he was scrolling again—the same escape mechanism as always. He caught it early this time and redirected. The gap between noticing and changing shrank every year. That shrinking was growth.", "心理,激勵,日常"],
["certain", "ˈsɜːrtn", "adj.", "確定的", "Be certain about your values; flexible about everything else.", "對你的價值觀確定；對其他一切保持靈活。", "Certainly=肯定地。Uncertainty=不確定性。Make certain=確保。", "certainly=肯定地/uncertainty=不確定性/make certain=確保/certain amount=一定數量", "She was certain about very few things—and that certainty she held carefully. For everything else she moved through the world with open hands rather than clenched fists.", "哲學,激勵,溝通"],
["chance", "tʃɑːns", "n.", "機會", "Give yourself the chance to be wrong—that is where learning is.", "給自己犯錯的機會——那是學習的地方。", "By chance=偶然地。Take a chance=冒險。Stand a chance=有機會。", "by chance=偶然地/take a chance=冒險/stand a chance=有機會/chance encounter=偶然相遇", "She had almost not gone to the conference—too tired too busy too much to do at home. She went anyway. The conversation she had there changed the next five years of her work.", "激勵,生活,旅遊"],
["cheap", "tʃiːp", "adj.", "便宜的", "The cheapest things often cost the most in the long run.", "最便宜的東西往往長遠來看代價最高。", "Cheaply=便宜地。Dirt cheap=極便宜的。Cheap shot=不公正的攻擊。", "cheaply=便宜地/dirt cheap=極便宜/cheap shot=不公正的攻擊/cheap talk=空話", "She bought the more expensive version once. The quality lasted ten years. The cheap version she had bought before lasted eighteen months. She did the math. Quality is usually the better value.", "金融,日常,哲學"],
["climb", "klaɪm", "v.", "攀爬", "Climb at your own pace—the view is the same from every path.", "按自己的節奏攀爬——每條路上的風景都是一樣的。", "Uphill climb=艱難攀升。Climb the ladder=爬上梯子。Climber=攀登者。", "uphill climb=艱難攀升/climb the ladder=爬上梯子/mountain climb=爬山/social climb=社會晉升", "She had watched others rush to the top while she moved steadily. When she arrived she had learned every ledge along the way. The steady climbers often know the mountain better than those who raced up.", "激勵,運動,哲學"],

["cross", "krɒs", "v.", "跨越", "Cross the line from planning into doing—that is where it all begins.", "跨越從計劃到行動的界線——那是一切開始的地方。", "Crossroads=十字路口。Cross your mind=閃過腦海。Cross the finish line=越過終點線。", "crossroads=十字路口/cross your mind=閃過腦海/cross the finish line=越過終點線/cross-functional=跨部門", "She stood at a crossroads for a year. Neither direction felt right. Eventually she understood: waiting for certainty is just another way of staying still. She crossed to the road that scared her more.", "激勵,哲學,生活"],
["curiosity", "ˌkjʊəriˈɒsɪti", "n.", "好奇心", "Curiosity is the engine of all learning and most discoveries.", "好奇心是所有學習和大多數發現的引擎。", "Curious=好奇的。Satisfy your curiosity=滿足好奇心。Intellectual curiosity=知識好奇心。", "curious=好奇的/satisfy your curiosity=滿足好奇心/intellectual curiosity=知識好奇心/stay curious=保持好奇", "She maintained her childhood curiosity as an adult—not as nostalgia but as practice. Every person she met knew something she didn't. Every problem had a lesson inside. Curiosity made everything interesting.", "教育,哲學,激勵"],

["dead", "dɛd", "adj.", "死的；完全", "Dead ends are redirection in disguise—they show you where not to go.", "死路是偽裝的重定向——它們告訴你哪裡不能去。", "Deadline=截止日期。Dead end=死路。Drop dead gorgeous=驚豔地美麗。", "deadline=截止日期/dead end=死路/drop-dead gorgeous=驚豔地美麗/dead on arrival=一開始就失敗", "He had reached a dead end in his research. For months nothing worked. Then the dead end forced him sideways into a different approach. The result was better than his original direction could have produced.", "激勵,科學,哲學"],
["deal", "diːl", "v./n.", "處理；交易", "Deal with the hardest thing first—it makes everything else easier.", "先處理最難的事情——它使其他一切都更容易。", "Big deal=大事情。Deal with=處理。A good deal=很好的交易。", "big deal=大事情/deal with=處理/a good deal=很好的交易/deal breaker=破壞協議的條件", "She ate the frog every morning—started with the hardest task. Everyone else dreaded that task all day. She finished it by nine and moved through the rest with momentum and relief.", "職場,激勵"],

["drop", "drɒp", "v.", "放棄；掉落", "Drop what no longer serves you—carrying dead weight wastes living energy.", "放棄不再為你服務的東西——攜帶死重浪費生命的能量。", "Drop a habit=放棄習慣。Raindrop=雨滴。Drop everything=放下一切。", "drop a habit=放棄習慣/raindrop=雨滴/drop everything=放下一切/drop the ball=搞砸了", "She dropped the project that had consumed her for two years. The decision felt like failure. Six months later freed from it she created something better in a fraction of the time.", "激勵,生活,職場"],

["empty", "ˈɛmti", "adj.", "空的", "Empty space creates room for what needs to come next.", "空的空間為接下來需要出現的東西創造了空間。", "Empty-handed=空手的。Empty promise=空洞的承諾。Run on empty=精疲力竭。", "empty-handed=空手的/empty promise=空洞的承諾/run on empty=精疲力竭/fill the empty space=填補空白", "She cleared the wall of all the old work. The empty space felt uncomfortable at first then liberating. She began filling it only with what truly represented who she was becoming not who she had been.", "日常,哲學,藝術"],

["fear", "fɪər", "n.", "恐懼", "Fear is a signal not a verdict—learn to read it correctly.", "恐懼是一個信號，而不是一個判決——學會正確地閱讀它。", "Face your fear=面對恐懼。Fear of failure=對失敗的恐懼。Overcome fear=克服恐懼。", "face your fear=面對恐懼/fear of failure=對失敗的恐懼/overcome fear=克服恐懼/conquer fear=征服恐懼", "She made a list of everything she was afraid to do. Then she did one thing on the list each month. By year end she had done twelve terrifying things and was unrecognizable to who she had been.", "激勵,心理,生活"],

["memory", "ˈmɛməri", "n.", "記憶", "Your memories of overcoming difficulty are your most powerful resource.", "你克服困難的記憶是你最強大的資源。", "Memory lane=回憶往事。Short memory=短暫記憶。Commit to memory=記住。", "memory lane=回憶往事/short memory=短暫記憶/commit to memory=記住/photographic memory=照相式記憶", "She kept a file called evidence—every time she had done something hard survived something difficult. When doubt came she read it. Memory of capability is the most reliable antidote to fear.", "心理,激勵,教育"],
["next", "nɛkst", "adj.", "下一個", "The next step is always smaller than the fear of taking it.", "下一步總是比邁出它的恐懼要小。", "Next up=接下來。Take the next step=邁出下一步。What's next=接下來是什麼。", "next up=接下來/take the next step=邁出下一步/next chapter=下一章/thinking ahead=提前想", "She had been overwhelmed by the distance to the goal. Then someone asked: what is the next single step? Just one. She named it. She took it. The goal became a series of next steps each simple each doable.", "激勵,生活"],
["pace", "peɪs", "n.", "步調", "Set your own pace—comparison corrupts the joy of progress.", "設定你自己的步調——比較腐蝕進步的喜悅。", "Keep pace=跟上步調。Pace yourself=控制節奏。Set the pace=設定步調。", "keep pace=跟上步調/pace yourself=控制節奏/at a good pace=以良好的步調/set the pace=設定步調", "She had spent years running at other people's pace. Exhausted and always behind. The day she ran at her own pace she overtook everyone she had been chasing. Own rhythm beats borrowed speed.", "激勵,運動,哲學"],
["patience", "ˈpeɪʃəns", "n.", "耐心", "Patience is not passive—it is active trust in the process.", "耐心不是被動的——它是對過程的積極信任。", "Patient=有耐心的。Test your patience=考驗耐心。Practice patience=練習耐心。", "patient=有耐心的/test your patience=考驗耐心/practice patience=練習耐心/virtue of patience=耐心的美德", "She had mistaken impatience for energy for years. Then she learned the difference. Impatience redirected her before she arrived. Patience she found was how you let effort accumulate into results.", "激勵,哲學,心理"],
["peace", "piːs", "n.", "和平；內心平靜", "Peace of mind comes from being honest with yourself.", "內心平靜來自於對自己誠實。", "In peace=和平地。World peace=世界和平。At peace=平靜。", "in peace=和平地/world peace=世界和平/at peace=平靜/peace of mind=心安", "She had been chasing achievement for decades. Then she found that peace was available right now—not after the next goal not after solving the next problem. It was a choice available in any moment.", "哲學,激勵,心理"],
["plant", "plænt", "v.", "種植；播下種子", "Plant seeds you won't see bloom—that is faith in action.", "種植你不會看到開花的種子——那是信念的行動。", "Plant an idea=種下想法。Plant seeds=播下種子。House plant=室內植物。", "plant an idea=種下想法/plant seeds=播下種子/house plant=室內植物/plantation=種植園", "He mentored students who graduated and moved on. He never heard from most of them. Then one wrote: you changed my life. He had planted without expecting harvest. The letter came twenty years later.", "教育,激勵,自然"],
["quick", "kwɪk", "adj.", "快的", "Quick action on small problems prevents big ones.", "對小問題採取快速行動可以防止大問題。", "Quickly=快速地。Quick fix=臨時解決方案。Quick-witted=反應敏捷的。", "quickly=快速地/quick fix=臨時解決方案/quick-witted=反應敏捷的/quick learner=快速學習者", "She addressed problems quickly—not impulsively but promptly. Small fires doused immediately never became infernos. The discipline of quick response to small issues had saved her from every large crisis she could think of.", "職場,激勵"],
["sometimes", "ˈsʌmtaɪmz", "adv.", "有時", "Sometimes the best thing you can do is simply show up.", "有時候你能做的最好的事情就是簡單地出現。", "Sometimes it helps=有時很有幫助。Sometimes less is more=有時少即是多。", "sometimes it helps=有時很有幫助/sometimes when=有時當/but sometimes=但有時/sometimes less is more=有時少即是多", "She had stopped waiting for the perfect conditions to offer support. Sometimes a text message saying I am thinking of you was all someone needed. Sometimes small is exactly enough.", "社交,激勵,哲學"],
["space", "speɪs", "n.", "空間", "Create space to think—the best ideas need room to form.", "創造思考的空間——最好的想法需要空間來形成。", "Need space=需要空間。Breathing space=喘息空間。Outer space=外太空。", "need space=需要空間/breathing space=喘息空間/outer space=外太空/create space=創造空間", "She left white space in her calendar—time with no assigned task. Other people called it waste. She called it investment. Every breakthrough idea had come from time that looked from the outside like nothing.", "激勵,創意,生活"],
["subject", "ˈsʌbdʒɪkt", "n.", "主題；科目", "Choose a subject and go deep—surface knowledge is available everywhere.", "選擇一個主題並深入研究——表面知識到處都有。", "Subject matter=主題內容。Change the subject=換個話題。On the subject of=關於...的話題。", "subject matter=主題內容/change the subject=換個話題/on the subject of=關於...話題/difficult subject=困難的話題", "She had become deeply knowledgeable in one narrow subject. That depth had made her the person everyone called. Not despite the narrowness—because of it. Specialization creates scarcity. Scarcity creates value.", "教育,職場,商業"],
["narrow", "ˈnæroʊ", "adj.", "狹窄的；有限的", "She took a narrow path through the forest to reach the waterfall.", "她走了一條狹窄的小路穿過森林到達瀑布。", "Narrow-minded=心胸狹窄。Narrow escape=死裡逃生。Narrow it down=縮小範圍。", "narrow-minded=心胸狹窄/narrow escape=死裡逃生/narrow down=縮小範圍/narrow road=狹窄的路", "The path was narrow but clear. She walked slowly, watching each step. At the end was the widest view she had ever seen. The narrowest paths often open into the broadest places.", "旅遊,自然,激勵"],
["necessary", "ˈnɛsəsɛri", "adj.", "必要的", "Not everything urgent is necessary, and not everything necessary is urgent.", "不是所有緊急的事情都是必要的，也不是所有必要的事情都是緊急的。", "Necessity=必要性（名詞）。Necessarily=必然地。Take necessary steps=採取必要步驟。", "necessity=必要性/necessarily=必然地/take necessary steps=採取必要步驟/as necessary=按需要", "She made a list of what was truly necessary and crossed out everything else. The list shrank to five items. Those five, given full attention, produced everything she had hoped the full list would.", "生活,激勵,職場"],
["neighbor", "ˈneɪbər", "n.", "鄰居", "A good neighbor is someone who knows when to help and when to give space.", "好鄰居是知道何時幫助、何時給予空間的人。", "Neighborhood=鄰里（名詞）。Neighboring=鄰近的。Next-door neighbor=隔壁鄰居。", "neighborhood=鄰里/neighboring=鄰近的/next-door neighbor=隔壁鄰居/good neighbor=好鄰居", "She barely knew her neighbor's name after three years. Then a storm knocked out the power for a week. By the end, they were sharing meals and stories. Crisis creates community.", "社交,家庭,日常"],
["neutral", "ˈnjuːtrəl", "adj.", "中立的", "Stay neutral in conflicts that are not yours to resolve.", "在不屬於你解決的衝突中保持中立。", "Neutrality=中立（名詞）。Remain neutral=保持中立。Neutral ground=中立地帶。", "neutrality=中立/remain neutral=保持中立/neutral ground=中立地帶/neutral tone=中性語氣", "She had learned to hold neutral space in heated arguments — not because she had no opinion, but because she understood that her presence as a listener was more valuable than another voice.", "溝通,職場,哲學"],
["obvious", "ˈɒbviəs", "adj.", "明顯的", "The obvious answer is often wrong — look deeper before deciding.", "明顯的答案往往是錯誤的——在決定之前看得更深。", "Obviously=明顯地。It is obvious that=顯而易見。State the obvious=陳述顯而易見的事。", "obviously=明顯地/it is obvious that=顯而易見/state the obvious=陳述顯然/not so obvious=不那麼明顯", "Everyone saw the obvious solution. She asked what would happen if the obvious solution didn't exist. That question led to the breakthrough nobody had considered. The obvious blocks the possible.", "教育,哲學,職場"],
["ordinary", "ˈɔːrdɪnɛri", "adj.", "普通的", "Extraordinary results come from ordinary people doing ordinary things extraordinarily well.", "非凡的結果來自普通人把普通事情做得出奇地好。", "Extraordinarily=非凡地。Extraordinary=非凡的（反義）。Out of the ordinary=不尋常的。", "extraordinarily=非凡地/out of the ordinary=不尋常的/ordinary life=普通生活/above ordinary=超出普通", "She was, by every measure, ordinary. Same resources, same constraints, same hours in the day. What was different was the quality of her attention to each ordinary moment. That was everything.", "激勵,哲學"],
["pattern", "ˈpætərn", "n.", "模式", "Identify your patterns before they identify you.", "在你的模式識別你之前識別它們。", "Recognize a pattern=識別模式。Break a pattern=打破模式。Behavioral pattern=行為模式。", "recognize a pattern=識別模式/break a pattern=打破模式/behavioral pattern=行為模式/thought pattern=思維模式", "She reviewed her decisions over ten years and found the patterns — when she thrived, when she struggled, what conditions brought out her best. That pattern recognition was worth more than any advice she had received.", "心理,教育,激勵"],
["permanent", "ˈpɜːrmənənt", "adj.", "永久的", "Nothing is permanent — not the bad times and not the good ones.", "沒有什麼是永久的——不是壞時光，也不是好時光。", "Permanently=永久地。Permanent solution=永久解決方案。Permanent record=永久記錄。", "permanently=永久地/permanent solution=永久解決方案/permanent record=永久記錄/permanent change=永久改變", "She reminded herself that both suffering and joy were temporary. That realization made the suffering more bearable and the joy more precious. Impermanence is not a tragedy — it is the nature of everything.", "哲學,心理,激勵"],
["personal", "ˈpɜːrsənl", "adj.", "個人的", "Keep your personal standards high even when professional ones are low.", "即使職業標準低，也要保持個人標準高。", "Personally=個人地。Personal growth=個人成長。Personal space=個人空間。", "personally=個人地/personal growth=個人成長/personal space=個人空間/personal brand=個人品牌", "She had a personal code that governed everything, from how she sent emails to how she kept promises. The code was not for others to see — it was for her to live by. Character is personal.", "激勵,哲學,職場"],
["physical", "ˈfɪzɪkl", "adj.", "身體的；物質的", "Physical health is the foundation on which everything else is built.", "身體健康是建立其他一切的基礎。", "Physical fitness=體能。Physical activity=體力活動。Physical space=物理空間。", "physical fitness=體能/physical activity=體力活動/physical space=物理空間/physical health=身體健康", "She treated her body as a professional tool requiring daily maintenance. Not from vanity — from function. A well-maintained body produced energy, clarity, and resilience that no amount of strategy could substitute.", "健康,運動,生活"],
["point", "pɔɪnt", "n.", "要點；觀點", "Get to the point — people's attention is their most limited resource.", "直接說要點——人們的注意力是他們最有限的資源。", "Make a point=表達觀點。Turning point=轉折點。Point of view=觀點。", "make a point=表達觀點/turning point=轉折點/point of view=觀點/beside the point=離題了", "She learned to state her point in the first sentence, not the last. That discipline — leading with the conclusion rather than building to it — made her communication twice as effective in half the time.", "溝通,職場"],
["powerful", "ˈpaʊərfʊl", "adj.", "有力的", "The most powerful communication is quiet, clear, and consistent.", "最有力的溝通是安靜、清晰和一致的。", "Powerfully=有力地。Empower=賦能（同根）。Powerful tool=強大的工具。", "powerfully=有力地/empower=賦能/powerful tool=強大工具/powerful message=有力的訊息", "She gave powerful presentations not by speaking loudly but by speaking precisely. Every word earned its place. The pause before the key point was as deliberate as the point itself. Power lives in precision.", "溝通,職場,激勵"],
["prevent", "prɪˈvɛnt", "v.", "預防", "Preventing problems is always cheaper than fixing them.", "預防問題總是比修復問題更便宜。", "Prevention=預防（名詞）。Preventive=預防性的。Prevent mistakes=預防錯誤。", "prevention=預防/preventive=預防性的/prevent mistakes=預防錯誤/proactive prevention=積極預防", "She invested in prevention rather than correction. Regular maintenance over emergency repair. Honest conversations before they became conflicts. Small investments before problems became expensive. Foresight is the cheapest strategy.", "健康,職場,生活"],
["pride", "praɪd", "n.", "自豪；驕傲", "Take pride in your work without letting pride prevent learning.", "為你的工作感到自豪，但不要讓驕傲妨礙學習。", "Take pride in=為...感到自豪。Pride yourself on=以...為豪。Source of pride=自豪的來源。", "take pride in=為...感到自豪/pride yourself on=以...為豪/source of pride=自豪的來源/healthy pride=健康的自豪", "She took pride in her craft with humility about her knowledge. That combination — proud of the work, humble about what she still didn't know — kept her both motivated and teachable.", "激勵,哲學,職場"],
["purpose", "ˈpɜːrpəs", "n.", "目的；使命", "Purpose gives you reasons to get up when results give you reasons to stop.", "目的給你起床的理由，當結果給你停下來的理由時。", "Sense of purpose=使命感。On purpose=故意地。Find your purpose=找到你的使命。", "sense of purpose=使命感/on purpose=故意地/find your purpose=找到使命/live with purpose=有目的地生活", "She had a clear purpose that pre-dated any specific goal. When goals failed or changed, the purpose remained and generated new goals. Purpose is the root; goals are the branches.", "激勵,哲學"],
["quiet", "ˈkwaɪɪt", "adj.", "安靜的", "The quiet person in the room is often the most dangerous thinker.", "房間裡最安靜的人往往是最危險的思考者。", "Quietly=安靜地。Quiet confidence=安靜的自信。Stay quiet=保持安靜。", "quietly=安靜地/quiet confidence=安靜的自信/stay quiet=保持安靜/quiet strength=安靜的力量", "She spoke rarely but precisely. When she did speak, the room adjusted its attention. She had learned that words spoken less frequently carry more weight. Scarcity creates value even in conversation.", "溝通,哲學"],
["raise", "reɪz", "v.", "提升；提出", "Raise the bar you hold yourself to — then raise it again.", "提高你對自己持有的標準——然後再次提高。", "Raise standards=提高標準。Raise a question=提出問題。Raise funds=籌款。", "raise standards=提高標準/raise a question=提出問題/raise funds=籌款/raise awareness=提高意識", "She raised her personal standard every year — not dramatically, but consistently. Each year, the baseline became slightly higher. After ten years, the cumulative elevation was extraordinary.", "激勵,職場"],
["rare", "rɛər", "adj.", "罕見的", "Rare skills command rare rewards — become the person nobody else is.", "罕見的技能獲得罕見的回報——成為沒有其他人是的那個人。", "Rarely=很少地。Rare opportunity=難得的機會。Rare talent=罕見的才能。", "rarely=很少地/rare opportunity=難得的機會/rare talent=罕見的才能/rare combination=罕見組合", "She pursued rare combinations rather than common excellences. To be great at one thing was admirable. To be excellent at two seemingly unrelated things was almost impossible to replace.", "激勵,商業,職場"],
["react", "riˈækt", "v.", "反應", "React slowly to bad news and quickly to good opportunities.", "對壞消息緩慢反應，對好機會快速反應。", "Reaction=反應（名詞）。Overreact=過度反應。Reactive=被動反應的。", "reaction=反應/overreact=過度反應/reactive=被動反應的/proactive vs reactive=主動vs被動", "She trained herself to pause before reacting to anything upsetting. Three breaths. Then a question: Is this as important as my initial reaction suggests? Usually the answer was no. Pause is the antidote to regret.", "心理,激勵,溝通"],
["realize", "ˈrɪəlaɪz", "v.", "意識到；實現", "The most important things you realize usually arrive slowly, not suddenly.", "你意識到的最重要的事情通常是緩慢到來的，而不是突然的。", "Realization=認識（名詞）。Come to realize=逐漸意識到。Self-realization=自我實現。", "realization=認識/come to realize=逐漸意識到/self-realization=自我實現/dawning realization=逐漸醒悟", "She realized her greatest strength at 40, though it had been operating since childhood. Most people's greatest gifts are invisible to themselves. What others notice in you is worth noticing.", "激勵,心理"],
["recover", "rɪˈkʌvər", "v.", "恢復", "Recovery is not weakness — it is the investment that makes performance possible.", "恢復不是軟弱——它是讓表現成為可能的投資。", "Recovery time=恢復時間。Quick recovery=快速恢復。Recover from failure=從失敗中恢復。", "recovery time=恢復時間/quick recovery=快速恢復/recover from failure=從失敗中恢復/full recovery=完全恢復", "She scheduled recovery with the same seriousness as work. Sleep, rest, play — all managed deliberately. She had learned that sustainable output required planned recovery. The best athletes understand this. So do the best thinkers.", "健康,激勵,運動"],
["reduce", "rɪˈdjuːs", "v.", "減少", "Reduce complexity until the core becomes visible.", "減少複雜性直到核心變得可見。", "Reduction=減少（名詞）。Reduce risk=降低風險。Stress reduction=減壓。", "reduction=減少/reduce risk=降低風險/stress reduction=減壓/reduce waste=減少浪費", "She applied reduction to everything — her commitments, her possessions, her words. Every subtraction revealed something more essential. The practice of reduction became, paradoxically, one of her greatest creative acts.", "生活,哲學,激勵"],
["relationship", "rɪˈleɪʃənʃɪp", "n.", "關係", "Your relationships are the architecture of your life — build them carefully.", "你的關係是你生活的建築——要小心地建立它們。", "Build relationships=建立關係。Healthy relationship=健康的關係。Relationship skills=關係技能。", "build relationships=建立關係/healthy relationship=健康的關係/relationship skills=關係技能/long-term relationship=長期關係", "She invested in relationships during the easy times. When difficult times came, those investments paid back. The relationships she had nourished quietly became the most valuable assets she had ever accumulated.", "社交,生活,職場"],
["relief", "rɪˈliːf", "n.", "解脫；緩解", "The relief of finishing something hard is one of the purest feelings available.", "完成某件困難事情的解脫感是最純粹的感覺之一。", "Feel relief=感到解脫。Relief from stress=從壓力中解脫。Sense of relief=解脫感。", "feel relief=感到解脫/relief from stress=從壓力中解脫/sense of relief=解脫感/bring relief=帶來解脫", "She finished the project three days early and felt a wave of relief so pure it surprised her. That feeling — clean completion — was the reward she had been working toward without knowing it. Finish things.", "激勵,日常"],
["reputation", "ˌrɛpjʊˈteɪʃən", "n.", "聲譽", "Your reputation is what people say about you when you are not in the room.", "你的聲譽是人們在你不在場時對你說的話。", "Build a reputation=建立聲譽。Good reputation=好聲譽。Reputation management=聲譽管理。", "build a reputation=建立聲譽/good reputation=好聲譽/reputation management=聲譽管理/protect your reputation=保護聲譽", "She built her reputation through daily deposits of reliability, honesty, and genuine care. When she needed it most, the reputation was there — a kind of social capital accumulated over years of invisible investment.", "職場,社交,激勵"],
["response", "rɪˈspɒns", "n.", "回應", "Your response to any event is the one thing fully within your control.", "你對任何事件的回應是你完全可以控制的唯一事情。", "In response to=回應。Quick response=快速回應。Thoughtful response=深思熟慮的回應。", "in response to=回應/quick response=快速回應/thoughtful response=深思熟慮的回應/measured response=有節制的回應", "She learned to give thoughtful responses rather than immediate reactions. The pause between stimulus and response was where her best judgment lived. That gap, cultivated deliberately, saved her from countless avoidable mistakes.", "溝通,心理,哲學"],
["select", "sɪˈlɛkt", "v.", "選擇；篩選", "Select carefully — everything you choose, you un-choose everything else.", "謹慎選擇——你選擇的每一件事，你都放棄了其他所有事情。", "Selection=選擇（名詞）。Selective=有選擇性的。Hand-selected=精心挑選的。", "selection=選擇/selective=有選擇性的/hand-selected=精心挑選/carefully select=謹慎選擇", "She was highly selective — about projects, relationships, and commitments. That selectivity was not elitism. It was the recognition that her resources were finite and that good choices require saying no to good options.", "生活,激勵,哲學"],
["self", "sɛlf", "n.", "自我", "Build a strong self and your relationships, work, and resilience all improve.", "建立強大的自我，你的關係、工作和韌性都會改善。", "Self-confidence=自信。Self-aware=自我察覺的。Sense of self=自我感。", "self-confidence=自信/self-aware=自我察覺/sense of self=自我感/self-improvement=自我提升", "She invested heavily in her relationship with herself — not selfishly, but practically. The stronger and clearer her sense of self, the more she could offer to others without losing herself in the giving.", "心理,哲學,激勵"],
["smart", "smɑːrt", "adj.", "聰明的", "Being smart opens doors. Being kind keeps them open.", "聰明打開了門。善良使它們保持開放。", "Work smart=聰明地工作。Street smart=街頭智慧。Smart choice=明智的選擇。", "work smart=聰明地工作/street smart=街頭智慧/smart choice=明智的選擇/emotionally smart=情感智商高", "She was smart about many things and humble about not being smart about everything. That honest calibration — knowing where her intelligence ended — was itself a form of intelligence that most smart people lack.", "激勵,教育,哲學"],
["specific", "spɪˈsɪfɪk", "adj.", "具體的", "Be specific — vague communication produces vague outcomes.", "要具體——模糊的溝通產生模糊的結果。", "Specifically=具體地。Specific goal=具體目標。Be more specific=更具體。", "specifically=具體地/specific goal=具體目標/be more specific=更具體/specific feedback=具體反饋", "She gave specific feedback rather than general impressions. Not 'this was good' but 'the way you structured the third section made the argument much clearer.' Specificity is the engine of improvement.", "溝通,教育,職場"],
["spirit", "ˈspɪrɪt", "n.", "精神；鬥志", "Keep your spirit alive — it is harder to revive than any other capacity.", "保持你的精神活躍——它比任何其他能力都更難恢復。", "Team spirit=團隊精神。Spirit of adventure=冒險精神。Lift someone's spirit=振奮某人的精神。", "team spirit=團隊精神/spirit of adventure=冒險精神/lift someone's spirit=振奮精神/free spirit=自由的靈魂", "She kept her spirit by doing small things daily that had nothing to do with productivity — reading for pleasure, walking without purpose, talking to strangers. Those purposeless activities kept her human.", "心理,生活,哲學"],
["steady", "ˈstɛdi", "adj.", "穩定的", "Steady and consistent always beats intense and inconsistent.", "穩定而一致總是勝過激烈而不一致。", "Steady progress=穩定進展。Steady hand=穩定的手。Remain steady=保持穩定。", "steady progress=穩定進展/steady hand=穩定的手/remain steady=保持穩定/slow and steady=慢而穩定", "She was steady. Not exciting — steady. And over time, that steadiness produced outcomes that excited people could not sustain long enough to achieve.", "激勵,職場"],
["stuck", "stʌk", "adj.", "困住的", "When you feel stuck, you are usually one conversation away from becoming unstuck.", "當你感到困住時，你通常離解困只有一次對話的距離。", "Feel stuck=感到困住。Get unstuck=解除困境。Stuck in a rut=陷入老套。", "feel stuck=感到困住/get unstuck=解除困境/stuck in a rut=陷入老套/break free=突破束縛", "She had a protocol for being stuck: take a walk, talk to someone, sleep on it. Those three steps, applied in order, had never failed to generate at least one path forward. Stuck is always temporary.", "激勵,心理"],
["tendency", "ˈtɛndənsi", "n.", "傾向", "Know your tendencies — they are your autopilot, running whether you chose it or not.", "了解你的傾向——它們是你的自動駕駛儀，無論你是否選擇它都在運行。", "Natural tendency=自然傾向。Tendency to=傾向於。Human tendency=人類傾向。", "natural tendency=自然傾向/tendency to=傾向於/human tendency=人類傾向/overcome tendency=克服傾向", "She mapped her tendencies with clinical precision — what triggered her defensiveness, what activated her best work, what drained her fastest. That map made her more predictable to herself and more navigable to everyone else.", "心理,教育"],
["thankful", "ˈθæŋkfʊl", "adj.", "感謝的", "Be thankful specifically — gratitude has more power when it names what it is grateful for.", "具體地感謝——當感激之情說明它所感謝的事時，它有更大的力量。", "Thankfully=感謝地。Be thankful for=為...感謝。Deeply thankful=深深感謝。", "thankfully=感謝地/be thankful for=為...感謝/deeply thankful=深深感謝/express thanks=表達感謝", "She sent specific thank-you messages — not templates but genuine acknowledgments of specific things specific people had done. Those specific expressions of gratitude deepened every relationship they touched.", "社交,激勵"],
["thrive", "θraɪv", "v.", "茁壯成長", "Find the conditions in which you thrive and create them wherever you can.", "找到你能茁壯成長的條件，並盡可能在任何地方創造它們。", "Thrive on=因...而茁壯。Conditions to thrive=茁壯的條件。Help others thrive=幫助他人茁壯。", "thrive on=因...而茁壯/conditions to thrive=茁壯的條件/help others thrive=幫助他人茁壯/able to thrive=能夠茁壯", "She thrived in environments of high challenge and high support. Once she identified that formula, she stopped tolerating environments that were only high challenge or only high support. Knowing your conditions is power.", "激勵,職場,生活"],
["trade", "treɪd", "n./v.", "交易；交換", "Every choice is a trade — choose what you trade away as carefully as what you gain.", "每個選擇都是一種交易——像選擇你獲得的一樣謹慎地選擇你交換出去的。", "Trade off=权衡取捨。Make a trade=做交易。Trade secret=商業秘密。", "trade off=权衡取捨/make a trade=做交易/trade secret=商業秘密/fair trade=公平貿易", "She made every trade consciously. Every yes traded away a collection of nos. By seeing choices as trades rather than additions, she became more honest about what she was actually choosing.", "商業,哲學,生活"],
["trial", "ˈtraɪəl", "n.", "試驗；磨難", "Every trial teaches what no classroom can.", "每次試驗都教導課堂無法教導的東西。", "Trial and error=試錯。Stand trial=接受審判。Clinical trial=臨床試驗。", "trial and error=試錯/stand trial=接受審判/clinical trial=臨床試驗/fair trial=公正審判", "She ran small trials before large commitments. Test before invest. Try before commit. That experimental orientation reduced the cost of mistakes while increasing the accuracy of her larger decisions.", "教育,科學,激勵"],
["variety", "vəˈraɪɪti", "n.", "多樣性", "Variety in your learning inputs produces variety in your thinking outputs.", "學習輸入的多樣性產生思維輸出的多樣性。", "Wide variety=廣泛的多樣性。Variety of options=各種選項。Variety is the spice of life=變化是生活的調味品。", "wide variety=廣泛的多樣性/variety of options=各種選項/variety is the spice of life=變化是生活的調味/in a variety of ways=以各種方式", "She consumed a wide variety of ideas — from biology, philosophy, art, and engineering. The cross-pollination of those inputs created thinking that was impossible to generate from within a single discipline alone.", "教育,創意"],
["willing", "ˈwɪlɪŋ", "adj.", "願意的", "Be willing to be wrong — it is the price of being right more often.", "願意犯錯——這是更頻繁地做對的代價。", "Willingness=意願（名詞）。Willing to learn=願意學習。Ready and willing=準備好且願意。", "willingness=意願/willing to learn=願意學習/ready and willing=準備好且願意/willing to try=願意嘗試", "She was willing to be the least experienced person in any room if the room was better than where she had been. That willingness to be a beginner again, repeatedly, was the source of her accelerated growth.", "激勵,教育,哲學"],
["worthy", "ˈwɜːrði", "adj.", "有價值的；值得的", "Do work worthy of the person you are becoming.", "做值得你正在成為的那個人的工作。", "Worthwhile=值得的。Worthy of respect=值得尊重的。Unworthy=不值得的（反義）。", "worthwhile=值得的/worthy of respect=值得尊重的/unworthy=不值得的/worthy cause=值得支持的事業", "She held herself to a standard of producing only what was genuinely worthy — not perfect, but honest and good. That commitment to worthiness, applied to every output, made her work something people trusted.", "激勵,哲學,職場"],
["alive", "əˈlaɪv", "adj.", "有活力的；活著的", "Do work that makes you feel alive — not just employed.", "做讓你感到有活力的工作——而不只是有工作。", "Come alive=充滿活力。Alive with possibility=充滿可能性。Stay alive=保持活力。", "come alive=充滿活力/alive with possibility=充滿可能性/stay alive=保持活力/feel alive=感到有活力", "She had worked at jobs that paid well and left her half-dead. She had worked at projects that paid barely enough and left her feeling fully alive. She chose alive, consistently, and never regretted it.", "激勵,職場,生活"],
["apart", "əˈpɑːrt", "adv.", "分開；除...之外", "What sets you apart is not what you have but how you use it.", "讓你與眾不同的不是你擁有什麼，而是你如何使用它。", "Set apart=使與眾不同。Fall apart=崩潰。Tear apart=撕裂。", "set apart=使與眞不同/fall apart=崩潰/tear apart=撕裂/stand apart=脫穎而出", "When everything fell apart, she noticed what remained. What remained — her values, her relationships, her fundamental character — was the real foundation. Everything built on that foundation rebuilt quickly.", "激勵,哲學"],
["application", "ˌæplɪˈkeɪʃən", "n.", "應用；申請", "Knowledge without application is just information.", "沒有應用的知識只是信息。", "Practical application=實際應用。Apply for=申請。Application process=申請流程。", "practical application=實際應用/apply for=申請/application process=申請流程/real-world application=現實應用", "She tested every idea she learned against practical application. Theory that couldn't be applied was interesting but not useful. She invested most deeply in knowledge that had both intellectual depth and practical value.", "教育,職場"],
["better", "ˈbɛtər", "adj.", "更好的", "Be better than you were yesterday — that is the only comparison that matters.", "比昨天的自己更好——這是唯一重要的比較。", "Do better=做得更好。Better off=處境更好。Improve for the better=改善得更好。", "do better=做得更好/better off=處境更好/improve for the better=改善得更好/better version=更好的版本", "She measured herself only against her past self. The external comparisons — richer, faster, more recognized — never moved her. Internal comparisons — wiser, kinder, more capable — moved her every day.", "激勵,哲學"],
["brave", "breɪv", "adj.", "勇敢的", "Brave is not fearless — it is afraid and acting anyway.", "勇敢不是無畏——它是害怕但仍然行動。", "Bravely=勇敢地。Bravery=勇氣（名詞）。Brave enough=足夠勇敢。", "bravely=勇敢地/bravery=勇氣/brave enough=足夠勇敢/act bravely=勇敢地行動", "She was consistently brave — not because she felt no fear, but because she had developed a relationship with fear. She knew its texture, its triggers, and its tendency to shrink when approached directly.", "激勵,心理"],
["carry", "ˈkæri", "v.", "攜帶；承擔", "Carry your past experiences as lessons, not as burdens.", "把你過去的經驗作為教訓，而不是負擔。", "Carry on=繼續。Carry weight=有分量。Carry through=貫徹到底。", "carry on=繼續/carry weight=有分量/carry through=貫徹到底/carry the team=支撐團隊", "She carried her past lightly — as reference, not as identity. What had happened to her was part of her story, not the whole of it. The difference between those two framings was the difference between stuck and free.", "心理,哲學,激勵"],
["chief", "tʃiːf", "adj.", "主要的；最重要的", "Your chief responsibility is to the quality of your own thinking.", "你最主要的責任是你自己思維的品質。", "Chief concern=主要顧慮。Chief reason=主要原因。In chief=主要地。", "chief concern=主要顧慮/chief reason=主要原因/chief executive=首席執行官/chief editor=總編輯", "She identified her chief responsibility in every role she held. Not all responsibilities, but the chief one — the one that, if neglected, rendered all others less relevant. That clarity of priority made her remarkably effective.", "職場,激勵,教育"],
["chip", "tʃɪp", "v.", "逐漸完成", "Chip away at large goals daily and they gradually become reality.", "每天逐漸完成大目標，它們就會逐漸成為現實。", "Chip away at=逐漸削減。Chip in=貢獻；插話。Chip off the old block=一脈相承。", "chip away at=逐漸削減/chip in=貢獻/chip off the old block=一脈相承", "She chipped away at her most ambitious goal for seven years. Not dramatically — a small piece each day. The goal seemed impossible at the start. By year seven, it had been assembled piece by piece into reality.", "激勵"],
["condition", "kənˈdɪʃən", "n.", "條件；狀態", "Don't wait for perfect conditions — they never arrive.", "不要等待完美的條件——它們永遠不會到來。", "Working condition=工作條件。Condition yourself=調適自己。Ideal conditions=理想條件。", "working condition=工作條件/condition yourself=調適自己/ideal conditions=理想條件/condition for success=成功條件", "She produced her best work under imperfect conditions — because she had trained herself not to require perfect ones. That independence from ideal conditions made her extraordinarily reliable regardless of circumstances.", "激勵,職場"],
["cool", "kuːl", "adj.", "冷靜的；酷的", "Stay cool when others are heating up — your calm becomes your advantage.", "當其他人變得激動時保持冷靜——你的冷靜成為你的優勢。", "Cool down=冷靜下來。Keep cool=保持冷靜。Cool-headed=冷靜頭腦的。", "cool down=冷靜下來/keep cool=保持冷靜/cool-headed=冷靜頭腦的/play it cool=保持冷靜", "She was the coolest person in every heated room — not from detachment but from practice. She had trained calmness until it was automatic. What looked natural had been deliberately cultivated for years.", "職場,心理"],
["cover", "ˈkʌvər", "v.", "覆蓋；涵蓋", "Cover your basics before attempting the advanced.", "在嘗試高級之前覆蓋你的基礎。", "Cover all bases=涵蓋所有方面。Cover for someone=代替某人。Cover a topic=涵蓋一個主題。", "cover all bases=涵蓋所有方面/cover for someone=代替某人/cover a topic=涵蓋主題/cover the basics=涵蓋基礎", "She covered basics with meticulous care before advancing. Not because basics were more interesting — because she had learned that advanced failure is almost always a failure of basics in disguise.", "教育,職場"],
["data", "ˈdeɪtə", "n.", "數據", "Let data inform your decisions, not make them for you.", "讓數據告知你的決定，而不是替你做決定。", "Data-driven=數據驅動的。Collect data=收集數據。Data analysis=數據分析。", "data-driven=數據驅動的/collect data=收集數據/data analysis=數據分析/interpret data=解讀數據", "She valued data highly and trusted human judgment equally. Data told her what was happening. Judgment told her what it meant. Both were necessary. Neither alone was sufficient.", "科學,商業,教育"],
["depth", "dɛpθ", "n.", "深度", "Seek depth over breadth in at least one thing — it becomes your irreplaceable edge.", "在至少一件事上追求深度而不是廣度——它成為你不可替代的優勢。", "In depth=深入地。Depth of knowledge=知識深度。Lack of depth=缺乏深度。", "in depth=深入地/depth of knowledge=知識深度/lack of depth=缺乏深度/explore depth=探索深度", "She went deep in her chosen field until she saw things nobody else had seen. That depth — invisible from the surface — became the source of insights that her field had not encountered before.", "教育,職場,激勵"],
["distinct", "dɪˈstɪŋkt", "adj.", "不同的；獨特的", "Be distinctly yourself — there is no competitive advantage in being a copy.", "做獨特的自己——做一個複製品沒有競爭優勢。", "Distinction=區別（名詞）。Distinctive=有特色的。Distinctly=明顯地。", "distinction=區別/distinctive=有特色的/distinctly=明顯地/distinct advantage=明顯優勢", "She cultivated what was distinct about her — the combination of skills, perspectives, and approaches that nobody else had assembled in quite the same way. Distinctness is the only sustainable differentiation.", "激勵,商業,哲學"],
["divide", "dɪˈvaɪd", "v.", "分割；分配", "Divide your work into manageable pieces — mountains are climbed one step at a time.", "將你的工作分成可管理的部分——山是一步一步爬上去的。", "Divide and conquer=分而治之。Divided attention=分散的注意力。Divide equally=平均分配。", "divide and conquer=分而治之/divided attention=分散的注意力/divide equally=平均分配/divide time=分配時間", "She divided every overwhelming project into the smallest possible steps. The first step was always manageable. Once started, momentum carried her forward. Division is the answer to overwhelm.", "激勵,職場,教育"],
["double", "ˈdʌbl", "v.", "加倍", "Double your rate of failure — that is how you double your rate of learning.", "將你的失敗率加倍——那是你將學習率加倍的方法。", "Double check=仔細複查。Double down=加倍投入。Double your effort=加倍努力。", "double check=仔細複查/double down=加倍投入/double your effort=加倍努力/double the impact=加倍影響", "She doubled down on what was working rather than fixing what wasn't. That allocation of energy toward strength rather than weakness consistently produced better returns than the correction strategy she had tried before.", "激勵,商業"],
["draw", "drɔː", "v.", "汲取；吸引", "Draw lessons from every experience — they are the dividend on what you paid.", "從每次經歷中汲取教訓——它們是你所付出的紅利。", "Draw attention=吸引注意力。Draw a conclusion=得出結論。Draw on experience=汲取經驗。", "draw attention=吸引注意力/draw a conclusion=得出結論/draw on experience=汲取經驗/draw inspiration=汲取靈感", "She drew on experiences most people would have buried — failures, embarrassments, missed opportunities. Those experiences, mined for their lessons, became the richest source of her professional wisdom.", "激勵,教育"],
["emotional", "ɪˈmoʊʃənl", "adj.", "情感的", "Emotional intelligence is the multiplier on every other intelligence you have.", "情商是你擁有的每一種其他智慧的乘數。", "Emotionally intelligent=情商高的。Emotional support=情感支持。Emotional health=情感健康。", "emotionally intelligent=情商高的/emotional support=情感支持/emotional health=情感健康/emotional awareness=情感意識", "She had learned that emotions were data, not disturbances. Her emotional intelligence — reading feelings accurately and responding wisely — made her more effective in every professional and personal relationship she held.", "心理,職場,激勵"],
["encounter", "ɪnˈkaʊntər", "v.", "遇到；邂逅", "Encounter every person as if they might teach you something important.", "遇到每個人，就好像他們可能教你一些重要的事情一樣。", "Brief encounter=短暫的邂逅。Encounter challenges=遇到挑戰。Unexpected encounter=意外的相遇。", "brief encounter=短暫的邂逅/encounter challenges=遇到挑戰/unexpected encounter=意外的相遇/meaningful encounter=有意義的相遇", "She treated every encounter as potentially significant. Three of her most important relationships had started as brief, seemingly unimportant conversations. She had learned not to pre-judge which encounters mattered.", "社交,哲學,激勵"],
["end", "ɛnd", "n.", "結束；目的", "Every end contains the seeds of a new beginning if you look for them.", "如果你尋找的話，每一個結束都包含新開始的種子。", "In the end=最終。Means to an end=達到目的的手段。Bring to an end=使結束。", "in the end=最終/means to an end=達到目的的手段/bring to an end=使結束/end goal=最終目標", "She grieved endings properly — allowing herself to feel the loss fully before moving on. That clean grieving, practiced deliberately, cleared space for genuine new beginnings rather than the half-starts that incomplete endings produce.", "哲學,激勵,心理"],
["evidence", "ˈɛvɪdəns", "n.", "證據", "Base your beliefs on evidence and update them when the evidence changes.", "將你的信念建立在證據上，並在證據改變時更新它們。", "Gather evidence=收集證據。Hard evidence=確鑿證據。Evidence-based=基於證據的。", "gather evidence=收集證據/hard evidence=確鑿證據/evidence-based=基於證據的/lack of evidence=缺乏證據", "She changed her mind readily when presented with better evidence. Not from weakness — from commitment to truth. Those who cling to positions despite contradicting evidence are not strong; they are trapped.", "科學,教育,哲學"],
["flash", "flæʃ", "v.", "閃現；一閃", "A great idea flashed through her mind during the morning walk.", "一個好主意在她早晨散步時閃過她的腦海。", "Flash of inspiration=靈感閃現。In a flash=一瞬間。Flash card=閃卡。", "flash of inspiration=靈感閃現/in a flash=一瞬間/flash card=閃卡/news flash=新聞快訊", "The idea flashed and she wrote it down immediately. She had lost too many flashes by trusting memory. Now every flash was captured before it could escape.", "教育,創意,日常"],
["flight", "flaɪt", "n.", "飛行；逃跑", "Every long flight is an opportunity for uninterrupted reading and thinking.", "每一次長途飛行都是不間斷閱讀和思考的機會。", "Flight of fancy=奇思妙想。Take flight=起飛。In-flight=飛行中。", "flight of fancy=奇思妙想/take flight=起飛/in-flight=飛行中/overnight flight=夜間飛行", "She loved long flights. No wifi, no meetings, no interruptions. Just her, a book, and eight hours of unbroken thinking. Some of her best ideas arrived at 35,000 feet.", "旅遊,激勵"],
["flow", "floʊ", "n.", "心流；流動", "Find the activities that put you in a state of flow — they are your signal.", "找到讓你進入心流狀態的活動——它們是你的信號。", "Go with the flow=隨遇而安。Cash flow=現金流。In the flow=在狀態中。", "go with the flow=隨遇而安/cash flow=現金流/in the flow=在狀態中/flow state=心流狀態", "She entered flow regularly through her creative work. Time disappeared. Hours felt like minutes. She emerged energized rather than depleted. Flow, she had learned, was not a luxury — it was a signal of alignment.", "心理,激勵,創意"],
["frame", "freɪm", "v.", "框架；構建", "How you frame a situation determines how you experience it.", "你如何框架一個情況決定了你如何體驗它。", "Reframe=重新框架。Frame of mind=心態。Problem framing=問題框架。", "reframe=重新框架/frame of mind=心態/problem framing=問題框架/frame the question=構建問題", "She reframed every difficulty as a teacher. Not falsely — genuinely. What was this experience teaching her that a comfortable one could not? That question, asked honestly, always yielded an answer worth having.", "心理,激勵,哲學"],
["gap", "ɡæp", "n.", "差距；空隙", "The gap between where you are and where you want to be is your work.", "你所在的地方和你想去的地方之間的差距就是你的工作。", "Bridge the gap=縮短差距。Achievement gap=成就差距。Knowledge gap=知識差距。", "bridge the gap=縮短差距/achievement gap=成就差距/knowledge gap=知識差距/close the gap=縮小差距", "She mapped her gaps clearly every year — skills, knowledge, relationships, habits. That honest accounting was the foundation of her development plan. You cannot bridge a gap you have not named.", "激勵,教育,職場"],
["glad", "ɡlæd", "adj.", "高興的", "Be glad for what you have while working toward what you want.", "在努力追求你想要的同時，為你擁有的感到高興。", "Feel glad=感到高興。Glad to help=很樂意幫助。Glady=高興地。", "feel glad=感到高興/glad to help=很樂意幫助/gladly=高興地/glad you came=很高興你來了", "She practiced gladness — specifically noticing what she was genuinely glad about, every day. Not forced positivity but honest noticing. The practice, sustained, shifted her baseline from neutral to genuinely grateful.", "心理,激勵"],
["glance", "ɡlɑːns", "n.", "一瞥；一瞬", "At first glance, success looks effortless — that is the illusion to resist.", "乍一看，成功看起來毫不費力——那是要抵制的幻覺。", "At first glance=乍一看。Take a glance=瞥一眼。Quick glance=快速一瞥。", "at first glance=乍一看/take a glance=瞥一眼/quick glance=快速一瞥/glance over=快速瀏覽", "At first glance, she seemed to have made it easily. Looking closer, you saw the years of invisible work, the rejected drafts, the private struggles. Success looks effortless only from a distance.", "激勵,社交"],
["grace", "ɡreɪs", "n.", "優雅；恩典", "Handle difficulty with grace — it is one of the most admirable human qualities.", "優雅地應對困難——這是最令人欽佩的人類品質之一。", "With grace=優雅地。Grace under pressure=壓力下的優雅。Act with grace=以優雅行動。", "with grace=優雅地/grace under pressure=壓力下的優雅/act with grace=以優雅行動/graceful decline=優雅地拒絕", "She failed gracefully — acknowledging it cleanly, learning from it quickly, and moving forward without drama. That grace in failure was, paradoxically, what made people trust her with the next important thing.", "激勵,社交,哲學"],
["head", "hɛd", "n.", "頭腦；領導者", "Use your head before you use your voice — thinking before speaking saves words.", "在你用你的聲音之前使用你的頭腦——在說話之前思考節省了文字。", "Head start=領先優勢。Keep your head=保持冷靜。Head of the table=主位。", "head start=領先優勢/keep your head=保持冷靜/head of the table=主位/use your head=動動腦筋", "She paused before speaking in every meeting. That pause — just three seconds — gave her head time to sort what she really wanted to say from what she merely wanted to react with.", "溝通,職場"],
["heal", "hiːl", "v.", "療癒；恢復", "Heal your relationship with failure and you will become fearless.", "療癒你與失敗的關係，你將變得無所畏懼。", "Healing process=治癒過程。Heal yourself=療癒自己。Time heals=時間治癒一切。", "healing process=治癒過程/heal yourself=療癒自己/time heals=時間治癒一切/emotional healing=情感療癒", "She gave herself time to heal properly after setbacks — not rushing through grief, not suppressing disappointment. The healing was not weakness. It was the preparation for returning to the work fully replenished.", "健康,心理,激勵"],
["hire", "haɪər", "v.", "雇用", "Hire for character first, then for skills — skills can be taught, character cannot.", "先雇用品格，然後是技能——技能可以教，品格不能。", "Hire talent=雇用人才。New hire=新雇員。Hire and fire=雇用和解雇。", "hire talent=雇用人才/new hire=新雇員/hire and fire=雇用和解雇/hire well=善用招聘", "She hired slowly and deliberately — looking for character, curiosity, and coachability. Skills could be built. Those three qualities had to already be present. Her hiring record was the best in the company because of it.", "職場,激勵"],
["hold", "hoʊld", "v.", "持有；堅持", "Hold your ground on values but be flexible on methods.", "在價值觀上堅持立場，但在方法上靈活。", "Hold on=堅持；等等。Hold back=阻止。Hold yourself accountable=讓自己負責。", "hold on=堅持/hold back=阻止/hold yourself accountable=讓自己負責/hold space=保持空間", "She held her positions with evidence and let them go when the evidence changed. That combination — conviction today, openness tomorrow — made her both trustworthy and reliable as a thinker.", "哲學,溝通"],
["inner", "ˈɪnər", "adj.", "內心的", "Your inner voice is rarely wrong — learn to hear it clearly.", "你的內心聲音很少是錯的——學會清晰地聆聽它。", "Inner peace=內心平靜。Inner strength=內在力量。Inner critic=內心批評者。", "inner peace=內心平靜/inner strength=內在力量/inner critic=內心批評者/inner voice=內心聲音", "She had cultivated a quiet inner voice through years of reflection. The voice was not loud — it was clear. Clarity, she had found, was more useful than volume. She listened to it before making any major decision.", "心理,哲學,激勵"],
["interact", "ˌɪntərˈækt", "v.", "互動；交流", "Every interaction is an opportunity to either deposit or withdraw from the relationship account.", "每次互動都是在關係帳戶中存款或取款的機會。", "Social interaction=社會互動。Interact with=與...互動。Human interaction=人際互動。", "social interaction=社會互動/interact with=與...互動/human interaction=人際互動/meaningful interaction=有意義的互動", "She treated every interaction as consequential — not from anxiety but from care. Small moments of kindness, honesty, and attention accumulated into the deep relationships she built over decades.", "溝通,社交,激勵"],
["interest", "ˈɪntrəst", "n.", "興趣；利息", "Follow your interest further than feels comfortable — that is where mastery begins.", "跟隨你的興趣比感覺舒適更進一步——那是精通開始的地方。", "Take interest in=對...感興趣。Mutual interest=共同興趣。Interest rate=利率。", "take interest in=對...感興趣/mutual interest=共同興趣/interest rate=利率/compound interest=複利", "She followed her interests with the seriousness others reserved for obligations. Interest, she had found, was not frivolous — it was the signal pointing toward where her best work would be done.", "激勵,教育,金融"],
["joy", "dʒɔɪ", "n.", "喜悅", "Find joy in the process, not just in the outcome.", "在過程中找到喜悅，而不只是在結果中。", "Feel joy=感到喜悅。Source of joy=喜悅的來源。Pure joy=純粹的喜悅。", "feel joy=感到喜悅/source of joy=喜悅的來源/pure joy=純粹的喜悅/joyful=充滿喜悅的", "She found ways to enjoy the process of difficult work, not just its completion. That practice — finding pleasure in the doing — made difficult work sustainable and the days richer with meaning.", "激勵,哲學,生活"],
["jump", "dʒʌmp", "v.", "跳躍；跳進", "Jump at opportunities but walk away from impulsive decisions.", "抓住機會，但遠離衝動的決定。", "Jump to conclusions=倉促下結論。Take a leap=採取飛躍。Jump in=投入。", "jump to conclusions=倉促下結論/take a leap=採取飛躍/jump in=投入/jump at the chance=抓住機會", "She jumped at opportunities that aligned with her values and her direction. But she walked carefully away from options that merely looked good from the outside. Alignment, not attractiveness, was her criterion for jumping.", "激勵,哲學"],
["knowledge", "ˈnɒlɪdʒ", "n.", "知識", "Knowledge that is not applied is just information waiting to be useful.", "未被應用的知識只是等待有用的信息。", "Knowledge base=知識庫。Self-knowledge=自我認識。Common knowledge=常識。", "knowledge base=知識庫/self-knowledge=自我認識/common knowledge=常識/knowledge gap=知識差距", "She was constantly building her knowledge base — not passively accumulating information, but actively connecting, testing, and applying what she learned. Knowledge, applied, became wisdom. Applied regularly, it became mastery.", "教育,激勵"],
["lack", "læk", "n./v.", "缺乏", "Never let what you lack stop you from using what you have.", "不要讓你缺乏的東西阻止你使用你所擁有的。", "Lack of experience=缺乏經驗。Lack motivation=缺乏動力。Make up for lack=彌補缺乏。", "lack of experience=缺乏經驗/lack motivation=缺乏動力/make up for lack=彌補缺乏/no lack of=不缺乏", "She had started with more lacks than advantages. That catalogue of what was missing could have paralyzed her. Instead, she inventoried what she had and used it with such thoroughness that the lack became irrelevant.", "激勵,哲學"],
["large", "lɑːrdʒ", "adj.", "大的；廣泛的", "Think large but act small — large visions require small consistent steps.", "大處著眼，小處著手——大願景需要小的一致步驟。", "At large=大體上。Large scale=大規模。Larger picture=更大的圖景。", "at large=大體上/large scale=大規模/larger picture=更大的圖景/larger goal=更大目標", "She held a large vision and took small steps daily toward it. The vision kept her inspired. The steps kept her grounded. That combination — big dream, small action — was the entire method.", "激勵,哲學"],
["lay", "leɪ", "v.", "奠定；放置", "Lay a solid foundation before building anything significant.", "在建立任何重要的事情之前，先奠定堅實的基礎。", "Lay the groundwork=奠定基礎。Lay out=布局。Lay the foundation=打基礎。", "lay the groundwork=奠定基礎/lay out=布局/lay the foundation=打基礎/lay your cards=攤牌", "She spent the first year of every major project laying foundations — systems, relationships, knowledge — that others could not see. When the project grew, the foundation held what others' rushed starts could not support.", "職場,激勵"],
["load", "loʊd", "n.", "負擔；量", "Share the load — humans were not designed to carry everything alone.", "分擔負擔——人類不是為獨自承擔一切而設計的。", "Work load=工作量。Share the load=分擔負擔。Off-load=卸下負擔。", "work load=工作量/share the load=分擔負擔/off-load=卸下負擔/bear the load=承擔負擔", "She asked for help when her load exceeded her capacity — without embarrassment, without apology. That directness made her easy to support and made the people around her feel trusted and useful.", "激勵,社交,職場"],
["logical", "ˈlɒdʒɪkl", "adj.", "合邏輯的", "Be logical about facts and compassionate about people — the combination is wisdom.", "對事實合乎邏輯，對人充滿同情——這種組合就是智慧。", "Logical conclusion=邏輯結論。Think logically=邏輯地思考。Logical step=合理的步驟。", "logical conclusion=邏輯結論/think logically=邏輯地思考/logical step=合理的步驟/logically sound=邏輯合理", "She was logical about systems and kind about people. The two modes — precision and compassion — operated together in her best decisions. Logic without compassion is cold. Compassion without logic is unreliable.", "哲學,溝通,職場"],
["mark", "mɑːrk", "v.", "標記；留下痕跡", "Mark your progress — what is tracked is what gets managed.", "標記你的進度——被追踪的事情才是被管理的事情。", "Leave a mark=留下痕跡。Mark the occasion=紀念這個時刻。Benchmark=基準（同根）。", "leave a mark=留下痕跡/mark the occasion=紀念時刻/benchmark=基準/mark progress=標記進度", "She marked every milestone — not extravagantly, but deliberately. A note in her journal. A moment of acknowledgment. Those markings created a personal history of growth she could revisit when she doubted herself.", "激勵,生活"],
["mean", "miːn", "v.", "意味著；打算", "Mean what you say and say what you mean — clarity is kindness.", "言出必行，言為心聲——清晰是一種善意。", "Well-meaning=善意的。Meaningful=有意義的。Mean business=認真的。", "well-meaning=善意的/meaningful=有意義的/mean business=認真的/beyond what words mean=超越文字的意義", "She meant every word she said. Not dramatically — simply. That alignment between what she thought, what she said, and what she did was the foundation of everything trustworthy about her.", "溝通,哲學"],
["much", "mʌtʃ", "adv.", "很多；非常", "Much of what looks like talent is simply consistent effort applied over time.", "許多看起來像才能的東西只是隨時間應用的一致努力。", "As much as=和...一樣多。Much of=許多。More than much=超過很多。", "as much as=和...一樣多/much of=許多/not much=不多/as much as possible=盡可能多", "She had seen much that looked like natural talent on closer inspection turn out to be consistent effort that had become invisible through years of repetition. She respected the effort more than the appearance of talent.", "激勵,教育"],
["nurture", "ˈnɜːrtʃər", "v.", "培養；養育", "Nurture your talents the way a gardener nurtures seedlings.", "像園丁培育幼苗一樣培養你的才能。", "Nurturing=有培育性的。Nurture vs nature=後天培育與先天本性。Nurture relationships=培養關係。", "nurturing=有培育性/nature vs nurture=先後天之爭/nurture talent=培養才能/nurture growth=培育成長", "She nurtured her team's ideas with patience, water, and light. Three years later the garden was unrecognizable from the bare soil she had started with.", "職場,教育,激勵"],
["observe", "əbˈzɜːrv", "v.", "觀察；遵守", "Observe carefully before drawing any conclusions about anything.", "在對任何事情下結論之前仔細觀察。", "Observation=觀察（名詞）。Observer=觀察者。Observant=觀察力強的。", "observation=觀察/observant=觀察力強/closely observe=仔細觀察/observe the rules=遵守規定", "She observed without judgment for the first week. Only after she truly understood the situation did she offer her perspective. Observation before opinion is wisdom.", "科學,哲學,教育"],
["obtain", "əbˈteɪn", "v.", "獲得；取得", "Obtain knowledge through curiosity, not just through necessity.", "通過好奇心而不只是通過需要來獲得知識。", "Obtainable=可獲得的。Hard to obtain=難以獲得。Obtain permission=取得許可。", "obtainable=可獲得的/hard to obtain=難以獲得/obtain permission=取得許可/obtain results=取得結果", "He obtained his certification not for the certificate but for the knowledge. The credential opened doors. The knowledge built what was inside them.", "教育,職場"],
["ownership", "ˈoʊnərʃɪp", "n.", "所有權；主人翁精神", "Take ownership of your results instead of crediting luck or blaming others.", "對你的結果承擔主人翁責任，而不是將功勞歸於運氣或責怪他人。", "Sense of ownership=主人翁感。Take ownership=承擔責任。Ownership mentality=主人翁心態。", "sense of ownership=主人翁感/take ownership=承擔責任/ownership mentality=主人翁心態/collective ownership=集體所有", "When the project failed, she took full ownership — no blame, no excuses. When it succeeded the next time, she gave the credit away. That pattern built extraordinary loyalty around her.", "職場,激勵,哲學"],
["participate", "pɑːrˈtɪsɪpeɪt", "v.", "參與", "Participate fully in your own life instead of watching it from the side.", "完全參與你自己的生活，而不是從旁邊觀看它。", "Participation=參與（名詞）。Active participation=積極參與。Participate in=參與...。", "participation=參與/active participation=積極參與/full participation=完全參與/encourage participation=鼓勵參與", "She stopped waiting to be invited and started showing up. The meetings she attended without invitation were the ones that shaped her career most. Participation is the starting point of influence.", "職場,激勵"],
["permission", "pərˈmɪʃən", "n.", "許可；允許", "Stop waiting for permission to do great work — give it to yourself.", "停止等待做偉大工作的許可——給自己許可。", "Ask permission=尋求許可。Grant permission=授予許可。Permission to fail=允許失敗。", "ask permission=尋求許可/grant permission=授予許可/seek permission=尋求許可/written permission=書面許可", "She had spent years waiting for someone to tell her she was ready. Then she realized: nobody gives that permission. The work itself decides. Start, and readiness follows.", "激勵,哲學"],
["practical", "ˈpræktɪkl", "adj.", "實用的；務實的", "Be practical in your methods and ambitious in your goals.", "在方法上務實，在目標上有抱負。", "Practically=實際上。Practical approach=實際方法。Impractical=不實際的（反義）。", "practically=實際上/practical approach=實際方法/impractical=不實際的/practical experience=實際經驗", "She combined vision with practicality — she dreamed at the level of ambition and planned at the level of execution. Neither alone was sufficient. Together they were unstoppable.", "職場,激勵,哲學"],
["precise", "prɪˈsaɪs", "adj.", "精確的；確切的", "Precise language prevents ninety percent of misunderstandings.", "精確的語言可以防止百分之九十的誤解。", "Precisely=精確地。Precision=精確（名詞）。Imprecise=不精確的（反義）。", "precisely=精確地/precision=精確/imprecise=不精確的/with precision=精確地", "She edited her emails until the meaning was precise enough to have only one interpretation. That discipline added five minutes to each email and eliminated hours of follow-up clarification.", "溝通,職場,教育"],
["refine", "rɪˈfaɪn", "v.", "精煉；改進", "Refine your work until it cannot be improved further, then release it.", "精煉你的工作，直到它無法進一步改善，然後發布它。", "Refined=精煉的。Refinement=改進（名詞）。Refine your skills=磨練技能。", "refined=精煉的/refinement=改進/refine your skills=磨練技能/continual refinement=持續改進", "She refined her presentations until every slide had a single clear point. The audience could follow without effort. Clarity, she had learned, is not a constraint on intelligence. It is its expression.", "職場,溝通,藝術"],
["release", "rɪˈliːs", "v.", "釋放；發布", "Release what no longer serves you to make room for what will.", "釋放不再服務你的東西，為將服務你的東西騰出空間。", "Press release=新聞稿。Release from=從...釋放。Release the pressure=釋放壓力。", "press release=新聞稿/release from=從...釋放/release the pressure=釋放壓力/release control=放開控制", "She practiced releasing outcomes she could not control. Not passively — she did the work, then let go. That combination — maximum effort, minimum attachment — produced her best results.", "哲學,激勵,心理"],
["remain", "rɪˈmeɪn", "v.", "保持；留下", "Remain consistent when everything around you is changing.", "當你周圍的一切都在變化時保持一致。", "Remain calm=保持冷靜。Remain focused=保持專注。Remains to be seen=有待觀察。", "remain calm=保持冷靜/remain focused=保持專注/remains to be seen=有待觀察/remain true to=忠於", "She remained true to her values when staying true was expensive. That consistency — visible to everyone over years — built the kind of trust that no amount of good performance could manufacture alone.", "激勵,哲學,職場"],
["remarkable", "rɪˈmɑːrkəbl", "adj.", "非凡的；引人注目的", "Remarkable work is ordinary work done with extraordinary care.", "非凡的工作是以非凡的關心做的普通工作。", "Remarkably=非凡地。Remark=備注（名詞）。Worth remarking=值得注意。", "remarkably=非凡地/remarkable achievement=非凡成就/truly remarkable=真正非凡/remarkable person=非凡的人", "She was called remarkable by people who had never watched her work. Those who had watched knew: she was methodical, not miraculous. Remarkable results have unremarkable daily explanations.", "激勵,教育,哲學"],
["respond", "rɪˈspɒnd", "v.", "回應；反應", "How you respond to adversity is the truest measure of your character.", "你如何回應逆境是衡量你性格最真實的標準。", "Response=回應（名詞）。Responsive=反應靈敏的。Respond thoughtfully=深思熟慮地回應。", "response=回應/responsive=反應靈敏的/respond thoughtfully=深思熟慮地回應/initial response=最初的回應", "She paused three seconds before responding to any provocation. That pause — practiced until automatic — changed the quality of her reactions from impulsive to considered. Three seconds changed her reputation.", "溝通,心理,激勵"],
["reward", "rɪˈwɔːrd", "v./n.", "獎勵；回報", "Reward effort as well as outcome — it sustains the behavior you want.", "獎勵努力以及結果——它維持你想要的行為。", "Reward yourself=獎勵自己。Well-deserved reward=應得的獎勵。Intrinsic reward=內在獎勵。", "reward yourself=獎勵自己/well-deserved reward=應得的獎勵/intrinsic reward=內在獎勵/risk and reward=風險與回報", "She built small rewards into her system for completing important work. Not external validation — private celebrations. A walk after a difficult piece. A cup of good coffee after finishing a draft. Rituals matter.", "激勵,生活,心理"],
["root", "ruːt", "n.", "根；根源", "Find the root cause of any recurring problem and fix that instead of the symptoms.", "找到任何反復出現問題的根本原因，並修復它而不是症狀。", "Root cause=根本原因。Take root=生根。Uproot=拔根（反義）。", "root cause=根本原因/take root=生根/get to the root=找到根本/deep roots=深根", "She was known for finding root causes nobody else had identified. While others treated symptoms, she asked: what is creating this? That question, asked persistently, solved permanent problems.", "教育,職場,哲學"],
["settle", "ˈsɛtl", "v.", "解決；安定；接受", "Never settle for less than you are capable of — capable people become what they settle for.", "永遠不要接受比你有能力的更少——有能力的人會成為他們接受的樣子。", "Settle down=定居；平靜下來。Settle for=接受（較少的）。Reach a settlement=達成和解。", "settle down=定居/settle for=接受較少/reach a settlement=達成和解/never settle=永不妥協", "She refused to settle for good when excellent was achievable. Not from perfectionism — from self-respect. Accepting less than her capability was, she had decided, a form of self-betrayal.", "激勵,哲學"],
["silence", "ˈsaɪləns", "n.", "沉默；安靜", "Use silence strategically — it is more powerful than most words.", "策略性地使用沉默——它比大多數話語更有力量。", "Stay silent=保持沉默。In silence=在沉默中。Comfortable silence=舒適的沉默。", "stay silent=保持沉默/in silence=在沉默中/comfortable silence=舒適的沉默/deafening silence=震耳欲聾的沉默", "She learned to be comfortable with silence in negotiations. The other party always felt compelled to fill it. The information they offered to fill the silence was invaluable. Silence is the most underused tool.", "溝通,職場,哲學"],
["stable", "ˈsteɪbl", "adj.", "穩定的", "Build a stable foundation before pursuing growth — foundations matter.", "在追求成長之前建立穩定的基礎——基礎很重要。", "Stability=穩定（名詞）。Stable income=穩定收入。Emotionally stable=情緒穩定的。", "stability=穩定/stable income=穩定收入/emotionally stable=情緒穩定/keep stable=保持穩定", "She was emotionally stable not because nothing affected her, but because she had built inner anchors — values, routines, relationships — that held firm when everything external shifted.", "激勵,心理,生活"],
["structure", "ˈstrʌktʃər", "n.", "結構", "Create enough structure to enable freedom, not to prevent it.", "創建足夠的結構來實現自由，而不是阻止它。", "Organizational structure=組織結構。Add structure=增加結構。Unstructured=無結構的。", "organizational structure=組織結構/add structure=增加結構/unstructured=無結構的/build structure=建立結構", "She gave her team structure — clear goals, clear timelines, clear responsibilities — and then maximum autonomy within that structure. Structure as a container for freedom, not a cage against it.", "職場,教育"],
["sufficient", "səˈfɪʃnt", "adj.", "足夠的", "Sufficient preparation is more useful than perfect preparation that never finishes.", "足夠的準備比從未完成的完美準備更有用。", "Sufficiently=足夠地。Insufficient=不足的（反義）。More than sufficient=超過足夠。", "sufficiently=足夠地/insufficient=不足的/more than sufficient=超過足夠/sufficient evidence=足夠的證據", "She learned to distinguish between sufficient and perfect. Perfect was the enemy of shipped. Sufficient, delivered on time and iterated upon, consistently beat perfect that arrived late or never.", "職場,激勵,哲學"],
["teamwork", "ˈtiːmwɜːrk", "n.", "團隊合作", "Teamwork produces outcomes that no individual, however talented, can match.", "團隊合作產生任何個人，無論多有才能，都無法匹敵的結果。", "Team player=團隊合作者。Foster teamwork=促進團隊合作。Effective teamwork=有效的團隊合作。", "team player=團隊合作者/foster teamwork=促進團隊合作/effective teamwork=有效的團隊合作/spirit of teamwork=團隊精神", "She hired people whose strengths were her weaknesses and then trusted them to apply those strengths. That trust — genuine, not performative — was the foundation of the most effective team she had ever built.", "職場,激勵,社交"],
["tolerance", "ˈtɒlərəns", "n.", "容忍；寬容", "Tolerance of ambiguity is the key skill for thriving in a complex world.", "對模糊性的容忍是在複雜世界中蓬勃發展的關鍵技能。", "Tolerant=容忍的（形容詞）。Tolerate=容忍（動詞）。Zero tolerance=零容忍。", "tolerant=容忍的/tolerate=容忍/zero tolerance=零容忍/cultivate tolerance=培養容忍", "She was comfortable not knowing, not deciding, not having answers. That tolerance for ambiguity — uncomfortable for most — meant she could hold problems open longer and find better solutions.", "教育,哲學,職場"],
["tone", "toʊn", "n.", "語氣；基調", "The tone of your communication changes how the content is received.", "你溝通的語氣改變了內容被接受的方式。", "Set the tone=定下基調。Tone of voice=語氣。In a positive tone=以積極的語氣。", "set the tone=定下基調/tone of voice=語氣/in a positive tone=以積極語氣/strike the right tone=找到合適的語氣", "She was acutely aware of tone — in emails, in meetings, in casual conversations. The same content, delivered with different tone, could inspire or deflate. She chose tone with the same care she chose words.", "溝通,職場"],
["track", "træk", "v.", "追踪；記錄", "Track what matters and ignore what doesn't — measurement shapes behavior.", "追踪重要的事情，忽略不重要的——衡量塑造行為。", "Track record=業績記錄。Keep track of=追踪。Track progress=追踪進度。", "track record=業績記錄/keep track of=追踪/track progress=追踪進度/on track=按計劃", "She tracked three metrics weekly: output quality, relationship quality, and personal energy. Not productivity — those three specific things. What you measure, she had learned, is what you manage.", "職場,激勵,生活"],
["treat", "triːt", "v.", "對待；處理", "Treat every person with dignity regardless of their status or role.", "無論地位或角色，以尊嚴對待每個人。", "Treat fairly=公平對待。Treat with respect=以尊重對待。Special treatment=特殊待遇。", "treat fairly=公平對待/treat with respect=以尊重對待/special treatment=特殊待遇/treat yourself=善待自己", "She treated the cleaner and the CEO with identical courtesy. Not as a strategy but as a principle. The cleaner noticed. The CEO noticed. Both remembered. How you treat people is who you are.", "社交,職場,哲學"],
["trend", "trɛnd", "n.", "趨勢；潮流", "Identify trends early and position yourself ahead of where things are going.", "早期識別趨勢，在事情走向的前方定位自己。", "Follow a trend=跟隨趨勢。Trend-setter=潮流引領者。Against the trend=逆潮流。", "follow a trend=跟隨趨勢/trend-setter=潮流引領者/against the trend=逆潮流/emerging trend=新興趨勢", "She read widely to detect trends across disciplines before they reached her own field. That cross-disciplinary awareness consistently put her two years ahead of the industry she served.", "商業,教育,科技"],
["true", "truː", "adj.", "真實的；忠實的", "Be true to yourself even when it is costly — the alternative is costlier.", "即使代價高昂，也要忠於自己——另一種選擇代價更高。", "Ring true=聽起來真實。Stay true=保持真實。True to your values=忠於你的價值觀。", "ring true=聽起來真實/stay true=保持真實/true to your values=忠於價值觀/the true story=真實的故事", "She was true to herself in the small moments when it would have been easy to bend. That consistency — unremarkable in isolation, extraordinary in accumulation — became the most reliable thing about her.", "激勵,哲學"],
["uncertainty", "ʌnˈsɜːrtnti", "n.", "不確定性", "Make peace with uncertainty — it will always be present.", "與不確定性和平相處——它將永遠存在。", "Live with uncertainty=與不確定性共存。Face uncertainty=面對不確定性。Embrace uncertainty=擁抱不確定性。", "live with uncertainty=與不確定性共存/face uncertainty=面對不確定性/embrace uncertainty=擁抱不確定性/navigate uncertainty=駕馭不確定性", "She had stopped requiring certainty before acting. Instead she required clarity of purpose, sufficient information, and reversibility if wrong. That trio replaced certainty as her decision-making standard.", "哲學,激勵,商業"],
["unexpected", "ˌʌnɪkˈspɛktɪd", "adj.", "意外的；出乎預料的", "Some of the best things are unexpected — stay open to them.", "一些最好的事情是意外的——對它們保持開放。", "Expect the unexpected=期待意外。Unexpected opportunity=意外的機會。Pleasantly unexpected=愉快的意外。", "expect the unexpected=期待意外/unexpected opportunity=意外的機會/pleasantly unexpected=愉快的意外/take an unexpected turn=走向意外轉折", "She left margin in every day for the unexpected. Not emptiness — margin. That space for the unplanned was where the most interesting things in her professional life consistently happened.", "哲學,生活,激勵"],
["vocal", "ˈvoʊkl", "adj.", "大聲的；直言的", "Be vocal about what you stand for and people who share those values will find you.", "大聲說出你所堅持的，有相同價值觀的人就會找到你。", "Vocalize=表達。Vocal advocate=直言的倡導者。Speak up=發聲（同義）。", "vocalize=表達/vocal advocate=直言的倡導者/speak up=發聲/be vocal about=公開表達", "She was vocal about her values — not loudly, but clearly. People who shared them were drawn to her. People who didn't know where she stood. Both outcomes were useful.", "溝通,激勵,社交"],
["workload", "ˈwɜːrkloʊd", "n.", "工作量", "Manage your workload before it manages you.", "在工作量管理你之前管理它。", "Heavy workload=繁重的工作量。Reduce workload=減少工作量。Share the workload=分擔工作量。", "heavy workload=繁重的工作量/reduce workload=減少工作量/share the workload=分擔工作量/manage workload=管理工作量", "She reviewed her workload every Friday: what was essential, what could be delegated, what could be eliminated. That weekly audit prevented the accumulation of busyness that mistook itself for productivity.", "職場,生活"],
["yield", "jiːld", "v.", "產生；屈服", "Yield results through consistency rather than through heroic effort.", "通過一致性而不是英雄式的努力產生結果。", "High yield=高產量。Yield to pressure=屈服於壓力。Yield results=產生結果。", "high yield=高產量/yield to pressure=屈服於壓力/yield results=產生結果/yield ground=讓步", "She applied consistent daily effort rather than sporadic intense effort. The yield of her steady approach over a decade exceeded what three times her early effort could have produced in bursts.", "激勵,農業,商業"],
["zone", "zoʊn", "n.", "區域；狀態", "Create conditions for your zone state — that is where your best work lives.", "為你的心流狀態創造條件——那是你最好的工作所在。", "Comfort zone=舒適圈。In the zone=進入狀態。Zone of proximal development=最近發展區。", "comfort zone=舒適圈/in the zone=進入狀態/zone of proximal development=最近發展區/strike zone=打擊區", "She knew exactly what conditions helped her enter her zone: early morning, silence, a clear task, a cup of tea. She protected those conditions jealously. The zone cannot be forced, but it can be invited.", "激勵,生活,心理"],
["absent-minded", "ˈæbsənt ˈmaɪndɪd", "adj.", "心不在焉的", "He was so absent-minded that he forgot his own birthday.", "他心不在焉到忘記了自己的生日。", "Absent+mind=心思不在。Absent-mindedly=心不在焉地。", "absent-mindedly=心不在焉地/lost in thought=沉浸在思緒中", "He walked into the kitchen and forgot why. He stood there, laughing at himself. Being absent-minded, he decided, was proof he was thinking deeply about something important.", "日常,心理"],
["accelerate", "əkˈsɛləreɪt", "v.", "加速", "Accelerate your learning by teaching what you know to others.", "通過向他人教授你所知道的來加速你的學習。", "Acceleration=加速（名詞）。Accelerate growth=加速成長。Decelerate=減速（反義）。", "acceleration=加速/accelerate growth=加速成長/accelerate change=加速改變/rapid acceleration=快速加速", "She accelerated her progress not by working harder but by finding the highest-leverage activities and focusing exclusively on those. Acceleration comes from selection, not effort multiplication.", "激勵,商業,職場"],
["accommodate", "əˈkɒmədeɪt", "v.", "容納；適應；遷就", "Accommodate different working styles without compromising on standards.", "在不妥協標準的情況下適應不同的工作風格。", "Accommodating=善於配合的。Accommodation=住宿；適應（名詞）。Accommodate change=適應改變。", "accommodating=善於配合的/accommodation=住宿/accommodate needs=滿足需求/flexible accommodation=靈活調適", "She accommodated the different rhythms of her team members — early birds and night owls, sprinters and marathon runners. Uniform conditions produce uniform mediocrity. Adapted conditions produce varied excellence.", "職場,教育"],
["achievement", "əˈtʃiːvmənt", "n.", "成就；成績", "Your greatest achievement is becoming the person capable of your next one.", "你最偉大的成就是成為有能力達到下一個的那個人。", "Academic achievement=學業成就。Major achievement=重大成就。Sense of achievement=成就感。", "academic achievement=學業成就/major achievement=重大成就/sense of achievement=成就感/lifelong achievement=終身成就", "She looked at her biggest achievement and asked: who did I have to become to achieve this? Then she identified who she needed to become for the next one. Achievement is a mirror showing you who you are.", "激勵,教育"],
["acknowledge", "əkˈnɒlɪdʒ", "v.", "承認；致謝", "Acknowledge contributions — people remember who noticed their effort.", "承認貢獻——人們記住誰注意到了他們的努力。", "Acknowledgment=致謝；承認（名詞）。Acknowledge a mistake=承認錯誤。Publicly acknowledge=公開承認。", "acknowledgment=致謝/acknowledge a mistake=承認錯誤/publicly acknowledge=公開承認/acknowledge receipt=確認收到", "She acknowledged every contribution — small and large, public and invisible. That habit of recognition created an environment where people felt seen. Feeling seen is one of the deepest human needs.", "溝通,職場,社交"],
["addiction", "əˈdɪkʃən", "n.", "上癮；沉迷", "Beware of addiction to distraction — it is the most common thief of potential.", "警惕對分心的上癮——它是最常見的潛力小偷。", "Addictive=令人上癮的。Addicted to=沉迷於。Break an addiction=戒除上癮。", "addictive=令人上癮的/addicted to=沉迷於/break an addiction=戒除上癮/digital addiction=數位上癮", "She noticed she was addicted to checking her phone — the micro-hits of dopamine from every notification. She turned off all notifications. The withdrawal was real. The clarity that followed was extraordinary.", "健康,科技,心理"],
