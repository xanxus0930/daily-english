["anomaly", "əˈnɒməli", "n.", "異常；反常", "The data anomaly pointed to a fundamental flaw in the model.", "數據異常指向了模型中的根本性缺陷。", "A+nomal+y→不符合規律的事→異常。", "statistical anomaly=統計異常/anomaly detection=異常檢測/identify an anomaly=識別異常", "She always investigated anomalies. The others ignored them. Anomalies are often the beginning of a new theory.", "學術,科學,數據"],

["contingent", "kənˈtɪndʒənt", "adj.", "取決於…的；偶然的", "Success is contingent on both preparation and timing.", "成功取決於準備和時機兩者。", "Conting+ent→接觸到就可能發生的→取決於。", "contingent on=取決於/contingency plan=應急計劃/highly contingent=高度不確定的", "He learned that most outcomes were contingent on factors he had not considered. Humility made him a better planner.", "哲學,商業,學術"],

var S = {
  g: function(k, def) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; } },
  s: function(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  get xp()     { return this.g('de_xp', 0); },      set xp(v)     { this.s('de_xp', v); },
  get wv()     { return this.g('de_wv', 0); },      set wv(v)     { this.s('de_wv', v); },
  get days()   { return this.g('de_days', []); },   set days(v)   { this.s('de_days', v); },
  get saved()  { return this.g('de_saved', []); },  set saved(v)  { this.s('de_saved', v); },
  get maxDay() { return this.g('de_maxday', 0); },  set maxDay(v) { this.s('de_maxday', v); },
  get accent() { return this.g('de_accent', 'us'); },set accent(v){ this.s('de_accent', v); }
};

// ══════════════════════════════════════════════
function getStartDate() {
  var v = localStorage.getItem('de_start');
  return v ? v : '2025-01-01';
}
function getDay() {
  var start = new Date(getStartDate());
  var now = new Date();
  var diff = Math.floor((now - start) / 86400000) + 1;
  return Math.max(1, diff);
}
function getDaysForLv(l) {
  var bank = WORDS[l] || [];
  return Math.ceil(bank.length / 15);
}
function isUnlocked(l) {
  if (l === 'b') return true;
  var bDays = getDaysForLv('b');
  if (l === 'i') return S.maxDay >= bDays;
  if (l === 'a') return S.maxDay >= bDays + getDaysForLv('i');
  return false;
}
function getActiveLv() {
  if (isUnlocked('a')) return 'a';
  if (isUnlocked('i')) return 'i';
  return 'b';
}
function initDaily() {
  lv = getActiveLv();
  var bank = WORDS[lv] || [];
  var PER = 15;
  var day = getDay();
  var off = (day - 1);
  var start = (off * PER) % Math.max(1, bank.length);
  todayWords = [];
  for (var i = 0; i < PER; i++) todayWords.push(bank[(start + i) % bank.length]);
  var rOff = Math.max(0, off - 3);
  var rStart = (rOff * PER) % Math.max(1, bank.length);
  reviewWords = [];
  for (var i = 0; i < PER; i++) reviewWords.push(bank[(rStart + i) % bank.length]);
  // Track day
  var today = new Date().toISOString().slice(0,10);
  var days = S.days;
  if (days.indexOf(today) < 0) { days.push(today); S.days = days; }
  if (day > S.maxDay) S.maxDay = day;
  wIdx = 0;
}

function setAccent(a) {
  currentAccent = a;
  S.accent = a;
  document.getElementById('acc-us').className = a === 'us' ? 'on' : '';
  document.getElementById('acc-uk').className = a === 'uk' ? 'on' : '';
}
function getBestVoice(lang) {
  var voices = speechSynthesis.getVoices();
  var matches = voices.filter(function(v) { return v.lang.startsWith(lang); });
  return matches[0] || null;
}
function speak(text, rate) {
  if (!text) return;
  speechSynthesis.cancel();
  var lang = currentAccent === 'uk' ? 'en-GB' : 'en-US';
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = rate || 0.9;
  var v = getBestVoice(lang);
  if (v) utt.voice = v;
  speechSynthesis.speak(utt);
}

function pronListen() { speak(todayWords[wIdx % todayWords.length][0], 0.7); }
function toggleRec() {
  if (!isRecording) startRec(); else stopRec();
}
function startRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此瀏覽器不支援語音辨識'); return; }
  recog = new SR();
  recog.lang = currentAccent === 'uk' ? 'en-GB' : 'en-US';
  recog.interimResults = false;
  recog.onresult = function(e) {
    var heard = e.results[0][0].transcript.toLowerCase().trim();
    var conf = e.results[0][0].confidence;
    var target = todayWords[wIdx % todayWords.length][0].toLowerCase();
    var score = calcSimilarity(target, heard, conf);
    showPronScore(score, heard, target);
    addXP(score >= 80 ? 5 : 2);
  };
  recog.onerror = function() { stopRecUI(); toast('辨識失敗，請再試一次'); };
  recog.onend = function() { stopRecUI(); };
  recog.start();
  isRecording = true;
  document.getElementById('rec-btn').className = 'pbtn rec active';
  document.getElementById('rec-txt').textContent = '停止錄音';
}
function stopRec() { if (recog) recog.stop(); stopRecUI(); }
function stopRecUI() {
  isRecording = false;
  document.getElementById('rec-btn').className = 'pbtn rec';
  document.getElementById('rec-txt').textContent = '開始錄音';
}
function calcSimilarity(a, b, conf) {
  a = a.toLowerCase().replace(/[^a-z]/g,'');
  b = b.toLowerCase().replace(/[^a-z]/g,'');
  if (a === b) return 100;
  var m = a.length, n = b.length;
  var dp = [];
  for (var i = 0; i <= m; i++) { dp[i] = []; for (var j = 0; j <= n; j++) dp[i][j] = 0; }
  for (var i = 0; i <= m; i++) dp[i][0] = i;
  for (var j = 0; j <= n; j++) dp[0][j] = j;
  for (var i = 1; i <= m; i++) for (var j = 1; j <= n; j++) {
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  }
  var base = Math.round((1 - dp[m][n] / Math.max(m, n)) * 100);
  return Math.min(100, Math.round(base * 0.7 + (conf || 0.8) * 30));
}
function showPronScore(score, heard, target) {
  var el = document.getElementById('pron-result');
  el.style.display = '';
  var arc = document.getElementById('score-arc');
  var numEl = document.getElementById('score-num');
  var circ = 2 * Math.PI * 32;
  var offset = circ * (1 - score / 100);
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--amber)' : 'var(--red)';
  numEl.textContent = score;
  document.getElementById('score-heard').textContent = '你說了: "' + heard + '"';
  var tips = score >= 90 ? '太棒了！發音非常準確！🎉' :
             score >= 75 ? '很好！注意強調重音位置。' :
             score >= 60 ? '還不錯！多練習幾次，注意清楚地說每個音節。' :
             '再試一試！先聽範例，再慢慢模仿。目標：' + target;
  document.getElementById('score-tips').textContent = tips;
}

function doSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    var q = document.getElementById('search-inp').value.trim().toLowerCase();
    var resultsEl = document.getElementById('search-results');
    if (!q) {
      resultsEl.innerHTML = '<div class="search-empty"><div class="icon">🔍</div><p>輸入英文單字或中文意思<br>搜尋全部單字庫</p></div>';
      return;
    }
    // Build all words
    var all = [];
    ['b','i','a'].forEach(function(l) {
      (WORDS[l] || []).forEach(function(w){ all.push({w:w, lv:l}); });
    });
    var matches = all.filter(function(item) {
      var w = item.w;
      return (w[0]||'').toLowerCase().includes(q) ||
             (w[3]||'').includes(q) ||
             (w[4]||'').toLowerCase().includes(q);
    });
    if (!matches.length) {
      resultsEl.innerHTML = '<div class="search-empty"><p>找不到「' + q + '」的相關單字</p></div>';
      return;
    }
    var lvColors = {b:'var(--green)',i:'var(--amber)',a:'var(--red)'};
    var lvLabels = {b:'初級',i:'中級',a:'高級'};
    resultsEl.innerHTML = '<div style="font-size:12px;color:var(--t3);margin-bottom:10px">找到 ' + matches.length + ' 個結果</div>';
    var container = document.createElement('div');
    matches.slice(0, 50).forEach(function(item) {
      var w = item.w;
      var l = item.lv;
      var saved = S.saved;
      var isSaved = saved.some(function(s){ return s.en === w[0]; });
      var card = document.createElement('div');
      card.className = 'search-item';
      var topDiv = document.createElement('div');
      topDiv.className = 'top';
      var enEl = document.createElement('div');
      enEl.className = 'en';
      enEl.textContent = w[0];
      var lvTag = document.createElement('div');
      lvTag.className = 'lv-tag';
      lvTag.style.cssText = 'background:none;color:' + lvColors[l] + ';border-color:' + lvColors[l] + '40';
      lvTag.textContent = lvLabels[l];
      var actDiv = document.createElement('div');
      actDiv.className = 'actions';
      var spkBtn = document.createElement('button');
      spkBtn.className = 's-btn';
      spkBtn.style.cssText = 'color:var(--green);border-color:var(--gb);';
      spkBtn.textContent = '▶';
      spkBtn.onclick = (function(en){ return function(){ speak(en); }; })(w[0]);
      var svBtn = document.createElement('button');
      svBtn.className = 's-btn';
      svBtn.style.cssText = isSaved ? 'color:var(--amber);border-color:var(--ab)' : 'color:var(--t2);border-color:var(--border)';
      svBtn.textContent = isSaved ? '★' : '☆';
      svBtn.onclick = (function(word, ph, pos, zh, ex, exzh, tip, lvl, btn){ return function(){
        var s2 = S.saved;
        var found = -1;
        for (var j = 0; j < s2.length; j++) { if (s2[j].en === word) { found = j; break; } }
        if (found >= 0) { s2.splice(found,1); S.saved=s2; btn.textContent='☆'; btn.style.cssText='color:var(--t2);border-color:var(--border)'; toast('已移除'); }
        else { s2.push({en:word,ph:ph,pos:pos,zh:zh,ex:ex,exzh:exzh,tip:tip,lv:lvl}); S.saved=s2; btn.textContent='★'; btn.style.cssText='color:var(--amber);border-color:var(--ab)'; addXP(5); toast('⭐ 儲存！'); }
      }; })(w[0],w[1]||'',w[2]||'',w[3]||'',w[4]||'',w[5]||'',w[6]||'',l,svBtn);
      actDiv.appendChild(spkBtn);
      actDiv.appendChild(svBtn);
      topDiv.appendChild(enEl); topDiv.appendChild(lvTag); topDiv.appendChild(actDiv);
      var phLine = document.createElement('div');
      phLine.className = 'ph-line';
      phLine.textContent = (w[1]||'') + '  ' + (w[2]||'');
      var zhLine = document.createElement('div');
      zhLine.className = 'zh-line';
      zhLine.textContent = w[3]||'';
      var exLine = document.createElement('div');
      exLine.className = 'ex-line';
      exLine.textContent = w[4]||'';
      var exzhLine = document.createElement('div');
      exzhLine.style.cssText = 'font-size:11px;color:var(--t3);margin-top:2px';
      exzhLine.textContent = w[5]||'';
      card.appendChild(topDiv); card.appendChild(phLine); card.appendChild(zhLine);
      card.appendChild(exLine); card.appendChild(exzhLine);
      if (w[8]) {
        var stLine = document.createElement('div');
        stLine.className = 'story-line';
        stLine.textContent = w[8].slice(0, 80) + '…';
        card.appendChild(stLine);
      }
      container.appendChild(card);
    });
    resultsEl.appendChild(container);
  }, 200);
}

// ══════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════
var quizItems = [];
var qIdx = 0;
var qScore = 0;
function buildQuiz() {
  var pool = todayWords.concat(reviewWords);
  quizItems = [];
  var shuffled = pool.slice().sort(function(){ return Math.random()-.5; });
  var used = shuffled.slice(0, 10);
  used.forEach(function(w, i) {
    var type = i % 3 === 2 ? 'fill' : 'mc';
    var opts = [];
    if (type === 'mc') {
      var distractors = pool.filter(function(d){ return d[0] !== w[0]; }).sort(function(){ return Math.random()-.5; }).slice(0,3);
      opts = distractors.map(function(d){ return d[3]; });
      var ansPos = Math.floor(Math.random()*4);
      opts.splice(ansPos, 0, w[3]);
      quizItems.push({type:'mc', q:'「' + w[0] + '」的中文是？', opts:opts, ans:w[3], exp:'✓ ' + w[0] + ' = ' + w[3], w:w});
    } else {
      quizItems.push({type:'fill', q:'根據中文填入英文單字：「' + w[3] + '」', ans:w[0].toLowerCase(), exp:'✓ 答案是 "' + w[0] + '"，' + w[3], w:w});
    }
  });
  qIdx = 0; qScore = 0;
}
function renderQuiz() {
  var area = document.getElementById('quiz-area');
  if (!quizItems.length) buildQuiz();
  if (qIdx >= quizItems.length) {
    area.innerHTML = '<div style="text-align:center;padding:40px 16px"><div style="font-size:48px;margin-bottom:16px">' + (qScore >= 8 ? '🎉' : qScore >= 5 ? '👍' : '💪') + '</div>' +
      '<div style="font-size:24px;font-weight:700;margin-bottom:8px">' + qScore + ' / ' + quizItems.length + '</div>' +
      '<div style="font-size:14px;color:var(--t3);margin-bottom:24px">' + (qScore >= 8 ? '太棒了！' : qScore >= 5 ? '繼續加油！' : '多練習吧！') + '</div>' +
      '<button onclick="buildQuiz();renderQuiz()" style="padding:12px 28px;border-radius:var(--r2);background:var(--green);border:none;color:#0f1117;font-weight:700;cursor:pointer;font-family:var(--sans);font-size:15px">再來一次</button></div>';
    return;
  }
  var q = quizItems[qIdx];
  var html = '<div style="font-size:11px;color:var(--t3);margin-bottom:4px">第 ' + (qIdx+1) + ' / ' + quizItems.length + ' 題</div>' +
    '<div class="q-card"><div class="q-text">' + q.q + '</div>';
  if (q.type === 'mc') {
    html += '<div class="q-opts">';
    q.opts.forEach(function(opt, i) {
      html += '<button class="q-opt" id="qopt-' + i + '" onclick="checkMC(this,\'' + opt.replace(/'/g,"\\'") + '\')">' + opt + '</button>';
    });
    html += '</div>';
  } else {
    html += '<input type="text" class="q-fill" id="q-fill-inp" placeholder="輸入英文單字..." autocomplete="off" autocapitalize="off">' +
      '<button class="q-submit" onclick="checkFill()">確認</button>';
  }
  html += '<div id="q-fb" style="display:none"></div></div>';
  area.innerHTML = html;
  if (q.type === 'fill') {
    var inp = document.getElementById('q-fill-inp');
    if (inp) inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') checkFill(); });
  }
}
function checkMC(btn, chosen) {
  var q = quizItems[qIdx];
  document.querySelectorAll('.q-opt').forEach(function(b){ b.onclick = null; });
  var correct = chosen === q.ans;
  btn.className = 'q-opt ' + (correct ? 'correct' : 'wrong');
  if (!correct) {
    document.querySelectorAll('.q-opt').forEach(function(b){ if (b.textContent === q.ans) b.className = 'q-opt correct'; });
  }
  showQFeedback(correct, q);
  if (correct) { qScore++; addXP(10); }
  setTimeout(function(){ qIdx++; renderQuiz(); }, correct ? 1200 : 2500);
}
function checkFill() {
  var inp = document.getElementById('q-fill-inp');
  if (!inp) return;
  var val = inp.value.trim().toLowerCase();
  var q = quizItems[qIdx];
  var correct = val === q.ans;
  inp.style.borderColor = correct ? 'var(--green)' : 'var(--red)';
  inp.disabled = true;
  showQFeedback(correct, q);
  if (correct) { qScore++; addXP(10); }
  setTimeout(function(){ qIdx++; renderQuiz(); }, correct ? 1200 : 2500);
}
function showQFeedback(correct, q) {
  var fb = document.getElementById('q-fb');
  fb.style.display = '';
  fb.className = 'q-feedback ' + (correct ? 'ok' : 'no');
  fb.innerHTML = q.exp;
  if (!correct) {
    var svBtn = document.createElement('button');
    svBtn.className = 'qsave-btn';
    var saved = S.saved;
    var isSaved = saved.some(function(s){ return s.en === q.w[0]; });
    svBtn.textContent = isSaved ? '★ 已在單字本' : '☆ 加入單字本';
    if (isSaved) svBtn.className = 'qsave-btn saved';
    svBtn.onclick = function() {
      var s2 = S.saved;
      var found = s2.some(function(s){ return s.en === q.w[0]; });
      if (!found) { s2.push({en:q.w[0],ph:q.w[1],pos:q.w[2],zh:q.w[3],ex:q.w[4],exzh:q.w[5],tip:q.w[6],lv:lv}); S.saved=s2; svBtn.textContent='★ 已在單字本'; svBtn.className='qsave-btn saved'; addXP(5); toast('⭐ 儲存！'); }
    };
    fb.appendChild(svBtn);
  }
}

// ══════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════
var chatSceneIdx = 0;
var chatConvoIdx = 0;
function initChat() {
  var sel = document.getElementById('scene-sel');
  sel.innerHTML = '';
  var scenes = SCENES[lv] || SCENES.b;
  scenes.forEach(function(s, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
  chatSceneIdx = 0;
  chatConvoIdx = 0;
  resetChat();
}
function changeScene() {
  chatSceneIdx = parseInt(document.getElementById('scene-sel').value) || 0;
  chatConvoIdx = 0;
  resetChat();
}
function resetChat() {
  document.getElementById('chat-msgs').innerHTML = '';
  chatConvoIdx = 0;
  var scenes = SCENES[lv] || SCENES.b;
  var scene = scenes[chatSceneIdx] || scenes[0];
  showHints(scene);
  appendMsg(scene.convos[0].a, scene.convos[0].zh, 'ai');
  chatConvoIdx = 1;
}
function showHints(scene) {
  var el = document.getElementById('chat-hints');
  el.innerHTML = '';
  (scene.hints || []).forEach(function(h) {
    var btn = document.createElement('button');
    btn.className = 'hint-pill';
    btn.textContent = h;
    btn.onclick = function() { document.getElementById('chat-inp').value = h; sendMsg(); };
    el.appendChild(btn);
  });
}
function appendMsg(text, zh, who) {
  var el = document.createElement('div');
  el.className = 'bubble ' + who;
  el.innerHTML = text;
  if (zh && who === 'ai') {
    var zhEl = document.createElement('div');
    zhEl.className = 'zh-trans';
    zhEl.textContent = zh;
    zhEl.style.display = showZh ? '' : 'none';
    el.appendChild(zhEl);
  }
  document.getElementById('chat-msgs').appendChild(el);
  if (el.scrollIntoView) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  if (who === 'ai') speak(text, 0.85);
}
function sendMsg() {
  var inp = document.getElementById('chat-inp');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  appendMsg(text, '', 'user');
  addXP(8);
  var scenes = SCENES[lv] || SCENES.b;
  var scene = scenes[chatSceneIdx] || scenes[0];
  setTimeout(function() {
    if (chatConvoIdx < scene.convos.length) {
      var c = scene.convos[chatConvoIdx];
      appendMsg(c.a, c.zh, 'ai');
      chatConvoIdx++;
    } else {
      appendMsg("Great job! You've completed this conversation. Try another scene!", "做得好！你完成了這個對話。試試其他場景！", 'ai');
      chatConvoIdx = 0;
    }
  }, 600);
}
function toggleZh() {
  showZh = !showZh;
  document.getElementById('zh-toggle').textContent = showZh ? '隱藏中文翻譯' : '顯示中文翻譯';
  document.querySelectorAll('.zh-trans').forEach(function(el){ el.style.display = showZh ? '' : 'none'; });
}
function toggleChatMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此瀏覽器不支援語音輸入'); return; }
  var mic = document.getElementById('chat-mic');
  if (mic.classList.contains('active')) {
    if (recog) recog.stop();
    mic.className = 'chat-mic';
    return;
  }
  recog = new SR();
  recog.lang = currentAccent === 'uk' ? 'en-GB' : 'en-US';
  recog.interimResults = false;
  recog.onresult = function(e) {
    document.getElementById('chat-inp').value = e.results[0][0].transcript;
    mic.className = 'chat-mic';
    sendMsg();
  };
  recog.onerror = function() { mic.className = 'chat-mic'; };
  recog.onend = function() { mic.className = 'chat-mic'; };
  recog.start();
  mic.className = 'chat-mic active';
}

// ══════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════
function updateLvUI() {
  lv = getActiveLv();
  var bDays = getDaysForLv('b');
  var iDays = getDaysForLv('i');
  var aDays = getDaysForLv('a');
  var totalDays = bDays + iDays + aDays;
  var curDay = S.maxDay;
  var pct = Math.min(100, Math.round(curDay / totalDays * 100));
  document.getElementById('lv-fill').style.width = pct + '%';
  document.getElementById('lv-pct').textContent = curDay + ' / ' + totalDays + ' 天';
  document.getElementById('lv-b-info').textContent = bDays + '天';
  document.getElementById('lv-i-info').textContent = iDays + '天';
  document.getElementById('lv-a-info').textContent = aDays + '天';
  ['b','i','a'].forEach(function(l) {
    var el = document.getElementById('lv-' + l);
    if (isUnlocked(l)) el.className = 'lv-chip active';
    else el.className = 'lv-chip locked';
  });
}
function renderProg() {
  document.getElementById('stat-xp').textContent = S.xp;
  document.getElementById('stat-wv').textContent = S.wv;
  document.getElementById('stat-days').textContent = S.days.length;
  document.getElementById('stat-saved').textContent = S.saved.length;
  updateLvUI();
  renderCal();
  var start = getStartDate();
  document.getElementById('start-date-inp').value = start;
  document.getElementById('start-status').textContent = '目前：' + start + '（Day ' + getDay() + '）';
}
function renderCal() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  document.getElementById('cal-label').textContent = (m+1) + '月 ' + y;
  var firstDay = new Date(y, m, 1).getDay();
  var days = new Date(y, m+1, 0).getDate();
  var today = now.getDate();
  var doneArr = S.days;
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for (var i = 0; i < firstDay; i++) { var e = document.createElement('div'); grid.appendChild(e); }
  for (var d = 1; d <= days; d++) {
    var el = document.createElement('div');
    var ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    el.className = 'cday' + (d === today ? ' today' : doneArr.indexOf(ds) >= 0 ? ' done' : '');
    el.textContent = d;
    grid.appendChild(el);
  }
}

// ══════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════
function setStartDate() {
  var val = document.getElementById('start-date-inp').value;
  if (!val) { toast('請選擇日期'); return; }
  localStorage.setItem('de_start', val);
  S.maxDay = 0;
  initDaily(); updateLvUI(); renderWord(); renderReview(); renderQuiz(); renderProg();
  toast('起始日已更新！Day ' + getDay());
}
function unlockLv(l) {
  if (!confirm('確定要手動解鎖' + (l==='i'?'中級':'高級') + '嗎？')) return;
  var bDays = getDaysForLv('b');
  S.maxDay = l === 'i' ? bDays : bDays + getDaysForLv('i');
  initDaily(); updateLvUI(); renderProg();
  toast('🔓 解鎖成功！');
}
function resetStats() {
  if (!confirm('確定要重置所有學習紀錄嗎？（儲存的單字本不會被刪除）')) return;
  var sv = S.saved;
  ['de_xp','de_wv','de_days','de_maxday'].forEach(function(k){ localStorage.removeItem(k); });
  S.saved = sv;
  initDaily(); updateLvUI(); renderWord(); renderReview(); renderQuiz(); renderProg();
  toast('學習紀錄已重置');
}
function resetAll() {
  if (!confirm('確定要完全重置嗎？所有資料包含單字本都會被刪除，無法復原！')) return;
  ['de_xp','de_wv','de_days','de_maxday','de_saved','de_start','de_accent'].forEach(function(k){ localStorage.removeItem(k); });
  currentAccent = 'us';
  setAccent('us');
  initDaily(); updateLvUI(); renderWord(); renderReview(); renderQuiz(); renderProg();
  toast('所有資料已清除');
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goScreen(s) {
  document.querySelectorAll('.screen').forEach(function(el){ el.style.display = 'none'; });
  document.querySelectorAll('.nv').forEach(function(el){ el.className = 'nv'; });
  var sc = document.getElementById('screen-' + s);
  if (sc) sc.style.display = 'block';
  var nv = document.getElementById('nav-' + s);
  if (nv) nv.className = 'nv on';
  if (s === 'saved') renderSaved();
  if (s === 'prog') renderProg();
  if (s === 'quiz') { buildQuiz(); renderQuiz(); }
  if (s === 'search') {
    document.getElementById('search-results').innerHTML = '<div class="search-empty"><div class="icon">🔍</div><p>輸入英文單字或中文意思<br>搜尋全部單字庫</p></div>';
    setTimeout(function(){ document.getElementById('search-inp').focus(); }, 100);
  }
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
setAccent(currentAccent);
initDaily();
renderWord();
renderReview();
buildQuiz();
initChat();
document.getElementById('xp-num').textContent = S.xp;

// iOS "Add to Home Screen" tip
if (!window.navigator.standalone && /iphone|ipad|ipod/i.test(navigator.userAgent)) {
  setTimeout(function(){ toast('💡 分享 → 加入主畫面，像 App 一樣使用'); }, 3500);
}
