["reflect", "rɪˈflɛkt", "v.", "反思；反射", "Reflect weekly on what is working and what is not.", "每週反思什麼有效，什麼無效。", "Reflection=反思（名詞）。Self-reflection=自我反思。Time for reflection=反思時間。", "reflection=反思/self-reflection=自我反思/time for reflection=反思時間/deep reflection=深度反思", "She ended every week with fifteen minutes of honest reflection. Not journaling — just three questions: What worked? What didn't? What would I do differently? Those forty-five words per week compounded into wisdom.", "生活,激勵,教育"],
["relevant", "ˈrɛlɪvənt", "adj.", "相關的；有意義的", "Stay relevant by learning faster than the world changes.", "通過比世界變化更快地學習來保持相關性。", "Relevance=相關性（名詞）。Keep relevant=保持相關性。Relevant experience=相關經驗。", "relevance=相關性/keep relevant=保持相關性/relevant experience=相關經驗/stay relevant=保持相關", "She updated her skills before they became obsolete. That proactive learning kept her relevant through three major industry disruptions that eliminated the careers of many of her peers.", "職場,教育"],
["rely", "rɪˈlaɪ", "v.", "依靠", "Rely on systems, not just willpower, for consistent results.", "依靠系統，而不只是意志力，來獲得一致的結果。", "Rely on=依靠。Reliable=可靠的（形容詞）。Over-rely=過度依靠。", "rely on=依靠/reliable=可靠的/over-rely=過度依靠/self-reliance=自立", "She made herself reliable — not because she was naturally disciplined, but because she had built systems that made reliability the path of least resistance. Systems beat character every time.", "生活,職場,激勵"],
["routine", "ruːˈtiːn", "n.", "例行公事；慣例", "A morning routine is the first act of self-respect each day.", "晨間例行活動是每天自尊的第一個行為。", "Daily routine=日常例行活動。Break the routine=打破例行活動。Routine work=常規工作。", "daily routine=日常例行/break the routine=打破例行/routine work=常規工作/establish a routine=建立例行活動", "She designed her routine around her biology — working deeply in the morning when her mind was sharp, handling meetings midday, and doing creative work in the late afternoon. Aligning routine with rhythm multiplied output.", "生活,健康,激勵"],
["sacrifice", "ˈsækrɪfaɪs", "n./v.", "犧牲", "Every achievement requires you to sacrifice something of lower value.", "每一個成就都要求你犧牲一些價值較低的東西。", "Make a sacrifice=做出犧牲。Sacrifice for=為...犧牲。Short-term sacrifice=短期犧牲。", "make a sacrifice=做出犧牲/sacrifice for=為...犧牲/short-term sacrifice=短期犧牲/worth the sacrifice=值得犧牲", "She sacrificed leisure time for three years to build something she believed in. Not from martyrdom but from prioritization. Every yes to the important thing was a no to the less important one.", "激勵,生活,哲學"],
["satisfaction", "ˌsætɪsˈfækʃən", "n.", "滿足；滿意", "Find satisfaction in the work itself, not only in its recognition.", "在工作本身中找到滿足，而不只是在其認可中。", "Customer satisfaction=客戶滿意度。Job satisfaction=工作滿足感。Self-satisfaction=自我滿足。", "customer satisfaction=客戶滿意度/job satisfaction=工作滿足感/self-satisfaction=自我滿足/deep satisfaction=深度滿足", "She found deep satisfaction in completing difficult things. The satisfaction came not from the result but from the evidence that she had matched her intention with her action. Doing what you say you will do is deeply satisfying.", "心理,激勵,職場"],
["seek", "siːk", "v.", "尋求；追求", "Seek feedback constantly — it is the fastest path to mastery.", "不斷尋求反饋——這是通往精通最快的路徑。", "Seek advice=尋求建議。Seek out=主動尋找。Job-seeker=求職者。", "seek advice=尋求建議/seek out=主動尋找/job-seeker=求職者/seek improvement=追求改善", "She never waited for feedback to be offered. She actively sought it — specifically and frequently. That seeking transformed her from a good performer to an exceptional one within two years.", "教育,激勵,職場"],
["standard", "ˈstændərd", "n.", "標準", "Hold yourself to a higher standard than anyone else holds you.", "將自己保持在比任何其他人對你要求的更高標準上。", "High standard=高標準。Set the standard=設定標準。Gold standard=黃金標準。", "high standard=高標準/set the standard=設定標準/gold standard=黃金標準/below standard=低於標準", "Her personal standard was always higher than the external requirement. When others asked why she worked so hard on things no one would notice, she said: 'I notice.' Internal standards outlast external ones.", "激勵,職場,哲學"],
["strength", "strɛŋθ", "n.", "力量；優勢", "Lead with your strengths and be aware of your weaknesses.", "以你的優勢領先，並意識到你的弱點。", "Strength training=力量訓練。Inner strength=內在力量。Strengthen=加強（動詞）。", "strength training=力量訓練/inner strength=內在力量/strengthen=加強/build on strengths=在優勢上建立", "She identified her three greatest strengths and built her career around them. Not because she ignored her weaknesses, but because building on strengths creates exponential value while fixing weaknesses creates incremental value.", "激勵,職場,健康"],
["struggle", "ˈstrʌɡl", "n./v.", "掙扎；奮鬥", "Share your struggles — they are what connect you to others.", "分享你的掙扎——它們是讓你與他人相連的東西。", "Struggle with=為...而掙扎。Uphill struggle=艱難奮鬥。Struggle to=努力去做。", "struggle with=為...而掙扎/uphill struggle=艱難奮鬥/struggle to=努力去做/embrace the struggle=擁抱掙扎", "She shared her struggle publicly — not to seek sympathy, but to normalize difficulty. The response from people who had been silently struggling themselves was overwhelming. Visibility of struggle creates permission to continue.", "激勵,社交,心理"],
["transform", "trænsˈfɔːrm", "v.", "轉變；改變", "Transform your environment to transform your behavior automatically.", "改變你的環境，自動轉變你的行為。", "Transformation=轉變（名詞）。Personal transformation=個人轉變。Transform into=轉變成。", "transformation=轉變/personal transformation=個人轉變/transform into=轉變成/transformative experience=轉變性的體驗", "The transformation she led was not of systems but of culture. When the culture changed, everything changed: decisions, behaviors, outputs. She had learned that culture transformation is the only transformation that lasts.", "商業,激勵,生活"],
["tremendous", "trɪˈmɛndəs", "adj.", "巨大的；驚人的", "A tremendous amount of success is explained by consistent small actions.", "大量的成功可以通過一致的小行動來解釋。", "Tremendously=極大地。Tremendous progress=巨大進步。Tremendous opportunity=巨大機會。", "tremendously=極大地/tremendous progress=巨大進步/tremendous effort=巨大努力/tremendous impact=巨大影響", "The results looked tremendous. The inputs were modest and consistent. The gap between modest input and tremendous output is called time. Most people stop before the gap closes.", "激勵,商業"],
["update", "ˈʌpdeɪt", "v.", "更新", "Update your beliefs when evidence demands it — that is wisdom.", "當證據需要時更新你的信念——那就是智慧。", "Software update=軟體更新。Update your skills=更新你的技能。Stay updated=保持更新。", "software update=軟體更新/update your skills=更新技能/stay updated=保持更新/regular update=定期更新", "She regularly updated her mental models — beliefs she had held for years — based on new evidence. That intellectual flexibility made her advice unusually reliable in a rapidly changing world.", "科技,哲學,教育"],
["abuse", "əˈbjuːz", "n./v.", "濫用；虐待", "Abuse of power destroys trust faster than anything else.", "濫用權力比任何事情都更快地摧毀信任。", "Drug abuse=藥物濫用。Verbal abuse=言語虐待。Abuse of trust=濫用信任。", "drug abuse=藥物濫用/verbal abuse=言語虐待/abuse of trust=濫用信任/child abuse=兒童虐待", "She noticed the early signs of power abuse in the team dynamic and addressed them directly. Unchecked, small abuses become normalized. Named early, they can be corrected before they become culture.", "社會,職場,心理"],
["access", "ˈæksɛs", "n./v.", "進入；使用", "Access to information changes everything about what you can do.", "獲得資訊的途徑改變了你能做的一切。", "Have access to=有機會使用。Gain access=獲得進入。Access denied=拒絕訪問。", "have access to=有機會使用/gain access=獲得進入/equal access=平等機會/restricted access=限制訪問", "She opened access to her network freely. When someone needed a connection, she made it. That habit of generous access — costing her little — changed lives she would never know about.", "科技,社會,商業"],
["accomplish", "əˈkɒmplɪʃ", "v.", "完成；達到", "You can accomplish anything if you break it into small enough steps.", "如果你把它分解成足夠小的步驟，你可以完成任何事情。", "Accomplishment=成就（名詞）。Well-accomplished=成就卓著的。Sense of accomplishment=成就感。", "accomplishment=成就/sense of accomplishment=成就感/major accomplishment=重大成就/accomplish a goal=達成目標", "She accomplished extraordinary things not because she was extraordinary but because she treated impossible things as simply a matter of planning, patience, and consistent effort.", "激勵,教育"],
["accumulate", "əˈkjuːmjʊleɪt", "v.", "積累；積聚", "Accumulate knowledge daily — it compounds faster than money.", "每天積累知識——它的複利比金錢更快。", "Accumulation=積累（名詞）。Gradually accumulate=逐漸積累。Accumulate experience=積累經驗。", "accumulation=積累/gradually accumulate=逐漸積累/accumulate experience=積累經驗/accumulate wealth=積累財富", "She accumulated ten years of domain knowledge before the market valued it. Then suddenly her accumulated expertise was the most valuable thing in the room. Accumulation is invisible until it's undeniable.", "教育,激勵,商業"],
["act", "ækt", "v./n.", "行動；法令", "Stop planning and start acting — imperfect action beats perfect inaction.", "停止計劃，開始行動——不完美的行動勝過完美的不行動。", "Act on=根據...行動。Take action=採取行動。Call to action=呼籲行動。", "act on=根據...行動/take action=採取行動/call to action=呼籲行動/act of kindness=善意之舉", "She acted on incomplete information all her life. Not recklessly — she gathered the best available evidence, made her best judgment, then moved. Waiting for certainty is waiting for never.", "激勵,哲學"],
["admire", "ədˈmaɪər", "v.", "欽佩；讚賞", "Admire people by learning from them, not by worshipping them.", "通過向他們學習來欽佩人，而不是通過崇拜他們。", "Admiration=欽佩（名詞）。Admirable=值得欽佩的。Self-admiration=自我欣賞。", "admiration=欽佩/admirable=值得欽佩的/worthy of admiration=值得欽佩/mutual admiration=相互欽佩", "She told every person she admired exactly why she admired them. Not flattery — specific, genuine acknowledgment. Those conversations deepened relationships in ways that only honesty about appreciation can.", "社交,激勵,溝通"],
["adopt", "əˈdɒpt", "v.", "採用；領養", "Adopt new ideas the way children adopt new words — with delight.", "像孩子學習新詞一樣採用新想法——帶著喜悅。", "Adopt a strategy=採用策略。Adoption=採用（名詞）。Early adopter=早期採用者。", "adopt a strategy=採用策略/adoption=採用/early adopter=早期採用者/widely adopted=廣泛採用", "She was an early adopter of every powerful new idea — not from trendiness but from a constant orientation toward improvement. What others discovered later, she had been practicing for years.", "商業,教育,科技"],
["advance", "ədˈvɑːns", "v./n.", "前進；進步", "Advance your position before anyone realizes it needs advancing.", "在任何人意識到需要之前，先推進你的位置。", "Advance notice=提前通知。Career advancement=職業進步。In advance=提前。", "advance notice=提前通知/career advancement=職業進步/in advance=提前/advance payment=預付款", "She planned three years in advance in an industry where most planned three months. That time horizon advantage allowed her to see and move toward opportunities that others would not even notice for eighteen months.", "職場,商業,激勵"],
["aggressive", "əˈɡrɛsɪv", "adj.", "積極進取的；激進的", "Be aggressive in your goals and gentle in your methods.", "在目標上積極進取，在方法上溫和。", "Aggressive strategy=積極策略。Passive-aggressive=被動攻擊性的。Aggressively=積極地。", "aggressive strategy=積極策略/passive-aggressive=被動攻擊性/aggressively pursue=積極追求/aggressive growth=激進增長", "She was aggressively ambitious in private and quietly diligent in public. The combination confused competitors who underestimated her until the results arrived. Ambition is best telegraphed through output, not announcement.", "職場,商業,激勵"],
["aim", "eɪm", "v./n.", "目標；瞄準", "Aim high even if you might miss — where you land will still be remarkable.", "即使你可能不中，也要高瞄——你降落的地方仍然會很出色。", "Aim for=瞄準。Well-aimed=瞄準得當的。Aim to=意在。", "aim for=瞄準/well-aimed=瞄準得當/aim to please=意在取悅/clear aim=明確目標", "Her aim was specific, measurable, and adjusted regularly based on new information. She tracked deviation without judgment and corrected course without drama. That is what intelligent aiming looks like.", "激勵,教育,生活"],
["alert", "əˈlɜːrt", "adj./v.", "警覺的；提醒", "Stay alert to opportunity — it rarely announces itself loudly.", "保持對機會的警覺——它很少大聲宣告自己。", "On the alert=保持警覺。Alert someone=提醒某人。Stay alert=保持警覺。", "on the alert=保持警覺/alert someone=提醒某人/stay alert=保持警覺/early alert=早期預警", "She was alert to the small changes that preceded large ones — in markets, in relationships, in her own energy levels. Early detection, she knew, is always cheaper than late reaction.", "職場,商業,健康"],
["alternative", "ɔːlˈtɜːrnətɪv", "n./adj.", "替代選擇；替代的", "Always generate alternatives before settling on the first solution.", "在確定第一個解決方案之前，永遠生成替代選擇。", "Consider alternatives=考慮替代選擇。Alternative approach=替代方法。No alternative=別無選擇。", "consider alternatives=考慮替代選擇/alternative approach=替代方法/no alternative=別無選擇/seek alternatives=尋找替代選擇", "She never accepted the first solution. She generated three alternatives before evaluating any. That discipline of alternatives consistently produced options that the obvious first answer had made invisible.", "職場,教育,哲學"],
["anxiety", "æŋˈzaɪɪti", "n.", "焦慮", "Transform anxiety into action — movement is anxiety's cure.", "將焦慮轉化為行動——行動是焦慮的治療方法。", "Feel anxious=感到焦慮。Social anxiety=社交焦慮。Performance anxiety=表現焦慮。", "feel anxious=感到焦慮/social anxiety=社交焦慮/performance anxiety=表現焦慮/manage anxiety=管理焦慮", "She felt anxiety before every important presentation. Then she learned that anxiety and excitement have the same physiology. She started relabeling her pre-presentation anxiety as readiness. The performance improved immediately.", "健康,心理,激勵"],
["appreciate", "əˈpriːʃieɪt", "v.", "欣賞；感激", "Appreciate what you have while pursuing what you want.", "在追求你想要的同時欣賞你所擁有的。", "Appreciation=欣賞；感激（名詞）。Deeply appreciate=深深感激。Appreciate the effort=感謝付出。", "appreciation=欣賞/deeply appreciate=深深感激/appreciate the effort=感謝付出/show appreciation=表示感謝", "She made it a practice to tell people specifically what she appreciated about them. Not generic compliments — specific observations. Those precise appreciations created depth in every relationship she had.", "社交,激勵,心理"],
["aspect", "ˈæspɛkt", "n.", "方面；層面", "Consider every aspect before committing to any major decision.", "在做出任何重大決定之前考慮每個方面。", "Positive aspect=積極方面。Consider all aspects=考慮所有方面。Different aspect=不同方面。", "positive aspect=積極方面/consider all aspects=考慮所有方面/multiple aspects=多個方面/technical aspect=技術方面", "She taught her team to examine the human, technical, and financial aspects of every problem simultaneously. That three-lens approach consistently uncovered solutions that single-perspective thinking missed.", "職場,教育,商業"],
["asset", "ˈæsɛt", "n.", "資產；優勢", "Your reputation is your most valuable and fragile asset.", "你的聲譽是你最有價值也最脆弱的資產。", "Key asset=關鍵資產。Asset management=資產管理。Personal asset=個人資產。", "key asset=關鍵資產/asset management=資產管理/personal asset=個人資產/appreciating asset=升值資產", "She invested in intangible assets — reputation, relationships, knowledge — with the same discipline most people reserve for financial ones. Those intangible assets proved more durable and more generative.", "商業,金融,激勵"],
["associate", "əˈsoʊsɪeɪt", "v.", "聯繫；聯想", "Associate with people who expand your thinking, not just your comfort.", "與拓展你思維的人聯繫，而不只是讓你舒適的人。", "Association=聯繫（名詞）。Associate with=與...聯繫。Close associate=親密夥伴。", "association=聯繫/associate with=與...聯繫/close associate=親密夥伴/word association=詞語聯想", "She was deliberate about who she associated with professionally. Not coldly — warmly, but intentionally. Every significant relationship in her life had been sought rather than stumbled upon.", "社交,職場,激勵"],
["authentic", "ɔːˈθɛntɪk", "adj.", "真實的；正宗的", "Authentic self-expression is the most powerful form of influence.", "真實的自我表達是最有力的影響形式。", "Authenticity=真實性（名詞）。Authentic leadership=真實性領導。Be authentic=做真實的自己。", "authenticity=真實性/authentic leadership=真實性領導/be authentic=做真實的自己/authentic connection=真實的連結", "She led authentically — showing uncertainty when uncertain, emotions when emotional, limits when at her limits. That refusal to perform invulnerability made her the most trusted person her team had ever worked for.", "職場,溝通,激勵"],
["bond", "bɒnd", "n./v.", "聯繫；情感紐帶", "Strong bonds are built through shared challenges, not just shared good times.", "強大的情感紐帶是通過共同的挑戰建立的，而不只是共同的美好時光。", "Bond over=因...產生情感聯繫。Emotional bond=情感紐帶。Bond of trust=信任的紐帶。", "bond over=因...產生聯繫/emotional bond=情感紐帶/bond of trust=信任紐帶/strong bond=強大聯繫", "The team that went through the difficult project together became closer than any team-building exercise had ever made them. Shared hardship creates bonds that shared celebration cannot replicate.", "社交,職場,家庭"],
["characteristic", "ˌkærɪktəˈrɪstɪk", "n./adj.", "特點；特有的", "Identify your most characteristic strengths and lead with them.", "識別你最典型的優勢並以此為先。", "Characteristic feature=典型特點。Personal characteristic=個人特點。Characteristic behavior=特有行為。", "characteristic feature=典型特點/personal characteristic=個人特點/characteristic behavior=特有行為/defining characteristic=決定性特點", "Her most characteristic quality was not skill or intelligence — it was consistency. People could count on exactly who she would be, regardless of circumstance. That predictability was rare and enormously reassuring.", "職場,哲學,社交"],
["colleague", "ˈkɒliːɡ", "n.", "同事", "Treat every colleague as a potential long-term collaborator.", "把每個同事都視為潛在的長期合作者。", "Work with colleagues=與同事合作。Former colleague=前同事。Close colleague=親密同事。", "work with colleagues=與同事合作/former colleague=前同事/close colleague=親密同事/respect colleagues=尊重同事", "She maintained relationships with former colleagues across decades. When she needed them, they remembered how she had treated them. When they needed her, she remembered too. Professional relationships are long.", "職場,社交"],
["concern", "kənˈsɜːrn", "n./v.", "關心；擔憂", "Express your concerns early before they become crises.", "在它們成為危機之前盡早表達你的擔憂。", "Cause for concern=令人擔憂的原因。Be concerned=感到擔憂。Growing concern=日益增加的擔憂。", "cause for concern=令人擔憂/be concerned=感到擔憂/growing concern=日益增加的擔憂/raise a concern=提出擔憂", "She raised concerns as soon as she detected them. Not alarmism — measured, specific, solution-oriented. That habit of early concern-raising saved projects and relationships that delayed concern would have damaged.", "職場,溝通"],
["confidence", "ˈkɒnfɪdəns", "n.", "自信；信心", "Confidence is not absence of doubt but action taken despite it.", "自信不是沒有懷疑，而是儘管有懷疑仍採取行動。", "Build confidence=建立自信。Self-confidence=自信。Confidence boost=信心提升。", "build confidence=建立自信/self-confidence=自信/confidence boost=信心提升/quiet confidence=低調的自信", "She built her confidence through accumulated evidence of capability — not through affirmations but through the track record of having done hard things before. Confidence is a result, not a starting point.", "心理,激勵"],
["control", "kənˈtroʊl", "n./v.", "控制", "Focus only on what you can control — let go of the rest completely.", "只專注於你能控制的——完全放開其餘的。", "In control=在控制中。Out of control=失控。Self-control=自我控制。", "in control=在控制中/out of control=失控/self-control=自我控制/control yourself=控制自己", "She divided every concern into two lists: within my control and outside my control. She worked diligently on the first list and practiced deliberate acceptance of the second. That discipline transformed her relationship with anxiety.", "心理,激勵,哲學"],
["count", "kaʊnt", "v.", "計算；重要", "Make every day count — not busy, not productive: meaningful.", "讓每天都有意義——不是忙碌，不是有效率：而是有意義的。", "Count on=依賴。Make it count=充分利用。Every count=每一個都算。", "count on=依賴/make it count=充分利用/every vote counts=每票都算/count your blessings=感謝你擁有的", "She ended every week by asking: what counted this week? Not what was completed — what mattered. That distinction between completion and meaning changed how she allocated her attention.", "哲學,激勵,生活"],
["courage", "ˈkɜːrɪdʒ", "n.", "勇氣", "Courage is choosing growth over comfort when it matters most.", "勇氣是在最重要的時候選擇成長而不是舒適。", "Take courage=鼓起勇氣。Courage of your convictions=堅守信念的勇氣。Act of courage=勇敢的行為。", "take courage=鼓起勇氣/courage of your convictions=堅守信念/act of courage=勇敢的行為/moral courage=道德勇氣", "The courage she valued most was not physical — it was the courage to say an unpopular truth, to disagree with a powerful person, to admit a mistake publicly. That quiet courage is both rarer and more important.", "激勵,哲學,社會"],
["daily", "ˈdeɪli", "adj.", "日常的；每天的", "Your daily actions, not your occasional heroics, determine your trajectory.", "你的日常行動，而不是你偶爾的英雄主義，決定了你的軌跡。", "Daily habit=日常習慣。Daily routine=日常例行活動。Day by day=一天一天地。", "daily habit=日常習慣/daily routine=日常例行/day by day=一天一天/daily practice=每日練習", "She reviewed her daily actions every week against her long-term goals. That alignment check — are my days pointing in the right direction? — was her most important strategic practice.", "生活,激勵"],
["damage", "ˈdæmɪdʒ", "n./v.", "損害", "Prevent damage to your reputation — it takes years to repair.", "防止對你聲譽的損害——修復需要多年時間。", "Cause damage=造成損害。Damage control=損害控制。Irreparable damage=不可挽回的損害。", "cause damage=造成損害/damage control=損害控制/irreparable damage=不可挽回的損害/minimize damage=減少損害", "When she made a public mistake, she moved immediately to damage control — honest acknowledgment, genuine apology, clear correction. That swift response converted potential reputational damage into trust.", "職場,溝通"],
["date", "deɪt", "n.", "日期；約會", "Set dates for your goals — dreams without dates are just wishes.", "為你的目標設定日期——沒有日期的夢想只是願望。", "Due date=截止日期。Up to date=最新的。Out of date=過時的。", "due date=截止日期/up to date=最新的/out of date=過時的/set a date=設定日期", "She set a date for every dream. Not because she was certain — but because a date created reality. Without a date, the dream lived permanently in the future. With one, it entered the present.", "激勵,生活"],
["dedicate", "ˈdɛdɪkeɪt", "v.", "投身；奉獻", "Dedicate a portion of every day to getting better at the most important thing.", "每天投入一部分時間在最重要的事情上變得更好。", "Dedicated=投身的。Dedication=奉獻（名詞）。Fully dedicated=完全投入。", "dedicated=投身的/dedication=奉獻/fully dedicated=完全投入/dedicate time=投入時間", "She dedicated the first hour of every day to learning something new in her field. That daily dedication — sustained over ten years — made her the most knowledgeable person in every room she entered.", "激勵,教育,職場"],
["delay", "dɪˈleɪ", "n./v.", "延遲", "When you delay the hard thing, you double the difficulty.", "當你推遲困難的事情時，你把難度翻了一倍。", "Without delay=立即。Delay tactics=拖延戰術。Time delay=時間延遲。", "without delay=立即/delay tactics=拖延戰術/time delay=時間延遲/avoid delay=避免延遲", "She addressed problems immediately without delay. The discomfort of immediate confrontation was always less than the discomfort of delayed conversation grown large. Prompt action is the cheapest form of problem management.", "職場,激勵,溝通"],
["desire", "dɪˈzaɪər", "n./v.", "渴望；欲望", "Connect your work to a genuine desire and it will never feel like work.", "將你的工作與真正的渴望聯繫起來，它將永遠不會感覺像工作。", "Burning desire=熱切渴望。Desire to improve=改進的渴望。Heart's desire=內心渴望。", "burning desire=熱切渴望/desire to improve=改進的渴望/heart's desire=內心渴望/intense desire=強烈渴望", "She had a burning desire that nobody had managed to extinguish — not failure, not criticism, not the years of obscurity. Desire, maintained purely enough, eventually ignites everything around it.", "激勵,心理"],
["detail", "ˈdiːteɪl", "n.", "細節", "The details distinguish mediocre from extraordinary work.", "細節區分了平庸和非凡的工作。", "In detail=詳細地。Pay attention to detail=注意細節。Minor detail=次要細節。", "in detail=詳細地/pay attention to detail=注意細節/minor detail=次要細節/critical detail=關鍵細節", "She paid attention to details nobody else noticed — not obsessively but professionally. Clients noticed that she noticed. The care visible in details signaled the care given to everything else.", "職場,教育"],
["determined", "dɪˈtɜːrmɪnd", "adj.", "堅定的；下決心的", "Be determined in purpose and flexible in approach.", "在目的上堅定，在方法上靈活。", "Determination=決心（名詞）。Fiercely determined=非常堅定的。Self-determined=自我決定的。", "determination=決心/fiercely determined=非常堅定/self-determined=自我決定/determined effort=堅定努力", "She was the most determined person in every room — not because she was certain, but because she was clear. Clarity of purpose makes determination look like a natural quality when it is actually a disciplined choice.", "激勵,心理"],
["difference", "ˈdɪfrəns", "n.", "差別；不同", "Make the difference between things that matter and things that don't.", "區分重要的事情和不重要的事情。", "Make a difference=產生影響。Spot the difference=找不同。Difference of opinion=意見分歧。", "make a difference=產生影響/spot the difference=找不同/difference of opinion=意見分歧/key difference=關鍵區別", "She did not set out to be famous. She set out to make a difference to the specific people in front of her. That focused intention made a large and indirect impact she could never have planned.", "激勵,社會,哲學"],
["direct", "dɪˈrɛkt", "adj./v.", "直接的；指引", "Be direct with kindness — people need honesty delivered gently.", "善意地直接——人們需要溫和傳遞的誠實。", "Direct communication=直接溝通。Be direct=直接說。Direct approach=直接方法。", "direct communication=直接溝通/be direct=直接說/direct approach=直接方法/straight and direct=坦率直接", "She was direct about her expectations, gentle about her tone, and consistent in both. That combination — high clarity, high warmth — made people feel both respected and cared for.", "溝通,職場,社交"],
["discuss", "dɪˈskʌs", "v.", "討論", "Discuss before deciding — the best answer is often in the room.", "在決定之前討論——最好的答案通常就在房間裡。", "Discussion=討論（名詞）。Open discussion=開放討論。In-depth discussion=深入討論。", "discussion=討論/open discussion=開放討論/in-depth discussion=深入討論/encourage discussion=鼓勵討論", "She facilitated discussions rather than leading them. The answers that emerged from collective thinking were consistently better than any she could have generated alone. Wisdom is often distributed.", "溝通,教育,職場"],
["distance", "ˈdɪstəns", "n.", "距離；疏遠", "Create distance between yourself and your problems to see them clearly.", "在你自己和你的問題之間創造距離，以便清楚地看到它們。", "Keep a distance=保持距離。Long distance=長距離。Go the distance=堅持到底。", "keep a distance=保持距離/long distance=長距離/go the distance=堅持到底/emotional distance=情感距離", "She took a week away from the problem she could not solve. When she returned, the solution was obvious. Distance is the most underused thinking tool available to anyone.", "教育,心理,哲學"],
["durable", "ˈdjʊərəbl", "adj.", "持久的；耐用的", "Build durable habits, relationships, and skills — not just fast results.", "建立持久的習慣、關係和技能——而不只是快速的結果。", "Durability=持久性（名詞）。Long-lasting=長久的（同義）。Durable impact=持久的影響。", "durability=持久性/long-lasting=長久的/durable impact=持久的影響/built to last=建造得持久", "Her early decisions prioritized durability over speed. She built things that lasted. Not dramatically — steadily. Years later, everything she had built still stood while faster-built alternatives had collapsed.", "激勵,商業,生活"],
["earn", "ɜːrn", "v.", "賺取；贏得", "Earn trust, respect, and credibility — they cannot be taken.", "贏得信任、尊重和可信度——它們無法被強取。", "Earn a living=謀生。Earn respect=贏得尊重。Hard-earned=努力賺來的。", "earn a living=謀生/earn respect=贏得尊重/hard-earned=努力賺來的/you earn it=你贏得它", "She earned everything she had — not as a boast, but as a fact. Nothing had been given. Everything had been worked for. That knowledge, bone-deep, gave her a confidence that inherited privilege never provides.", "激勵,職場,哲學"],
["educate", "ˈɛdʒʊkeɪt", "v.", "教育", "Educate yourself continuously — the world changes faster than schools do.", "不斷自我教育——世界變化比學校更快。", "Self-educated=自學的。Educate yourself=自我教育。Educate others=教育他人。", "self-educated=自學的/educate yourself=自我教育/educate others=教育他人/educated guess=有根據的猜測", "She allocated a fixed percentage of her income to her own education every year, regardless of financial pressure. That investment, made consistently for twenty years, produced returns that dwarfed every other asset she owned.", "教育,金融,激勵"],
["eliminate", "ɪˈlɪmɪneɪt", "v.", "消除；淘汰", "Eliminate what doesn't matter to amplify what does.", "消除不重要的東西以放大重要的東西。", "Elimination=消除（名詞）。Eliminate waste=消除浪費。Eliminate distractions=消除干擾。", "elimination=消除/eliminate waste=消除浪費/eliminate distractions=消除干擾/process of elimination=排除法", "She applied the process of elimination to her calendar aggressively every quarter. Not cruelty — clarity. Everything that remained was something that genuinely mattered. That ruthless curation was her secret.", "職場,生活,激勵"],
["empower", "ɪmˈpaʊər", "v.", "賦能；授權", "Empower others and your influence multiplies beyond your direct reach.", "賦予他人能力，你的影響力將倍增超出你的直接接觸範圍。", "Empowerment=賦能（名詞）。Feel empowered=感到被賦能。Empower your team=賦予團隊能力。", "empowerment=賦能/feel empowered=感到被賦能/empower your team=賦予團隊能力/self-empowerment=自我賦能", "She measured her leadership by how much she had made herself unnecessary. When her team operated excellently without her, she knew she had succeeded. Empowerment makes leaders scalable.", "職場,激勵"],
["enable", "ɪˈneɪbl", "v.", "使能夠；賦能", "Enable others to do their best work by removing the obstacles in their way.", "通過移除路上的障礙使他人能夠做到最好的工作。", "Enabler=推動者。Enable growth=促進成長。Technology-enabled=技術支持的。", "enabler=推動者/enable growth=促進成長/technology-enabled=技術支持的/enable success=促進成功", "She spent each Monday asking: what is blocking my team this week? Then she spent the week removing those blocks. Leadership as obstacle removal was the most impactful approach she found.", "職場,商業"],
["energy", "ˈɛnədʒi", "n.", "能量；精力", "Manage your energy more carefully than your time — tired efforts waste time.", "比管理你的時間更仔細地管理你的能量——疲憊的努力浪費時間。", "Energy levels=精力水平。High energy=高能量。Conserve energy=節省能量。", "energy levels=精力水平/high energy=高能量/conserve energy=節省能量/positive energy=積極的能量", "She tracked her energy, not just her time. She scheduled demanding work when energy was high and administrative tasks when energy was lower. That alignment multiplied her output at constant hours.", "健康,生活,激勵"],
["enthusiasm", "ɪnˈθjuːziæzm", "n.", "熱情；熱忱", "Genuine enthusiasm is contagious and impossible to fake sustainably.", "真正的熱情是有感染力的，無法持續地偽裝。", "Enthusiastic=熱情的（形容詞）。Infectious enthusiasm=感染性的熱情。Lack of enthusiasm=缺乏熱情。", "enthusiastic=熱情的/infectious enthusiasm=感染性熱情/lack of enthusiasm=缺乏熱情/natural enthusiasm=自然的熱情", "Her enthusiasm was never performed — it was the natural output of doing work she genuinely cared about. That authenticity made it contagious. Teams took on her energy because hers was real.", "激勵,職場"],
["equal", "ˈiːkwəl", "adj.", "平等的", "Treat everyone equally and you will be trusted by everyone.", "平等對待每個人，你將受到每個人的信任。", "Equality=平等（名詞）。Equal opportunity=平等機會。Equal treatment=平等對待。", "equality=平等/equal opportunity=平等機會/equal treatment=平等對待/level playing field=公平競爭環境", "She treated the newest intern and the most senior executive with identical respect. That consistency — visible to everyone — made her the most trusted person in the organization at every level.", "社會,職場,哲學"],
["essential", "ɪˈsɛnʃəl", "adj.", "必要的；基本的", "Identify what is truly essential and discard the rest fearlessly.", "識別真正必要的東西，無懼地丟棄其餘的。", "Essentially=基本上。Non-essential=非必要的。Essential skill=基本技能。", "essentially=基本上/non-essential=非必要的/essential skill=基本技能/strip to the essential=精簡到本質", "She asked herself annually: what is the essential core of what I do? That question eliminated years of accumulated non-essential activity and left only the work that was irreplaceable and meaningful.", "生活,職場,哲學"],
["evolve", "ɪˈvɒlv", "v.", "進化；發展", "Evolve your views as new evidence arrives — that is intelligence.", "隨著新證據的到來進化你的觀點——那就是智慧。", "Evolution=進化（名詞）。Evolving situation=不斷發展的情況。Continuously evolve=持續進化。", "evolution=進化/evolving situation=不斷發展的情況/continuously evolve=持續進化/evolve with the times=與時俱進", "She evolved publicly — updating opinions, acknowledging when she had been wrong, changing positions based on evidence. In a world where minds are changed in private, that public evolution built extraordinary trust.", "哲學,教育,激勵"],
["exhausted", "ɪɡˈzɔːstɪd", "adj.", "精疲力竭的", "When exhausted, rest — but make rest a practice not just a reaction.", "精疲力竭時休息——但讓休息成為一種習慣，而不只是一種反應。", "Exhaustion=疲憊（名詞）。Mentally exhausted=精神疲憊。Run down=精力耗盡（同義）。", "exhaustion=疲憊/mentally exhausted=精神疲憊/physically exhausted=身體疲憊/on the verge of exhaustion=接近精疲力竭", "She had once been chronically exhausted. Then she redesigned her life around recovery — sleep first, deep work second. The work did not suffer. It improved. Rest is not the opposite of productivity.", "健康,生活,激勵"],
["exist", "ɪɡˈzɪst", "v.", "存在；生活", "Make sure you are living, not just existing.", "確保你是在活著，而不只是存在著。", "Existence=存在（名詞）。Existing=現有的（形容詞）。Coexist=共存。", "existence=存在/existing=現有的/coexist=共存/come into existence=開始存在", "She made the distinction between existing and living explicit to herself: existing means going through the motions; living means choosing, feeling, growing. She chose living, even when it was harder.", "哲學,激勵,生活"],
["express", "ɪkˈsprɛs", "v.", "表達", "Express gratitude explicitly — people rarely know they mattered unless told.", "明確地表達感激——除非被告知，人們很少知道他們的重要性。", "Express yourself=表達自我。Freedom of expression=表達自由。Express opinion=表達意見。", "express yourself=表達自我/freedom of expression=表達自由/express opinion=表達意見/clearly express=清楚表達", "She expressed appreciation specifically and often. Not general 'thanks' — 'The way you handled that difficult client call on Thursday changed the outcome of the whole account.' Specific expression creates real connection.", "溝通,社交"],
["extend", "ɪkˈstɛnd", "v.", "延伸；延長", "Extend grace to others — they are usually doing their best.", "向他人延伸恩典——他們通常在盡自己最大的努力。", "Extend a hand=伸出援手。Extended family=大家庭。Extend a deadline=延長截止日期。", "extend a hand=伸出援手/extended family=大家庭/extend a deadline=延長截止日期/extend your skills=延伸技能", "She extended the benefit of the doubt as a default, not a reward. That habitual generosity of interpretation created an environment where people felt safe enough to perform at their best.", "溝通,哲學,社交"],
["extraordinary", "ɪkˈstrɔːrdɪnɛri", "adj.", "非凡的", "Extraordinary results come from ordinary people doing things consistently.", "非凡的結果來自於普通人持續地做事情。", "Extraordinary effort=非凡的努力。Extraordinarily=非凡地。Above and beyond=超越職責。", "extraordinary effort=非凡努力/extraordinarily=非凡地/extraordinary circumstances=非凡情況/extraordinary person=非凡的人", "She was not extraordinary in isolation — she was extraordinary in combination. Her skills, values, and habits combined in a way that nobody else had bothered to combine. Extraordinary is often recombination.", "激勵,哲學"],
["ability", "əˈbɪlɪti", "n.", "能力", "She developed the ability to speak three languages.", "她培養了說三種語言的能力。", "Able=能夠（形容詞）。Ability to=做...的能力。Natural ability=天生的能力。", "ability to=做...的能力/natural ability=天生能力/beyond ability=超越能力/develop ability=培養能力", "She was told she had no ability for music. At fifty, she played her first concert. The audience wept. Ability, it turns out, is mostly stubborn practice.", "教育,激勵"],
["absent", "ˈæbsənt", "adj.", "缺席的；心不在焉的", "He was physically present but mentally absent during the meeting.", "他在會議上身體在場但精神不在。", "Absent-minded=心不在焉的。Be absent=缺席。Absent without leave=擅自缺席。", "absent-minded=心不在焉/be absent=缺席/presence and absence=在場與缺席", "She realized she had been present without being present for years — phone in hand, eyes distracted, heart elsewhere. She put the phone down. The quality of everything improved immediately.", "日常,家庭,心理"],
["abundant", "əˈbʌndənt", "adj.", "豐富的；充裕的", "The earth provides abundant resources when we use them wisely.", "當我們明智地使用時，地球提供豐富的資源。", "Abundance=豐富（名詞）。Abundantly=豐富地。Abundant opportunities=豐富的機會。", "abundance=豐富/abundantly=豐富地/abundant resources=豐富資源/live in abundance=生活在豐富中", "She shifted her thinking from scarcity to abundance. Not naively — she had learned that the world offers abundant possibilities to those who look for them rather than for their limits.", "哲學,激勵"],
["acceptable", "əkˈsɛptəbl", "adj.", "可接受的", "Set standards for what is acceptable and what is not.", "設定什麼是可以接受的，什麼是不可以的標準。", "Acceptability=可接受性（名詞）。Barely acceptable=勉強可接受的。Socially acceptable=社會可接受的。", "acceptability=可接受性/barely acceptable=勉強可接受/socially acceptable=社會可接受的", "She raised the bar for what she considered acceptable in her own work. That personal standard — higher than any external requirement — was what made her output remarkable.", "職場,教育"],
["accomplishment", "əˈkɒmplɪʃmənt", "n.", "成就", "Celebrate your accomplishments — they prove the hard work was real.", "慶祝你的成就——它們證明了努力工作是真實的。", "Major accomplishment=重大成就。List of accomplishments=成就清單。Sense of accomplishment=成就感。", "major accomplishment=重大成就/list of accomplishments=成就清單/sense of accomplishment=成就感", "She kept a record of every accomplishment, however small. On hard days, she read the list. It reminded her of the person capable of those things and reconnected her with her own strength.", "激勵,心理,教育"],
["acquire", "əˈkwaɪər", "v.", "獲得；學到", "Acquire the habit of learning before you need any specific knowledge.", "在你需要任何特定知識之前養成學習的習慣。", "Acquisition=獲取（名詞）。Acquire skills=獲得技能。Acquire knowledge=獲取知識。", "acquisition=獲取/acquire skills=獲得技能/acquire knowledge=獲取知識/newly acquired=新獲得的", "She acquired her most valuable skills not in school but in the gaps between formal education — the books read voluntarily, the projects started out of curiosity, the problems solved uninstructed.", "教育,激勵"],
["adequate", "ˈædɪkwɪt", "adj.", "足夠的；適當的", "Adequate preparation prevents poor performance completely.", "足夠的準備完全防止糟糕的表現。", "Adequacy=足夠（名詞）。Inadequate=不足的（反義）。More than adequate=綽綽有餘。", "adequacy=足夠/inadequate=不足的/more than adequate=綽綽有餘/barely adequate=勉強足夠", "She distinguished between adequate and excellent. She always aimed for excellent, but knowing where adequate was helped her allocate effort wisely — not everything deserves maximum effort.", "職場,教育"],
["adjust", "əˈdʒʌst", "v.", "調整；適應", "Adjust your approach when the results are not what you intended.", "當結果不是你預期的時，調整你的方法。", "Adjustable=可調整的。Self-adjustment=自我調整。Fine-tune=微調（同義）。", "adjustable=可調整的/self-adjustment=自我調整/fine-tune=微調/adjust expectations=調整期望", "She adjusted without resentment when data showed she was wrong. That psychological flexibility — changing course based on evidence rather than defending the original plan — made her consistently effective.", "激勵,職場,哲學"],
["affect", "əˈfɛkt", "v.", "影響；感動", "What you consistently do affects who you gradually become.", "你持續做的事情影響著你逐漸變成的人。", "Affected=受影響的。Emotional affect=情感反應。Deep effect=深遠影響（注意 effect=結果）。", "affected=受影響的/deeply affected=深受影響/affect behavior=影響行為/profoundly affect=深刻影響", "She was moved by small kindnesses — genuinely, visibly affected. That openness to being touched by the world made her more human to everyone she encountered, and more trusted for it.", "心理,情感,溝通"],
["after", "ˈɑːftər", "prep.", "之後；追求", "Look after yourself first — you cannot pour from an empty cup.", "先照顧好自己——你無法從空杯子裡倒出東西。", "After all=畢竟。Look after=照顧。After hours=下班後。", "after all=畢竟/look after=照顧/after hours=下班後/morning after=第二天早上", "She made it a principle to look after herself with the same care she gave to others. That simple equity — treating herself as well as she treated others — prevented burnout and sustained generosity.", "健康,生活,哲學"],
["agency", "ˈeɪdʒənsi", "n.", "能動性；代理機構", "You have more agency over your circumstances than you think.", "你對自己的環境有比你想的更多的主動性。", "Personal agency=個人能動性。Sense of agency=能動感。Exercise agency=行使能動性。", "personal agency=個人能動性/sense of agency=能動感/exercise agency=行使能動性/reclaim agency=重拾能動性", "She stopped seeing herself as a passive recipient of circumstance and started exercising agency over everything she could influence. That shift — from victim to agent — transformed her entire relationship with her life.", "心理,哲學,激勵"],
["agile", "ˈædʒaɪl", "adj.", "敏捷的；靈活的", "Stay agile — the ability to pivot quickly is worth more than any plan.", "保持敏捷——快速轉向的能力比任何計劃都更有價值。", "Agility=敏捷（名詞）。Agile team=敏捷團隊。Mental agility=思維敏捷。", "agility=敏捷/agile team=敏捷團隊/mental agility=思維敏捷/agile approach=敏捷方法", "She built agility into her workflow by refusing to over-plan. She planned enough to direct and no more. The rest she navigated with real-time information. Agility is planned incompleteness.", "職場,商業,激勵"],
["ahead", "əˈhɛd", "adv.", "前面；提前", "Think ahead — the problems you prevent are better than the ones you solve.", "提前思考——你預防的問題比你解決的問題更好。", "Ahead of schedule=提前完成。Plan ahead=提前計劃。Move ahead=向前推進。", "ahead of schedule=提前完成/plan ahead=提前計劃/move ahead=向前推進/think ahead=提前思考", "She always planned three steps ahead. Not from anxiety but from care — for the people who would be affected by decisions she made today. Thinking ahead is a form of respect for the future.", "激勵,職場,哲學"],
["alter", "ˈɔːltər", "v.", "改變；修改", "Alter your habits before life forces a more dramatic alteration.", "在生活強迫更戲劇性的改變之前改變你的習慣。", "Alteration=改變（名詞）。Alter the course=改變方向。Alter your thinking=改變你的思維。", "alteration=改變/alter the course=改變方向/alter your thinking=改變思維/radically alter=根本改變", "She altered her approach the moment evidence suggested it wasn't working. Not defensively — curiously. The willingness to alter course quickly is what separated her from those who kept doing the same thing expecting different results.", "激勵,哲學"],
["ambition", "æmˈbɪʃən", "n.", "雄心；抱負", "Pair ambition with humility — the combination is unstoppable.", "將雄心與謙遜配對——這個組合是不可阻擋的。", "Ambitious=有雄心的（形容詞）。Burning ambition=熾烈的雄心。Ambition without ethics=沒有道德的雄心。", "ambitious=有雄心的/burning ambition=熾烈的雄心/realistic ambition=現實的抱負/channel ambition=引導雄心", "Her ambition was large and quiet. She did not announce it — she worked it. People who need to broadcast their ambition often have less of it than those who just get up every day and do the work.", "激勵,職場,哲學"],
["ancient", "ˈeɪnʃənt", "adj.", "古代的；古老的", "Ancient wisdom applies to modern problems more than we admit.", "古代智慧應用於現代問題比我們承認的要多。", "Ancient civilization=古代文明。Ancient wisdom=古老智慧。Ancient practice=古老做法。", "ancient civilization=古代文明/ancient wisdom=古老智慧/ancient practice=古老做法/ancient history=古代歷史", "She read ancient philosophy not as history but as dialogue. The questions Socrates asked were identical to the ones she faced. Good questions, she realized, are truly ancient.", "教育,哲學,文化"],
["angle", "ˈæŋɡl", "n.", "角度；觀點", "Look at every problem from more than one angle before deciding.", "在決定之前從多個角度看每個問題。", "Different angle=不同角度。New angle=新角度。From every angle=從各個角度。", "different angle=不同角度/new angle=新角度/from every angle=從各個角度/change the angle=改變角度", "She never accepted the first way she saw a problem as the only way. She circled it like a sculptor circling marble — looking for where the best entry point was. The angle changes everything.", "教育,哲學,藝術"],
["annual", "ˈænjuəl", "adj.", "每年的；年度的", "Annual reviews should confirm what weekly check-ins already know.", "年度評估應該確認每週個別談話已經知道的內容。", "Annually=每年地。Annual report=年度報告。Annual leave=年假。", "annually=每年地/annual report=年度報告/annual leave=年假/annual review=年度評估", "She conducted annual reviews of her life — not of her work, her whole life. Values still aligned? Relationships still nourished? Was she becoming who she intended? That annual check-in kept her on her own path.", "生活,職場"],
["anticipate", "ænˈtɪsɪpeɪt", "v.", "預期；預測", "Anticipate objections before you present any proposal.", "在提交任何提案之前預測反對意見。", "Anticipation=預期（名詞）。Anticipate problems=預期問題。In anticipation of=預期...。", "anticipation=預期/anticipate problems=預期問題/in anticipation of=預期/anticipate needs=預測需求", "She anticipated her clients' needs before they expressed them. That proactive service — solving problems that had not yet been named — was what created loyalty that no competitor could buy.", "職場,溝通,商業"],
["appetite", "ˈæpɪtaɪt", "n.", "食慾；慾望", "An appetite for learning is the most important kind to cultivate.", "對學習的渴望是最重要的一種渴望來培養。", "Appetite for risk=冒險胃口。Lose your appetite=失去食慾。Healthy appetite=健康食慾。", "appetite for risk=冒險胃口/lose your appetite=失去食慾/healthy appetite=健康的食慾/appetite for learning=學習慾望", "She maintained a voracious appetite for new knowledge across her entire career. When colleagues stopped learning, she accelerated. That differential learning rate compounded into an insurmountable knowledge advantage.", "教育,激勵,飲食"],
["appropriate", "əˈproʊpriɪt", "adj.", "適當的；恰當的", "Choose the appropriate response for each situation carefully.", "為每個情況仔細選擇適當的回應。", "Appropriately=適當地。Appropriate behavior=適當的行為。Inappropriate=不適當的（反義）。", "appropriately=適當地/appropriate behavior=適當行為/inappropriate=不適當的/contextually appropriate=情境適當的", "She was known for always saying the appropriate thing — not the clever thing, not the safe thing: the appropriate thing. That calibration, requiring both intelligence and care, was rare and precious.", "溝通,社交"],
["arise", "əˈraɪz", "v.", "出現；產生", "Opportunities arise from problems — learn to look for them there.", "機會從問題中出現——學會在那裡尋找它們。", "Arising issue=出現的問題。Opportunities arise=機會出現。Arise from=由...產生。", "arising issue=出現的問題/opportunities arise=機會出現/arise from=由...產生/problems arising=出現的問題", "She was trained to look for opportunity in every arising problem. That habit — seeing problems as potential opportunities — consistently converted crises into competitive advantages.", "激勵,商業,哲學"],
["arm", "ɑːrm", "n./v.", "手臂；武裝", "Arm yourself with knowledge before entering any important conversation.", "在進入任何重要對話之前用知識武裝自己。", "Armed with=裝備有。Arm in arm=手挽手。Arm yourself=武裝自己。", "armed with=裝備有/arm in arm=手挽手/arm yourself=武裝自己/keep at arm's length=保持距離", "She walked into every difficult conversation armed with facts, prepared for emotions, and clear about her intention. That thorough preparation was not a weapon — it was a form of respect.", "溝通,職場"],
["arrangement", "əˈreɪndʒmənt", "n.", "安排；安置", "Make arrangements in advance and you will never be caught unprepared.", "提前做安排，你將永遠不會措手不及。", "Come to an arrangement=達成安排。Floral arrangement=花藝。Arrangement of ideas=想法的排列。", "come to an arrangement=達成安排/floral arrangement=花藝/arrangement of ideas=想法排列/working arrangement=工作安排", "She made arrangements for every contingency. Not from fear but from love — for the people who would depend on those arrangements. Preparation is care made visible.", "職場,生活"],
["assert", "əˈsɜːrt", "v.", "主張；堅持", "Assert your needs clearly — quiet resentment helps no one.", "清楚地主張你的需要——安靜的怨恨對任何人都沒有幫助。", "Assertive=堅定自信的（形容詞）。Assert yourself=堅持自我。Self-assertion=自我主張。", "assertive=堅定自信/assert yourself=堅持自我/self-assertion=自我主張/assertively=堅定地", "She learned to assert her needs without apology and without aggression. That middle ground — clear, direct, warm — transformed her relationships and her professional outcomes simultaneously.", "溝通,心理,職場"],
["assessment", "əˈsɛsmənt", "n.", "評估", "Honest self-assessment is more valuable than external validation.", "誠實的自我評估比外部驗證更有價值。", "Risk assessment=風險評估。Performance assessment=績效評估。Self-assessment=自我評估。", "risk assessment=風險評估/performance assessment=績效評估/self-assessment=自我評估/needs assessment=需求評估", "She conducted honest assessments of every project — what succeeded, what failed, what she would do differently. That systematic learning transformed her from a repeater of mistakes to a compounding learner.", "教育,職場,科學"],
["assign", "əˈsaɪn", "v.", "分配；指派", "Assign tasks based on strengths, not just availability.", "根據優勢而不只是可用性分配任務。", "Assignment=任務（名詞）。Assign responsibility=指派責任。Self-assigned=自我指派的。", "assignment=任務/assign responsibility=指派責任/self-assigned=自我指派/task assignment=任務分配", "She assigned work to people based on what would help them grow, not just what needed doing. That deliberate developmental assignment made every project both useful and educational.", "職場,教育"],
["atmosphere", "ˈætməsfɪər", "n.", "氣氛；大氣", "Create an atmosphere where people feel safe to take risks.", "創造一個人們感到冒險安全的氣氛。", "Positive atmosphere=積極氣氛。Tense atmosphere=緊張氣氛。Work atmosphere=工作氛圍。", "positive atmosphere=積極氣氛/tense atmosphere=緊張氣氛/work atmosphere=工作氛圍/create an atmosphere=創造氛圍", "She understood that atmosphere was as important as strategy. The culture she built — visible in daily interactions — was the environment where performance either thrived or withered.", "職場,社交"],
["attach", "əˈtætʃ", "v.", "附著；連接；依附", "Attach meaning to your work and it will never feel meaningless.", "將意義附加到你的工作上，它將永遠不會感覺無意義。", "Attachment=依附（名詞）。Attached to=依附於。Emotional attachment=情感依附。", "attachment=依附/attached to=依附於/emotional attachment=情感依附/detach and reattach=分離和重新連接", "She attached deeper meaning to everything she did — even small tasks. Not artificially, but by tracing their connection to something that mattered. Meaning is attachable to anything, if you look closely enough.", "心理,激勵,哲學"],
["attempt", "əˈtɛmpt", "n./v.", "嘗試", "Every attempt moves you closer to success, even failed ones.", "每次嘗試都讓你更接近成功，即使失敗的也是如此。", "First attempt=第一次嘗試。Make an attempt=做出嘗試。Failed attempt=失敗的嘗試。", "first attempt=第一次嘗試/make an attempt=做出嘗試/failed attempt=失敗的嘗試/bold attempt=大膽的嘗試", "She was on her fourteenth attempt when she finally succeeded. Each attempt had been slightly better than the last. She had been accumulating competence the entire time, even when it felt like failure.", "激勵,教育"],
["attract", "əˈtrækt", "v.", "吸引", "Attract the right opportunities by being exactly who you are.", "通過確實做自己來吸引正確的機會。", "Attraction=吸引（名詞）。Attract talent=吸引人才。Magnetic=有吸引力的（同義）。", "attraction=吸引/attract talent=吸引人才/magnetic=有吸引力的/attract attention=吸引注意", "She had stopped trying to attract anything. She focused entirely on becoming someone worth attracting things to. The opportunities that arrived once she made that shift were better than anything she had chased.", "激勵,哲學"],
["attribute", "ˈætrɪbjuːt", "n./v.", "屬性；歸因", "Never attribute to malice what can be adequately explained by misunderstanding.", "永遠不要把可以充分用誤解解釋的事情歸因於惡意。", "Key attribute=關鍵屬性。Attribute success to=將成功歸因於。Personal attribute=個人屬性。", "key attribute=關鍵屬性/attribute success to=將成功歸因於/positive attribute=積極屬性/character attribute=性格屬性", "She attributed her success clearly to the people who had helped her. That habit of honest attribution — naming contributors specifically — made her simultaneously humble and trustworthy.", "哲學,溝通,職場"],
["authority", "ɔːˈθɒrɪti", "n.", "權威；授權", "Build authority through expertise, not through title.", "通過專業知識而不是頭銜建立權威。", "Act with authority=以權威行動。Authority figure=權威人物。Abuse of authority=濫用權威。", "act with authority=以權威行動/authority figure=權威人物/abuse of authority=濫用權威/earn authority=贏得權威", "She had no formal authority in the room. But when she spoke, everyone listened. She had built authority the only way that lasts: through repeated demonstrations of being right, fair, and reliable.", "職場,社會,激勵"],
["background", "ˈbækɡraʊnd", "n.", "背景；後景", "Your background is part of your story, not the limit of your possibilities.", "你的背景是你故事的一部分，而不是你可能性的限制。", "Educational background=教育背景。Family background=家庭背景。Come from a background=來自某種背景。", "educational background=教育背景/family background=家庭背景/professional background=職業背景/background check=背景調查", "She came from a background that most would have called disadvantaged. She called it distinctive. Every part of her path had given her something that those with easier starts could not easily acquire.", "激勵,社會,哲學"],
["battle", "ˈbætl", "n.", "戰鬥；努力", "Pick your battles wisely — not every hill is worth the fight.", "明智地選擇你的戰鬥——不是每個山丘都值得爭取。", "Uphill battle=艱難戰鬥。Win the battle=贏得戰鬥。Battle of wills=意志力之爭。", "uphill battle=艱難戰鬥/win the battle=贏得戰鬥/battle of wills=意志力之爭/choose your battles=選擇你的戰鬥", "She had learned which battles were worth fighting and which were worth conceding. That strategic concession — giving ground where it didn't matter to gain ground where it did — was her most effective negotiating skill.", "激勵,職場,哲學"],
["beauty", "ˈbjuːti", "n.", "美；美麗", "Find beauty in the ordinary — it is everywhere once you look.", "在平凡中找到美——一旦你尋找，它無處不在。", "Natural beauty=自然美。Beauty of simplicity=簡單之美。In the eye of the beholder=情人眼裡出西施。", "natural beauty=自然美/beauty of simplicity=簡單之美/inner beauty=內在美/find beauty=找到美", "She trained herself to notice beauty daily. Not the spectacular — the ordinary beautiful: morning light, the texture of her coffee, the way a colleague laughed. The practice gradually made ordinary life extraordinary.", "藝術,哲學,日常"],
["bind", "baɪnd", "v.", "綁定；約束", "What binds people together is more powerful than what divides them.", "將人們綁在一起的東西比分裂他們的東西更強大。", "Binding agreement=有約束力的協議。Non-binding=不具約束力的。What binds us=什麼把我們聯繫在一起。", "binding agreement=有約束力的協議/non-binding=不具約束力/common bond=共同紐帶/bind people together=把人們聯繫在一起", "She sought what bound her team together rather than what differentiated them. That focus on shared purpose over individual differences created cohesion that survived every challenge the team faced.", "職場,社會,哲學"],
["bite", "baɪt", "v./n.", "咬；一口", "Bite off no more than you can chew — but chew what you bite.", "不要咬超過你能嚼的——但要咬你咬的東西。", "Bite the bullet=咬緊牙關。Bite off more than you can chew=貪多嚼不爛。Take a bite=咬一口。", "bite the bullet=咬緊牙關/bite off more than you can chew=貪多嚼不爛/take a bite=咬一口", "She had bitten off too much before and failed. She learned to scope accurately. Her commitments were smaller and more complete. Better to do three things excellently than ten things adequately.", "激勵,日常"],
["blame", "bleɪm", "v./n.", "責怪", "Replace blame with curiosity — it produces solutions instead of conflict.", "用好奇心取代責怪——它產生解決方案而不是衝突。", "Blame someone=責怪某人。Blame culture=責怪文化。Misplace blame=誤責。", "blame someone=責怪某人/blame culture=責怪文化/avoid blame=避免責怪/share the blame=分擔責任", "She replaced 'whose fault is this?' with 'what happened and how do we prevent it?' That shift — from blame to learning — was the most powerful cultural change she ever made in an organization.", "職場,溝通,心理"],
["blind", "blaɪnd", "adj./v.", "盲目的；使盲目", "Don't be blind to your own patterns — they are usually obvious to others.", "不要對你自己的模式視而不見——它們通常對其他人很明顯。", "Blind spot=盲點。Turn a blind eye=視而不見。Blind to=對...視而不見。", "blind spot=盲點/turn a blind eye=視而不見/blind to=對...視而不見/willfully blind=故意忽視", "She sought out her blind spots actively rather than waiting for them to cause damage. That proactive vulnerability — asking others what she couldn't see — made her more reliable than those who defended their blind spots.", "心理,教育,職場"],
["block", "blɒk", "v./n.", "阻礙；街區", "Clear the mental blocks before you can see what is actually possible.", "清除心理阻礙，然後你才能看到什麼是真正可能的。", "Mental block=心理阻礙。Block out time=封鎖時間。Building block=積木；基礎元素。", "mental block=心理阻礙/block out time=封鎖時間/building block=基礎元素/stumbling block=絆腳石", "She blocked two hours daily in her calendar — marked 'deep work' and treated as unchallengeable. That protected time was where her best work happened. Guard the blocks of time that matter.", "職場,生活"],
["bold", "boʊld", "adj.", "大膽的；醒目的", "Bold decisions, carefully made, produce outcomes that cautious ones cannot.", "謹慎做出的大膽決定產生謹慎決定無法產生的結果。", "Boldly=大膽地。Bold move=大膽行動。Bold enough=足夠大膽。", "boldly=大膽地/bold move=大膽行動/bold enough=足夠大膽/bold leadership=大膽的領導力", "She was bold in ways that looked calm. She said difficult truths with a steady voice. She made large bets with quiet confidence. Real boldness looks like certainty from the outside.", "激勵,職場"],
["boost", "buːst", "v.", "提升；增強", "Boost others and you will find yourself lifted in return.", "提升他人，你將發現自己也被回報地提升。", "Confidence boost=信心提升。Boost morale=提振士氣。Give a boost=給予推動力。", "confidence boost=信心提升/boost morale=提振士氣/give a boost=給予推動力/energy boost=能量提升", "She made a habit of publicly boosting her colleagues' work — not from politics but from genuine recognition. That generosity created an environment where credit was abundant and competition was replaced by cooperation.", "職場,社交,激勵"],
["boundary", "ˈbaʊndəri", "n.", "界限；邊界", "Clear boundaries are not walls — they are honest lines of respect.", "清晰的界限不是牆——它們是尊重的誠實線條。", "Set boundaries=設定界限。Boundary issues=界限問題。Push the boundaries=突破界限。", "set boundaries=設定界限/boundary issues=界限問題/push the boundaries=突破界限/healthy boundary=健康的界限", "She set boundaries not to push people away but to define the conditions under which she could be fully present. Boundaries, she had learned, protected relationships rather than preventing them.", "心理,職場,社交"],
["calm", "kɑːm", "adj.", "冷靜的", "Stay calm when everyone else is panicking — that is leadership.", "當其他人都在恐慌時保持冷靜——那就是領導力。", "Calmness=冷靜（名詞）。Keep calm=保持冷靜。Calm down=冷靜下來。", "calmness=冷靜/keep calm=保持冷靜/calm down=冷靜下來/calm approach=冷靜方法", "She practiced calmness the way others practiced running — daily, deliberately, even when unnecessary. When the crisis came, she was ready. Calm is a skill, not a trait.", "心理,激勵,職場"],
["capable", "ˈkeɪpəbl", "adj.", "有能力的", "You are more capable than your fears make you believe.", "你比你的恐懼讓你相信的更有能力。", "Capability=能力（名詞）。Highly capable=高度有能力的。Capability gap=能力差距。", "capability=能力/highly capable=高度有能力/capability gap=能力差距/prove capable=證明有能力", "She hired people more capable than herself in every specific area. That habit — choosing capability over ego — built teams that outperformed anything she could have built alone.", "職場,激勵"],
["capture", "ˈkæptʃər", "v.", "捕捉；記錄", "Capture your ideas the moment they come — they won't stay.", "在想法出現的那一刻捕捉它們——它們不會停留。", "Capture attention=吸引注意力。Capture the moment=記錄時刻。Screen capture=截圖。", "capture attention=吸引注意力/capture the moment=記錄時刻/screen capture=截圖/capture data=捕捉數據", "She carried a small notebook everywhere. Ideas captured on paper stayed. Ideas trusted to memory rarely did. The notebook became, over years, her most valuable intellectual archive.", "教育,日常,創意"],
["cause", "kɔːz", "n./v.", "原因；事業；引起", "Find a cause worth your best effort and give it exactly that.", "找到值得你最大努力的事業，並給予恰好那些努力。", "Good cause=好事業。Root cause=根本原因。Cause and effect=因果關係。", "good cause=好事業/root cause=根本原因/cause and effect=因果關係/social cause=社會事業", "She worked for causes, not just careers. When her work connected to something larger than herself, the motivation was different — deeper, more durable, harder to exhaust.", "激勵,社會,哲學"],
["chapter", "ˈtʃæptər", "n.", "章節；人生篇章", "Every ending is just a chapter break, not the story's end.", "每個結局只是一個章節的換行，而不是故事的結束。", "A new chapter=新篇章。Turn the page=翻篇。Close a chapter=結束一個章節。", "a new chapter=新篇章/turn the page=翻篇/close a chapter=結束章節/write your own chapter=書寫自己的篇章", "She started a new chapter at 45 with the same energy she had had at 25 — but with twenty years of wisdom added. The later chapters, she discovered, can be the best ones.", "激勵,生活,哲學"],
["charge", "tʃɑːrdʒ", "v.", "負責；充電", "Take charge of your direction before someone else does it for you.", "在別人為你做之前，掌控你的方向。", "Take charge=負責。In charge=負責的。Charge your energy=為你的能量充電。", "take charge=負責/in charge=負責的/free of charge=免費/charge ahead=向前衝", "She took charge of her development proactively. No waiting for the company to train her. No waiting for the mentor to call. She was the driver of her own education, always.", "激勵,職場"],
["chart", "tʃɑːrt", "v./n.", "繪製；圖表", "Chart your own course — borrowed maps lead to borrowed destinations.", "繪製你自己的航線——借來的地圖帶你到借來的目的地。", "Chart progress=記錄進度。Off-chart=圖表之外的。Chart a course=規劃路線。", "chart progress=記錄進度/chart a course=規劃路線/off the charts=超出預期/flow chart=流程圖", "She charted her professional development visually — goals, milestones, gaps, progress. Seeing the whole map reduced anxiety and increased clarity. Visualization is a form of thinking.", "職場,教育"],
["chase", "tʃeɪs", "v.", "追逐", "Stop chasing results and start building the habits that produce them.", "停止追逐結果，開始建立產生它們的習慣。", "Chase a dream=追夢。Chase success=追求成功。Wild goose chase=徒勞的追逐。", "chase a dream=追夢/chase success=追求成功/wild goose chase=徒勞追逐/give chase=追趕", "She stopped chasing and started attracting — not passively, but by becoming what deserved to attract what she wanted. The chase had exhausted her. The becoming energized her.", "激勵,哲學"],
["circumstance", "ˈsɜːrkəmstəns", "n.", "環境；情況", "Circumstances do not make character — they reveal it.", "環境不創造性格——它揭示性格。", "In these circumstances=在這些情況下。Adverse circumstances=不利情況。Exceptional circumstances=特殊情況。", "in these circumstances=在這些情況下/adverse circumstances=不利情況/exceptional circumstances=特殊情況", "She had grown up in circumstances that most would call impossible. She called them formative. Every difficult circumstance had taught her something that easy circumstances never could.", "激勵,哲學,社會"],
["civil", "ˈsɪvɪl", "adj.", "文明的；禮貌的", "Remain civil in disagreement — it signals strength, not weakness.", "在不同意見中保持文明——這表示力量，而不是軟弱。", "Civil rights=民權。Civil society=公民社會。Civilian=平民。", "civil rights=民權/civil society=公民社會/civilized=文明的/civil discussion=文明討論", "She insisted on civil discourse in every meeting she led. Disagreement, she explained, can coexist with respect. The moment we lose civility, we lose the ability to persuade and be persuaded.", "溝通,社會,職場"],
["clarity", "ˈklærɪti", "n.", "清晰", "Clarity of purpose is more motivating than certainty of outcome.", "目的的清晰比結果的確定更有激勵性。", "With clarity=清晰地。Bring clarity=帶來清晰。Mental clarity=思維清晰。", "with clarity=清晰地/bring clarity=帶來清晰/mental clarity=思維清晰/seek clarity=尋求清晰", "She spent thirty minutes every Sunday clarifying her priorities for the coming week. That weekly clarity practice was worth more than any productivity tool she had ever tried.", "激勵,生活"],
["clever", "ˈklɛvər", "adj.", "聰明的", "Being clever gets you far; being kind keeps you there.", "聰明讓你走得很遠；善良讓你留在那裡。", "Clever solution=聰明的解決方案。Quick-witted=反應敏捷的。Cleverness=機智（名詞）。", "clever solution=聰明的解決方案/quick-witted=反應敏捷/cleverness=機智/deceptively clever=出奇地聰明", "She was undeniably clever but had learned early that cleverness without character is more dangerous than useful. She cultivated both in equal measure and became genuinely formidable.", "激勵,社交"],
["close", "kloʊz", "adj./v.", "親近的；關閉", "Stay close to people who bring out the best in you.", "與讓你展現最好一面的人保持親近。", "Close the gap=縮小差距。Close-knit=緊密聯繫的。Come close=接近。", "close the gap=縮小差距/close-knit=緊密聯繫的/come close=接近/close examination=仔細審查", "She kept her circle small and close. Not from exclusivity but from depth. A few genuine connections beat hundreds of superficial ones. Closeness requires time and only time is finite.", "社交,哲學,家庭"],
["cloud", "klaʊd", "n.", "雲；障礙", "Every cloud has a silver lining if you are willing to look for it.", "如果你願意尋找，每朵烏雲都有一線希望。", "Every cloud has a silver lining=塞翁失馬，焉知非福。Cloud nine=極度快樂。Clouded judgment=被遮蔽的判斷。", "silver lining=一線希望/cloud nine=極度快樂/clouded judgment=被遮蔽的判斷/storm cloud=暴風雲", "She had a crisis of confidence after the failure. Then she found the silver lining: the failure had redirected her toward something better. The cloud had been a blessing in disguise.", "激勵,自然,哲學"],
["combine", "kəmˈbaɪn", "v.", "結合；組合", "The best ideas come from combining existing things in new ways.", "最好的想法來自以新方式結合現有的東西。", "Combination=組合（名詞）。Combined effort=共同努力。Combine forces=合力。", "combination=組合/combined effort=共同努力/combine forces=合力/winning combination=制勝組合", "She combined skills from different fields in ways her industry had never seen. That unique combination made her solutions impossible to replicate. Your combination of skills is your differentiation.", "商業,創意,教育"],
["come", "kʌm", "v.", "來；成為", "Good things come to those who prepare and then act decisively.", "好事來自於那些準備然後果斷行動的人。", "Come to terms=接受。Come across=偶然遇到。Come a long way=進步很多。", "come to terms=接受/come across=偶然遇到/come a long way=進步很多/come through=撐過去", "She had come a long way from where she started — but only because she started. Progress looks impossible before you begin. Looking back, the distance is always surprising.", "激勵,日常"],
["conclusion", "kənˈkluːʒən", "n.", "結論", "Don't jump to conclusions — they are usually wrong and always expensive.", "不要急於得出結論——它們通常是錯誤的，而且總是代價高昂的。", "Reach a conclusion=得出結論。Foregone conclusion=既成結論。Draw conclusions=得出結論。", "reach a conclusion=得出結論/foregone conclusion=既成結論/draw conclusions=得出結論/premature conclusion=過早的結論", "She withheld conclusions until the evidence was sufficient. In a room of people jumping to conclusions, her deliberate withholding made her voice more credible when she finally spoke.", "科學,溝通,教育"],
["conflict", "ˈkɒnflɪkt", "n.", "衝突", "Healthy conflict produces better decisions than false harmony.", "健康的衝突比虛假的和諧產生更好的決定。", "Inner conflict=內心衝突。Conflict resolution=衝突解決。Avoid conflict=避免衝突。", "inner conflict=內心衝突/conflict resolution=衝突解決/avoid conflict=避免衝突/manage conflict=管理衝突", "She welcomed productive conflict in her team. Teams that never disagree never discover the best answer. She built norms where disagreement was expected, respected, and resolved constructively.", "職場,溝通,教育"],
["connection", "kəˈnɛkʃən", "n.", "連結；人脈", "The quality of your connections determines the quality of your life.", "你連結的品質決定了你生活的品質。", "Make a connection=建立連結。Network connection=網絡連結。Human connection=人際連結。", "make a connection=建立連結/network connection=網絡連結/human connection=人際連結/meaningful connection=有意義的連結", "She invested in connections for their intrinsic value — not for what they could give her. That orientation — genuine interest over transactional calculation — produced the deepest and most durable professional relationships she had.", "社交,職場,哲學"],
["convenience", "kənˈviːniəns", "n.", "方便", "Convenience is often the enemy of growth — hard things are worth doing.", "方便常常是成長的敵人——困難的事情值得去做。", "For convenience=為了方便。At your convenience=在你方便的時候。Convenience store=便利商店。", "for convenience=為了方便/at your convenience=在你方便時/convenience store=便利商店/sacrifice convenience=犧牲方便", "She consistently chose the less convenient option when it served her long-term better. That habit — sacrificing present convenience for future capability — was invisible at first and transformative over time.", "生活,激勵,哲學"],
["correct", "kəˈrɛkt", "adj./v.", "正確的；糾正", "Correct yourself before correcting others — lead by example.", "在糾正他人之前先糾正自己——以身作則。", "Correction=糾正（名詞）。Self-correct=自我糾正。Correct course=糾正方向。", "correction=糾正/self-correct=自我糾正/correct course=糾正方向/factually correct=事實正確", "She welcomed being corrected. Not performatively — genuinely. Being corrected meant she was learning. She treated corrections as gifts, not attacks. That reframe made her infinitely coachable.", "教育,溝通,激勵"],
["craft", "kræft", "n./v.", "工藝；精心製作", "Craft your work with the care of someone who will never forget their name is on it.", "像永遠不會忘記自己名字在上面的人一樣精心製作你的工作。", "Craft skills=工藝技能。Master your craft=掌握你的工藝。Craftsmanship=工匠精神。", "craft skills=工藝技能/master your craft=掌握工藝/craftsmanship=工匠精神/handcraft=手工藝", "She approached every deliverable as a craftsperson — with attention, pride, and care for the person who would receive it. That craft mentality, applied to emails as well as presentations, made everything she made excellent.", "職場,藝術,激勵"],
["credible", "ˈkrɛdɪbl", "adj.", "可信的", "Build credibility before you need to be believed.", "在你需要被相信之前建立可信度。", "Credibility=可信度（名詞）。Highly credible=高度可信的。Lose credibility=失去可信度。", "credibility=可信度/highly credible=高度可信/lose credibility=失去可信度/earn credibility=贏得可信度", "She built credibility one accurate prediction, one kept promise, one delivered result at a time. By the time she needed people to trust a big claim, the bank of small credibilities was full.", "職場,溝通"],
["crucial", "ˈkruːʃl", "adj.", "關鍵的；至關重要的", "Timing is crucial — the right move at the wrong time often fails.", "時機是關鍵的——在錯誤的時間採取正確的行動往往會失敗。", "Crucially=至關重要地。Crucial moment=關鍵時刻。Crucial decision=關鍵決定。", "crucially=至關重要地/crucial moment=關鍵時刻/crucial decision=關鍵決定/play a crucial role=扮演關鍵角色", "She identified the crucial moments in every project — the points where the entire arc depended on a single decision — and gave those moments extraordinary attention. Not everything deserves equal attention.", "職場,教育"],
["current", "ˈkɜːrənt", "adj.", "當前的；流行的", "Stay current by learning continuously, not just at the start of your career.", "通過持續學習而不只是在職業開始時保持當前狀態。", "Currently=目前。Keep up to date=跟上時代。Current affairs=時事。", "currently=目前/keep up to date=跟上時代/current affairs=時事/stay current=保持當前", "She updated her knowledge portfolio quarterly — reading across disciplines, attending different events, seeking perspectives from outside her usual circles. Staying current was a discipline, not a casualty of busyness.", "教育,職場"],
["deep", "diːp", "adj.", "深的；深刻的", "Deep work produces results that shallow work never can.", "深層工作產生膚淺工作永遠無法產生的結果。", "Deep down=在內心深處。Deep work=深層工作。Go deep=深入。", "deep down=在內心深處/deep work=深層工作/go deep=深入/deep thinking=深度思考", "She protected time for deep work as fiercely as she protected time for sleep. In a shallow-attention world, the ability to focus deeply for extended periods had become the rarest competitive advantage.", "教育,職場,激勵"],
["deliver", "dɪˈlɪvər", "v.", "傳遞；兌現", "Deliver on your promises — it is the simplest and rarest skill.", "兌現你的承諾——這是最簡單也是最罕見的技能。", "Deliver results=取得結果。On-time delivery=準時交付。Delivery=交付（名詞）。", "deliver results=取得結果/on-time delivery=準時交付/deliver on promise=兌現承諾/delivery method=交付方式", "She had a simple philosophy: under-promise and over-deliver, every time. That philosophy, applied consistently, built a reputation so strong that her work was sought before she had to offer it.", "職場,激勵,商業"],
["depend", "dɪˈpɛnd", "v.", "依賴；取決於", "Build capabilities that do not depend on perfect conditions.", "建立不依賴完美條件的能力。", "Depend on=依賴。Dependable=可靠的。Over-depend=過度依賴。", "depend on=依賴/dependable=可靠的/over-depend=過度依賴/mutual dependence=相互依賴", "She had trained herself to produce her best work regardless of conditions — without the right tools, the right mood, or the right timing. That independence from ideal circumstances made her extraordinarily reliable.", "激勵,職場"],
["design", "dɪˈzaɪn", "v./n.", "設計", "Design your life deliberately rather than letting it be designed by default.", "故意設計你的生活，而不是讓它被默認設計。", "By design=故意地。Design thinking=設計思維。Well-designed=設計良好的。", "by design=故意地/design thinking=設計思維/well-designed=設計良好的/design your life=設計你的生活", "She applied design thinking to her life: who is the user (herself), what are the needs, what are the constraints, what are the possibilities, what will I test first? Life design as a practice.", "生活,激勵,設計"],
["direction", "dɪˈrɛkʃən", "n.", "方向", "Speed without direction is energy without impact.", "沒有方向的速度是沒有影響的能量。", "Sense of direction=方向感。Change direction=改變方向。In the right direction=朝正確方向。", "sense of direction=方向感/change direction=改變方向/in the right direction=朝正確方向/clear direction=清晰方向", "She gave her team clear direction and then got out of the way. The direction removed uncertainty. The trust removed micromanagement. What remained was capable people performing at their potential.", "職場,激勵"],
["effective", "ɪˈfɛktɪv", "adj.", "有效的", "Effective is doing the right things; efficient is doing things right.", "有效是做正確的事情；高效是把事情做對。", "Effectively=有效地。Effectiveness=有效性（名詞）。Cost-effective=具有成本效益的。", "effectively=有效地/effectiveness=有效性/cost-effective=具成本效益/highly effective=高度有效", "She evaluated her work by effectiveness, not effort. That distinction — did it work, not did I try — kept her focused on outcomes rather than activities. Effort is an input. Effectiveness is the output.", "職場,激勵"],
["embrace", "ɪmˈbreɪs", "v.", "擁抱；接受", "Embrace uncertainty — it is where all opportunity lives.", "擁抱不確定性——那是所有機會所在之處。", "Embrace change=擁抱改變。Embrace failure=擁抱失敗。Fully embrace=完全擁抱。", "embrace change=擁抱改變/embrace failure=擁抱失敗/fully embrace=完全擁抱/embrace the unknown=擁抱未知", "She had taught herself to lean into discomfort rather than away from it. That embrace of difficulty — feeling it fully and moving through it — made her stronger with each encounter.", "激勵,哲學,心理"],
["emotion", "ɪˈmoʊʃən", "n.", "情緒", "Emotions are information — learn to read yours accurately.", "情緒是信息——學會準確地閱讀你的情緒。", "Emotional intelligence=情商。Raw emotion=原始情緒。Mixed emotions=複雜情緒。", "emotional intelligence=情商/raw emotion=原始情緒/mixed emotions=複雜情緒/emotional response=情緒反應", "She developed emotional intelligence not by suppressing emotions but by getting fluent in their language. Each emotion, she learned, was pointing at something — usually something worth examining.", "心理,激勵,溝通"],
["encourage", "ɪnˈkɜːrɪdʒ", "v.", "鼓勵", "Encourage others specifically — vague encouragement is forgotten quickly.", "具體地鼓勵他人——模糊的鼓勵很快就被遺忘。", "Encouragement=鼓勵（名詞）。Highly encouraging=非常鼓勵人的。Encourage growth=鼓勵成長。", "encouragement=鼓勵/highly encouraging=非常鼓勵/encourage growth=鼓勵成長/words of encouragement=鼓勵的話", "She encouraged people at exactly the moment they wanted to give up — and she always seemed to know when that moment was. That timing, honed from years of paying attention, made her encouragement transformative.", "激勵,社交,教育"],
["endure", "ɪnˈdjʊər", "v.", "忍受；持久", "Endure the difficult phase — it is the bridge between where you are and where you want to be.", "忍受困難的階段——它是你所在的地方和你想去的地方之間的橋樑。", "Endurance=耐力（名詞）。Mental endurance=心理耐力。Endure hardship=忍受艱辛。", "endurance=耐力/mental endurance=心理耐力/endure hardship=忍受艱辛/physical endurance=體力耐力", "She ran marathons not for the time but for the practice of endurance. The training of her mind — to keep going when everything in her wanted to stop — was directly transferable to every other area of her life.", "運動,激勵"],
["enhance", "ɪnˈhɑːns", "v.", "增強；提升", "Enhance your strengths before patching your weaknesses.", "在修補你的弱點之前增強你的優勢。", "Enhancement=增強（名詞）。Greatly enhanced=大大增強。Enhance performance=提升表現。", "enhancement=增強/greatly enhanced=大大增強/enhance performance=提升表現/self-enhancement=自我提升", "She spent 80% of her development time enhancing her three greatest strengths and 20% maintaining adequate competence in areas of weakness. That allocation reflected her understanding of where exponential value lives.", "教育,激勵,職場"],
["excel", "ɪkˈsɛl", "v.", "擅長；卓越", "Excel at the specific thing that only you can do well.", "在只有你能做好的特定事情上擅長。", "Excellence=卓越（名詞）。Excel in=在...方面卓越。Strive for excellence=追求卓越。", "excellence=卓越/excel in=在...方面卓越/strive for excellence=追求卓越/excel beyond=超越", "She had stopped trying to be good at everything and focused on excelling at a few specific things. In those areas, she became genuinely extraordinary. Excellence requires restriction.", "激勵,職場,哲學"],
["extra", "ˈɛkstrə", "adj.", "額外的", "That extra step you were tempted to skip is usually the one that matters most.", "你想要跳過的那個額外步驟通常是最重要的。", "Go the extra mile=多做一點。Extra effort=額外努力。Extras=附加功能。", "go the extra mile=多做一點/extra effort=額外努力/go above and beyond=超越職責/extra care=額外關注", "She always went the extra mile — not to be noticed but because her personal standard required it. The extra step felt voluntary from the outside. From the inside, it was simply her minimum.", "激勵,職場"],
["faith", "feɪθ", "n.", "信念；信任", "Have faith in the process even when you cannot see the progress.", "即使你看不到進展，也要對過程有信念。", "Keep faith=保持信念。Faith in yourself=對自己的信念。Good faith=誠信。", "keep faith=保持信念/faith in yourself=對自己的信念/good faith=誠信/act in good faith=出於誠信行動", "She had faith in the process during the seasons when results were invisible. That faith — not blind, but based on evidence from past seasons — sustained effort through the gaps between inputs and visible outputs.", "激勵,哲學,心理"],
["far", "fɑːr", "adv.", "很遠；大大", "You can go far if you go together — and even farther if you build others up.", "如果你一起走，你可以走很遠——如果你培養他人，你可以走得更遠。", "Go far=走很遠；有前途。Far-reaching=影響深遠的。Far from over=遠未結束。", "go far=走很遠/far-reaching=影響深遠/far from over=遠未結束/come this far=走到這裡", "She was far more interested in building people around her than in building herself up. The cumulative impact of that generosity carried her farther than any individual ambition alone could have.", "激勵,社交,哲學"],
["fierce", "fɪərs", "adj.", "激烈的；猛烈的", "Be fiercely protective of your time, values, and energy.", "對你的時間、價值觀和精力要激烈地保護。", "Fiercely competitive=激烈競爭的。Fierce determination=猛烈的決心。Fierce loyalty=激烈的忠誠。", "fiercely competitive=激烈競爭的/fierce determination=猛烈的決心/fierce loyalty=激烈的忠誠/fierce advocate=激烈的倡導者", "She was fierce about what she believed in — not aggressively, but immovably. When she took a position based on evidence and values, she held it under pressure without apology or retreat.", "激勵,職場,哲學"],
["found", "faʊnd", "v.", "建立；發現", "Found your work on principles that don't change when circumstances do.", "在環境改變時也不會改變的原則上建立你的工作。", "Founded on=建立在...上。Found a company=創立公司。Well-founded=有充分根據的。", "founded on=建立在...上/found a company=創立公司/well-founded=有充分根據的/newly founded=新建立的", "She founded her company on a principle rather than on a product: solve real problems honestly. When products changed and markets shifted, that founding principle kept everything coherent and on course.", "商業,哲學,激勵"],
["fulfill", "fʊlˈfɪl", "v.", "實現；滿足", "Fulfill your potential by choosing growth over comfort daily.", "通過每天選擇成長而不是舒適來實現你的潛力。", "Fulfillment=成就感（名詞）。Fulfill a promise=履行承諾。Self-fulfilling=自我實現的。", "fulfillment=成就感/fulfill a promise=履行承諾/self-fulfilling=自我實現的/fulfill potential=實現潛力", "She had learned that fulfillment was not a destination but a direction — consistently moving toward work that mattered, relationships that nourished, and a life that felt like her own. Direction over destination.", "激勵,哲學,生活"],
["fundamental", "ˌfʌndəˈmɛntl", "adj.", "基本的；根本的", "Master the fundamentals before exploring the advanced.", "在探索高級之前掌握基礎知識。", "Fundamentally=根本上。Fundamental change=根本改變。Fundamental principle=基本原則。", "fundamentally=根本上/fundamental change=根本改變/fundamental principle=基本原則/back to fundamentals=回歸基礎", "She returned to fundamentals whenever she hit a wall. Advanced problems, she had discovered, were almost always caused by weak foundations. Fix the foundation; the wall fixes itself.", "教育,激勵,哲學"],
["generous", "ˈdʒɛnərəs", "adj.", "慷慨的", "Be generous with your knowledge — shared knowledge multiplies.", "對你的知識慷慨——分享的知識會倍增。", "Generosity=慷慨（名詞）。Generous with time=慷慨地給予時間。Be generous=慷慨。", "generosity=慷慨/generous with time=慷慨給予時間/be generous=慷慨/generous offer=慷慨的提議", "She gave away knowledge freely — without keeping score. The reputation that generosity built repaid her exponentially, in opportunities, trust, and relationships she could never have manufactured.", "激勵,社交,哲學"],
["global", "ˈɡloʊbl", "adj.", "全球的", "Think globally and you will see patterns that local thinking misses.", "全球性地思考，你將看到局部思維錯過的模式。", "Global perspective=全球視角。Go global=走向全球。Global impact=全球影響。", "global perspective=全球視角/go global=走向全球/global impact=全球影響/global mindset=全球思維", "She trained herself to see every local issue in its global context. That expanded frame of reference made her solutions more innovative and more applicable than those developed in a local bubble.", "商業,教育,社會"],
["great", "ɡreɪt", "adj.", "偉大的；很好的", "The distance from good to great is consistency applied over time.", "從好到偉大的距離是隨時間累積的一致性。", "Greatly=非常地。Greatness=偉大（名詞）。In great shape=狀態極佳。", "greatly=非常地/greatness=偉大/in great shape=狀態極佳/great potential=巨大潛力", "She was not born great — she practiced toward it. The greatness people admired had ten invisible years of unglamorous work behind it. Every great thing has an unremarkable backstory of consistent effort.", "激勵"],
["harm", "hɑːrm", "n./v.", "傷害", "Do no harm is good; actively do good is better.", "不傷害是好的；積極行善是更好的。", "Harmless=無害的。Harm someone=傷害某人。No harm done=沒有傷害發生。", "harmless=無害的/harm someone=傷害某人/no harm done=沒有傷害/harm's way=危險之地", "She established a clear ethical line: never do harm, even through inaction. That standard — covering both what she did and what she allowed — kept her integrity intact through situations that tested others.", "哲學,社會"],
["humble", "ˈhʌmbl", "adj.", "謙遜的", "Stay humble — arrogance closes the mind that opened your success.", "保持謙遜——傲慢關閉了開啟你成功的思維。", "Humility=謙遜（名詞）。Humble yourself=謙遜自己。Humbly=謙遜地。", "humility=謙遜/humble yourself=謙遜自己/humbly=謙遜地/intellectual humility=知識謙遜", "She was humble about her expertise — not falsely modest, but genuinely open to being wrong. That intellectual humility made her more accurate, more trusted, and more interesting to talk to than confident people who were often wrong.", "激勵,哲學,溝通"],
["imagine", "ɪˈmædʒɪn", "v.", "想像", "Imagine the future you want and then work backward to where you are.", "想像你想要的未來，然後從那裡倒退到你現在的位置。", "Imagination=想像力（名詞）。Imaginative=有想像力的。Can you imagine?=你能想像嗎？", "imagination=想像力/imaginative=有想像力的/visualize=視覺化/imagine the possibilities=想像可能性", "She spent ten minutes each morning vividly imagining the person she intended to become. Not wishfully — with detail and emotion. That mental rehearsal primed her behavior for the rest of the day.", "激勵,心理"],
