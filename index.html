    ["deny", "dɪˈnaɪ", "v.", "否認；拒絕", "She denied herself comfort to build the life she wanted.", "她拒絕了舒適以建立她想要的生活。", "De+ny(否定)→完全否定→否認。", "deny a claim=否認指控/self-denial=自我克制/deny access=拒絕進入", "He denied the problem existed. She named it directly. The problem didn't change. The approach to it did.", "溝通,個人成長,日常"],
    ["devoted", "dɪˈvoʊtɪd", "adj.", "投入的；忠誠的", "She was devoted to her craft in a way few people understood.", "她對自己的工藝的投入程度是少數人能理解的。", "De+voted(誓言)→把誓言獻出去→投入的。", "devoted to=致力於/deeply devoted=深深投入/devoted follower=忠誠的追隨者", "He admired her devotion from a distance. Then he tried a fraction of it. The results surprised him. Devotion compounds.", "個人成長,激勵,習慣"],
    ["diagnose", "ˈdaɪəɡnoʊz", "v.", "診斷；判斷", "The doctor diagnosed the condition early and treatment was effective.", "醫生早期診斷了這個情況，治療很有效果。", "Dia+gnose(知道)→通過檢查知道病因→診斷。", "correctly diagnose=正確診斷/early diagnosis=早期診斷/diagnose a problem=診斷問題", "She could diagnose a team's dysfunction in an hour. Not through instruments—through listening. Observation is a form of expertise.", "健康,職場,個人成長"],
    ["disguise", "dɪsˈɡaɪz", "v./n.", "偽裝；掩飾", "Every setback was an opportunity in disguise.", "每一次挫折都是偽裝的機會。", "Dis+guise(外表)→改變外表→偽裝。", "in disguise=偽裝的/blessings in disguise=因禍得福/disguise yourself=偽裝自己", "What felt like failure was preparation in disguise. She only saw this clearly in hindsight. That's why she stopped judging setbacks immediately.", "激勵,個人成長,日常"],
    ["dismiss", "dɪˈsmɪs", "v.", "解散；忽視", "She refused to dismiss unconventional ideas without exploring them.", "她拒絕在探索之前忽視非常規的想法。", "Dis+miss(送走)→把事情送走不管→忽視。", "dismiss an idea=否決想法/dismiss employees=解僱員工/easily dismissed=容易被忽視", "He dismissed the feedback because it was uncomfortable. She acted on it. Six months later, the difference was visible.", "溝通,職場,個人成長"],
    ["display", "dɪˈspleɪ", "v./n.", "展示；顯示", "She displayed her work publicly for the first time and held her breath.", "她第一次公開展示她的作品，屏住呼吸。", "Dis+play→展開來讓人看→展示。", "on display=展示中/display confidence=展現自信/window display=櫥窗展示", "He kept his work hidden until it was perfect. She displayed it early and improved it with feedback. One approach teaches faster.", "藝術,個人成長,商業"],
    ["distribute", "dɪˈstrɪbjuːt", "v.", "分發；分配", "She distributed the work evenly so no one burned out.", "她均勻地分配工作，這樣沒有人會精疲力竭。", "Dis+tribute(給予)→分送給各方→分發。", "distribute evenly=平均分配/distribution channel=分銷渠道/distribute resources=分配資源", "She discovered that sharing her knowledge didn't diminish her—it multiplied her. Generosity is a growth strategy.", "商業,職場,個人成長"],
    ["disturb", "dɪˈstɜːrb", "v.", "打擾；擾亂", "She closed her door for two hours each morning—do not disturb.", "她每天早上關門兩小時—請勿打擾。", "Dis+turb(搖動)→讓穩定的東西搖動→打擾。", "do not disturb=請勿打擾/disturb the peace=破壞秩序/deeply disturbed=深感不安", "He let everything disturb his focus. She protected her deep work hours aggressively. Same job, different outputs.", "習慣,職場,個人成長"],
    ["donate", "doʊˈneɪt", "v.", "捐贈", "She donated not just money but her time and skills.", "她捐贈的不只是金錢，還有她的時間和技能。", "Don+ate(給予)→給予他人→捐贈。", "donate blood=捐血/donate to charity=捐給慈善機構/donation amount=捐款金額", "She had started donating when she had very little. The habit grew with her income. Generosity doesn't start when you have more.", "社會,習慣,個人成長"],
    ["draft", "dræft", "n./v.", "草稿；起草", "She wrote a rough draft without stopping to edit.", "她寫了一份粗糙的草稿，沒有停下來編輯。", "Draft→先打出的初始版本。", "rough draft=初稿/final draft=最終稿/draft a plan=起草計劃", "The first draft was terrible. She expected that. The fifth draft was excellent. The first draft's purpose is to exist, not to impress.", "寫作,個人成長,創意"],
    ["drama", "ˈdrɑːmə", "n.", "戲劇；誇張", "She stayed calm in situations others turned into drama.", "在別人製造戲劇的情況下，她保持冷靜。", "Drama→充滿張力和情節的事件→戲劇。", "avoid drama=避免戲劇化/family drama=家庭矛盾/drama queen=愛誇張的人", "He created drama unintentionally. She chose clarity instead. The same information, delivered calmly, produced a completely different response.", "藝術,溝通,情緒"],
    ["economy", "ɪˈkɒnəmi", "n.", "經濟；節約", "She studied the economy to understand the world she operated in.", "她研究經濟以了解她所在的世界。", "Eco+nomy(管理)→管理家庭資源→經濟。", "global economy=全球經濟/local economy=本地經濟/economy of scale=規模經濟", "She understood that the economy was not abstract. It was made of individual decisions, multiplied by millions.", "商業,社會,教育"],
    ["element", "ˈɛlɪmənt", "n.", "元素；要素", "Trust is a key element of any strong relationship.", "信任是任何強大關係的關鍵要素。", "Element→構成整體的基本部分。", "key element=關鍵要素/element of surprise=意外的成分/natural element=自然元素", "She stripped the project to its essential elements. Three remained. Those three became the product.", "商業,教育,個人成長"],
    ["emergency", "ɪˈmɜːrdʒənsi", "n.", "緊急情況；急事", "She kept calm in emergencies because she had trained for them.", "她在緊急情況下保持冷靜，因為她已為此訓練過。", "Emerge+ncy→突然浮現的危機→緊急情況。", "in an emergency=在緊急情況下/emergency exit=緊急出口/declare an emergency=宣布緊急狀態", "The emergency didn't faze her. She had run the scenario in her head a hundred times. Mental rehearsal is real preparation.", "安全,健康,個人成長"],
    ["emphasize", "ˈɛmfəsaɪz", "v.", "強調；著重", "She emphasized the why, not the what, in every presentation.", "她在每次演講中強調原因，而不是內容。", "Em+phas+ize→加重力道→強調。", "emphasize a point=強調要點/overemphasize=過度強調/emphasize quality=強調品質", "He used bold and capitals to emphasize everything. Nothing stood out. She used silence. Everything landed.", "溝通,教育,職場"],
    ["entire", "ɪnˈtaɪər", "adj.", "整個的；全部的", "She gave the entire project her full attention.", "她把全部注意力放在整個專案上。", "En+tire(拉)→全部拉在一起→整個的。", "entire team=整個團隊/entire life=一生/entirely wrong=完全錯誤", "The entire meeting he had been distracted. She had been present. Their takeaways from the same meeting were entirely different.", "日常,職場,個人成長"],
    ["entrance", "ˈɛntrəns", "n.", "入口；進入", "She paused at the entrance and took a breath before walking in.", "她在入口處停下來，深吸一口氣後走了進去。", "Enter+ance→進入的地方→入口。", "main entrance=主入口/entrance exam=入學考試/make an entrance=隆重登場", "Every entrance is also an exit to what came before. She understood this. Every new chapter requires leaving the last.", "日常,個人成長,激勵"],
    ["ethics", "ˈɛθɪks", "n.", "倫理；道德", "She made every decision through the lens of her personal ethics.", "她通過個人倫理的視角做出每一個決定。", "Ethi+cs→關於道德行為的學問→倫理。", "business ethics=商業倫理/ethical decision=道德決定/code of ethics=道德準則", "He asked: is it legal? She asked: is it right? Both questions matter. Only one of them builds a reputation that lasts.", "哲學,商業,個人成長"],
    ["exhibit", "ɪɡˈzɪbɪt", "v./n.", "展出；展覽", "She exhibited her first series of paintings at a small café.", "她在一間小咖啡廳展出了她的第一系列畫作。", "Ex+hibit(持有)→把東西拿出來展示→展出。", "art exhibit=藝術展覽/exhibit behavior=表現行為/museum exhibit=博物館展覽", "He waited for the prestigious gallery. She started with the café. People saw her work. That's how galleries found her later.", "藝術,個人成長,激勵"],
    ["export", "ˈɛkspɔːrt", "n./v.", "出口；輸出", "The country's main export was creativity and craftsmanship.", "這個國家的主要出口是創意和工藝。", "Ex+port(港口)→從港口送出→出口。", "export goods=出口貨物/export data=匯出數據/net exporter=淨出口國", "She exported her ideas through writing. What stayed local stayed invisible. What traveled changed the conversation.", "商業,創意,社會"],
    ["extensive", "ɪkˈstɛnsɪv", "adj.", "廣泛的；大量的", "She had extensive experience across multiple industries.", "她在多個行業擁有廣泛的經驗。", "Ex+tensive→向外延伸很廣→廣泛的。", "extensive research=廣泛研究/extensive network=廣泛人脈/extensive damage=大範圍損害", "His knowledge was extensive but shallow. Hers was narrower but deep. The market rewarded depth in her field.", "教育,商業,個人成長"],
    ["facility", "fəˈsɪlɪti", "n.", "設施；才能", "The new facility gave the team everything they needed.", "新設施給了團隊他們需要的一切。", "Facil+ity→讓事情容易做的東西→設施。", "training facility=訓練設施/research facility=研究設施/facility manager=設施管理員", "She had run a startup from a kitchen table. When they finally got a proper facility, she missed the kitchen. Constraint breeds creativity.", "商業,職場,日常"],
    ["fortune", "ˈfɔːrtʃən", "n.", "財富；命運", "She made her own fortune through patience and persistence.", "她通過耐心和堅持創造了自己的財富。", "Fortune→命運帶來的東西，好的或壞的→財富。", "make a fortune=發財/fortune favors the bold=機會青睞大膽的人/fortune teller=算命師", "He was born into fortune. She built it. Both had it by forty. Only one knew how to keep it. Building teaches retention.", "金融,激勵,個人成長"],
    ["frequent", "ˈfriːkwənt", "adj.", "頻繁的", "Frequent small actions outperform occasional large ones.", "頻繁的小行動勝過偶爾的大行動。", "Frequent→發生的次數很多→頻繁的。", "frequent flyer=常旅客/frequent updates=頻繁更新/frequently asked=常見問題", "She checked in frequently with her team. Not to monitor—to support. The distinction was felt immediately.", "職場,習慣,管理"],
    ["frustrate", "ˈfrʌstreɪt", "v.", "使沮喪；阻礙", "She channeled frustration into motivation instead of defeat.", "她把沮喪轉化為動力而不是失敗。", "Frus+trate→努力被阻擋→使沮喪。", "feel frustrated=感到沮喪/frustrating situation=令人沮喪的情況/channel frustration=轉化沮喪", "Frustration told her where the problem was. She had learned to listen to it rather than suppress it. Emotions are data.", "情緒,個人成長,心理"],
    ["govern", "ˈɡʌvərn", "v.", "統治；管轄", "Values govern decisions better than rules do.", "價值觀比規則更能管理決策。", "Govern→引導和控制一個系統或群體。", "govern a country=治理國家/self-governing=自治的/governing principle=指導原則", "The company had a hundred rules. She replaced them with five principles. People understood them. The culture clarified overnight.", "社會,管理,個人成長"],
    ["gradual", "ˈɡrædʒuəl", "adj.", "逐漸的；漸進的", "Gradual improvement is more sustainable than dramatic change.", "逐漸的改善比戲劇性的改變更持久。", "Grad+ual→一步一步上升的→逐漸的。", "gradual change=逐漸改變/gradual progress=逐步進展/gradual decline=逐漸衰退", "He wanted transformation overnight. She made gradual adjustments. A year later, she was unrecognizable. He was still waiting.", "個人成長,習慣,激勵"],
    ["guarantee", "ˌɡærənˈtiː", "n./v.", "保證；保障", "She could guarantee effort, but not always outcomes.", "她能保證努力，但不總是保證結果。", "Guarantee→給予他人確定性的承諾。", "money-back guarantee=退款保證/no guarantee=無法保證/guarantee success=保證成功", "She never promised outcomes. She promised effort. Over time, the effort consistently produced outcomes. Promises of process beat promises of results.", "商業,個人成長,溝通"],
    ["guilty", "ˈɡɪlti", "adj.", "有罪的；感到內疚的", "She stopped feeling guilty about rest and started treating it as fuel.", "她停止為休息感到內疚，開始把它視為燃料。", "Guilt+y→有罪惡感的狀態→內疚的。", "feel guilty=感到內疚/guilty conscience=良心不安/not guilty=無罪", "He felt guilty resting. She rested without guilt. Both had the same hours in the day. Only one used them sustainably.", "情緒,健康,個人成長"],
    ["highlight", "ˈhaɪlaɪt", "v./n.", "強調；亮點", "She highlighted the most important points and let the rest fade.", "她強調了最重要的要點，讓其餘的退後。", "High+light→讓某部分更亮→強調。", "highlight an issue=強調問題/career highlight=職業亮點/highlight reel=精彩片段", "His presentation had fifty highlights. Nothing stood out. She had three. The audience remembered all of them.", "溝通,教育,職場"],
    ["immediate", "ɪˈmiːdiət", "adj.", "立即的；直接的", "She looked for immediate solutions but also planned for long-term ones.", "她尋找即時解決方案，但也計劃長期解決方案。", "Im+mediate(中間)→中間沒有任何東西→立即的。", "immediate response=立即回應/immediate effect=即時效果/in the immediate term=短期內", "He wanted immediate results. She planted seeds. The harvest came slower but lasted longer. Timeframe changes everything.", "個人成長,商業,激勵"],
    ["independent", "ˌɪndɪˈpɛndənt", "adj.", "獨立的", "She raised her children to be independent thinkers.", "她培養孩子成為獨立思考者。", "In+dependent→不依賴任何人→獨立的。", "become independent=變得獨立/independent thinking=獨立思考/financially independent=財務獨立", "He needed approval for every decision. She made decisions and explained them after. Independence is a skill that grows with practice.", "個人成長,教育,激勵"],
    ["indicate", "ˈɪndɪkeɪt", "v.", "表明；指示", "The data indicated a trend no one else had noticed.", "數據表明了一個沒有其他人注意到的趨勢。", "In+dicate(說)→向內指出→表明。", "indicate interest=表示有興趣/indicate a problem=指出問題/all indicators=所有指標", "She looked at what the numbers indicated before forming an opinion. That sequence—data first—made her reliably right.", "商業,教育,溝通"],
    ["inform", "ɪnˈfɔːrm", "v.", "通知；告知", "She informed her team early so they could prepare.", "她提早通知她的團隊，讓他們能夠準備。", "In+form(形狀)→給某事一個形狀→告知。", "inform someone=告知某人/well-informed=消息靈通的/inform a decision=為決策提供依據", "He surprised the team with last-minute changes. She informed them early. Same changes. Different experiences. Timing is a form of respect.", "溝通,職場,管理"],
    ["intense", "ɪnˈtɛns", "adj.", "強烈的；緊張的", "The intense focus she brought to every task was rare and powerful.", "她帶給每個任務的強烈專注既罕見又強大。", "In+tense(拉緊)→被拉得很緊→強烈的。", "intense focus=強烈專注/intense competition=激烈競爭/deeply intense=極其強烈", "She worked intensely for three hours and rested completely. He worked moderately all day. Her output was double.", "個人成長,習慣,激勵"],
    ["interrupt", "ˌɪntəˈrʌpt", "v.", "打斷；中斷", "She never interrupted—and people always finished their best ideas.", "她從不打斷，人們總能說完他們最好的想法。", "Inter+rupt(打破)→在中間打破→打斷。", "interrupt someone=打斷某人/sorry to interrupt=抱歉打斷/interrupt a conversation=中斷對話", "He interrupted before she finished. He thought he knew where she was going. He was wrong. Listening to the end changes the beginning.", "溝通,社交,個人成長"],
    ["justice", "ˈdʒʌstɪs", "n.", "正義；公正", "She fought for justice in small daily ways, not just big moments.", "她在日常的小事中爭取公正，而不只是在大事上。", "Just+ice→公正的狀態→正義。", "seek justice=尋求正義/social justice=社會公正/sense of justice=正義感", "He talked about justice loudly. She practiced it quietly. The loudest voices are not always the most righteous acts.", "社會,倫理,個人成長"],
    ["lecture", "ˈlɛktʃər", "n./v.", "講課；訓斥", "She gave lectures that felt like conversations.", "她給的講課感覺像是對話。", "Lect+ure(讀)→讀給大家聽→講課。", "give a lecture=發表演講/lecture hall=演講廳/stop lecturing=停止說教", "The lecture was supposed to be sixty minutes. He asked a question. She spent twenty minutes on the answer. The class rated it the best.", "教育,溝通,學術"],
    ["legal", "ˈliːɡəl", "adj.", "合法的；法律上的", "She always ensured her business decisions were legally sound.", "她始終確保她的商業決策在法律上是合理的。", "Leg+al→與法律相關的→合法的。", "legal advice=法律建議/legal document=法律文件/legally binding=有法律約束力的", "He moved fast and ignored legal details. She moved slightly slower and never had to stop. Speed is expensive when the foundation cracks.", "法律,商業,個人成長"],
    ["manufacture", "ˌmænjuˈfæktʃər", "v./n.", "製造；生產", "The company manufactured goods with zero waste as a policy.", "公司以零廢棄物為政策生產商品。", "Manu(手)+facture(做)→用手做出來→製造。", "manufacture products=製造產品/local manufacturing=本地製造/manufacturing process=製造流程", "She had manufactured her reputation the same way she manufactured products—carefully, consistently, without shortcuts.", "商業,環保,個人成長"],
    ["maximum", "ˈmæksɪməm", "n./adj.", "最大值；最大的", "She operated at maximum effectiveness, not maximum effort.", "她以最大效能而非最大努力運作。", "Maxim+um→能夠達到的最高值→最大值。", "at maximum=在最大值/maximum potential=最大潛力/reach the maximum=達到上限", "He worked at maximum effort and burned out. She worked at maximum effectiveness and sustained. Not the same thing.", "個人成長,健康,職場"],
    ["moderate", "ˈmɒdərɪt", "adj./v.", "適中的；主持", "She maintained a moderate pace that she could sustain indefinitely.", "她保持了一個可以無限期維持的適中速度。", "Moder+ate→保持在中間→適中的。", "moderate exercise=適度運動/moderate temperature=溫和的溫度/moderate a discussion=主持討論", "He went all-in immediately and quit in three weeks. She started moderate and never stopped. Consistency beats intensity.", "健康,個人成長,習慣"],
    ["mutual", "ˈmjuːtʃuəl", "adj.", "相互的；共同的", "Their success was built on mutual respect and shared goals.", "他們的成功建立在相互尊重和共同目標上。", "Mutu+al→相互給予的→相互的。", "mutual respect=相互尊重/mutual benefit=互利/mutual understanding=相互理解", "She sought mutual benefit in every negotiation. Not just for optics—because mutual deals last. One-sided ones don't.", "溝通,商業,社交"],
    ["navigate", "ˈnævɪɡeɪt", "v.", "導航；應對", "She navigated complexity with unusual calm.", "她以不尋常的冷靜應對複雜性。", "Nav+igate→引導船舶→導航。", "navigate challenges=應對挑戰/navigate uncertainty=應對不確定/hard to navigate=難以駕馭", "He froze when the path was unclear. She treated every unclear path as an opportunity to practice navigation.", "個人成長,旅遊,激勵"],
    ["occupy", "ˈɒkjupaɪ", "v.", "佔據；佔領", "She occupied her mind with creation rather than consumption.", "她用創造而非消費佔據她的思想。", "Occu+py(拿)→拿走並持有→佔據。", "occupy space=佔據空間/keep occupied=保持忙碌/occupy your mind=佔據思想", "He had nothing to do and felt empty. She filled her time deliberately. The fullness she felt was not from busy-ness but from meaning.", "個人成長,習慣,心理"],
    ["original", "əˈrɪdʒɪnəl", "adj.", "原創的；最初的", "She valued original thinking over impressive credentials.", "她重視原創思維勝過令人印象深刻的資歷。", "Origin+al→來自起源的→原創的。", "original idea=原創想法/original version=原版/think originally=有原創地思考", "He impressed with credentials. She impressed with ideas. In the long run, original thinking outlasts paper qualifications.", "藝術,教育,個人成長"],
    ["passion", "ˈpæʃən", "n.", "熱情；激情", "She followed her passion and built a career around it.", "她追隨她的熱情，並圍繞它建立了職業生涯。", "Pass+ion→強烈的情感流過→熱情。", "follow your passion=追隨你的熱情/passionate about=對…充滿熱情/passion project=熱情項目", "He had passion but no skill. She had skill but no passion. Then she found something that needed both. That was when everything changed.", "個人成長,激勵,職場"],
    ["persuade", "pərˈsweɪd", "v.", "說服；勸說", "She persuaded through clarity and empathy, not pressure.", "她通過清晰和同理心而非壓力來說服人。", "Per+suade(甜蜜)→用甜言蜜語說服→說服。", "persuade someone=說服某人/hard to persuade=難以說服/persuasive argument=有說服力的論點", "He persuaded with data. She persuaded with stories. Both were correct. Only one changed minds.", "溝通,職場,個人成長"],
    ["philosophy", "fɪˈlɒsəfi", "n.", "哲學；人生觀", "Her work philosophy was simple: start, persist, improve.", "她的工作哲學很簡單：開始、堅持、改進。", "Philo(愛)+sophy(智慧)→愛好智慧→哲學。", "life philosophy=人生哲學/work philosophy=工作理念/personal philosophy=個人哲學", "She had a philosophy for how she worked. It made hard decisions easy. Values without a philosophy are just good intentions.", "哲學,個人成長,激勵"],
    ["predict", "prɪˈdɪkt", "v.", "預測；預言", "She predicted trends by reading widely across fields.", "她通過廣泛閱讀各個領域來預測趨勢。", "Pre+dict(說)→提前說出→預測。", "predict the future=預測未來/accurately predict=準確預測/hard to predict=難以預測", "He predicted based on patterns from his field. She predicted based on patterns from everywhere. Her forecasts were more accurate.", "商業,教育,個人成長"],
    ["promote", "prəˈmoʊt", "v.", "晉升；推廣", "She promoted her team members before herself.", "她在自己之前晉升她的團隊成員。", "Pro+mote(移動)→向前移動→晉升。", "promote a product=推廣產品/get promoted=獲得晉升/promote growth=促進成長", "He promoted himself constantly. She promoted her team. By the time she was promoted, the whole team celebrated. That's how you know it's real.", "職場,管理,激勵"],
    ["protest", "ˈproʊtɛst", "v./n.", "抗議；反對", "She protested quietly through the quality of her work.", "她通過她工作的品質安靜地抗議。", "Pro+test(作見證)→公開作見證→抗議。", "peaceful protest=和平抗議/protest against=抗議/without protest=毫無怨言", "He protested loudly. She worked differently. Both wanted change. Only one created it.", "社會,個人成長,政治"],
    ["qualify", "ˈkwɒlɪfaɪ", "v.", "具備資格；限定", "She qualified for the position through experience, not just credentials.", "她通過經驗而非僅憑資歷獲得了這個職位的資格。", "Qual+ify→讓自己符合所需的品質→具備資格。", "qualify for=具備…資格/meet qualifications=符合資格/qualifying round=資格賽", "She didn't have the stated requirements. She applied anyway. They hired her for what she had, not what she lacked.", "職場,教育,激勵"],
    ["refuse", "rɪˈfjuːz", "v.", "拒絕", "She refused to accept the version of herself others had decided.", "她拒絕接受他人決定的那個版本的自己。", "Re+fuse(使用)→拒絕使用→拒絕。", "refuse an offer=拒絕提議/refuse to give up=拒絕放棄/flat refusal=斷然拒絕", "He refused to be dismissed. She refused to be defined. Both knew their own worth. That knowledge is the starting point of everything.", "個人成長,激勵,職場"],
    ["restore", "rɪˈstɔːr", "v.", "恢復；修復", "She restored old relationships with the same care she built new ones.", "她以修復新關係同樣的用心修復了舊關係。", "Re+store(放置)→放回原位→恢復。", "restore trust=恢復信任/restore balance=恢復平衡/restore an old building=修復舊建築", "He burned bridges. She restored them when possible. The network that sustained her over decades was built on repair as much as connection.", "社交,個人成長,職場"],
    ["restrict", "rɪˈstrɪkt", "v.", "限制；約束", "She restricted her choices to increase her focus.", "她通過限制自己的選擇來提高專注度。", "Re+strict(緊)→拉緊邊界→限制。", "restrict access=限制進入/self-restrict=自我限制/restrict movement=限制行動", "He had infinite options and made none. She restricted herself to three. The constraint produced clarity. Fewer choices enable deeper commitment.", "個人成長,習慣,商業"],
    ["reveal", "rɪˈviːl", "v.", "揭示；透露", "She revealed her process, not just her results, and people learned more.", "她揭示了她的過程，而不僅僅是結果，人們學到了更多。", "Re+veal(遮蓋)→揭開遮蓋→揭示。", "reveal the truth=揭示真相/reveal yourself=展現自我/reveal data=揭露數據", "He showed only the finished work. She showed the work in progress. His audience admired. Hers learned. Both have value.", "溝通,藝術,教育"],
    ["satisfy", "ˈsætɪsfaɪ", "v.", "滿足；令人滿意", "She satisfied high standards without sacrificing her wellbeing.", "她在不犧牲自身健康的情況下達到了高標準。", "Satis(足夠)+fy→讓某人感到足夠→滿足。", "satisfy a need=滿足需要/customer satisfaction=客戶滿意度/hard to satisfy=難以令人滿意", "He was never satisfied. She set clear criteria for satisfaction. When met, she celebrated. When not, she adjusted. Both motivate differently.", "情緒,商業,個人成長"],
    ["secure", "sɪˈkjʊər", "adj./v.", "安全的；確保", "She felt secure not because nothing could go wrong but because she knew she could handle it.", "她感到安全不是因為一切都不會出錯，而是因為她知道她能應對。", "Se+cure(關心)→讓自己被關心保護→安全的。", "feel secure=感到安全/secure a deal=確保交易/job security=工作保障", "He sought security from outside. She built it from inside. When the external changed, he collapsed. She adapted.", "個人成長,心理,激勵"],
    ["sensitive", "ˈsɛnsɪtɪv", "adj.", "敏感的；體貼的", "She was sensitive to others' needs in a way that made her invaluable.", "她對他人需求的敏感讓她變得無價。", "Sens+itive→對刺激有感覺的→敏感的。", "emotionally sensitive=情感敏感/sensitive issue=敏感問題/sensitive to=對…敏感", "She had been told her sensitivity was a weakness. Then she learned it was precision—the ability to read what others missed.", "溝通,個人成長,社交"],
    ["signal", "ˈsɪɡnəl", "n./v.", "信號；表明", "She sent clear signals and asked for clear ones in return.", "她發出清晰的信號，並要求得到清晰的回應。", "Signal→發送讓人理解某事的標誌。", "send a signal=發送信號/mixed signal=模糊信號/signal strength=信號強度", "The market was sending signals. Most weren't reading them. She was. Three months later, everyone saw what she had acted on months earlier.", "商業,溝通,個人成長"],
    ["significant", "sɪɡˈnɪfɪkənt", "adj.", "重要的；顯著的", "She made significant progress without making a significant noise about it.", "她取得了顯著的進步，但並沒有大肆宣揚。", "Signific+ant→製造重要意義的→重要的。", "significant impact=重要影響/significant change=顯著改變/statistically significant=統計上顯著", "The change was small but significant. She knew it. Others caught up three months later. That three-month window was everything.", "商業,個人成長,教育"],
    ["similar", "ˈsɪmɪlər", "adj.", "相似的；類似的", "They had similar goals but completely different approaches.", "他們有相似的目標，但方法完全不同。", "Similar→像另一件事一樣的→相似的。", "similar to=類似於/think similarly=有相似的想法/similar result=相似結果", "She looked for the similar element across different problems. Finding it let her apply one solution in many places.", "教育,商業,個人成長"],
    ["society", "səˈsaɪəti", "n.", "社會；社交界", "She wanted to contribute to society, not just consume from it.", "她想為社會做貢獻，而不只是消費它。", "Socie+ty→一起生活的人群→社會。", "modern society=現代社會/contribute to society=為社會做貢獻/civil society=公民社會", "He asked what society could give him. She asked what she could give society. Same starting point, completely different destinations.", "社會,個人成長,激勵"],
    ["species", "ˈspiːʃiːz", "n.", "物種", "Humans are the only species that chooses to change itself.", "人類是唯一選擇改變自己的物種。", "Species→有共同特徵的生物群體→物種。", "endangered species=瀕危物種/plant species=植物物種/protect species=保護物種", "She had studied many species of leaders. The rarest: those who listened before speaking and changed when wrong.", "自然,科學,個人成長"],
    ["statement", "ˈsteɪtmənt", "n.", "聲明；陳述", "She backed every statement with evidence and delivered it with calm.", "她用證據支撐每一個陳述，並以冷靜地方式傳達。", "State+ment→把某種狀態說出來→聲明。", "make a statement=做出聲明/mission statement=使命宣言/financial statement=財務報表", "Her statement was short, clear, and final. The meeting ended in thirty minutes. Clarity is the greatest efficiency tool.", "溝通,商業,教育"],
    ["status", "ˈsteɪtəs", "n.", "狀態；地位", "She cared more about her status in her own mind than in others'.", "她更在乎自己內心對自己的評價，而不是他人的評價。", "Status→某人或某事目前所在的位置→狀態。", "social status=社會地位/status update=狀態更新/status quo=現狀", "He chased status. She chased mastery. By forty, she had both. He had neither. External status follows internal mastery.", "個人成長,社會,激勵"],
    ["survive", "sərˈvaɪv", "v.", "存活；度過", "She didn't just survive the crisis—she emerged stronger.", "她不只是熬過了危機，她變得更強大。", "Sur+vive(生活)→在之上繼續生活→存活。", "survive hardship=在苦難中存活/barely survive=勉強存活/survival instinct=生存本能", "Every person she admired had a story about something they had barely survived. The surviving was never the end—it was the beginning.", "激勵,個人成長,健康"],
    ["symbol", "ˈsɪmbəl", "n.", "象徵；符號", "She became a symbol of what was possible without perfect circumstances.", "她成為了在不完美環境下仍能實現目標的象徵。", "Symbol→代表更大意義的標誌。", "become a symbol=成為象徵/cultural symbol=文化象徵/power symbol=力量象徵", "The small gift had become a symbol of their friendship. When the friendship changed, she still kept it. Some objects hold more than matter.", "文化,藝術,個人成長"],
    ["threaten", "ˈθrɛtən", "v.", "威脅；恐嚇", "She refused to be threatened into silence.", "她拒絕被威脅而沉默。", "Threat+en→發出威脅的行為→威脅。", "feel threatened=感到受威脅/threaten someone=威脅某人/threaten stability=威脅穩定", "He felt threatened by her competence. She felt motivated by his. Same information. Different responses. Response is a choice.", "個人成長,溝通,社會"],
    ["translate", "trænsˈleɪt", "v.", "翻譯；轉化", "She translated complex ideas into simple actions.", "她把複雜的想法轉化為簡單的行動。", "Trans+late(帶)→帶到另一個語言或形式→翻譯。", "translate a document=翻譯文件/translate into action=轉化為行動/lost in translation=在翻譯中遺失", "His report was accurate but unreadable. She translated it into three sentences. The CEO acted on those three sentences. Clarity is power.", "溝通,教育,職場"],
    ["typical", "ˈtɪpɪkəl", "adj.", "典型的；一般的", "She challenged typical thinking and found atypical results.", "她挑戰了典型的思維，找到了非典型的結果。", "Typ+ical→符合典型模式的→典型的。", "typical behavior=典型行為/not typical=不典型/typical example=典型例子", "He did the typical thing. She asked: what's the atypical approach? The question itself was enough to change the outcome.", "個人成長,商業,教育"],
    ["violate", "ˈvaɪəleɪt", "v.", "違反；侵犯", "She refused to violate her principles even under pressure.", "她拒絕在壓力下違反她的原則。", "Viol+ate(強力)→強制破壞→違反。", "violate a rule=違反規則/violate trust=侵犯信任/legal violation=法律違規", "He bent the rules when convenient. She held to them when inconvenient. Long-term, the consistency became her reputation.", "個人成長,法律,倫理"],
    ["welfare", "ˈwɛlfɛər", "n.", "福利；福祉", "She cared about the welfare of her team as much as the results.", "她對團隊福祉的關心和對結果的關心一樣多。", "Well+fare→走得好→福祉。", "social welfare=社會福利/animal welfare=動物福利/employee welfare=員工福祉", "The team's welfare was her first agenda item, not an afterthought. The results spoke to the wisdom of that priority.", "社會,管理,個人成長"],
    ["witness", "ˈwɪtnəs", "n./v.", "目擊；見證", "She witnessed change and also caused it.", "她目睹了改變，也促成了改變。", "Witness→看見某事發生的人→目擊者。", "be a witness=作見證人/witness history=見證歷史/eye witness=目擊者", "She had witnessed enough to know what mattered. That knowledge made her patient with beginnings and honest about endings.", "社會,個人成長,日常"],
    ["capitalize", "ˈkæpɪtəlaɪz", "v.", "利用；資本化", "They capitalized on the trend before competitors did.", "他們在競爭對手之前利用了這一趨勢。", "Capital+ize→把資本投入使用→利用。", "capitalize on=利用/capitalize a letter=大寫/well-capitalized=資本充足的", "She spotted the opportunity before it became obvious. She capitalized on it quietly. Timing and preparation, not luck.", "商業,金融,個人成長"]
],
i: [
["achieve", "əˈtʃiːv", "v.", "達成；實現", "You achieve what you consistently work toward.", "你達到的是你一貫努力的目標。", "Achievement = 成就。High achiever = 高成就者。Achievable = 可達成的。", "achievement=成就/high achiever=高成就者/achievable goal=可達成目標/sense of achievement=成就感", "She set one major goal per year. She wrote it down and worked on it every day. By year five, the impossible had become ordinary.", "職場,激勵"],
["adapt", "əˈdæpt", "v.", "適應；改編", "Successful people adapt quickly to changing conditions.", "成功的人迅速適應不斷變化的條件。", "Adaptable = 適應性強的。Adaptation = 適應（名詞）。", "adaptable=適應性強/adaptation=適應/adapt to change=適應變化/highly adaptable=非常有適應力", "The market changed overnight. Teams that adapted survived. Teams that resisted did not. Adaptability is not a soft skill — it is the most important one.", "商業,職場"],
["advantage", "ədˈvɑːntɪdʒ", "n.", "優勢；好處", "Use your unique background as a competitive advantage.", "利用你獨特的背景作為競爭優勢。", "Take advantage of = 利用。Competitive advantage = 競爭優勢。", "take advantage of=利用/competitive advantage=競爭優勢/natural advantage=天然優勢", "She was younger than everyone in the room. At first it seemed like a disadvantage. Then she realized her fresh perspective was her greatest advantage.", "商業,職場"],
["afford", "əˈfɔːrd", "v.", "負擔得起；有能力", "He could not afford to miss this opportunity.", "他不能錯過這個機會。", "Cannot afford = 負擔不起。Affordable = 負擔得起的。", "cannot afford=負擔不起/affordable=負擔得起的/affordable housing=可負擔住房", "She could not afford a gym membership, so she ran outside for free. Three years later, she finished her first marathon. Access is less important than commitment.", "金融,生活"],
["analyze", "ˈænəlaɪz", "v.", "分析", "Before making a decision, always analyze the data first.", "在做決定之前，先分析數據。", "Analysis = 分析（名詞）。Analyst = 分析師。Data analysis = 數據分析。", "analysis=分析/analyst=分析師/data analysis=數據分析/analyze trends=分析趨勢", "The team spent weeks analyzing the problem. Then a new member asked one question nobody had considered. The answer changed the entire strategy.", "商業,科學"],
["approach", "əˈproʊtʃ", "n./v.", "方法；接近", "Try a different approach if your first one is not working.", "如果你的第一個方法不奏效，嘗試不同的方法。", "New approach = 新方法。Approach someone = 接近某人。Hands-on approach = 實際操作的方式。", "new approach=新方法/hands-on approach=實際操作/different approach=不同方法/fresh approach=全新方法", "She had tried the same approach three times. Then she asked a colleague for ideas. The new approach she never would have thought of alone worked immediately.", "職場,創意"],
["assume", "əˈsjuːm", "v.", "假設；認為", "Never assume — always verify your information first.", "永遠不要假設——先驗證你的資訊。", "Assumption = 假設（名詞）。Take for granted = 視為理所當然。", "assumption=假設/take for granted=視為理所當然/never assume=絕不假設", "He assumed the client was happy because they had not complained. He was wrong. Now he asks directly: How can I serve you better? Never assume.", "職場,溝通"],
["attitude", "ˈætɪtjuːd", "n.", "態度；姿態", "A positive attitude changes everything around you.", "積極的態度改變你周圍的一切。", "Attitude problem = 態度問題。Positive attitude = 積極態度。", "attitude problem=態度問題/positive attitude=積極態度/bad attitude=不好態度/change your attitude=改變態度", "Two workers had the same job. One complained daily. One treated each task as a chance to grow. A year later, only one was promoted. Attitude is everything.", "職場,激勵"],
["available", "əˈveɪləbl", "adj.", "有空的；可用的", "Are you available for a quick call tomorrow morning?", "你明天早上有空打一個簡短電話嗎？", "Not available = 沒空。Widely available = 廣泛可得。", "not available=沒空/widely available=廣泛可得/make yourself available=讓自己有空", "She made herself available for five minutes after every presentation. That small habit made her the most approachable leader in the company.", "職場,溝通"],
["benefit", "ˈbɛnɪfɪt", "n./v.", "好處；利益；受益", "Exercise has many long-term health benefits.", "運動有許多長期的健康好處。", "Benefit from = 從...受益。Fringe benefits = 附加福利。Side benefit = 附帶好處。", "benefit from=從...受益/fringe benefits=附加福利/mutual benefit=互利/cost-benefit=成本效益", "She took the lower-paying job for the learning benefits. Two years later, her skills were worth three times her previous salary. Short-term cost, long-term benefit.", "商業,生活"],
["budget", "ˈbʌdʒɪt", "n./v.", "預算", "Stay within budget even when it is uncomfortable to do so.", "即使令人不舒服，也要保持在預算內。", "Over budget = 超出預算。Budget cut = 預算削減。Stick to a budget = 遵守預算。", "over budget=超出預算/budget cut=預算削減/stick to budget=遵守預算/budget-friendly=經濟實惠", "The startup had almost no budget. So they got creative: social media instead of ads, referrals instead of sales teams. Constraints breed the best innovation.", "商業,金融"],
["career", "kəˈrɪər", "n.", "職業生涯", "Your career is a marathon not a sprint — pace yourself.", "你的職業生涯是馬拉松，不是短跑——調整好節奏。", "Career path = 職涯路徑。Career change = 轉職。Career goal = 職涯目標。", "career path=職涯路徑/career change=轉職/career goal=職涯目標/career advice=職涯建議", "She spent 15 years climbing the ladder. Then she stepped off it to follow her real passion. Best career decision she ever made — though it looked like a step back.", "職場,生活"],
["challenge", "ˈtʃælɪndʒ", "n./v.", "挑戰；質疑", "Every challenge is an opportunity in disguise.", "每個挑戰都是偽裝的機會。", "Challenge yourself = 挑戰自己。Rise to the challenge = 迎接挑戰。", "challenge yourself=挑戰自己/rise to the challenge=迎接挑戰/challenging situation=挑戰性情境", "She set a challenge: one cold call per day for 100 days. By day 30, she had landed three clients. By day 100, she had enough business to hire two employees.", "商業,激勵"],
["clarify", "ˈklærɪfaɪ", "v.", "澄清；說明", "Before reacting, clarify. Before assuming, ask.", "在反應之前，先澄清。在假設之前，先問。", "Clarification = 澄清（名詞）。Seek clarification = 尋求澄清。", "seek clarification=尋求澄清/clarify expectations=澄清期望/clarify your position=說明立場", "She did not argue. She asked: Can you help me understand what you mean? That one sentence prevented three arguments that week alone.", "職場,溝通"],
["client", "ˈklaɪənt", "n.", "客戶", "Your best marketing is a happy client who tells others.", "你最好的行銷是一個告訴別人的快樂客戶。", "Client meeting = 客戶會議。Long-term client = 長期客戶。Loyal client = 忠實客戶。", "client meeting=客戶會議/long-term client=長期客戶/loyal client=忠實客戶/new client=新客戶", "She spent more time keeping existing clients happy than chasing new ones. Within two years, 80% of her business came from referrals. Happy clients bring more clients.", "商業,職場"],
["collaborate", "kəˈlæbəreɪt", "v.", "合作", "The best ideas come when different minds collaborate.", "最好的想法來自於不同思想的合作。", "Collaboration = 合作（名詞）。Cross-team = 跨團隊的。", "collaboration=合作/collaborative spirit=合作精神/cross-team collaboration=跨團隊合作/co-create=共同創造", "The designer and the engineer disagreed on everything. Their manager put them in a room with one goal. Three days later, they had created the company best product.", "職場,商業"],
["commit", "kəˈmɪt", "v.", "承諾；投入", "If you commit to something fully the results will follow.", "如果你全心全意承諾做某件事，結果就會隨之而來。", "Commitment = 承諾（名詞）。Committed = 投入的。", "commitment=承諾/committed to=投入/full commitment=全力投入/make a commitment=做出承諾", "He committed to writing one page a day. No matter what. Some days were terrible. But he never skipped. After a year, he had a book. Commitment beats inspiration.", "生活,激勵"],
["communicate", "kəˈmjuːnɪkeɪt", "v.", "溝通；傳達", "Great leaders communicate clearly and listen actively.", "偉大的領導者清晰溝通並積極傾聽。", "Communication = 溝通（名詞）。Communicate effectively = 有效溝通。", "communication=溝通/communicate effectively=有效溝通/miscommunicate=溝通不良/clear communication=清晰溝通", "The project failed not because of a bad plan — but because two teams never communicated. The lesson cost the company a million dollars. Communicate early and often.", "職場,溝通"],
["compete", "kəmˈpiːt", "v.", "競爭", "Do not compete with others. Compete with who you were yesterday.", "不要與別人競爭。與昨天的自己競爭。", "Competition = 競爭（名詞）。Competitive = 競爭的。Competitor = 競爭對手。", "competition=競爭/competitive=競爭的/competitor=競爭對手/compete with=與...競爭", "She stopped looking at what competitors were doing. She focused on what her customers needed. Six months later, she had more customers than anyone else.", "商業,哲學"],
["confident", "ˈkɒnfɪdənt", "adj.", "自信的", "Act confident even when you do not feel it on the inside.", "即使內心不感覺自信，也要表現得自信。", "Confidence = 自信（名詞）。Self-confident = 自信的。Build confidence = 建立自信。", "confidence=自信/self-confident=自信的/build confidence=建立自信/lack confidence=缺乏自信", "She was not confident at first. She was terrified. But she stood straight, spoke clearly, and smiled. By the time she finished, she felt confident. Action creates confidence.", "職場,心理"],
["confirm", "kənˈfɜːrm", "v.", "確認", "Please confirm your attendance by the end of the week.", "請在週末前確認您的出席。", "Confirmation = 確認（名詞）。Confirm in writing = 書面確認。", "confirmation=確認/confirm in writing=書面確認/await confirmation=等待確認/booking confirmation=訂位確認", "She sent the confirmation, the reminder, and the follow-up. Some called it over-communication. But her events always ran perfectly. Too much clarity is never too much.", "職場,旅遊"],
["consequence", "ˈkɒnsɪkwəns", "n.", "後果；結果", "Every action has a consequence — think before you act.", "每個行動都有後果——行動之前先思考。", "As a consequence = 因此。Face the consequences = 承擔後果。", "as a consequence=因此/face the consequences=承擔後果/consequence of actions=行動的後果", "The small decision to be kind had a large consequence. She never found out, but the person she helped that day became her company biggest client five years later.", "哲學,商業"],
["consistent", "kənˈsɪstənt", "adj.", "一致的；穩定的", "Consistent small actions beat occasional big ones.", "一致的小行動勝過偶爾的大行動。", "Consistency = 一致性（名詞）。Be consistent = 保持一致。", "consistency=一致性/be consistent=保持一致/consistently reliable=一貫可靠/inconsistent=不一致", "He was not the most talented. But he showed up consistently, followed through, and never needed reminding. That consistency made him the most valuable person.", "職場,激勵"],
["contribute", "kənˈtrɪbjuːt", "v.", "貢獻；捐款", "What can you contribute that no one else can?", "你能貢獻什麼是別人無法替代的？", "Contribution = 貢獻（名詞）。Contributor = 貢獻者。", "contribution=貢獻/make a contribution=做出貢獻/contributor=貢獻者/unique contribution=獨特貢獻", "She volunteered not for recognition but to contribute. Five years later, she was running the organization. Contribution leads where competition cannot.", "社會,職場"],
["convince", "kənˈvɪns", "v.", "說服；使相信", "She convinced the board to fund her project with one story.", "她用一個故事說服董事會資助她的項目。", "Convincing = 有說服力的。Self-convincing = 自我說服。", "convincing=有說服力的/hard to convince=難以說服/convince yourself=說服自己", "He tried for months to convince them with data. Nothing worked. Then he told one story. They approved the budget immediately. Stories convince where numbers fail.", "商業,溝通"],
["creative", "kriˈeɪtɪv", "adj.", "有創造力的", "The most creative solutions come when you break the rules.", "最有創意的解決方案來自於你打破規則的時候。", "Creativity = 創造力（名詞）。Think creatively = 創意思考。", "creativity=創造力/think creatively=創意思考/creative freedom=創作自由/creative block=創作瓶頸", "The team had tried everything — then she removed the deadline. Without pressure, the creative solution appeared in two days. Sometimes constraints prevent the answer.", "創意,職場"],
["crisis", "ˈkraɪsɪs", "n.", "危機", "Every crisis contains within it the seed of opportunity.", "每個危機都含有機會的種子。", "Crisis management = 危機管理。Handle a crisis = 處理危機。In crisis = 在危機中。", "crisis management=危機管理/handle a crisis=處理危機/financial crisis=金融危機", "When the crisis hit, the manager sent one email: I do not have all the answers but I am here and we will figure it out together. That was enough.", "商業,職場"],
["critical", "ˈkrɪtɪkl", "adj.", "批判的；關鍵的", "Critical thinking is the most valuable skill you can develop.", "批判性思考是你能培養的最有價值的技能。", "Critical thinking = 批判性思考。Be critical of = 批評。At a critical moment = 在關鍵時刻。", "critical thinking=批判性思考/be critical of=批評/critical point=關鍵點/critically important=至關重要", "She never accepted the first answer. She always asked: But why? That habit of critical thinking led her to discover the real problem nobody else had found.", "教育,職場"],
["deadline", "ˈdɛdlaɪn", "n.", "截止日期", "Work expands to fill the time available — so set deadlines.", "工作會擴展到填滿可用的時間——所以設定截止日期。", "Meet a deadline = 趕上截止日。Miss a deadline = 錯過截止日。", "meet a deadline=趕上截止/miss a deadline=錯過截止/tight deadline=緊迫截止/approaching deadline=臨近截止日", "She mapped every task working backward from the deadline. When others panicked the final week, she was already done. Planning from the end is a superpower.", "職場,商業"],
["debate", "dɪˈbeɪt", "n./v.", "辯論；爭論", "A good debate challenges your thinking and makes you stronger.", "好的辯論挑戰你的思維並使你更強大。", "Open to debate = 有待商榷。Debate club = 辯論社。", "open to debate=有待商榷/debate club=辯論社/heated debate=激烈辯論/public debate=公開辯論", "She was wrong and her colleague was right. The debate made her update her model. I am glad you pushed back, she said after. The best teams debate to find truth.", "職場,教育"],
["decision", "dɪˈsɪʒən", "n.", "決定", "The most important decisions deserve the most careful thought.", "最重要的決定值得最仔細的思考。", "Make a decision = 做決定。Decision-maker = 決策者。", "make a decision=做決定/decision-maker=決策者/tough decision=艱難決定/snap decision=倉促決定", "She slept on every major decision. Not because she was slow — but because she knew the morning always brought clarity. The best decisions come after rest.", "哲學,職場"],
["delegate", "ˈdɛlɪɡeɪt", "v./n.", "委派；代表", "Great leaders delegate — control freaks burn out alone.", "偉大的領導者懂得委派——控制狂獨自精疲力竭。", "Delegation = 委派（名詞）。Delegate responsibility = 委派責任。", "delegation=委派/delegate responsibility=委派責任/trust to delegate=信任委派", "She had to do everything herself — until she burned out. Then she learned to delegate. Within six months, her team was performing better without her.", "職場,商業"],
["demand", "dɪˈmɑːnd", "n./v.", "需求；要求", "There is strong demand for people who solve real problems.", "對解決真實問題的人有強烈需求。", "In high demand = 需求量大。Supply and demand = 供需。", "in high demand=需求量大/supply and demand=供需/on demand=隨需應求/demand too much=要求太多", "She learned that skill just before the market started demanding it. Lucky? No, she said. I watched the trends for two years. Smart beats lucky.", "商業,經濟"],
["demonstrate", "ˈdɛmənstreɪt", "v.", "示範；展示", "Demonstrate your skills rather than just describing them.", "示範你的技能，而不是僅僅描述它們。", "Demonstration = 示範（名詞）。Demonstrably = 可證明地。", "demonstration=示範/demonstrate skills=展示技能/live demonstration=現場示範", "Instead of saying she was good at design, she brought three samples to the interview. She was hired on the spot. Show, do not tell.", "職場,商業"],
["develop", "dɪˈvɛləp", "v.", "發展；開發", "The best way to develop a skill is daily deliberate practice.", "培養技能的最好方法是每天刻意練習。", "Development = 發展。Develop a habit = 養成習慣。Developer = 開發者。", "development=發展/develop a habit=養成習慣/professional development=專業發展/software developer=軟體開發者", "The app started as a weekend project. As it developed, others had the same problem. Today it has five million users. Solve your own problem first.", "科技,商業"],
["efficient", "ɪˈfɪʃnt", "adj.", "有效率的", "Work efficiently and you will have time for what matters.", "有效率地工作，你就會有時間做重要的事。", "Efficiency = 效率（名詞）。Cost-efficient = 成本效益的。Time-efficient = 省時的。", "efficiency=效率/cost-efficient=成本效益/time-efficient=省時/streamline=精簡", "She stopped checking email 40 times a day and started checking it twice. She became more efficient without working harder. Efficiency is about eliminating, not adding.", "職場,科技"],
["engage", "ɪnˈɡeɪdʒ", "v.", "參與；吸引；雇用", "Great teachers engage students not just deliver content.", "偉大的老師讓學生參與，不只是傳遞內容。", "Engagement = 參與（名詞）。Engaging = 吸引人的。Disengage = 脫離參與。", "engagement=參與/customer engagement=客戶參與/fully engaged=完全投入/disengaged=不參與", "The best managers did not lecture. They asked questions and listened. Their teams felt engaged and produced three times more. Engagement is ignited by curiosity.", "職場,教育"],
["evaluate", "ɪˈvæljueɪt", "v.", "評估；評價", "Regularly evaluate your progress to stay on track.", "定期評估你的進度以保持在正確軌道上。", "Evaluation = 評估（名詞）。Self-evaluation = 自我評估。", "evaluation=評估/self-evaluation=自我評估/performance evaluation=績效評估", "She evaluated her goals every three months. Not to judge herself — but to learn and adjust. That habit of evaluation is why she always improved.", "職場,生活"],
["expand", "ɪkˈspænd", "v.", "擴展；擴大", "Expand your horizons by trying something new each month.", "每個月嘗試新的東西來擴展你的視野。", "Expansion = 擴展（名詞）。Expand your horizons = 開闊眼界。", "expansion=擴展/expand your horizons=開闊眼界/expanding market=擴大市場/rapid expansion=快速擴展", "They started with one café. Then two. Then ten. Each expansion taught them something new. Growth is not just getting bigger — it is getting better.", "商業,職場"],
["expectation", "ˌɛkspɛkˈteɪʃən", "n.", "期望；預期", "Set clear expectations early to avoid misunderstandings later.", "早期設定清楚的期望以避免後來的誤解。", "Meet expectations = 達到期望。Exceed expectations = 超出期望。", "meet expectations=達到期望/exceed expectations=超出期望/unmet expectations=未達到的期望", "She always set clear expectations on day one. Her teams never guessed what success looked like. Clarity about expectations is the foundation of every good relationship.", "職場,溝通"],
["feedback", "ˈfiːdbæk", "n.", "回饋意見", "Constructive feedback is a gift — learn to receive it well.", "建設性的回饋是一份禮物——要學會好好接受它。", "Constructive feedback = 建設性意見。Negative feedback = 負面回饋。", "constructive feedback=建設性意見/negative feedback=負面回饋/feedback loop=回饋循環", "She asked every client: What could I do better? One gave feedback that changed her entire model. Asking for feedback is free. Not asking is expensive.", "職場,商業"],
["flexible", "ˈflɛksɪbl", "adj.", "彈性的；靈活的", "Stay flexible — the best plans always change along the way.", "保持彈性——最好的計劃總是會在途中改變。", "Flexibility = 彈性（名詞）。Flexible hours = 彈性工時。", "flexibility=彈性/flexible hours=彈性工時/flexible approach=彈性方法/stay flexible=保持彈性", "The plan changed five times. She adapted each time without drama. The goal stays the same, she said. The path does not have to. Flexible thinking saved the project.", "職場,生活"],
["focus", "ˈfoʊkəs", "v./n.", "專注；焦點", "Focus on what you can control and release the rest.", "專注於你能控制的，放下其他的。", "In focus = 清楚的。Out of focus = 模糊的。Laser focus = 高度專注。", "in focus=清楚的/lose focus=失去專注/laser focus=高度專注/stay focused=保持專注", "She had twenty goals. She narrowed to one. In six months, she achieved more than she had in the previous five years. Focus is the multiplier of all effort.", "職場,生活,激勵"],
["goal", "ɡoʊl", "n.", "目標；進球", "A goal without a plan is just a wish.", "沒有計劃的目標只是一個願望。", "Set a goal = 設定目標。Long-term goal = 長期目標。Goal-oriented = 目標導向的。", "set a goal=設定目標/long-term goal=長期目標/short-term goal=短期目標/goal-oriented=目標導向", "She wrote her goal on a sticky note and put it on her bathroom mirror. She saw it every morning. Every night, she asked: Did I move toward it today? After one year, she had arrived.", "職場,激勵"],
["growth", "ɡroʊθ", "n.", "成長；增長", "Personal growth is the foundation of all other success.", "個人成長是所有其他成功的基礎。", "Growth mindset = 成長心態。Personal growth = 個人成長。Career growth = 職涯成長。", "growth mindset=成長心態/personal growth=個人成長/career growth=職涯成長/organic growth=有機成長", "She did not track her salary. She tracked her skills. Every year, she was worth more. The growth in skills led to growth in everything else.", "職場,生活,激勵"],
["implement", "ˈɪmplɪmɛnt", "v.", "實施；執行", "A plan is worthless until you implement it — so just start.", "計劃在實施之前毫無價值——所以就開始吧。", "Implementation = 實施（名詞）。Roll out = 推出/實施。", "implementation=實施/implement a strategy=執行策略/roll out=推出/implement changes=執行變更", "The team spent months planning. Then one manager said: We have planned long enough. Let us implement and learn from doing. That shift changed everything.", "職場,商業"],
["improve", "ɪmˈpruːv", "v.", "改進；改善", "Small daily improvements lead to remarkable long-term results.", "每天的微小改進帶來長期的顯著成果。", "Improvement = 改進（名詞）。Room for improvement = 改善空間。", "improvement=改進/room for improvement=改善空間/self-improvement=自我提升/show improvement=顯示改善", "The athlete did not improve dramatically overnight. She improved 1% every day. After one year, she was 37 times better. Improvement is math before it is magic.", "運動,激勵"],
["influence", "ˈɪnfluəns", "n./v.", "影響；影響力", "Use your influence to lift others not to impress them.", "用你的影響力來提升他人，而不是給他人留下深刻印象。", "Influence = 影響力（名詞）。Influential = 有影響力的。", "influential=有影響力的/sphere of influence=影響範圍/have influence over=對...有影響力", "She never sought to be influential. She just helped anyone who asked. Twenty years later, former students called her the most influential person in their lives.", "職場,社會"],
["initiative", "ɪˈnɪʃɪətɪv", "n.", "主動性；倡議", "Take initiative without being asked — that is how leaders emerge.", "不需要被要求就主動採取行動——這就是領導者如何出現的。", "Show initiative = 展現主動性。On your own initiative = 主動地。", "show initiative=展現主動性/on your own initiative=主動地/lack of initiative=缺乏主動性", "She did not wait to be asked. She saw a problem and fixed it. Her manager noticed. Not because she told him — but because the problem was gone.", "職場,激勵"],
["innovate", "ˈɪnəveɪt", "v.", "創新", "Companies that do not innovate eventually disappear.", "不創新的公司最終會消失。", "Innovation = 創新（名詞）。Innovative = 創新的。Disruptive innovation = 顛覆性創新。", "innovation=創新/innovative=創新的/disruptive innovation=顛覆性創新/culture of innovation=創新文化", "The innovation did not come from the R and D team. It came from a customer complaint. Someone asked: What if we fixed that? Two months later, it was the company flagship feature.", "商業,科技"],
["inspire", "ɪnˈspaɪər", "v.", "激勵；鼓舞", "The best leaders inspire through actions not just words.", "最好的領導者通過行動而非只是言語來激勵他人。", "Inspiration = 靈感（名詞）。Inspiring = 激勵人心的。", "inspiration=靈感/inspiring=激勵人心的/source of inspiration=靈感來源/be inspired by=受...激勵", "She never wrote a motivational speech. She just showed up every day and gave her best. Thirty years later, hundreds of people said she was the reason they succeeded.", "職場,激勵"],
["interview", "ˈɪntərvjuː", "n./v.", "面試；採訪", "Prepare for interviews by practicing answers out loud.", "通過大聲練習答案來準備面試。", "Job interview = 工作面試。Interview skills = 面試技巧。", "job interview=工作面試/panel interview=小組面試/mock interview=模擬面試/interview skills=面試技巧", "She prepared for the interview by researching the company, practicing her answers, and preparing thoughtful questions. She got the job. Preparation is not luck — it is strategy.", "職場"],
["invest", "ɪnˈvɛst", "v.", "投資；投入", "Invest in yourself — it is the best return you will ever get.", "投資自己——這是你能得到的最好回報。", "Investment = 投資（名詞）。Investor = 投資者。Return on investment = 投資回報。", "investment=投資/investor=投資者/return on investment=投資回報/invest in yourself=投資自己", "She spent her bonus on a course instead of a vacation. Two years later, that course had tripled her income. Investing in skills always pays compounding interest.", "金融,生活"],
["involve", "ɪnˈvɒlv", "v.", "包含；使參與", "Good decisions involve everyone affected by those decisions.", "好的決策包含了那些受到這些決策影響的所有人。", "Involvement = 參與（名詞）。Involved = 相關的。", "involvement=參與/get involved=參與/deeply involved=深度參與/involve others=讓他人參與", "She made the decision alone and it failed. Next time, she involved her team from the start. The plan was better and everyone owned the result. Involve early.", "職場,溝通"],
["launch", "lɔːntʃ", "v./n.", "發射；推出", "Every successful product started with someone daring to launch.", "每一個成功的產品都始於有人敢於推出。", "Product launch = 產品發布。Launch a campaign = 推出活動。", "product launch=產品發布/launch a campaign=推出活動/soft launch=軟性推出", "The product was not perfect. She launched it anyway. Customers found problems she had never imagined. She fixed them. Version 2 was loved. Launch fast, improve always.", "商業,科技"],
["leadership", "ˈliːdərʃɪp", "n.", "領導力；領導", "Leadership is not about being in charge — it is about caring.", "領導力不是關於負責——而是關於關心。", "Leader = 領導者。Lead = 領導（動詞）。Thought leadership = 思想領導力。", "leader=領導者/leadership skills=領導技能/thought leadership=思想領導力/lead by example=以身作則", "She was not the loudest in the room. But when she spoke, everyone listened. Her leadership came from listening deeply and acting decisively. Quiet can be powerful.", "職場,社會"],
["manage", "ˈmænɪdʒ", "v.", "管理；設法做到", "How you manage your time reflects your values.", "你如何管理時間反映了你的價值觀。", "Manager = 經理。Management = 管理。Time management = 時間管理。", "time management=時間管理/manage a team=管理團隊/manage stress=管理壓力/project management=項目管理", "She managed a team of 30 with almost no experience. But she listened well, admitted mistakes, and trusted her people. The team thrived. Management is trust, not control.", "職場,商業"],
["negotiate", "nɪˈɡoʊʃieɪt", "v.", "協商談判", "Everything is negotiable — the question is how well you prepare.", "一切都是可以商量的——問題是你準備得有多好。", "Negotiation = 談判（名詞）。Win-win negotiation = 雙贏談判。", "negotiation=談判/win-win=雙贏/negotiate terms=協商條款/hard to negotiate=難以協商", "Both sides had dug in hard. Then a junior member said: What if we both get something? That reframe closed the deal in one hour. Reframing is the best negotiation tool.", "商業,職場"],
["objective", "əbˈdʒɛktɪv", "n./adj.", "目標；客觀的", "State your objective clearly before starting any project.", "在開始任何項目之前清楚地說明你的目標。", "Objective = 目標（名詞）。Objectively = 客觀地。Long-term objective = 長期目標。", "long-term objective=長期目標/business objective=業務目標/objectively speaking=客觀地說", "She started every meeting with one slide: what is our objective today? It saved hours of aimless discussion. Clarity of objective creates efficiency of execution.", "職場,商業"],
["opportunity", "ˌɒpəˈtjuːnɪti", "n.", "機會", "Opportunity does not announce itself — you have to notice it.", "機會不會自我宣告——你必須注意它。", "Seize an opportunity = 抓住機會。Create your own opportunity = 創造自己的機會。", "seize the opportunity=抓住機會/window of opportunity=機會之窗/equal opportunity=平等機會/create opportunity=創造機會", "She was rejected from her dream company three times. The fourth time, she presented a plan showing how she would solve their biggest problem. They hired her on the spot.", "職場,激勵"],
["outcome", "ˈaʊtkʌm", "n.", "結果；成果", "Focus on the process not just the desired outcome.", "專注於過程，而不只是期望的結果。", "Desired outcome = 期望的結果。Positive outcome = 積極的結果。", "desired outcome=期望結果/positive outcome=積極結果/focus on outcomes=專注成果", "She stopped measuring success by outcomes alone. She started measuring by the quality of her process. The outcomes improved as a result. Process creates results.", "職場,哲學"],
["perform", "pərˈfɔːrm", "v.", "執行；表演；表現", "Under pressure is when you really see how someone performs.", "在壓力下才是你真正看到一個人如何表現的時候。", "Performance = 表現（名詞）。High-performing = 高績效的。Performer = 表演者。", "performance=表現/high-performing=高績效的/performance review=績效評估/perform under pressure=在壓力下表現", "She was at her best under pressure. When deadlines tightened, her focus sharpened. Not everyone performs well under pressure — she had trained herself to.", "職場,運動"],
["persevere", "ˌpɜːrsɪˈvɪər", "v.", "堅持；不屈不撓", "Persevere when things get hard — that is when others quit.", "在事情變困難時堅持——那是別人放棄的時候。", "Perseverance = 毅力（名詞）。Persevering = 堅持不懈的。", "perseverance=毅力/persevering=堅持不懈/never give up=永不放棄/against all odds=克服重重困難", "She failed the entrance exam three times. She took it a fourth time and passed. People asked how. I just refused to accept no as a permanent answer, she said.", "激勵,教育"],
["pressure", "ˈprɛʃər", "n.", "壓力；施壓", "Some people thrive under pressure while others crumble.", "有些人在壓力下茁壯成長，而其他人則崩潰。", "Under pressure = 在壓力下。Peer pressure = 同伴壓力。Pressure cooker = 壓力鍋。", "under pressure=在壓力下/peer pressure=同伴壓力/work under pressure=在壓力下工作/high-pressure situation=高壓情況", "The best leaders she had worked under had one thing in common: they never passed pressure down. They absorbed it and gave their teams clarity. That is real leadership.", "職場,心理"],
["priority", "praɪˈɒrɪti", "n.", "優先事項", "If everything is a priority nothing is a priority.", "如果每件事都是優先事項，那麼什麼都不是優先事項。", "Top priority = 首要優先事項。Set priorities = 設定優先次序。", "top priority=首要優先/set priorities=設定優先次序/prioritize=排列優先次序/competing priorities=相互競爭的優先事項", "She had 20 tasks. She crossed out 15 and worked on 5. By the end of the week, those 5 were done well. The other 15 were less urgent than she had thought.", "職場,時間管理"],
["process", "ˈprɒsɛs", "n./v.", "過程；處理", "Trust the process even when you cannot see the results yet.", "即使你還看不到結果，也要相信過程。", "Step-by-step process = 逐步過程。Streamlined process = 精簡的過程。", "step-by-step process=逐步過程/streamlined process=精簡過程/due process=正當程序/process improvement=流程改進", "She did not think about the goal every day. She thought about the process — what habits and actions would lead there. Six months later, the goal had arrived.", "職場,哲學,激勵"],
["productive", "prəˈdʌktɪv", "adj.", "有生產力的；高效的", "Being busy and being productive are not the same thing.", "忙碌和有生產力並不是同一件事。", "Productivity = 生產力（名詞）。Unproductive = 無生產力的。", "productivity=生產力/unproductive=無生產力/highly productive=高度生產力/productivity hack=提高效率的技巧", "She worked 4 hours a day and produced more than colleagues working 10. Productive work is intentional work. Busyness is often a way to avoid what matters.", "職場,生活"],
["professional", "prəˈfɛʃənl", "adj.", "專業的", "Always maintain professional behavior even under pressure.", "即使在壓力下也要保持專業行為。", "Professionalism = 專業精神。Professional development = 職業發展。", "professionalism=專業精神/professional development=職業發展/unprofessional=不專業/look professional=看起來專業", "He lost the deal but thanked the client warmly and asked for feedback. A month later, the client called back. That was the most professional rejection I have seen.", "職場,商業"],
["progress", "ˈprɒɡrɛs", "n./v.", "進步；進展", "Progress is more important than perfection — just keep moving.", "進步比完美更重要——只要繼續前進。", "Make progress = 取得進步。Track progress = 追蹤進度。", "make progress=取得進步/track progress=追蹤進度/slow progress=緩慢進步/significant progress=顯著進步", "She measured herself not against others but against where she was yesterday. That small shift in measurement changed everything. Progress is a personal metric.", "激勵,生活"],
["propose", "prəˈpoʊz", "v.", "提議；求婚", "Before you propose a solution make sure you understand the problem.", "在你提議解決方案之前，確保你了解問題。", "Proposal = 提案（名詞）。Business proposal = 商業提案。", "proposal=提案/business proposal=商業提案/propose a solution=提議解決方案/counter-proposal=反提案", "She did not send a CV. She sent a five-page proposal showing how she would grow their business in 90 days. They called her the same afternoon. Show what you can do.", "商業,職場"],
["recommend", "ˌrɛkəˈmɛnd", "v.", "推薦", "I highly recommend reading before making any big decision.", "我強烈推薦在做任何重大決定之前閱讀。", "Recommendation = 推薦（名詞）。Highly recommended = 強力推薦。", "highly recommend=強力推薦/letter of recommendation=推薦信/act on recommendation=依推薦行動", "She asked the local what he actually ate at. He took her there himself. Best meal of her trip. Local recommendations always beat tourist guidebooks.", "旅遊,餐飲"],
["reliable", "rɪˈlaɪəbl", "adj.", "可靠的", "The most valuable team members are the reliable ones.", "最有價值的團隊成員是可靠的人。", "Reliability = 可靠性（名詞）。Unreliable = 不可靠的。", "reliability=可靠性/unreliable=不可靠的/consistently reliable=一貫可靠/reliable source=可靠來源", "He was not the most talented but he showed up, followed through, and never needed reminding. After three years, he was promoted above everyone who had outperformed him in interviews.", "職場,性格"],
["resolve", "rɪˈzɒlv", "v.", "解決；決心", "Stay calm and you will always find a way to resolve conflicts.", "保持冷靜，你總會找到解決衝突的方法。", "Resolution = 解決方案（名詞）。Conflict resolution = 衝突解決。", "resolution=解決方案/conflict resolution=衝突解決/resolve a dispute=解決爭端/resolve issues=解決問題", "The two teams had not spoken in months. She called one meeting, gave each side five minutes, and asked one question: What do you both want? The conflict resolved in two hours.", "職場,溝通"],
["resource", "ˈriːsɔːrs", "n.", "資源", "Lack of resources is not the problem — lack of creativity is.", "缺乏資源不是問題——缺乏創造力才是。", "Human resources = 人力資源。Resource management = 資源管理。", "human resources=人力資源/resource management=資源管理/natural resources=自然資源/allocate resources=分配資源", "She had the smallest budget in the department but the most creative team. They did more with less than anyone else. Constraints are just creative fuel.", "商業,職場"],
["responsible", "rɪˈspɒnsɪbl", "adj.", "負責任的", "Being responsible means owning your outcomes good or bad.", "負責任意味著承擔你的結果，好的或壞的。", "Responsibility = 責任（名詞）。Hold accountable = 追究責任。", "responsibility=責任/hold accountable=追究責任/responsible for=負責/take responsibility=承擔責任", "When the mistake was discovered, she was the first to say: That was my error. Here is how I am fixing it. Trust in her doubled overnight. Owning errors builds respect.", "職場,社會"],
["revenue", "ˈrɛvɪnjuː", "n.", "收入；收益", "Revenue is important but profit is what keeps businesses alive.", "收入很重要，但利潤才是讓企業存活的東西。", "Revenue stream = 收入來源。Generate revenue = 創造收入。", "revenue stream=收入來源/generate revenue=創造收入/annual revenue=年收入/revenue growth=收入增長", "The startup focused on revenue from day one. Not users. Not traffic. Revenue. That one decision forced them to build something people actually paid for.", "商業"],
["schedule", "ˈskɛdʒuːl", "n./v.", "時間表；安排", "Schedule your priorities or others will schedule your time.", "安排你的優先事項，否則他人會安排你的時間。", "On schedule = 按時。Behind schedule = 落後進度。Flexible schedule = 彈性時間表。", "on schedule=按時/behind schedule=落後進度/schedule a meeting=安排會議/flexible schedule=彈性時間表", "Her calendar had zero empty slots. Then her doctor said: Schedule rest like meetings. Otherwise rest never happens. She blocked two hours every Sunday. It changed everything.", "職場,健康"],
["skill", "skɪl", "n.", "技能；技術", "Every skill you develop is an investment that compounds.", "你培養的每一個技能都是一項複利投資。", "Skill set = 技能組合。Soft skills = 軟技能。Hard skills = 硬技能。", "skill set=技能組合/soft skills=軟技能/hard skills=硬技能/develop a skill=培養技能", "She spent one hour every day learning a new skill. After five years, her skill set was so unique that she was the only person in the world who could do what she did.", "教育,職場,激勵"],
["solution", "səˈluːʃən", "n.", "解決方案", "Every problem has a solution — your job is to find it.", "每個問題都有解決方案——你的工作是找到它。", "Find a solution = 找到解決方案。Practical solution = 實際的解決方案。", "find a solution=找到解決方案/practical solution=實際解決方案/creative solution=創意解法/long-term solution=長期解決方案", "She never brought a problem to her manager without a proposed solution. After one year, she was the most trusted person on the team. Own problems. Bring solutions.", "職場,哲學"],
["strategy", "ˈstrætɪdʒi", "n.", "策略", "A good strategy does not answer everything — it focuses on the right things.", "好的策略不能回答一切——它聚焦於正確的事情。", "Strategic = 策略性的。Long-term strategy = 長期策略。", "long-term strategy=長期策略/strategic planning=策略規劃/competitive strategy=競爭策略/execute strategy=執行策略", "She did not have more resources than competitors. She just focused more carefully. That discipline made her the market leader in three years. Strategy beats resources.", "商業,職場"],
["succeed", "səkˈsiːd", "v.", "成功", "You are more likely to succeed if you help others succeed first.", "如果你首先幫助他人成功，你就更有可能成功。", "Success = 成功（名詞）。Successful = 成功的。Successor = 繼承者。", "success=成功/successful=成功的/successor=繼承者/recipe for success=成功的秘訣", "She helped every junior colleague who asked. Twenty years later, those colleagues were CEOs and directors who gave her opportunities nobody else had access to. Help others succeed.", "職場,激勵"],
["sustainable", "səˈsteɪnəbl", "adj.", "可持續的", "Build habits and systems that are sustainable long-term.", "建立可長期持續的習慣和系統。", "Sustainability = 可持續性（名詞）。Sustainable growth = 可持續增長。", "sustainability=可持續性/sustainable growth=可持續增長/environmentally sustainable=環境可持續", "She did not sprint toward her goal. She built systems she could maintain forever. Slow, sustainable progress beat the short bursts of motivation that burned out everyone else.", "生活,環境,激勵"],
["talent", "ˈtælənt", "n.", "才能；天賦", "Talent is the starting point — hard work is what matters most.", "才能是起點——努力工作才是最重要的。", "Talented = 有才華的。Natural talent = 天生才華。Talent show = 才藝秀。", "talented=有才華的/natural talent=天生才華/talent show=才藝秀/develop talent=培養才能", "He was not the most talented player. But he was the first to arrive and last to leave every practice. Talent is common. Commitment to developing it is rare.", "運動,教育,激勵"],
["team", "tiːm", "n.", "團隊", "A great team is made of people who make each other better.", "一個偉大的團隊由讓彼此變得更好的人組成。", "Teamwork = 團隊合作。Team player = 有團隊精神的人。", "teamwork=團隊合作/team player=有團隊精神的人/team spirit=團隊精神/build a team=建立團隊", "She built her team not by finding the most talented people but by finding people who made each other better. Chemistry beat credentials every time.", "職場,商業"],
["transparent", "trænsˈpærənt", "adj.", "透明的；坦誠的", "Transparent leadership builds far more trust than secrecy.", "透明的領導力建立比保密更多的信任。", "Transparency = 透明度（名詞）。Be transparent about = 對...保持透明。", "transparency=透明度/be transparent about=對...保持透明/lack of transparency=缺乏透明度", "She told her team exactly why the decision was made, even when it was not her choice. People felt respected and informed. Transparency is the fastest way to build trust.", "職場,溝通"],
["urgent", "ˈɜːrdʒənt", "adj.", "緊急的", "Not everything urgent is important. Distinguish carefully.", "不是所有緊急的事都重要。要仔細區分。", "Urgency = 緊迫性（名詞）。Mark as urgent = 標記為緊急。", "urgency=緊迫性/mark as urgent=標記為緊急/urgent care=緊急護理/create urgency=製造緊迫感", "The manager opened every email marked urgent. Most were not. She started filtering ruthlessly. Her stress dropped by half. Urgency is often manufactured.", "職場,健康"],
["vision", "ˈvɪʒən", "n.", "願景；視力", "A clear vision is worth more than a detailed plan.", "清晰的願景比詳細的計劃更有價值。", "Visionary = 有遠見的人。Long-term vision = 長期願景。", "visionary=有遠見的人/long-term vision=長期願景/shared vision=共同願景/vision board=願景板", "The CEO spent three days writing a one-page vision statement. Every decision after that was measured against it. Clarity of vision makes thousands of decisions easy.", "商業,職場"],
["agenda", "əˈdʒɛndə", "n.", "議程；動機", "Please review the agenda before tomorrow's meeting.", "請在明天的會議前查閱議程。", "Set the agenda = 設定議程。Hidden agenda = 隱藏的動機。Meeting agenda = 會議議程。", "set the agenda=設定議程/hidden agenda=隱藏動機/meeting agenda=會議議程/agenda item=議程項目", "She always sent the agenda 48 hours in advance. Meetings that previously ran over time now ended early. Preparation multiplied meeting efficiency by three.", "職場,商業"],
["allocate", "ˈæləkeɪt", "v.", "分配；撥款", "Allocate your best hours to your most important work.", "把你最好的時間分配給你最重要的工作。", "Allocation = 分配（名詞）。Resource allocation = 資源分配。Time allocation = 時間分配。", "resource allocation=資源分配/time allocation=時間分配/budget allocation=預算分配/allocate resources=分配資源", "The project failed not from lack of effort but from poor resource allocation. Everyone was busy. Nobody was working on the critical path. Allocation is strategy made visible.", "職場,商業"],
["assess", "əˈsɛs", "v.", "評估", "Honestly assess your strengths and weaknesses regularly.", "定期誠實地評估你的優缺點。", "Assessment = 評估（名詞）。Self-assessment = 自我評估。Performance assessment = 績效評估。", "assessment=評估/self-assessment=自我評估/performance assessment=績效評估/risk assessment=風險評估", "Before every project, she assessed risks comprehensively. Her team thought she was pessimistic. Her projects consistently delivered on time and budget. Assessment is not pessimism — it is preparation.", "職場,教育"],
["assumption", "əˈsʌmpʃən", "n.", "假設；前提", "Dangerous assumptions are the ones you make without realizing.", "危險的假設是你在沒有意識到的情況下做出的。", "Make an assumption = 做出假設。False assumption = 錯誤假設。Challenge assumptions = 挑戰假設。", "make an assumption=做出假設/false assumption=錯誤假設/challenge assumptions=挑戰假設/assumption-free=無假設", "The strategy was built on three assumptions that turned out to be wrong. She learned: always write your assumptions down explicitly before planning. Invisible assumptions are invisible risks.", "商業,哲學,職場"],
["benchmark", "ˈbɛntʃmɑːrk", "n./v.", "基準；對標", "Use industry benchmarks to measure your team's performance.", "使用行業基準來衡量你的團隊績效。", "Set a benchmark = 設定基準。Benchmark against = 與...對標。Industry benchmark = 行業基準。", "set a benchmark=設定基準/benchmark against=與...對標/performance benchmark=績效基準/world-class benchmark=世界級基準", "She benchmarked her company against the best in the world, not just her industry. The gap was larger than expected. That discomfort drove three years of exceptional improvement.", "商業,職場"],
["brand", "brænd", "n.", "品牌", "Your personal brand is what people say when you leave the room.", "你的個人品牌是人們在你離開房間後說的話。", "Brand identity = 品牌識別。Brand loyalty = 品牌忠誠度。Rebrand = 重新品牌定位。", "brand identity=品牌識別/brand loyalty=品牌忠誠度/rebrand=重塑品牌/personal brand=個人品牌", "She built the brand on one principle: never over-promise. Every customer expectation was exceeded. Brand loyalty followed not from marketing but from consistent delivery.", "商業,職場"],
["candidate", "ˈkændɪdɪt", "n.", "候選人；應徵者", "She was the strongest candidate by every objective measure.", "她在每一個客觀衡量標準上都是最強的候選人。", "Job candidate = 求職者。Top candidate = 最佳候選人。Front-runner = 領先候選人。", "job candidate=求職者/top candidate=最佳候選人/qualified candidate=合格候選人/ideal candidate=理想人選", "The hiring committee was divided. Then one manager said: 'Forget the CV. Who would you most want to face a crisis with?' The vote became unanimous.", "職場,商業"],
["capacity", "kəˈpæsɪti", "n.", "能力；容量", "She is working at full capacity and needs support now.", "她在全力運轉，現在需要支持。", "At full capacity = 全力運轉。Build capacity = 建立能力。Storage capacity = 儲存容量。", "at full capacity=全力運轉/build capacity=建立能力/mental capacity=心理能力/capacity building=能力建設", "Good managers monitor team capacity like engineers monitor engine capacity. Running people at 100% long-term is not sustainable. It is a recipe for failure, not success.", "職場,商業,健康"],
["competency", "ˈkɒmpɪtənsi", "n.", "能力；技能", "Map your core competencies before entering any new market.", "在進入任何新市場之前先規劃你的核心能力。", "Core competency = 核心能力。Technical competency = 技術能力。Competency framework = 能力框架。", "core competency=核心能力/technical competency=技術能力/competency gap=能力差距/build competency=建立能力", "The company tried to expand into areas outside their core competency. They failed expensively. Returning to what they did best, they thrived. Know where your mastery lives.", "商業,職場"],
["competitive", "kəmˈpɛtɪtɪv", "adj.", "競爭的；有競爭力的", "Stay competitive by constantly improving what you offer.", "通過不斷改進你提供的東西來保持競爭力。", "Competitive advantage = 競爭優勢。Highly competitive = 高度競爭的。Competitive pricing = 競爭性定價。", "competitive advantage=競爭優勢/highly competitive=高度競爭/competitive pricing=競爭性定價/stay competitive=保持競爭力", "She built a competitive advantage nobody else could copy: trust. Competitors could match her price or quality. Nobody could replicate fifteen years of relationships built on integrity.", "商業,職場"],
["consensus", "kənˈsɛnsəs", "n.", "共識", "Build consensus before committing to any major decision.", "在做出任何重大決定之前建立共識。", "Reach a consensus = 達成共識。Consensus-building = 建立共識。By consensus = 通過共識。", "reach a consensus=達成共識/consensus building=建立共識/general consensus=普遍共識/lack of consensus=缺乏共識", "The team made decisions by consensus for everything. Decision-making slowed to a crawl. She introduced a new rule: small decisions by one person, big ones by all. Speed returned.", "職場,溝通"],
["constraint", "kənˈstreɪnt", "n.", "限制；約束", "Constraints often lead to more creative solutions.", "限制往往導致更有創意的解決方案。", "Budget constraint = 預算限制。Time constraint = 時間限制。Work within constraints = 在限制內工作。", "budget constraint=預算限制/time constraint=時間限制/resource constraint=資源限制/creative constraint=創意約束", "The team complained about their limited budget. The manager reframed it: 'You have limited resources and unlimited creativity. Go.' They produced the company's best product ever.", "商業,職場,創意"],
["contract", "ˈkɒntrækt", "n.", "合同；契約", "Read every contract carefully before you sign anything.", "在簽署任何東西之前仔細閱讀每份合同。", "Sign a contract = 簽合同。Breach of contract = 違約。Service contract = 服務合同。", "sign a contract=簽合同/breach of contract=違約/service contract=服務合同/contract negotiation=合同談判", "She read contracts differently from others — not to find escape clauses, but to understand obligations. That thoroughness made her the most trusted partner in her industry.", "商業,法律"],
["coordinate", "koʊˈɔːrdɪneɪt", "v.", "協調", "Someone needs to coordinate the three teams' efforts.", "需要有人協調三個團隊的努力。", "Coordination = 協調（名詞）。Cross-functional coordination = 跨部門協調。Well-coordinated = 協調良好的。", "coordination=協調/cross-functional=跨部門/well-coordinated=協調良好/coordinate efforts=協調努力", "Without coordination, three teams worked on the same problem simultaneously. After she stepped in to coordinate, they divided the work and solved it in a third of the time.", "職場,商業"],
["corporate", "ˈkɔːrpərɪt", "adj.", "企業的；公司的", "Corporate culture determines whether talented people stay or leave.", "企業文化決定了有才能的人是留下還是離開。", "Corporate culture = 企業文化。Corporate governance = 公司治理。Corporate values = 企業價值觀。", "corporate culture=企業文化/corporate governance=公司治理/corporate values=企業價值觀/corporate ladder=職業階梯", "She declined the corporate job for the startup. Five years later, the corporate offer was ten times bigger because of her startup experience. Sometimes the less obvious path accelerates fastest.", "商業,職場"],
["criteria", "kraɪˈtɪəriə", "n.", "標準；條件", "What criteria do you use to evaluate success?", "你用什麼標準來評估成功？", "Meet the criteria = 符合標準。Evaluation criteria = 評估標準。Selection criteria = 選擇標準。", "meet the criteria=符合標準/evaluation criteria=評估標準/selection criteria=選擇標準/clear criteria=明確標準", "She judged every opportunity by the same three criteria: alignment with values, growth potential, impact on people. That clarity made decision-making fast and consistent.", "商業,哲學,職場"],
["demographic", "ˌdɛməˈɡræfɪk", "n./adj.", "人口的；人口統計", "Our target demographic is urban professionals aged 25-40.", "我們的目標人群是25-40歲的城市專業人士。", "Target demographic = 目標人群。Demographic shift = 人口轉變。Demographic data = 人口數據。", "target demographic=目標人群/demographic shift=人口轉變/demographic data=人口數據", "She noticed the demographic shift three years before competitors did. That early observation allowed her company to pivot before the change became obvious. Watching demographics is a superpower.", "商業,社會"],
["differentiate", "ˌdɪfəˈrɛnʃieɪt", "v.", "區分；使差異化", "You must clearly differentiate your offering from competitors.", "你必須清楚地使你的產品與競爭對手區分開來。", "Product differentiation = 產品差異化。Differentiated = 差異化的。Point of differentiation = 差異化點。", "product differentiation=產品差異化/point of difference=差異點/differentiated approach=差異化方法", "She asked her customers what made them choose her over competitors. The answer surprised her — it was not the product but the relationship. That answer reshaped her entire business model.", "商業,職場"],
["diligent", "ˈdɪlɪdʒənt", "adj.", "勤奮的；認真的", "The most diligent worker is not always the most productive.", "最勤奮的工作者不一定是最有生產力的。", "Diligence = 勤奮（名詞）。Diligently = 勤奮地。Hard-working = 努力工作的（同義）。", "diligence=勤奮/diligently=勤奮地/due diligence=盡職調查/diligent worker=勤奮的工作者", "She was the most diligent person in the office — first in, last out. But her output was average. She realized diligence needed direction. Working hard and working smart are not the same.", "職場,激勵"],
["disrupt", "dɪsˈrʌpt", "v.", "顛覆；干擾", "The startup set out to disrupt the entire financial industry.", "這家新創公司著手顛覆整個金融行業。", "Disruption = 顛覆（名詞）。Disruptive = 顛覆性的。Market disruption = 市場顛覆。", "disruption=顛覆/disruptive=顛覆性的/market disruption=市場顛覆/disruptive technology=顛覆性技術", "The industry laughed at the idea. Then it disrupted them completely. Every major disruption in history was dismissed by the people it eventually displaced. Take the disruptors seriously.", "商業,科技"],
["diverse", "daɪˈvɜːrs", "adj.", "多元的；不同的", "A diverse team produces more creative solutions consistently.", "多元化的團隊持續產生更有創意的解決方案。", "Diversity = 多元化（名詞）。Inclusive and diverse = 包容且多元。Cultural diversity = 文化多元性。", "diversity=多元化/cultural diversity=文化多元/diverse perspective=多元視角/build a diverse team=建立多元團隊", "The homogeneous team kept making the same kind of mistake. When she diversified the team — backgrounds, thinking styles, experience — the blind spots disappeared.", "商業,社會,職場"],
["document", "ˈdɒkjumənt", "n./v.", "文件；記錄", "Document every decision so you can learn from the outcomes.", "記錄每一個決定，以便你能從結果中學習。", "Documentation = 文件記錄（名詞）。Well-documented = 有充分記錄的。Document management = 文件管理。", "documentation=文件記錄/well-documented=有充分記錄/document management=文件管理/official document=官方文件", "She documented everything — decisions, reasoning, outcomes. When the same problem appeared two years later, the documentation saved days of rework. Writing things down is compounding thinking.", "職場,教育"],
["dominate", "ˈdɒmɪneɪt", "v.", "主導；主宰", "She dominated her market through consistency and quality.", "她通過一致性和品質主導了她的市場。", "Market dominance = 市場主導地位。Dominant = 主導的。Domination = 主宰（名詞）。", "market dominance=市場主導/dominant=主導的/domination=主宰/dominant player=主導者", "The company that dominated by lowering prices eventually lost to one that dominated through trust. Price is the weakest competitive advantage. Trust is the strongest.", "商業,運動"],
["emerge", "ɪˈmɜːrdʒ", "v.", "出現；浮現", "Strong leaders emerge in times of genuine uncertainty.", "強大的領導者在真正不確定的時候出現。", "Emerging market = 新興市場。Emergence = 出現（名詞）。Emerge stronger = 更強大地出現。", "emerging market=新興市場/emerge stronger=更強大地出現/newly emerging=新興的/pattern emerging=模式浮現", "She entered the emerging market when it was too small to be interesting to large competitors. When they finally noticed, she was already entrenched. Early entry into emerging spaces wins.", "商業,社會"],
["equity", "ˈɛkwɪti", "n.", "公平；股本", "Build equity in everything — relationships, reputation, skills.", "在一切事物中建立股本——關係、聲譽、技能。", "Equity stake = 股份。Brand equity = 品牌資產。Home equity = 房屋淨值。", "equity stake=股份/brand equity=品牌資產/home equity=房屋淨值/equity investment=股權投資", "She negotiated for equity, not just salary. Three years later, the company was acquired. The equity check changed her entire life trajectory. Always negotiate for ownership.", "商業,金融"],
["estimate", "ˈɛstɪmɪt", "v.", "估計；估算", "Always estimate conservatively and deliver beyond expectations.", "永遠保守估計並超越預期交付。", "Estimate time = 估計時間。Rough estimate = 大略估計。Cost estimate = 費用估計。", "estimate time=估計時間/rough estimate=大略估計/cost estimate=費用估計/ballpark estimate=大致估算", "She always doubled her time estimates for projects. She was always late anyway — but only by 10% instead of 100%. Teams that are honest about estimates build trust faster than optimistic ones.", "職場,商業"],
["exceed", "ɪkˈsiːd", "v.", "超過；超越", "Always aim to exceed what is expected of you.", "總是致力於超越對你的期望。", "Exceed expectations = 超越期望。Exceed the limit = 超出限制。Exceed targets = 超出目標。", "exceed expectations=超越期望/exceed the limit=超出限制/exceed targets=超出目標/far exceed=大幅超過", "She set her team's targets at what she believed was the ceiling, then watched them exceed it every quarter. She learned: people consistently surprise you upward when given the chance.", "職場,激勵"],
["execute", "ˈɛksɪkjuːt", "v.", "執行；實施", "Great strategy means nothing without great execution.", "沒有出色的執行，偉大的策略毫無意義。", "Execution = 執行（名詞）。Flawless execution = 完美執行。Execute the plan = 執行計劃。", "execution=執行/flawless execution=完美執行/execute the plan=執行計劃/poor execution=執行不善", "The idea was average. The execution was extraordinary. They won. The competitor had a better idea and mediocre execution. They lost. Execution beats ideas in the real world.", "商業,職場"],
["expertise", "ˌɛkspɜːrˈtiːz", "n.", "專業知識；專長", "Build deep expertise in one area before going broad.", "在廣泛發展之前先在一個領域建立深厚的專業知識。", "Domain expertise = 領域專長。Develop expertise = 培養專長。Expert = 專家。", "domain expertise=領域專長/develop expertise=培養專長/call on expertise=調用專長/expertise gap=專長差距", "She spent ten years building expertise in one narrow field. Then she was the only person in the world who could solve certain problems. Narrowness creates uniqueness. Uniqueness creates value.", "職場,教育"],
["facilitate", "fəˈsɪlɪteɪt", "v.", "促進；便利", "Her role was to facilitate collaboration between teams.", "她的角色是促進團隊之間的合作。", "Facilitator = 促進者。Facilitation = 促進（名詞）。Facilitate discussion = 促進討論。", "facilitator=促進者/facilitation=促進/facilitate discussion=促進討論/facilitate change=促進改變", "She transformed from 'answer-giver' to 'question-asker.' Her meetings went from directives to dialogues. She discovered that facilitating thinking produced better results than telling people what to think.", "職場,教育,溝通"],
