["forecast", "ˈfɔːrkæst", "n./v.", "預測；預報", "Accurate forecasting requires data, judgment, and humility.", "準確的預測需要數據、判斷和謙遜。", "Sales forecast = 銷售預測。Weather forecast = 天氣預報。Forecast accuracy = 預測準確性。", "sales forecast=銷售預測/weather forecast=天氣預報/forecast accuracy=預測準確性/demand forecast=需求預測", "Her forecasts were always conservative. She was proven right 80% of the time. That accuracy built credibility. Accuracy over optimism is always the winning forecasting philosophy.", "商業,科學"],
["generate", "ˈdʒɛnəreɪt", "v.", "產生；生成", "The campaign generated three times more revenue than expected.", "該活動產生了比預期多三倍的收入。", "Generate revenue = 產生收入。Generate ideas = 產生想法。Revenue generation = 收入產生。", "generate revenue=產生收入/generate ideas=產生想法/revenue generation=收入產生/generate leads=產生潛在客戶", "She generated ideas not by waiting for inspiration but by scheduling two hours per week for creative thinking. Ideas on demand. The schedule created the conditions for breakthrough.", "商業,創意"],
["goal-oriented", "ˈɡoʊl ˈɔːriəntɪd", "adj.", "目標導向的", "Hire goal-oriented people and remove the obstacles in their way.", "雇用目標導向的人並清除他們路上的障礙。", "Results-driven = 以結果為導向的。Outcome-focused = 以結果為中心的。Objective-based = 基於目標的。", "results-driven=以結果為導向/outcome-focused=以結果為中心/set clear goals=設定明確目標", "He defined success for his team clearly: not activity, but outcomes. That shift from measuring hours to measuring results transformed everything about how the team worked.", "職場,激勵"],
["incentive", "ɪnˈsɛntɪv", "n.", "激勵；誘因", "Align incentives with behaviors you want to encourage.", "將激勵措施與你想鼓勵的行為對齊。", "Financial incentive = 財務激勵。Create incentives = 創造激勵。Incentive program = 激勵計劃。", "financial incentive=財務激勵/create incentives=創造激勵/incentive program=激勵計劃/align incentives=對齊激勵", "She redesigned the incentive structure to reward collaboration, not individual performance. Within two quarters, the team's collective output doubled. What you reward, you get more of.", "商業,職場"],
["innovative", "ˈɪnəveɪtɪv", "adj.", "創新的", "The most innovative companies create cultures that welcome failure.", "最具創新性的公司創造歡迎失敗的文化。", "Innovation = 創新（名詞）。Innovate = 創新（動詞）。Groundbreaking innovation = 突破性創新。", "innovation=創新/innovate=創新/groundbreaking=突破性的/innovative approach=創新方法/disruptive innovation=顛覆性創新", "She gave every team member one afternoon per week for non-directed innovation. Most produced nothing. A few produced ideas that became the company's best products. The math worked.", "商業,科技,創意"],
["insight", "ˈɪnsaɪt", "n.", "洞察力；見解", "Deep customer insights transform average products into great ones.", "深刻的客戶洞察將普通產品轉化為優秀產品。", "Gain insight = 獲得洞察。Key insight = 關鍵見解。Business insight = 商業洞察。", "gain insight=獲得洞察/key insight=關鍵見解/actionable insight=可行的洞察/market insight=市場洞察", "The market research report was 200 pages. Her one insight — distilled from reading it carefully — was worth millions. The ability to find the one insight in 200 pages is rare and valuable.", "商業,教育"],
["integrity", "ɪnˈtɛɡrɪti", "n.", "誠信；正直", "Integrity means doing the right thing when no one is watching.", "誠信意味著在沒有人看到的時候做正確的事。", "Act with integrity = 以誠信行事。Integrity check = 誠信審查。Organizational integrity = 組織誠信。", "act with integrity=以誠信行事/integrity check=誠信審查/organizational integrity=組織誠信/personal integrity=個人誠信", "Clients chose her over cheaper options every time. When asked why, they said the same thing: integrity. They knew what she said was what she would do. That predictability was priceless.", "職場,商業,哲學"],
["justify", "ˈdʒʌstɪfaɪ", "v.", "證明正當；辯護", "Always be able to justify your decisions with clear reasoning.", "永遠能夠用清晰的推理來證明你的決定是正當的。", "Justification = 理由（名詞）。Unjustifiable = 無法辯護的。Justify a decision = 證明決定合理。", "justification=理由/unjustifiable=無法辯護/justify a decision=證明決定合理/can't justify=無法辯護", "She required every significant expenditure to come with a written justification. Not to block spending but to clarify thinking. Writing the justification often revealed the expenditure was unnecessary.", "職場,商業"],
["leverage", "ˈliːvərɪdʒ", "n./v.", "槓桿；利用", "Leverage your existing relationships to open new opportunities.", "利用你現有的關係來開拓新的機會。", "Financial leverage = 財務槓桿。Leverage resources = 利用資源。Use leverage = 使用槓桿。", "financial leverage=財務槓桿/leverage resources=利用資源/leverage your network=利用人脈/create leverage=創造槓桿", "She never tried to do everything herself. She leveraged other people's expertise, networks, and resources. That multiplication effect made one person feel like a whole team.", "商業,職場"],
["maintain", "meɪnˈteɪn", "v.", "維持；保持", "Maintain your standards even when it would be easier not to.", "即使不這樣做更容易，也要維持你的標準。", "Maintenance = 維護（名詞）。Well-maintained = 維護良好的。Maintain quality = 維持品質。", "maintenance=維護/well-maintained=維護良好/maintain quality=維持品質/self-maintenance=自我維護", "The company grew so fast that quality slipped. Customers noticed. The CEO paused growth to maintain standards. The pause cost short-term revenue but saved long-term trust.", "商業,職場"],
["maximize", "ˈmæksɪmaɪz", "v.", "最大化", "Maximize impact by focusing on your highest-value activities.", "通過專注於你最高價值的活動來最大化影響。", "Maximize efficiency = 最大化效率。Maximize returns = 最大化回報。Maximize potential = 最大化潛能。", "maximize efficiency=最大化效率/maximize returns=最大化回報/maximize potential=最大化潛能/maximize value=最大化價值", "She stopped trying to maximize everything. Instead, she maximized the few things that mattered most and let the rest be adequate. Selective maximization is a superpower.", "商業,職場"],
["measure", "ˈmɛʒər", "n./v.", "措施；衡量", "What gets measured gets managed — be intentional about what you measure.", "被衡量的東西被管理——有意識地衡量你所測量的東西。", "Performance measure = 績效衡量。Take measures = 採取措施。Measure progress = 衡量進展。", "performance measure=績效衡量/take measures=採取措施/measure progress=衡量進展/measurement tool=衡量工具", "She changed what she measured. Old: hours worked. New: customer satisfaction. New: team wellbeing. New: outcomes delivered. What you measure shapes what you become as an organization.", "商業,職場"],
["mentor", "ˈmɛntər", "n./v.", "導師；輔導", "A good mentor accelerates your growth by years.", "一個好的導師可以加速你的成長多年。", "Mentorship = 導師制度（名詞）。Mentor someone = 輔導某人。Seek a mentor = 尋找導師。", "mentorship=導師制度/mentor someone=輔導某人/seek a mentor=尋找導師/reverse mentoring=反向導師", "She had three mentors — one ahead of her in career, one her equal in experience, one younger with different skills. Each gave her perspectives she could never have seen alone.", "職場,教育"],
["milestone", "ˈmaɪlstoʊn", "n.", "里程碑；重要時刻", "Celebrate every milestone — they fuel the energy for the next one.", "慶祝每一個里程碑——它們為下一個加油。", "Hit a milestone = 達到里程碑。Project milestone = 項目里程碑。Career milestone = 職業里程碑。", "hit a milestone=達到里程碑/project milestone=項目里程碑/career milestone=職業里程碑/mark a milestone=標記里程碑", "She stopped only to celebrate two milestones: beginning and completion. The team burned out. She added celebrations for every intermediate milestone. Energy and commitment transformed.", "職場,商業,激勵"],
["momentum", "moʊˈmɛntəm", "n.", "動能；勢頭", "Build momentum through small wins before tackling bigger challenges.", "在應對更大挑戰之前通過小勝利建立動能。", "Gain momentum = 積累動能。Lose momentum = 失去勢頭。Maintain momentum = 保持動能。", "gain momentum=積累動能/lose momentum=失去勢頭/maintain momentum=保持動能/build momentum=建立動能", "Every project has an early phase where momentum is fragile. She protected that phase fiercely — no distractions, no pivots. Once momentum was established, the project became unstoppable.", "商業,職場,激勵"],
["motivate", "ˈmoʊtɪveɪt", "v.", "激勵；驅使", "You motivate people by connecting their work to something meaningful.", "你通過將他們的工作與有意義的東西聯繫起來來激勵人們。", "Motivation = 激勵（名詞）. Motivating = 激勵人心的。Self-motivated = 自我激勵的。", "motivation=激勵/motivating=激勵人心的/self-motivated=自我激勵/intrinsic motivation=內在激勵", "She stopped trying to motivate through fear or reward. Instead, she helped each person connect their daily work to a bigger purpose. Intrinsic motivation, she discovered, is the only kind that lasts.", "職場,教育,激勵"],
["network", "ˈnɛtwɜːrk", "n./v.", "人脈；建立人際網絡", "Your network is your net worth — build it with genuine care.", "你的人脈就是你的淨資產——用真誠的關心來建立它。", "Networking = 建立人脈。Network event = 人脈活動。Professional network = 專業人脈。", "networking=建立人脈/network event=人脈活動/professional network=專業人脈/expand your network=擴展人脈", "She networked by giving — articles, introductions, feedback — long before asking for anything. When she needed help, the response was overwhelming. Generosity is the best networking strategy.", "職場,社交"],
["optimize", "ˈɒptɪmaɪz", "v.", "優化", "Optimize your systems before trying to optimize your effort.", "在嘗試優化你的努力之前先優化你的系統。", "Optimization = 優化（名詞）。Process optimization = 流程優化。Optimize performance = 優化績效。", "optimization=優化/process optimization=流程優化/optimize performance=優化績效/cost optimization=成本優化", "She spent one week mapping her workflow in detail. Then optimized it ruthlessly. The same output began taking half the time. Working harder on an optimized system beats harder work on a broken one.", "商業,科技,職場"],
["outsource", "ˈaʊtsɔːrs", "v.", "外包", "Outsource what you are not excellent at and reinvest the time.", "外包你不擅長的事情並重新投資節省的時間。", "Outsourcing = 外包（名詞）。Outsource tasks = 外包任務。Strategic outsourcing = 策略性外包。", "outsourcing=外包/outsource tasks=外包任務/strategic outsourcing=策略性外包/core vs non-core=核心與非核心", "She outsourced every non-core function the moment she could afford it. Each outsourced task freed four hours per week. Those hours, reinvested into her strengths, multiplied her output dramatically.", "商業,職場"],
["performance", "pərˈfɔːrməns", "n.", "績效；表現", "High performance requires both clarity of role and support to succeed.", "高績效需要角色的清晰度和成功的支持。", "High performance = 高績效。Performance review = 績效評估。Performance gap = 績效差距。", "high performance=高績效/performance review=績效評估/performance gap=績效差距/measure performance=衡量績效", "She held performance conversations monthly, not annually. Issues were addressed before they became entrenched. Feedback given promptly changes behavior. Annual reviews merely document it.", "職場,商業"],
["pipeline", "ˈpaɪplaɪn", "n.", "管道；流程", "Always maintain a healthy pipeline of opportunities.", "永遠保持健康的機會流程。", "Sales pipeline = 銷售管道。Leadership pipeline = 領導力培養管道。Pipeline of talent = 人才培育管道。", "sales pipeline=銷售管道/leadership pipeline=領導力管道/pipeline of talent=人才培育/full pipeline=充實的管道", "When sales were strong, she still filled the pipeline. When others were celebrating, she was planting. The harvest she always had was the result of seeds she planted during the feast.", "商業,職場"],
["pitch", "pɪtʃ", "n./v.", "推介；音調", "Perfect your pitch until it fits inside sixty seconds.", "完善你的推介，直到它能在六十秒內完成。", "Sales pitch = 銷售推介。Pitch deck = 推介簡報。Make a pitch = 做一個推介。", "sales pitch=銷售推介/pitch deck=推介簡報/make a pitch=做推介/elevator pitch=電梯演講", "She practiced her pitch 200 times before the investor meeting. Walking in, she was calm. The investors said later: 'We have never seen someone so prepared.' 200 repetitions produce effortless confidence.", "商業,溝通"],
["productivity", "ˌprɒdʌkˈtɪvɪti", "n.", "生產力", "True productivity is doing the right things, not just more things.", "真正的生產力是做正確的事情，而不只是做更多的事情。", "Boost productivity = 提升生產力。Personal productivity = 個人生產力。Productivity tool = 生產力工具。", "boost productivity=提升生產力/personal productivity=個人生產力/productivity hack=生產力技巧/peak productivity=峰值生產力", "She measured her productivity by outcome, not activity. She worked fewer hours than her peers but produced more. Not because she worked harder — because she worked on the right things.", "職場,生活"],
["profile", "ˈproʊfaɪl", "n.", "簡介；側面", "Build your professional profile before you need it.", "在你需要它之前建立你的職業簡介。", "High profile = 高知名度。Risk profile = 風險狀況。Customer profile = 客戶簡介。", "high profile=高知名度/risk profile=風險狀況/customer profile=客戶簡介/raise your profile=提升知名度", "She built her public profile during the good years. When her company faced a crisis, the credibility she had built absorbed the impact. Reputation is insurance built before the claim is needed.", "商業,職場"],
["project", "ˈprɒdʒɛkt", "n.", "項目；工程", "Break every large project into small, achievable daily steps.", "將每個大項目分解成小的、可實現的每日步驟。", "Project management = 項目管理。On track = 在正軌上。Project scope = 項目範圍。", "project management=項目管理/on track=在正軌上/project scope=項目範圍/side project=側面項目", "Her side project started as a weekend experiment. She showed it to three friends. They showed their friends. Six months later, it had become her main business. Side projects deserve serious attention.", "商業,職場"],
["prototype", "ˈproʊtəˌtaɪp", "n.", "原型", "Build a prototype quickly and test it before full investment.", "快速建立一個原型，在全面投資之前進行測試。", "Rapid prototype = 快速原型。Prototype testing = 原型測試。Build a prototype = 建立原型。", "rapid prototype=快速原型/prototype testing=原型測試/build a prototype=建立原型/working prototype=可運作原型", "She built the prototype in one weekend. It was rough, ugly, and incomplete. But it was enough to show investors the concept. The perfect version came after the imperfect prototype found the funding.", "科技,商業"],
["scalable", "ˈskeɪləbl", "adj.", "可擴展的", "Build processes that are scalable from day one.", "從第一天起就建立可擴展的流程。", "Scale up = 擴大規模。Scalability = 可擴展性（名詞）。Highly scalable = 高度可擴展的。", "scale up=擴大規模/scalability=可擴展性/highly scalable=高度可擴展/scale a business=擴大業務", "She designed every system as if it would serve a million customers, when she had a hundred. When scale came, nothing broke. Building for scale early is far cheaper than rebuilding under pressure.", "商業,科技"],
["stakeholder", "ˈsteɪkhoʊldər", "n.", "利益相關者", "Identify all stakeholders early and communicate with them regularly.", "盡早識別所有利益相關者並定期與他們溝通。", "Key stakeholder = 關鍵利益相關者。Stakeholder management = 利益相關者管理。Internal stakeholder = 內部利益相關者。", "key stakeholder=關鍵利益相關者/stakeholder management=利益相關者管理/engage stakeholders=讓利益相關者參與", "The project failed not from poor execution but from poor stakeholder management. Three key people felt excluded from decisions. Including them cost nothing. Excluding them cost everything.", "商業,職場"],
["tactical", "ˈtæktɪkl", "adj.", "戰術的；策略性的", "Tactical decisions support the larger strategic direction.", "戰術決策支持更大的策略方向。", "Tactical approach = 戰術方法。Tactical thinking = 戰術思維。Strategic and tactical = 策略與戰術。", "tactical approach=戰術方法/tactical thinking=戰術思維/tactical retreat=戰術撤退/tactical decision=戰術決策", "She was a strategic thinker who could also execute tactically. That rare combination — seeing both the forest and the trees — made her the most complete leader in her organization.", "職場,商業"],
["target", "ˈtɑːrɡɪt", "n./v.", "目標；針對", "Set realistic targets and then exceed them systematically.", "設定現實的目標，然後系統地超越它們。", "Hit the target = 達到目標。Target audience = 目標受眾。On target = 在目標上。", "hit the target=達到目標/target audience=目標受眾/on target=在目標上/moving target=移動目標", "She broke annual targets into weekly ones. At week 52, she had either hit 52 small targets or learned from 52 specific failures. Both outcomes were better than one annual reckoning.", "商業,職場"],
["upgrade", "ˈʌpɡreɪd", "v./n.", "升級", "Upgrade your skills before your role requires it.", "在你的職位需要之前升級你的技能。", "System upgrade = 系統升級。Skill upgrade = 技能升級。Upgrade your thinking = 升級你的思維。", "system upgrade=系統升級/skill upgrade=技能升級/upgrade your thinking=升級你的思維/constant upgrade=持續升級", "She upgraded her technical skills every two years, staying ahead of changes in her field. While peers scrambled to catch up with new tools, she was already proficient. Proactive upgrading creates unfair advantages.", "科技,職場"],
["validate", "ˈvælɪdeɪt", "v.", "驗證；確認", "Validate your assumptions before investing significant resources.", "在投入大量資源之前驗證你的假設。", "Validation = 驗證（名詞）。Customer validation = 客戶驗證。Market validation = 市場驗證。", "validation=驗證/customer validation=客戶驗證/market validation=市場驗證/seek validation=尋求驗證", "She spent three weeks validating the idea with potential customers before building anything. The feedback changed the product completely. Validation before building is the most efficient path to success.", "商業,科技"],
["venture", "ˈvɛntʃər", "n./v.", "冒險；企業", "The bravest thing she ever did was venture into the unknown.", "她做過的最勇敢的事情就是冒險進入未知領域。", "Venture capital = 創業投資。Joint venture = 合資企業。Venture into = 冒險進入。", "venture capital=創業投資/joint venture=合資企業/venture into=冒險進入/calculated venture=有計算的冒險", "The venture failed financially. But it succeeded in teaching her more about business in one year than ten years in a stable job. Failed ventures are the most expensive and valuable education.", "商業,激勵"],
["workshop", "ˈwɜːrkʃɒp", "n.", "研討會；工作坊", "She ran a workshop that transformed how the team communicated.", "她舉辦了一個研討會，改變了團隊的溝通方式。", "Run a workshop = 舉辦工作坊。Workshop facilitator = 工作坊引導者。Skills workshop = 技能研討會。", "run a workshop=舉辦工作坊/workshop facilitator=工作坊引導者/skills workshop=技能研討會/interactive workshop=互動工作坊", "She made every workshop interactive: no slides for more than ten minutes, movement, discussion, application. Attendance became something people fought for. Learning environments should feel nothing like school.", "職場,教育"],
["accountability", "əˌkaʊntəˈbɪlɪti", "n.", "問責制", "Build a culture of accountability where people own their outcomes.", "建立一種問責文化，讓人們對自己的結果負責。", "Accountable=需要負責的。Hold accountable=追究責任。Personal accountability=個人問責。", "accountable=需要負責的/hold accountable=追究責任/personal accountability=個人問責/accountability partner=問責夥伴", "She redesigned the performance review to focus on accountability rather than blame. Accountability she explained is about owning what you can change—not punishing for what went wrong.", "職場,商業,激勵"],
["agility", "əˈdʒɪlɪti", "n.", "敏捷性", "Organizational agility is the ability to pivot without losing momentum.", "組織敏捷性是在不失去動能的情況下轉向的能力。", "Agile=敏捷的。Business agility=商業敏捷性。Mental agility=思維敏捷。", "agile=敏捷的/business agility=商業敏捷性/mental agility=思維敏捷/agility training=敏捷訓練", "She built agility into the team's structure—small autonomous units with clear mandates. When the market shifted each unit adapted without waiting for central approval. Speed came from structure not from chaos.", "商業,職場,運動"],
["alignment", "əˈlaɪnmənt", "n.", "一致", "Strategic alignment means everyone is moving in the same direction.", "戰略一致性意味著每個人都朝著同一個方向前進。", "Align=對齊。Out of alignment=失調。Alignment check=一致性檢查。", "align=對齊/out of alignment=失調/alignment check=一致性檢查/team alignment=團隊一致", "She spent the first month of every year ensuring organizational alignment—not through memos but through conversations. Everyone needed to understand not just the goal but the reasoning behind it.", "職場,商業,溝通"],
["bottleneck", "ˈbɒtlnɛk", "n.", "瓶頸", "Find the bottleneck first—improving everything else is usually wasted effort.", "先找到瓶頸——改善其他一切通常是浪費努力。", "Remove bottleneck=消除瓶頸。System bottleneck=系統瓶頸。Bottleneck analysis=瓶頸分析。", "remove bottleneck=消除瓶頸/system bottleneck=系統瓶頸/bottleneck analysis=瓶頸分析/critical bottleneck=關鍵瓶頸", "She mapped the entire process before attempting any improvement. The bottleneck was surprising—not where everyone had assumed. Targeting the right constraint produced three times the improvement of fixing everything else combined.", "商業,科技,職場"],
["calibrate", "ˈkælɪbreɪt", "v.", "校準", "Calibrate your effort to the value of the outcome not to your energy level.", "根據結果的價值校準你的努力，而不是根據你的精力水平。", "Calibration=校準。Well-calibrated=校準良好的。Recalibrate=重新校準。", "calibration=校準/well-calibrated=校準良好的/recalibrate=重新校準/calibrate expectations=校準期望", "She calibrated her team's workload quarterly—not just adding or removing tasks but reviewing whether current effort matched current priority. Calibration prevented both burnout and misdirection simultaneously.", "職場,科學,商業"],
["coalition", "ˌkoʊəˈlɪʃən", "n.", "聯盟", "Build a coalition before the battle—consensus takes longer than you think.", "在戰鬥之前建立聯盟——共識建立比你想的需要更長時間。", "Form a coalition=形成聯盟。Coalition partner=聯盟夥伴。Build support=建立支持。", "form a coalition=形成聯盟/coalition partner=聯盟夥伴/build support=建立支持/coalition government=聯合政府", "She mapped the stakeholders before proposing the change. She spent three weeks building the coalition she needed. When the proposal came to the table it passed smoothly. Preparation had done the politics in advance.", "政治,職場,商業"],
["commodity", "kəˈmɒdɪti", "n.", "商品", "When your product becomes a commodity your relationships become your product.", "當你的產品成為商品時，你的關係就成了你的產品。", "Commoditize=商品化。Commodity market=商品市場。Raw commodity=原材料。", "commoditize=商品化/commodity market=商品市場/commodity price=商品價格/raw commodity=原材料", "She saw the commoditization coming two years before it arrived. She had already repositioned around relationships and service quality. When the price war hit her competitors she was selling something that couldn't be commoditized.", "商業,金融,激勵"],
["conversion", "kənˈvɜːrʒən", "n.", "轉換率", "Improve conversion at each stage before adding more to the top.", "在增加更多之前先改善每個階段的轉換率。", "Convert=轉換。Conversion rate=轉換率。Lead conversion=潛在客戶轉換。", "convert=轉換/conversion rate=轉換率/lead conversion=潛在客戶轉換/currency conversion=貨幣兌換", "She focused on conversion rather than traffic. Better to turn twenty percent of a thousand into customers than one percent of ten thousand. Depth over breadth in the early stage always produces more sustainable growth.", "商業,科技,金融"],
["credibility", "ˌkrɛdɪˈbɪlɪti", "n.", "可信度", "Credibility is the sum of every small kept promise.", "可信度是每一個小的遵守承諾的總和。", "Credible=可信的。Establish credibility=建立可信度。Lose credibility=失去可信度。", "credible=可信的/establish credibility=建立可信度/lose credibility=失去可信度/professional credibility=專業可信度", "She built her credibility in the new field not through declarations but through deliverables. Small projects completed excellently. That track record visible to everyone spoke before she entered any room.", "職場,溝通,商業"],
["cutback", "ˈkʌtbæk", "n.", "削減", "Smart cutbacks protect the core and eliminate the peripheral.", "聰明的削減保護核心並消除外圍。", "Make cutbacks=進行削減。Budget cutbacks=預算削減。Strategic cutback=策略性削減。", "make cutbacks=進行削減/budget cutbacks=預算削減/strategic cutback=策略性削減/across-the-board cutbacks=全面削減", "She led the cutback process with a clear principle: cut everything that doesn't serve the core mission first. The process was painful but rational. The organization that emerged was leaner and more focused than before.", "商業,職場,金融"],
["deliverable", "dɪˈlɪvərəbl", "n.", "交付成果", "Define deliverables clearly at the start—vague goals produce vague results.", "在開始時清楚定義交付成果——模糊的目標產生模糊的結果。", "Deliver=交付。Key deliverable=關鍵交付成果。On-time delivery=準時交付。", "deliver=交付/key deliverable=關鍵交付成果/on-time delivery=準時交付/missed deliverable=未達成的交付", "She specified deliverables in every project brief: what would be produced by when to what standard. That clarity eliminated most of the confusion that typically consumed thirty percent of project time.", "職場,商業"],
["demographics", "ˌdɛməˈɡræfɪks", "n.", "人口統計", "Understand your demographics before designing your offer.", "在設計你的提案之前了解你的人口統計數據。", "Demographic shift=人口結構轉變。Target demographic=目標人群。Demographic data=人口數據。", "demographic shift=人口結構轉變/target demographic=目標人群/demographic data=人口數據/emerging demographic=新興人群", "She watched the demographic shift in her market and pivoted before competitors noticed. The data had been public. The insight was in choosing to act on it rather than dismiss it.", "商業,社會,科技"],
["disruption", "dɪˈsrʌpʃən", "n.", "顛覆", "Every major disruption creates as many opportunities as it destroys.", "每次重大顛覆創造的機會和它摧毀的一樣多。", "Disrupt=顛覆。Disruptive=顛覆性的。Market disruption=市場顛覆。", "disrupt=顛覆/disruptive=顛覆性的/market disruption=市場顛覆/creative disruption=創造性破壞", "She studied every disruption in her industry not with fear but with the question: where is the opportunity in this change? The companies that asked that question consistently became the new leaders.", "商業,科技,激勵"],
["entrepreneur", "ˌɒntrəprəˈnɜːr", "n.", "創業者", "The entrepreneur's skill is finding problems worth solving.", "創業者的技能是找到值得解決的問題。", "Entrepreneurship=創業。Serial entrepreneur=連續創業者。Entrepreneurial mindset=創業思維。", "entrepreneurship=創業/serial entrepreneur=連續創業者/entrepreneurial mindset=創業思維/social entrepreneur=社會創業者", "She hadn't set out to be an entrepreneur. She had set out to solve a problem. The company formed around the solution almost on its own. Most great companies start as someone's desperate attempt to fix something.", "商業,激勵"],
["execution", "ˌɛksɪˈkjuːʃən", "n.", "執行", "Flawless execution of a mediocre strategy beats poor execution of a great one.", "對平庸策略的完美執行勝過對偉大策略的糟糕執行。", "Execute=執行。Execution gap=執行差距。Execution quality=執行品質。", "execute=執行/execution gap=執行差距/execution quality=執行品質/plan vs execution=計劃與執行", "She had learned that the execution gap—the distance between plan and reality—was where most business strategies failed. She became obsessive about closing that gap through clear accountability and frequent check-ins.", "商業,職場,激勵"],
["framework", "ˈfreɪmwɜːrk", "n.", "框架", "A good framework makes complex decisions consistently reliable.", "好的框架使複雜的決策持續可靠。", "Decision framework=決策框架。Analytical framework=分析框架。Build a framework=建立框架。", "decision framework=決策框架/analytical framework=分析框架/build a framework=建立框架/apply a framework=應用框架", "She created a decision framework her team could apply without her—the criteria were clear enough that the decisions were almost automatic. Leadership she had learned is making yourself replaceable through systems.", "職場,商業,教育"],
["friction", "ˈfrɪkʃən", "n.", "摩擦；阻力", "Reduce friction for good behaviors; add friction to bad ones.", "減少好行為的摩擦；給壞行為增加摩擦。", "Create friction=製造摩擦。Remove friction=消除摩擦。Friction point=摩擦點。", "create friction=製造摩擦/remove friction=消除摩擦/friction point=摩擦點/interpersonal friction=人際摩擦", "She mapped the friction in her team's workflow—every unnecessary approval every duplicated step every unclear handover. Removing those friction points doubled throughput without any additional effort.", "商業,科技,職場"],
["governance", "ˈɡʌvərnəns", "n.", "治理", "Good governance creates the conditions for sustainable performance.", "良好的治理為可持續績效創造條件。", "Corporate governance=公司治理。Governance structure=治理結構。Self-governance=自我管理。", "corporate governance=公司治理/governance structure=治理結構/self-governance=自我管理/governance model=治理模式", "She redesigned the governance structure to separate oversight from operations. The board became truly independent. The CEO had real authority within clear limits. The company performed better in both dimensions.", "商業,政治,社會"],
["incentivize", "ɪnˈsɛntɪvaɪz", "v.", "激勵", "Incentivize the behaviors you want not just the outcomes.", "激勵你想要的行為，而不只是你想要的結果。", "Incentive=激勵。Financial incentive=財務激勵。Align incentives=對齊激勵。", "incentive=激勵/financial incentive=財務激勵/align incentives=對齊激勵/incentivize growth=激勵成長", "She redesigned the bonus structure to reward collaboration rather than individual heroics. Within two quarters information sharing improved dramatically. Incentivize what you actually want to see more of.", "商業,職場,心理"],
["iteration", "ˌɪtəˈreɪʃən", "n.", "迭代", "Rapid iteration beats slow perfection in uncertain environments.", "在不確定的環境中，快速迭代勝過緩慢的完美。", "Iterate=迭代。Iterative process=迭代過程。Multiple iterations=多次迭代。", "iterate=迭代/iterative process=迭代過程/multiple iterations=多次迭代/rapid iteration=快速迭代", "She shipped the minimum viable version and iterated based on real user behavior. Each iteration was cheaper and faster than the last. The tenth version was better than anything she could have planned in advance.", "科技,商業,激勵"],
["margin", "ˈmɑːrdʒɪn", "n.", "利潤率", "Protect your margins—they are the sustainability of everything else.", "保護你的利潤率——它們是其他一切的可持續性。", "Profit margin=利潤率。Margin of error=誤差幅度。Operating margin=營業利潤率。", "profit margin=利潤率/margin of error=誤差幅度/operating margin=營業利潤率/improve margins=改善利潤率", "She refused the large contract that would have required pricing below her margin floor. Her competitors took it and lost money. She waited for the contracts that worked. Profitability is a discipline not an accident.", "商業,金融"],
["metrics", "ˈmɛtrɪks", "n.", "衡量指標", "Choose metrics that measure what matters not what is easy to measure.", "選擇衡量重要事情的指標，而不是容易衡量的事情。", "Track metrics=追踪指標。Vanity metrics=虛榮指標。Leading metrics=領先指標。", "track metrics=追踪指標/vanity metrics=虛榮指標/leading metrics=領先指標/lagging metrics=滯後指標", "She replaced the team's vanity metrics—page views follower counts—with conversion and retention metrics. The team's behavior immediately changed to serve the actual business goals rather than the impressive-looking numbers.", "商業,科技,教育"],
["mindset", "ˈmaɪndˌsɛt", "n.", "思維方式", "Your mindset is the lens through which every circumstance is filtered.", "你的思維方式是過濾每種情況的鏡頭。", "Growth mindset=成長心態。Fixed mindset=固定心態。Entrepreneurial mindset=創業思維。", "growth mindset=成長心態/fixed mindset=固定心態/entrepreneurial mindset=創業思維/shift your mindset=轉變思維方式", "She hired for mindset before skill. Skills could be taught. The mindset—curious resilient accountable—was either there or it wasn't and it shaped everything else about how someone learned and performed.", "商業,教育,激勵"],
["onboarding", "ˈɒnˌbɔːrdɪŋ", "n.", "入職培訓", "Great onboarding sets the tone for the entire employment relationship.", "優秀的入職培訓為整個僱傭關係定下基調。", "Employee onboarding=員工入職。Onboarding process=入職流程。Effective onboarding=有效入職。", "employee onboarding=員工入職/onboarding process=入職流程/effective onboarding=有效入職/streamline onboarding=精簡入職", "She redesigned onboarding to focus on culture first tools second. New hires spent their first week understanding why before they learned how. The result: faster contribution stronger retention better culture fit.", "職場,商業"],
["overhead", "ˈoʊvərˌhɛd", "n.", "管理費用", "Keep overhead low until revenue makes it necessary.", "在收入使其必要之前保持低管理費用。", "Reduce overhead=降低管理費用。Overhead costs=間接成本。Fixed overhead=固定管理費。", "reduce overhead=降低管理費用/overhead costs=間接成本/fixed overhead=固定管理費/overhead ratio=間接費用比率", "She ran the startup with minimal overhead—not from poverty but from discipline. When growth came she added infrastructure deliberately only when operations clearly required it. Lean habits survived the growth.", "商業,金融"],
["pilot", "ˈpaɪlɪt", "n./v.", "試點；試驗", "Pilot before you scale—cheap learning now beats expensive learning later.", "在擴大之前先試點——現在便宜的學習勝過以後昂貴的學習。", "Pilot program=試點計劃。Run a pilot=運行試點。Pilot test=試點測試。", "pilot program=試點計劃/run a pilot=運行試點/pilot test=試點測試/expand from pilot=從試點擴展", "She insisted on piloting every significant change before full rollout. The pilots always revealed something the planning had missed. Those discoveries made cheaply prevented expensive mistakes at scale.", "商業,科技,教育"],
["positioning", "pəˈzɪʃənɪŋ", "n.", "定位", "Positioning determines what you compete on and with whom.", "定位決定了你在什麼方面競爭以及與誰競爭。", "Market positioning=市場定位。Reposition=重新定位。Strategic positioning=戰略定位。", "market positioning=市場定位/reposition=重新定位/strategic positioning=戰略定位/competitive positioning=競爭定位", "She repositioned the company from competing on price to competing on outcomes. The change attracted different clients—more demanding but more loyal—and enabled pricing that reflected the value delivered.", "商業,行銷"],
["resilience", "rɪˈzɪlɪəns", "n.", "韌性", "Organizational resilience is built during good times not tested ones.", "組織韌性在好的時候建立，而不是在被測試的時候。", "Resilient=有韌性的。Build resilience=建立韌性。Mental resilience=心理韌性。", "resilient=有韌性的/build resilience=建立韌性/mental resilience=心理韌性/bounce back=反彈恢復", "She invested in the company's resilience when times were good—diverse revenue streams strong reserves flexible contracts. When the crisis came the resilience absorbed what would otherwise have been a fatal blow.", "商業,心理,激勵"],
["retention", "rɪˈtɛnʃən", "n.", "留存率", "Retention is the metric that reveals whether you delivered on your promise.", "留存率是揭示你是否真正履行了承諾的指標。", "Employee retention=員工留存。Customer retention=客戶留存。Retention rate=留存率。", "employee retention=員工留存/customer retention=客戶留存/retention rate=留存率/retain=保留", "She redesigned the product around retention not acquisition. Customers who stayed became advocates. Advocates brought new customers. The retention-first strategy cost less in marketing and produced more durable growth.", "商業,科技,職場"],
["runway", "ˈrʌnweɪ", "n.", "運作時間", "Know your runway and make decisions accordingly.", "了解你的跑道並據此做出決定。", "Financial runway=財務跑道。Extend the runway=延伸跑道。Burn rate=消耗率。", "financial runway=財務跑道/extend the runway=延伸跑道/burn rate=消耗率/short runway=短跑道", "She kept eighteen months of runway at all times. Not from fear but from freedom—the freedom to make decisions based on what was right rather than what was urgent. Runway is the oxygen of good decision-making.", "商業,金融,激勵"],
["scale", "skeɪl", "v.", "擴大規模", "Scale the things that work before searching for new things to try.", "在尋找新的嘗試之前先擴大有效的東西。", "Scale up=擴大規模。Scalable=可擴展的。At scale=在大規模下。", "scale up=擴大規模/scalable=可擴展的/at scale=在大規模下/scale down=縮小規模", "She had found the thing that worked. The temptation was to find more things. She resisted and scaled the working thing instead. Five years later it was twenty times bigger. Discipline to scale the known beat curiosity to explore the new.", "商業,激勵"],
["traction", "ˈtrækʃən", "n.", "進展", "Traction means customers are returning without being pushed to.", "牽引力意味著客戶在沒有被推動的情況下回來了。", "Gain traction=獲得進展。Market traction=市場進展。Early traction=早期進展。", "gain traction=獲得進展/market traction=市場進展/early traction=早期進展/proof of traction=進展證明", "The first signs of traction were subtle—a customer who returned unprompted a referral from someone she hadn't asked. She recognized it immediately. Traction is the market whispering: keep going you are solving a real problem.", "商業,激勵"],
["turnaround", "ˈtɜːrnəˌraʊnd", "n.", "扭轉", "Every turnaround starts with honest diagnosis before optimistic action.", "每次扭轉都從誠實的診斷開始，然後才是樂觀的行動。", "Business turnaround=業務扭轉。Turnaround time=週轉時間。Lead a turnaround=領導扭轉。", "business turnaround=業務扭轉/turnaround time=週轉時間/lead a turnaround=領導扭轉/rapid turnaround=快速扭轉", "She inherited a failing division. Her first month was entirely diagnostic—no changes just observation. Her second month targeted the three root causes she had identified. The turnaround took six months and was complete.", "商業,職場,激勵"],
["workflow", "ˈwɜːrkfloʊ", "n.", "工作流程", "An optimized workflow makes excellence easier than mediocrity was before.", "優化的工作流程使卓越比以前的平庸更容易實現。", "Streamline workflow=精簡工作流程。Workflow automation=工作流程自動化。Optimize workflow=優化工作流程。", "streamline workflow=精簡工作流程/workflow automation=工作流程自動化/optimize workflow=優化工作流程/design a workflow=設計工作流程", "She spent one week mapping and another week optimizing her team's workflow. The same people with a better process produced thirty percent more output. The constraint had never been talent—it had been friction.", "職場,科技,商業"],
["accountable", "əˈkaʊntəbəl", "adj.", "負責任的", "She held herself accountable for outcomes, not just effort.", "她為結果而非僅僅為努力承擔責任。", "Account+able→能夠被計算在內→負責任的。", "hold accountable=追究責任/be accountable for=為…負責/accountability culture=問責文化", "He blamed external factors for every failure. She took responsibility. The gap between them grew wider every year.", "職場,個人成長,激勵"],
["acquire", "əˈkwaɪər", "v.", "獲得；習得", "She acquired three new clients through networking events.", "她通過人際活動獲得了三位新客戶。", "Ac+quire→主動去尋求並得到。", "acquire skills=習得技能/acquire knowledge=獲取知識/newly acquired=新獲得的", "He had acquired the habit slowly, without noticing. One day he looked back and saw how far it had taken him.", "職場,個人成長,商業"],
["ambition", "æmˈbɪʃən", "n.", "抱負；野心", "Her ambition is to lead a team that shapes public policy.", "她的抱負是領導一個制定公共政策的團隊。", "Ambit+ion→超出現有範圍的渴望。", "have ambition=有野心/burning ambition=強烈的抱負/ambition without action=空有抱負", "She had ambition but kept it quiet for years. Then someone asked. She told them. They became her mentor. Share what you want.", "職場,個人成長,激勵"],
["appeal", "əˈpiːl", "v./n.", "吸引；上訴", "The new product appealed to a younger audience.", "新產品對年輕受眾有吸引力。", "Ap+peal→向人呼喊尋求回應→吸引。", "appeal to=吸引/launch an appeal=發起募款/on appeal=上訴中", "The campaign appealed to values, not features. Sales tripled. People don't buy products—they buy identity.", "商業,行銷,法律"],
["authentic", "ɔːˈθɛntɪk", "adj.", "真實的；可信的", "Customers can detect authentic brands from fake ones.", "客戶能夠辨別真實品牌和虛假品牌。", "Author+entic→像作者親自創作→真實的。", "authentic leadership=真實的領導力/authentic brand=真實品牌/stay authentic=保持真實", "She stopped performing confidence and started being honest about what she didn't know. People trusted her more.", "商業,個人成長,社交"],
["credible", "ˈkrɛdɪbəl", "adj.", "可信的；有說服力的", "She built a credible reputation through years of consistent work.", "她通過多年持續的工作建立了可信的聲譽。", "Cred+ible→值得被相信的→可信的。", "credible source=可信來源/credible plan=可信的計劃/establish credibility=建立信譽", "He cited sources in every presentation. It slowed him down and gained him trust. Credibility is built in the details.", "商業,溝通,個人成長"],
["culture", "ˈkʌltʃər", "n.", "文化；培養", "Company culture is built by what you tolerate, not what you proclaim.", "公司文化是由你所容忍的行為決定的，而不是你所宣告的。", "Cult+ure→精心耕種的→文化。", "corporate culture=企業文化/culture fit=文化契合/build a culture=建立文化", "She had heard a hundred company value statements. None matched what she observed. Culture is what people do when no one is watching.", "商業,社會,管理"],
["dedicate", "ˈdɛdɪkeɪt", "v.", "投身於；奉獻", "She dedicated five years to building expertise in her niche.", "她用了五年時間建立她在利基領域的專業知識。", "Dedic+ate→把自己奉獻出去→投身於。", "dedicate to=投身於/dedicated worker=敬業員工/fully dedicated=完全投入", "He wasn't the most talented. But he dedicated more hours than anyone. After ten years, people called it talent. It was effort.", "職場,個人成長,激勵"],
["discipline", "ˈdɪsɪplɪn", "n./v.", "紀律；訓練", "Discipline is what bridges the gap between goals and achievement.", "紀律是連接目標和成就之間的橋樑。", "Disciple+ine→遵從訓練的狀態→紀律。", "self-discipline=自律/maintain discipline=保持紀律/discipline yourself=訓練自己", "She didn't have motivation every day. She had discipline. Discipline shows up even when motivation doesn't.", "個人成長,激勵,習慣"],
["impact", "ˈɪmpækt", "n./v.", "影響；衝擊", "She focused on high-impact work rather than high-volume work.", "她專注於高影響力的工作，而不是高數量的工作。", "Im+pact→強力打進去→衝擊和影響。", "have an impact=產生影響/positive impact=正面影響/impact assessment=影響評估", "She stopped measuring hours worked and started measuring impact created. The second metric rewarded value, not effort.", "商業,個人成長,激勵"],
["partnership", "ˈpɑːrtnərʃɪp", "n.", "合夥關係", "Their partnership combined her vision with his execution skills.", "他們的夥伴關係結合了她的願景和他的執行技能。", "Partner+ship→合夥關係。", "build a partnership=建立夥伴關係/strategic partnership=策略夥伴關係/long-term partnership=長期夥伴關係", "She had tried to do everything alone for years. When she found the right partner, the whole operation doubled.", "商業,社交,個人成長"],
["proactive", "proʊˈæktɪv", "adj.", "主動的；積極的", "She took a proactive approach to risk management.", "她對風險管理採取了積極主動的方法。", "Pro+active→提前採取行動→主動的。", "be proactive=積極主動/proactive approach=主動的方法/proactive communication=主動溝通", "She answered questions before they were asked. Proactive people don't create urgency—they prevent it.", "職場,管理,個人成長"],
["resilient", "rɪˈzɪliənt", "adj.", "有韌性的；快速恢復的", "She was resilient in the face of repeated rejection.", "她面對反覆的拒絕表現出了韌性。", "Resili+ent→像彈簧一樣彈回來→有韌性的。", "resilient mindset=有韌性的心態/build resilience=建立韌性/emotionally resilient=情緒上有韌性的", "She fell five times in two years. The rises were faster each time. Resilience improves with practice.", "個人成長,激勵,心理"],
["versatile", "ˈvɜːrsətaɪl", "adj.", "多才多藝的；萬用的", "She was versatile enough to lead both creative and technical teams.", "她足夠多才多藝，能夠同時領導創意和技術團隊。", "Vers+atile→能夠轉向各種方向→多才多藝的。", "versatile skill set=多樣技能組合/versatile approach=靈活的方法/highly versatile=非常靈活", "He was not the best at any single thing. But he was good at many and great at combining them. That made him rare.", "職場,個人成長,激勵"],
["accelerate", "əkˈsɛləreɪt", "v.", "加速", "They accelerated the timeline after securing additional funding.", "在獲得額外資金後，他們加快了時間表。", "Ac+celerate→讓速度加快→加速。", "accelerate growth=加速增長/accelerate change=加速變化/accelerated learning=加速學習", "When conditions aligned, she accelerated. She had been building capacity for this moment. Opportunity favors the prepared.", "商業,個人成長,激勵"],
["anticipate", "ænˈtɪsɪpeɪt", "v.", "預期；預見", "She anticipated customer objections and prepared responses in advance.", "她預見了客戶的反對意見並提前準備了回應。", "Anti+cipate→提前抓住→預期。", "anticipate problems=預見問題/anticipate needs=預見需求/highly anticipated=備受期待", "He anticipated the question before it was asked. He had the answer ready. That's what preparation looks like to an audience.", "商業,溝通,個人成長"],
["articulate", "ɑːrˈtɪkjuleɪt", "v./adj.", "清楚表達；口齒清晰的", "She articulated her idea so clearly that the board approved it immediately.", "她把自己的想法表達得如此清楚，董事會立即批准了。", "Artic+ulate→把想法的各個關節連起來→清楚表達。", "articulate clearly=清楚表達/well-articulated=表達清晰的/articulate your thoughts=表達你的想法", "He knew the answer. But he couldn't articulate it. So he spent a year writing. Now the words came with the ideas.", "溝通,職場,個人成長"],
["campaign", "kæmˈpeɪn", "n.", "活動；競選", "The marketing campaign generated five times its cost in revenue.", "市場行銷活動產生了五倍成本的收入。", "Camp+aign→像軍營一樣有組織的行動→活動。", "launch a campaign=發起活動/marketing campaign=行銷活動/election campaign=競選活動", "They built the campaign around one story, not many features. It went viral. Story always wins over specifications.", "商業,行銷,政治"],
["component", "kəmˈpoʊnənt", "n.", "組成部分；零件", "Every component of the strategy needed to align.", "策略的每個組成部分都需要對齊。", "Com+ponent→放在一起的各個部分→組成部分。", "key component=關鍵組成/component parts=各個組件/missing component=缺少的組件", "She mapped every component of the customer journey. When she found the broken one, everything made sense.", "商業,技術,教育"],
["criterion", "kraɪˈtɪəriən", "n.", "標準；準則（單數）", "The main criterion for selection was demonstrated impact.", "評選的主要標準是已展示的影響力。", "Crit+erion→用來判斷的標準（單數形式）。", "key criterion=關鍵標準/main criterion=主要標準/meet the criterion=符合標準", "She applied one criterion to every major decision: will I regret not doing this? It simplified everything.", "商業,個人成長,教育"],
["dedicated", "ˈdɛdɪkeɪtɪd", "adj.", "專注的；敬業的", "She was the most dedicated person on the team and it showed.", "她是團隊中最敬業的人，這一點顯而易見。", "Dedicate+d→已經奉獻出去的→敬業的。", "dedicated employee=敬業員工/dedicated server=專用伺服器/dedicated effort=專注的努力", "He wasn't flashy. He was dedicated. Years later, he was the standard everyone else measured themselves against.", "職場,個人成長,激勵"],
["derive", "dɪˈraɪv", "v.", "獲得；衍生自", "She derived great meaning from her volunteer work.", "她從志願工作中獲得了巨大的意義。", "De+rive(河流)→從源頭流出→衍生、獲得。", "derive satisfaction=獲得滿足感/derive value=獲取價值/derive from=衍生自", "He had derived his identity from his job for years. When the job ended, he had to find himself again. That was the gift.", "個人成長,心理,職場"],
["dominant", "ˈdɒmɪnənt", "adj.", "主導的；占主要地位的", "They became the dominant player in the market within five years.", "他們在五年內成為市場上的主導玩家。", "Domin+ant→主宰的位置→主導的。", "dominant position=主導地位/dominant brand=主導品牌/dominant strategy=主導策略", "She was dominant but not domineering. The difference was collaboration. You can lead without occupying all the space.", "商業,管理,個人成長"],
["efficiency", "ɪˈfɪʃənsi", "n.", "效率；效能", "She was obsessed with efficiency but never at the cost of quality.", "她癡迷於效率，但從不以犧牲品質為代價。", "Efficient+cy→以最小投入達到最大產出的狀態→效率。", "operational efficiency=運營效率/improve efficiency=提升效率/energy efficiency=能源效率", "He measured everything in time. She measured it in outcomes. Her efficiency looked different—slower but better.", "商業,職場,個人成長"],
["eliminate", "ɪˈlɪmɪneɪt", "v.", "消除；淘汰", "She eliminated three unnecessary steps from the process.", "她從流程中消除了三個不必要的步驟。", "E+limin+ate→從門口推出去→消除。", "eliminate waste=消除浪費/eliminate barriers=消除障礙/eliminate options=淘汰選項", "He spent a week listing what to eliminate, not what to add. The team was more productive immediately. Less is more.", "商業,職場,個人成長"],
["empower", "ɪmˈpaʊər", "v.", "賦權；使能夠", "She empowered her team to make decisions without approval.", "她授權她的團隊在無需批准的情況下做決定。", "Em+power→把力量放進去→賦予力量。", "empower employees=賦權員工/feel empowered=感到有能力/empower communities=賦權社區", "He had always needed permission. Then someone empowered him to decide. He became a different person by lunchtime.", "職場,管理,個人成長"],

a: [
["articulate", "ɑːrˈtɪkjuleɪt", "v./adj.", "清晰表達；口齒伶俐的", "She articulated her position clearly and persuasively.", "她清晰且有說服力地表達了她的立場。", "Articulation = 表達（名詞）。Well-articulated = 表達清晰的。", "well-articulated=表達清晰/inarticulate=表達不清/articulate your thoughts=表達想法", "The young lawyer was nervous, but when she started speaking, the room fell silent. Her ability to articulate complex ideas simply was her greatest power.", "職場,溝通"],
["ambiguous", "æmˈbɪɡjuəs", "adj.", "模糊的；含義不清的", "Avoid ambiguous instructions — be specific and clear always.", "避免模糊的指示——要始終具體和清晰。", "Ambiguity = 模糊性（名詞）。Remove ambiguity = 消除模糊。", "ambiguity=模糊性/remove ambiguity=消除模糊/morally ambiguous=道德上模糊的", "The project failed not because the goal was wrong — but because it was ambiguous. Everyone interpreted it differently. Remove ambiguity before you begin.", "職場,溝通"],
["analyze", "ˈænəlaɪz", "v.", "深度分析", "Before proposing solutions you must analyze root causes deeply.", "在提出解決方案之前，你必須深入分析根本原因。", "Analysis = 分析（名詞）。Critical analysis = 批判性分析。", "critical analysis=批判性分析/root cause analysis=根本原因分析/analyze thoroughly=徹底分析", "She did not accept the first explanation. She dug three levels deeper to find the real cause. That discipline of deep analysis saved the company from repeating the mistake.", "商業,科學"],
["coherent", "koʊˈhɪərənt", "adj.", "連貫的；有條理的", "A coherent argument is more persuasive than a complex one.", "連貫的論點比複雜的論點更有說服力。", "Coherence = 連貫性（名詞）。Incoherent = 不連貫的（反義）。", "coherence=連貫性/incoherent=不連貫/logically coherent=邏輯連貫/coherent strategy=連貫策略", "The report had excellent data but no coherent narrative. She spent three days restructuring — not the data, just the story. The board said yes immediately. Narrative is power.", "職場,溝通"],
["compelling", "kəmˈpɛlɪŋ", "adj.", "令人信服的；引人注目的", "A compelling argument changes how people see the world.", "令人信服的論點改變人們看待世界的方式。", "Compelling evidence = 有力證據。Compelling story = 引人入勝的故事。", "compelling argument=有力論點/compelling evidence=有力證據/compelling story=引人入勝的故事", "Her pitch was so compelling that investors did not just fund her — they asked to be involved. A great story creates momentum that data alone never can.", "商業,溝通"],
["contemplate", "ˈkɒntɛmpleɪt", "v.", "深思；考慮", "Before acting contemplate the consequences of your choices.", "在行動之前，深思你選擇的後果。", "Contemplation = 沉思（名詞）。Contemplative = 沉思的。", "contemplation=沉思/contemplative=沉思的/contemplate options=考慮選項", "He took three days to contemplate the offer. His friends thought he was overthinking. He was not. When he accepted, he had already played out every scenario. Slow decisions beat fast regrets.", "哲學,生活"],
["conviction", "kənˈvɪkʃən", "n.", "信念；定罪", "Act with conviction and others will follow your lead.", "以信念行動，其他人將跟隨你的引領。", "Deep conviction = 深刻信念。Conviction in beliefs = 對信念的確信。", "deep conviction=深刻信念/act with conviction=以信念行動/strength of conviction=信念的力量", "She had no money, no connections, and no guarantee of success. What she had was conviction. That alone convinced the first investor. Conviction is contagious.", "激勵,商業,哲學"],
["discern", "dɪˈsɜːrn", "v.", "辨別；洞察", "Leaders must discern what is important from what is urgent.", "領導者必須辨別什麼是重要的，什麼是緊急的。", "Discernment = 辨別力（名詞）。Discerning = 有洞察力的。", "discernment=辨別力/discerning=有洞察力的/discern patterns=辨別模式", "The data showed many signals. She discerned the three that mattered. Her team acted on those three alone. Six months later, she had been right about all of them.", "商業,哲學"],
["dilemma", "dɪˈlɛmə", "n.", "兩難；困境", "Every great moral story begins with an impossible dilemma.", "每一個偉大的道德故事都始於一個不可能的兩難困境。", "Ethical dilemma = 道德困境。Face a dilemma = 面對兩難。", "ethical dilemma=道德困境/face a dilemma=面對兩難/resolve a dilemma=解決困境", "She faced a dilemma: reveal the mistake and lose the client, or stay silent and keep the contract. She revealed it. The client respected her integrity and stayed.", "哲學,職場"],
["empirical", "ɪmˈpɪrɪkl", "adj.", "基於實證的", "Good policy must be based on empirical evidence not ideology.", "好的政策必須基於實證，而非意識形態。", "Empirically = 以實證的方式。Empirical research = 實證研究。", "empirical research=實證研究/empirically proven=有實證的/evidence-based=基於證據/empirical data=實證數據", "For years, the practice was dismissed as folk wisdom. Then empirical research confirmed what people had known for generations. Science catches up to lived experience.", "科學,社會"],
["eloquent", "ˈɛləkwənt", "adj.", "雄辯的；表達流暢的", "An eloquent speaker makes complex ideas feel simple and clear.", "雄辯的演說者使複雜的想法感覺簡單明了。", "Eloquence = 雄辯（名詞）。Eloquently = 雄辯地。", "eloquence=雄辯/speak eloquently=雄辯地說/eloquent prose=流暢的散文", "She was not born eloquent. She prepared every speech for 50 hours. By the time she stood up, the words flowed naturally. Eloquence is prepared, not inherited.", "溝通,教育"],
["ethical", "ˈɛθɪkl", "adj.", "符合道德的", "All long-term success depends on ethical foundations.", "所有長期的成功都依賴於道德基礎。", "Ethics = 道德（名詞）。Unethical = 不道德的。Business ethics = 商業道德。", "ethics=道德/unethical=不道德的/business ethics=商業道德/ethical dilemma=道德困境", "When the shortcut would have been profitable, she chose the ethical path. It cost her that quarter. It built her reputation for a decade. Ethics is a long-term investment.", "商業,哲學"],
["inevitable", "ɪnˈɛvɪtəbl", "adj.", "不可避免的", "Change is inevitable — your response to it is your choice.", "變化是不可避免的——你對它的反應是你的選擇。", "Inevitably = 不可避免地。Unavoidable = 無法避免的。", "inevitably=不可避免地/unavoidable=無法避免的/inevitable change=不可避免的變化/seems inevitable=似乎不可避免", "Is failure inevitable? the student asked. No, said the professor. But growth is impossible without it. That reframe changed how the entire class thought about risk.", "哲學,教育"],
["nuance", "ˈnjuːɑːns", "n.", "細微差別", "The best communicators are masters of nuance and tone.", "最好的溝通者是細微差別和語氣的大師。", "Nuanced = 細緻入微的。Miss the nuance = 錯過細微之處。", "nuanced=細緻入微/miss the nuance=錯過細節/cultural nuance=文化差異/subtle nuance=微妙差別", "The diplomat had studied not just the language but its nuances — the pauses, the tone shifts. That sensitivity helped her close negotiations that others could not.", "溝通,文化"],
["paradigm", "ˈpærədaɪm", "n.", "典範；範式", "Every major breakthrough challenges an existing paradigm.", "每一個重大突破都挑戰著現有的典範。", "Paradigm shift = 典範轉移。Challenge the paradigm = 挑戰既有模式。", "paradigm shift=典範轉移/challenge the paradigm=挑戰既有觀念/new paradigm=新典範/old paradigm=舊模式", "The old paradigm said workers needed to be in offices to be productive. The pandemic shattered it. A new paradigm is now being built from evidence, not assumption.", "科學,社會,商業"],
["perspective", "pərˈspɛktɪv", "n.", "觀點；看法；視角", "Changing your perspective changes the problem you are looking at.", "改變你的視角改變了你所看到的問題。", "From a different perspective = 從不同角度。Gain perspective = 獲得觀點。", "from a different perspective=從不同角度/gain perspective=獲得觀點/shift perspective=轉換觀點/broad perspective=廣泛視角", "She brought in an outsider to review the project. Within one hour, the outsider spotted what the team had been blind to for months. Fresh perspective is invaluable.", "哲學,商業"],
["pragmatic", "præɡˈmætɪk", "adj.", "務實的；實際的", "Be idealistic about goals but pragmatic about methods.", "對目標要有理想，對方法要務實。", "Pragmatism = 實用主義（名詞）。Pragmatically = 務實地。", "pragmatism=實用主義/pragmatically=務實地/pragmatic approach=務實方法/idealistic=理想主義的", "She was idealistic about the mission but pragmatic about execution. That rare combination — knowing the why and being flexible about the how — made her extraordinary.", "哲學,職場"],
["profound", "prəˈfaʊnd", "adj.", "深刻的；深遠的", "The most profound lessons come from the hardest experiences.", "最深刻的教訓來自最艱難的經歷。", "Profoundly = 深刻地。Profound impact = 深遠影響。", "profoundly=深刻地/profound impact=深遠影響/profound insight=深刻洞見/profound change=深刻變化", "The book changed one chapter at a time. By the last page, she had a profound shift in how she saw the world. Some books do not inform you — they transform you.", "哲學,教育"],
["resilient", "rɪˈzɪlɪənt", "adj.", "有韌性的；有恢復力的", "Resilient people do not avoid hardship — they grow through it.", "有韌性的人不迴避艱難——他們通過艱難成長。", "Resilience = 韌性（名詞）。Build resilience = 建立韌性。", "resilience=韌性/build resilience=建立韌性/mental resilience=心理韌性/bounce back=恢復", "She was knocked down three times before she succeeded. Each time she asked: What is this teaching me? That question is what made her resilient. Failure is tuition.", "心理,激勵"],
["rhetoric", "ˈrɛtərɪk", "n.", "修辭；言辭", "Empty rhetoric loses to honest simplicity every time.", "空洞的言辭每次都輸給誠實的簡單。", "Rhetorical question = 修辭問題。Political rhetoric = 政治言辭。", "rhetorical question=反問/political rhetoric=政治言辭/empty rhetoric=空洞言辭/powerful rhetoric=有力言辭", "The voters were tired of rhetoric without results. The candidate who spoke plainly about real problems won by a landslide. Substance always outlasts style.", "社會,溝通"],
["scrutinize", "ˈskruːtɪnaɪz", "v.", "仔細審查；細察", "Scrutinize every assumption before committing to a plan.", "在承諾一個計劃之前，仔細審查每一個假設。", "Scrutiny = 審查（名詞）。Under scrutiny = 在審查之下。", "scrutiny=審查/under scrutiny=在審查之下/close scrutiny=仔細審查/withstand scrutiny=經得起審查", "She scrutinized the contract clause by clause. Her lawyer thought she was paranoid. That one scrutinized clause saved her company from a disastrous obligation.", "商業,法律"],
["sophisticated", "səˈfɪstɪkeɪtɪd", "adj.", "複雜的；精緻的；老練的", "Sophisticated problems require sophisticated thinking and patience.", "複雜的問題需要複雜的思考和耐心。", "Sophistication = 精緻（名詞）。Unsophisticated = 不精緻的（反義）。", "sophistication=精緻/highly sophisticated=高度複雜的/sophisticated approach=複雜的方法", "The solution was elegant precisely because it was simple. Sophistication, she said, is knowing when not to add complexity. The best engineers remove features, not add them.", "科技,商業,哲學"],
["systemic", "sɪˈstɛmɪk", "adj.", "系統性的；體制性的", "Systemic problems require systemic solutions not quick fixes.", "系統性問題需要系統性解決方案，而不是快速修復。", "Systematically = 有系統地。System-wide = 系統範圍內的。", "systemic change=系統性改變/systemic problem=系統性問題/address systemically=系統性處理/root cause=根本原因", "The engineer kept fixing the same machine. A colleague asked: What if the problem is systemic — not the machine, but the process? It was. One question saved millions.", "社會,商業,科學"],
["tenacious", "tɪˈneɪʃəs", "adj.", "頑強的；堅持不懈的", "The most tenacious people are not fearless — they are determined.", "最頑強的人不是無畏的——他們是有決心的。", "Tenacity = 頑強（名詞）。Tenaciously = 頑強地。", "tenacity=頑強/tenaciously=頑強地/tenacious spirit=頑強的精神", "She was rejected 50 times before her first yes. Some called it stubbornness. She called it belief. Tenacity is what separates those who make it from those who almost did.", "激勵,商業"],
["transparent", "trænsˈpærənt", "adj.", "透明的；坦誠的", "Transparent communication builds faster and deeper trust.", "透明的溝通建立更快更深的信任。", "Transparency = 透明度（名詞）。Be transparent about = 對...保持透明。", "transparency=透明度/be transparent about=坦誠地/radical transparency=極度透明/lack of transparency=缺乏透明度", "She told her team exactly why every decision was made, even when it was not her choice. People felt respected. Transparency is the fastest trust-building tool available.", "職場,溝通"],
["unprecedented", "ʌnˈprɛsɪdɛntɪd", "adj.", "前所未有的；空前的", "This unprecedented situation requires unprecedented creativity.", "這種前所未有的情況需要前所未有的創造力。", "An unprecedented level = 前所未有的程度。Face unprecedented challenges = 面對前所未有的挑戰。", "unprecedented level=前所未有的程度/historically unprecedented=歷史上前所未有/face unprecedented challenges=面對空前挑戰", "The crisis was unprecedented. No playbook existed. She gathered her team and said: We write the playbook now. What we decide this week will define the company for decades.", "商業,社會"],
["versatile", "ˈvɜːrsətaɪl", "adj.", "多才多藝的；多用途的", "The most valuable employees are versatile generalists who specialize.", "最有價值的員工是專精於一事的多面手。", "Versatility = 多才多藝（名詞）。Versatile skill set = 多樣化技能組合。", "versatility=多才多藝/versatile skill set=多樣化技能/jack of all trades=萬事通", "She could design, code, and present. Each skill amplified the others. Her versatility made her not just employable but irreplaceable.", "職場,激勵"],
["vulnerable", "ˈvʌlnərəbl", "adj.", "脆弱的；易受傷的", "True connection requires being vulnerable with another person.", "真正的連結需要對另一個人展示脆弱。", "Vulnerability = 脆弱（名詞）。Make vulnerable = 使脆弱。", "vulnerability=脆弱/show vulnerability=展示脆弱/emotionally vulnerable=情感脆弱/strength in vulnerability=脆弱中的力量", "She shared her failures at the all-hands meeting. The room went silent, then erupted in applause. Her vulnerability gave everyone else permission to be human. Leadership is not armor.", "職場,心理,社會"],
["wisdom", "ˈwɪzdəm", "n.", "智慧", "Knowledge tells you what to do. Wisdom tells you when and why.", "知識告訴你做什麼。智慧告訴你何時以及為什麼。", "Words of wisdom = 智慧語錄。Conventional wisdom = 傳統觀點。", "words of wisdom=智慧語錄/conventional wisdom=傳統觀點/gain wisdom=獲得智慧/wisdom of experience=經驗的智慧", "At 85, she was asked the secret to a good life. Be curious. Be kind. Keep moving. Laugh especially at yourself. Four sentences. A lifetime of wisdom.", "哲學,生活,激勵"],
["analytical", "ˌænəˈlɪtɪkl", "adj.", "分析性的；善於分析的", "Analytical thinking transforms raw data into actionable strategy.", "分析性思維將原始數據轉化為可行策略。", "Analytical framework = 分析框架。Highly analytical = 高度分析性的。Analytical approach = 分析方法。", "analytical framework=分析框架/highly analytical=高度分析性/analytical approach=分析方法/analytical mindset=分析思維", "She developed her analytical framework over twenty years: separate facts from interpretations, test every assumption, quantify uncertainty. That framework made her the most reliable strategic thinker in any room.", "科學,職場,教育"],
["autonomous", "ɔːˈtɒnəməs", "adj.", "自主的；獨立的", "Autonomous decision-making requires deep alignment with values.", "自主決策需要與價值觀深度一致。", "Autonomy = 自主性（名詞）。Autonomous system = 自主系統。Operate autonomously = 自主運作。", "autonomy=自主性/autonomous system=自主系統/operate autonomously=自主運作/semi-autonomous=半自主", "She hired for attitude and values, then gave complete autonomy. Her team made better decisions than she would have made centrally. Trust in autonomous teams is not abdication — it is the highest form of leadership.", "職場,哲學,科技"],
["catalyst", "ˈkætəlɪst", "n.", "催化劑；推動者", "The pandemic was the catalyst for permanent organizational change.", "疫情是永久性組織變革的催化劑。", "Act as a catalyst = 充當催化劑。Catalytic = 催化的。Catalyze change = 催化變革。", "act as a catalyst=充當催化劑/catalytic=催化的/catalyze change=催化變革/economic catalyst=經濟催化劑", "She positioned herself as a catalyst rather than a controller — sparking reactions between people and ideas rather than directing them. Catalysts accelerate what was already possible.", "商業,科學,激勵"],
["circumvent", "ˌsɜːrkəmˈvɛnt", "v.", "規避；繞過", "Creative teams find ways to circumvent unnecessary bureaucracy.", "有創意的團隊找到規避不必要官僚主義的方法。", "Circumvention = 規避（名詞）。Circumvent rules = 規避規則。Circumvent obstacles = 繞過障礙。", "circumvention=規避/circumvent rules=規避規則/circumvent obstacles=繞過障礙/legitimately circumvent=合法規避", "She was careful to distinguish between circumventing harmful obstacles and circumventing necessary safeguards. That distinction — knowing which rules protect and which merely obstruct — was a form of ethical intelligence.", "商業,哲學,社會"],
["consolidate", "kənˈsɒlɪdeɪt", "v.", "整合；鞏固", "Consolidate gains before pushing into new territory.", "在推進到新領域之前先鞏固成果。", "Consolidation = 整合（名詞）。Consolidate power = 鞏固權力。Market consolidation = 市場整合。", "consolidation=整合/consolidate power=鞏固權力/market consolidation=市場整合/consolidate position=鞏固地位", "She knew when to expand and when to consolidate. That judgment — knowing which phase the business was in — separated her from founders who either expanded too early or consolidated too late.", "商業,職場"],
["contradictory", "ˌkɒntrəˈdɪktəri", "adj.", "矛盾的", "The evidence was contradictory, requiring careful analysis.", "證據是矛盾的，需要仔細分析。", "Contradiction = 矛盾（名詞）。Contradictory evidence = 矛盾的證據。Contradict = 反駁（動詞）。", "contradiction=矛盾/contradictory evidence=矛盾證據/internal contradiction=內部矛盾/resolve contradictions=解決矛盾", "The data sets were contradictory. Most analysts chose the data that confirmed their hypothesis. She chose to understand the contradiction. That investigation produced the breakthrough.", "科學,哲學,教育"],
["cultivate", "ˈkʌltɪveɪt", "v.", "培養；耕種", "Cultivate patience — it is the rarest and most useful virtue.", "培養耐心——它是最罕見也最有用的美德。", "Cultivation = 培養（名詞）。Cultivate relationships = 培養關係。Cultivate talent = 培養人才。", "cultivation=培養/cultivate relationships=培養關係/cultivate talent=培養人才/cultivate habits=培養習慣", "She cultivated one important relationship per month with complete attention — no agenda, genuine interest. After a decade, those cultivated relationships were the entire architecture of her success.", "社交,激勵,農業"],
["deliberate", "dɪˈlɪbərɪt", "adj./v.", "刻意的；深思熟慮", "Every choice she made was deliberate — nothing was accidental.", "她做的每一個選擇都是刻意的——沒有什麼是偶然的。", "Deliberate practice = 刻意練習。Deliberation = 深思熟慮（名詞）。Act deliberately = 刻意行動。", "deliberate practice=刻意練習/deliberation=深思熟慮/act deliberately=刻意行動/deliberate choice=刻意選擇", "Research shows that deliberate practice — focused, uncomfortable, with immediate feedback — produces mastery far faster than casual repetition. Ten thousand hours of deliberate practice creates expertise. Ten thousand hours of comfortable practice creates habit.", "教育,科學,激勵"],
["discourse", "ˈdɪskɔːrs", "n.", "話語；論述", "Public discourse shapes culture more than law or policy.", "公共話語比法律或政策更能塑造文化。", "Academic discourse = 學術話語。Public discourse = 公共話語。Discourse analysis = 話語分析。", "academic discourse=學術話語/public discourse=公共話語/discourse analysis=話語分析/shape discourse=塑造話語", "She changed the discourse in her field by asking different questions. Not 'how do we grow faster' but 'how do we grow better.' Different questions produce different answers and ultimately different futures.", "社會,學術,哲學"],
["epistemology", "ɪˌpɪstɪˈmɒlədʒi", "n.", "認識論", "Epistemology asks: how do we know what we think we know?", "認識論問：我們怎麼知道我們以為我們知道的事情？", "Epistemological = 認識論的。Theory of knowledge = 知識理論。Epistemic humility = 認識論謙遜。", "epistemological=認識論的/epistemic humility=認識論謙遜/theory of knowledge=知識理論", "The most dangerous people, she believed, were those who had never considered epistemology — who had never asked 'how do I know this is true?' That question, asked honestly, dismantles certainty and builds wisdom.", "哲學,學術,教育"],
["exacerbate", "ɪɡˈzæsərbeɪt", "v.", "加劇；使惡化", "Poor communication exacerbates every conflict significantly.", "溝通不良會顯著加劇每一個衝突。", "Exacerbation = 加劇（名詞）。Exacerbate a problem = 使問題惡化。Further exacerbate = 進一步加劇。", "exacerbation=加劇/exacerbate a problem=使問題惡化/further exacerbate=進一步加劇", "She watched the manager's response exacerbate the team's anxiety rather than calm it. She noted: in crises, leaders must be aware that their emotional state amplifies through every person they lead.", "溝通,職場,社會"],
["ideology", "ˌaɪdiˈɒlədʒi", "n.", "意識形態", "Rigid ideology prevents you from seeing reality clearly.", "僵化的意識形態阻止你清楚地看到現實。", "Political ideology = 政治意識形態。Ideological = 意識形態的。Challenge ideology = 挑戰意識形態。", "political ideology=政治意識形態/ideological=意識形態的/challenge ideology=挑戰意識形態/dominant ideology=主流意識形態", "She had principles but no ideology. She would update her views when evidence demanded it. That epistemic flexibility — changing your mind because of evidence, not in spite of it — was her greatest intellectual virtue.", "哲學,政治,社會"],
["implicit", "ɪmˈplɪsɪt", "adj.", "隱性的；暗含的", "Examine your implicit assumptions before they shape your decisions.", "在隱性假設塑造你的決定之前審視它們。", "Implicit bias = 隱性偏見。Implicit trust = 隱性信任。Make implicit explicit = 使隱性變顯性。", "implicit bias=隱性偏見/implicit trust=隱性信任/make implicit explicit=使隱性變顯性/implicit assumption=隱性假設", "She ran annual workshops on implicit bias. Not as a moral exercise but as a practical one. Bias makes bad decisions. Understanding it makes better ones. The business case for self-examination is overwhelming.", "心理,社會,教育"],
["inherent", "ɪnˈhɪərənt", "adj.", "固有的；內在的", "There is an inherent tension between speed and quality.", "速度和品質之間存在固有的張力。", "Inherently = 本質上。Inherent risk = 固有風險。Inherent value = 固有價值。", "inherently=本質上/inherent risk=固有風險/inherent value=固有價值/inherent limitation=固有限制", "She accepted the inherent limitations of her approach rather than pretending they did not exist. Clients trusted her analysis precisely because she always named what her method could not see.", "哲學,商業,科學"],
["innovation", "ˌɪnəˈveɪʃən", "n.", "創新", "True innovation solves a real human problem in a new way.", "真正的創新以新方式解決真實的人類問題。", "Disruptive innovation = 顛覆性創新。Innovation culture = 創新文化。Foster innovation = 培養創新。", "disruptive innovation=顛覆性創新/innovation culture=創新文化/foster innovation=培養創新/incremental innovation=漸進式創新", "The most significant innovations in her industry came not from the largest R&D budgets but from the teams with the highest psychological safety. People innovate where they feel safe to fail.", "商業,科技,社會"],
["interdisciplinary", "ˌɪntəˌdɪsɪˈplɪnəri", "adj.", "跨學科的", "The best solutions emerge from interdisciplinary thinking.", "最好的解決方案來自跨學科思維。", "Interdisciplinary approach = 跨學科方法。Cross-disciplinary = 跨學科的。Multidisciplinary = 多學科的。", "interdisciplinary approach=跨學科方法/cross-disciplinary=跨學科/multidisciplinary team=多學科團隊", "She hired outside her field deliberately. The software engineer brought systems thinking to the marketing problem. The artist saw patterns the analysts missed. Interdisciplinary teams solve problems that disciplinary ones cannot see.", "教育,科學,商業"],
["manifestation", "ˌmænɪfɛˈsteɪʃən", "n.", "體現；表現", "Success is the manifestation of daily discipline over years.", "成功是多年日常紀律的體現。", "Manifest = 體現（動詞）。Outward manifestation = 外在表現。Physical manifestation = 物理體現。", "manifest=體現/outward manifestation=外在表現/manifestation of values=價值觀的體現", "She understood that culture is not what companies say but what employees experience. Culture is the lived manifestation of values, not their proclamation. You see it in the small daily behaviors.", "社會,哲學,商業"],
["meticulous", "mɪˈtɪkjʊləs", "adj.", "一絲不苟的；細心的", "Meticulous attention to detail separates good from great work.", "對細節一絲不苟的關注將好的工作與偉大的工作區分開來。", "Meticulously = 一絲不苟地。Meticulous planning = 細心規劃。Meticulous research = 嚴謹研究。", "meticulously=一絲不苟地/meticulous planning=細心規劃/meticulous research=嚴謹研究/meticulous craftsman=精益求精的工匠", "Her meticulous documentation seemed obsessive to colleagues. When the project was acquired, the detailed records reduced due diligence time by 80%. Her meticulousness was not perfectionism — it was foresight.", "職場,教育,商業"],
["narrative", "ˈnærətɪv", "n.", "敘事；故事", "The narrative you tell about your situation shapes your experience.", "你對自己情況的敘事塑造了你的體驗。", "Change the narrative = 改變敘事。Dominant narrative = 主流敘事。Personal narrative = 個人敘事。", "change the narrative=改變敘事/dominant narrative=主流敘事/personal narrative=個人敘事/counter-narrative=反敘事", "She understood that every company crisis is partly a narrative crisis. The facts matter. How they are framed matters more. She was not spinning — she was ensuring the full truth was told in its proper context.", "溝通,社會,商業"],
["ontology", "ɒnˈtɒlədʒi", "n.", "本體論", "Ontology asks: what is the fundamental nature of reality?", "本體論問：現實的基本性質是什麼？", "Ontological = 本體論的。Ontological question = 本體論問題。Social ontology = 社會本體論。", "ontological=本體論的/social ontology=社會本體論/ontological question=本體論問題", "The philosopher asked: 'What do you assume exists as fundamental?' The student thought. Then began questioning assumptions she had never examined. Ontology, she discovered, underpins every other discipline.", "哲學,學術"],
["perpetuate", "pərˈpɛtʃueɪt", "v.", "使持續；延續", "Systems perpetuate the conditions that created them.", "系統會使創造它們的條件持續下去。", "Perpetuation = 延續（名詞）。Perpetuate a myth = 延續神話。Perpetuate inequality = 延續不平等。", "perpetuation=延續/perpetuate a myth=延續神話/perpetuate inequality=延續不平等/perpetuate behavior=延續行為", "She identified how her organization's hiring process perpetuated homogeneity. Not through malice but through inertia. Changing the process changed the outcomes. Systems either perpetuate or transform.", "社會,商業,哲學"],
["philosophical", "ˌfɪləˈsɒfɪkl", "adj.", "哲學的；達觀的", "Philosophical thinking helps you ask better questions.", "哲學思考幫助你提出更好的問題。", "Philosophy = 哲學（名詞）。Philosophically = 從哲學上說。Philosophical approach = 哲學方法。", "philosophy=哲學/philosophically=從哲學上說/philosophical debate=哲學辯論/philosophical question=哲學問題", "The philosophical training she received in university seemed impractical. Twenty years later, it was the most useful education she had — the ability to think clearly about unclear things was invaluable in every domain.", "哲學,教育,學術"],
["polarization", "ˌpoʊlərɪˈzeɪʃən", "n.", "兩極化；極化", "Social polarization makes productive dialogue increasingly rare.", "社會兩極化使富有成效的對話越來越罕見。", "Political polarization = 政治兩極化。Polarizing = 兩極化的（形容詞）。Combat polarization = 對抗兩極化。", "political polarization=政治兩極化/polarizing=兩極化的/combat polarization=對抗兩極化/reduce polarization=減少兩極化", "She made it her practice to have genuine conversations with people whose views differed completely from hers. Not to change their minds. But to understand why intelligent people believed differently. Polarization shrinks in the presence of curiosity.", "社會,政治,溝通"],
["precedent", "ˈprɛsɪdənt", "n.", "先例；先例", "Setting a dangerous precedent now can constrain you for decades.", "現在設定一個危險的先例可能會限制你數十年。", "Set a precedent = 設立先例。Historical precedent = 歷史先例。Without precedent = 無先例。", "set a precedent=設立先例/historical precedent=歷史先例/without precedent=無先例/legal precedent=法律先例", "She refused the special exception, even under pressure, knowing it would set a precedent that would undermine the entire policy. Short-term discomfort. Long-term integrity. Always worth it.", "法律,職場,哲學"],
["preconceived", "ˌpriːkənˈsiːvd", "adj.", "先入為主的", "Preconceived notions prevent you from seeing what is actually there.", "先入為主的觀念阻止你看到實際存在的東西。", "Preconception = 先入觀（名詞）。Preconceived idea = 先入為主的想法。Challenge preconceptions = 挑戰先入觀。", "preconception=先入觀/challenge preconceptions=挑戰先入觀/preconceived idea=先入為主的想法/let go of preconceptions=放棄先入觀", "The researcher entered the field with no preconceived hypothesis. She saw what was there, not what she expected to find. Her paper, grounded in observation rather than assumption, changed the field.", "科學,哲學,教育"],
["proliferate", "prəˈlɪfəreɪt", "v.", "擴散；激增", "Misinformation tends to proliferate faster than correction.", "錯誤信息往往比更正傳播得更快。", "Proliferation = 擴散（名詞）。Rapid proliferation = 快速擴散。Proliferate online = 在線擴散。", "proliferation=擴散/rapid proliferation=快速擴散/nuclear proliferation=核武器擴散/technology proliferation=技術擴散", "Technology proliferates faster than our capacity to understand its implications. That gap — between proliferation and comprehension — is where the most important ethical questions of our time live.", "科技,社會,哲學"],
["reconcile", "ˈrɛkənsaɪl", "v.", "調解；使和解", "Reconcile competing priorities with clear strategic thinking.", "通過清晰的策略思維調解競爭性優先事項。", "Reconciliation = 和解（名詞）。Reconcile accounts = 核對帳目。Reconcile differences = 調解分歧。", "reconciliation=和解/reconcile accounts=核對帳目/reconcile differences=調解分歧/hard to reconcile=難以調解", "The data seemed impossible to reconcile with the theory. But instead of discarding either, she held both in mind simultaneously. That tension eventually produced a synthesis that advanced the entire field.", "科學,哲學,溝通"],
["conjecture", "kənˈdʒɛktʃər", "n.", "推測", "Conjecture clearly labeled is a productive starting point; presented as fact it is dangerous.", "清楚標記的猜想是有效的起點；作為事實呈現是危險的。", "Speculate=推測。Informed conjecture=有根據的推測。Scientific conjecture=科學猜想。", "speculate=推測/informed conjecture=有根據的推測/scientific conjecture=科學猜想/risky conjecture=風險猜想", "She was careful to distinguish her conjectures from her conclusions. That discipline—labeling uncertainty clearly—made her analysis more trustworthy than those of colleagues who presented everything with equal confidence.", "科學,哲學,教育"],
["dialectic", "daɪəˈlɛktɪk", "n.", "辯證法", "Progress often emerges from the dialectic between opposing ideas.", "進步通常從對立想法的辯證中出現。", "Dialectical=辯證的。Hegelian dialectic=黑格爾辯證法。Intellectual dialectic=思想辯證法。", "dialectical=辯證的/Hegelian dialectic=黑格爾辯證法/intellectual dialectic=思想辯證法/productive tension=富有成效的張力", "She structured team discussions as dialectics—presenting opposing views seriously before seeking synthesis. The tension between positions held long enough consistently produced insights neither position contained alone.", "哲學,教育,溝通"],
["dissonance", "ˈdɪsənəns", "n.", "失調", "Cognitive dissonance is a signal—it means two things you believe are in tension.", "認知失調是信號——它意味著你相信的兩件事處於張力中。", "Cognitive dissonance=認知失調。Emotional dissonance=情感失調。Resolve dissonance=解決失調。", "cognitive dissonance=認知失調/emotional dissonance=情感失調/resolve dissonance=解決失調/uncomfortable dissonance=令人不舒服的失調", "She had learned to sit with cognitive dissonance rather than immediately resolving it. The discomfort of holding two contradictory beliefs was often a productive state—the birthplace of a more nuanced understanding.", "哲學,心理,教育"],
["empiricism", "ɛmˈpɪrɪsɪzəm", "n.", "經驗主義", "Empiricism is the discipline of letting evidence change your beliefs.", "經驗主義是讓證據改變你信念的紀律。", "Empiricist=經驗主義者。Empirical=基於經驗的。Radical empiricism=激進的經驗主義。", "empiricist=經驗主義者/empirical evidence=經驗證據/radical empiricism=激進的經驗主義/apply empiricism=應用經驗主義", "She was an empiricist in method if not in formal training: she tested hypotheses collected evidence and updated her beliefs when the evidence demanded it. That discipline made her unusually reliable.", "科學,哲學,教育"],
["heuristic", "hjʊˈrɪstɪk", "n.", "啟發式法則", "A good heuristic gives you the right answer most of the time with a fraction of the effort.", "好的啟發式法則在一小部分的努力下給你大部分的正確答案。", "Heuristic approach=啟發式方法。Mental heuristic=心智啟發法。Apply a heuristic=應用啟發法。", "heuristic approach=啟發式方法/mental heuristic=心智啟發法/apply a heuristic=應用啟發法/practical heuristic=實用啟發法", "She had developed a library of personal heuristics—rough-and-ready rules that gave reliable-enough answers for low-stakes decisions freeing her cognitive resources for the high-stakes ones that deserved careful analysis.", "哲學,科學,教育"],
["hubris", "ˈhjuːbrɪs", "n.", "傲慢", "Hubris precedes most spectacular failures—beware the certainty that success brings.", "傲慢先於大多數壯觀的失敗——要警惕成功帶來的確定性。", "Hubristic=傲慢的。Intellectual hubris=知識傲慢。Guard against hubris=防範傲慢。", "hubristic=傲慢的/intellectual hubris=知識傲慢/unchecked hubris=不受約束的傲慢/guard against hubris=防範傲慢", "She had watched the pattern: a run of success breeds certainty; certainty breeds hubris; hubris produces the overreach that ends the run. She guarded against her own success as carefully as against her own failure.", "哲學,社會,激勵"],
["liminal", "ˈlɪmɪnl", "adj.", "閾限的；過渡的", "The most creative work often happens in liminal states—between what was and what might be.", "最具創意的工作通常發生在閾限狀態——介於過去和可能的未來之間。", "Liminality=閾限性。Liminal space=閾限空間。Liminal experience=閾限體驗。", "liminality=閾限性/liminal space=閾限空間/liminal experience=閾限體驗/threshold state=閾值狀態", "She had learned to be comfortable in liminal spaces—the time between jobs the period after finishing and before starting the next. Those in-between states approached with openness had produced her most important insights.", "哲學,心理,創意"],
["metacognition", "ˌmɛtəkɒɡˈnɪʃən", "n.", "後設認知", "Metacognition—thinking about your thinking—is the foundation of expertise.", "後設認知——思考你的思考——是專業知識的基礎。", "Metacognitive=後設認知的。Develop metacognition=發展後設認知。Apply metacognition=應用後設認知。", "metacognitive=後設認知的/develop metacognition=發展後設認知/apply metacognition=應用後設認知", "She taught metacognition explicitly in her courses—not just how to solve problems but how to notice how you were solving them. Students who developed this habit improved faster and transferred skills more effectively.", "教育,心理,哲學"],
["positionality", "ˌpɒzɪʃəˈnælɪti", "n.", "立場性", "Acknowledging your positionality is not weakness—it is intellectual honesty.", "承認你的立場性不是弱點——它是知識上的誠實。", "Positionality statement=立場聲明。Researcher positionality=研究者立場。Interrogate positionality=審視立場。", "positionality statement=立場聲明/researcher positionality=研究者立場/interrogate positionality=審視立場", "She required her students to write positionality statements before beginning research—not to undermine their work but to make visible how their backgrounds assumptions and identities shaped their questions and interpretations.", "學術,社會,哲學"],
["reification", "ˌriːɪfɪˈkeɪʃən", "n.", "物化", "Reification mistakes abstractions for things—categories for fixed realities.", "物化將抽象誤認為事物——將類別視為固定現實。", "Reify=物化。Conceptual reification=概念物化。Avoid reification=避免物化。", "reify=物化/conceptual reification=概念物化/avoid reification=避免物化/social reification=社會物化", "She was vigilant about reification in her field—the tendency to treat socially constructed categories as natural kinds. Naming the construction didn't dissolve it but it opened space for questioning what the construction served.", "哲學,社會,學術"],
["teleology", "ˌtɛliˈɒlədʒi", "n.", "目的論", "Teleological thinking asks: what is this for? What end is it serving?", "目的論思維問：這是為了什麼？它服務於什麼目的？", "Teleological=目的論的。Teleological argument=目的論論點。Final cause=最終原因。", "teleological=目的論的/teleological argument=目的論論點/final cause=最終原因/purpose-driven=目的驅動的", "She applied teleological thinking to organizational problems: not how is this structured but what is it trying to achieve? The question often revealed that the structure was serving a purpose that had long since become obsolete.", "哲學,商業,教育"],
["weltanschauung", "ˈvɛltənˌʃaʊʊŋ", "n.", "世界觀", "Your Weltanschauung determines which questions you think are worth asking.", "你的世界觀決定了你認為哪些問題值得問。", "World view=世界觀。Comprehensive worldview=全面的世界觀。Challenge your worldview=挑戰你的世界觀。", "world view=世界觀/comprehensive worldview=全面的世界觀/challenge your worldview=挑戰你的世界觀/implicit worldview=隱性世界觀", "She made her Weltanschauung explicit—writing down the fundamental assumptions through which she interpreted experience. Making the implicit explicit allowed her to examine it test it and eventually update parts of it.", "哲學,學術,激勵"],
["subsidiarity", "ˌsʌbsɪˈdɪərɪti", "n.", "輔助性原則", "Subsidiarity means decisions should be made at the lowest effective level.", "輔助性原則意味著決定應該在最低有效層面做出。", "Apply subsidiarity=應用輔助性原則。Subsidiarity principle=輔助性原則。Organizational subsidiarity=組織輔助性。", "apply subsidiarity=應用輔助性原則/subsidiarity principle=輔助性原則/organizational subsidiarity=組織輔助性", "She restructured the organization around subsidiarity—pushing decisions down to the people with the most direct knowledge. Counterintuitively decentralizing decision-making improved both speed and quality simultaneously.", "政治,商業,哲學"],
["semiotics", "ˌsiːmiˈɒtɪks", "n.", "符號學", "Semiotics reveals how meaning is constructed not just conveyed.", "符號學揭示意義是如何被構建的，而不只是如何被傳達的。", "Semiotic=符號的。Semiotic analysis=符號學分析。Cultural semiotics=文化符號學。", "semiotic=符號的/semiotic analysis=符號學分析/cultural semiotics=文化符號學/sign and signifier=符號與能指", "She applied semiotic analysis to her company's communications—not to be academic but to understand what their brand was actually signaling versus what they intended. The gap was illuminating and immediately actionable.", "學術,溝通,哲學"],
["hegemony", "hɪˈdʒɛməni", "n.", "霸權", "Cultural hegemony shapes what questions are considered legitimate to ask.", "文化霸權塑造了被認為合法提問的問題。", "Hegemonic=霸權的。Cultural hegemony=文化霸權。Challenge hegemony=挑戰霸權。", "hegemonic=霸權的/cultural hegemony=文化霸權/challenge hegemony=挑戰霸權/structural hegemony=結構性霸權", "She studied how hegemonic assumptions shaped what her field considered worth researching. By naming those assumptions explicitly she was able to ask questions that the hegemony had made invisible. The questions produced surprising answers.", "社會,政治,學術"],
["acumen", "ˈækjumɛn", "n.", "敏銳；洞察力", "His business acumen allowed him to identify opportunities others missed.", "他的商業敏銳度讓他看到了別人錯過的機會。", "Acu+men→思維尖銳→洞察力。", "business acumen=商業敏銳/financial acumen=財務敏銳/sharp acumen=敏銳的洞察力", "She had no formal training but exceptional acumen. Instinct and observation made her irreplaceable.", "商業,個人成長,學術"],
