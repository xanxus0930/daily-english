<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日英語">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&display=swap" media="print" onload="this.media='all'">
<title>每日英語</title>
<style>
:root {
  --bg:#0f1117; --bg2:#181c25; --bg3:#1f2433;
  --border:#2a2f3d; --border2:#232839;
  --text:#e8eaf0; --t2:#a0a8c0; --t3:#5a6180;
  --green:#4ade80; --gl:rgba(74,222,128,.13); --gb:rgba(74,222,128,.3);
  --amber:#fbbf24; --al:rgba(251,191,36,.13); --ab:rgba(251,191,36,.3);
  --blue:#60a5fa; --bl:rgba(96,165,250,.13); --bb:rgba(96,165,250,.3);
  --red:#f87171; --rl:rgba(248,113,113,.13);
  --r:12px; --r2:8px;
  --sans:'Noto Sans TC',sans-serif; --serif:'Libre Baskerville',serif;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar .logo{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--green);flex:1}
.topbar .day-chip{font-size:11px;background:var(--gl);color:var(--green);border:1px solid var(--gb);padding:3px 10px;border-radius:99px;font-weight:700}
.topbar .xp-chip{font-size:11px;background:var(--al);color:var(--amber);border:1px solid var(--ab);padding:3px 10px;border-radius:99px}
.acc-btn{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:99px;overflow:hidden;font-size:11px}
.acc-btn button{padding:3px 8px;background:none;border:none;color:var(--t3);cursor:pointer;font-family:var(--sans);transition:all .15s}
.acc-btn button.on{background:var(--bl);color:var(--blue)}

/* ── SCREENS ── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(16px + 60px + var(--safe-bot));display:none}
.screen.on{display:block}

/* ── BOTTOM NAV ── */
.bnav{display:flex;align-items:stretch;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);flex-shrink:0}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 2px;background:none;border:none;cursor:pointer;color:var(--t3);font-family:var(--sans);font-size:10px;transition:color .15s}
.nv svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.nv.on{color:var(--green)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.card-hd{padding:14px 16px 0;display:flex;align-items:center;gap:8px}
.card-body{padding:12px 16px 16px}
.card-foot{padding:10px 16px;border-top:1px solid var(--border2);display:flex;gap:8px;flex-wrap:wrap}

/* ── WORD CARD ── */
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.wcard-top{padding:10px 16px 0;display:flex;align-items:center;justify-content:space-between}
.wcard-prog{height:3px;background:var(--bg3);margin:8px 16px 0;border-radius:99px}
.wcard-prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s}
.wcard-body{padding:10px 16px 16px;text-align:center}
.w-en{font-family:var(--serif);font-size:32px;font-style:italic;color:var(--text);margin-bottom:4px}
.w-ph{font-size:13px;color:var(--t3);margin-bottom:6px;letter-spacing:.5px}
.w-pos{display:inline-block;font-size:11px;background:var(--bg3);color:var(--t2);border:1px solid var(--border);border-radius:99px;padding:2px 10px;margin-bottom:10px}
.w-zh{font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px}
.w-ex-wrap{text-align:left;border-left:3px solid var(--green);padding-left:12px;margin-bottom:0}
.w-ex{font-size:14px;color:var(--t2);font-style:italic;line-height:1.6;margin-bottom:3px}
.w-exzh{font-size:12px;color:var(--t3)}
.ex-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.wcard-foot{padding:10px 16px;border-top:1px solid var(--border2);display:flex;gap:8px;flex-wrap:wrap}
.wbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:12px;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);background:var(--bg3);color:var(--t2);transition:all .15s}
.wbtn:active{transform:scale(.96)}
.wbtn.speak{border-color:var(--gb);background:var(--gl);color:var(--green)}
.wbtn.saved{border-color:var(--ab);background:var(--al);color:var(--amber)}
.wnavbtns{display:flex;gap:8px;margin-bottom:12px}
.nbtn{flex:1;padding:10px;border-radius:var(--r2);background:var(--bg2);border:1px solid var(--border);color:var(--t2);cursor:pointer;font-size:13px;font-family:var(--sans);transition:all .15s}
.nbtn:active{background:var(--bg3)}

/* ── TIP CARDS ── */
.tip-card{border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:13px}
.tip-card.amber{background:var(--al);border:1px solid var(--ab)}
.tip-card.green{background:var(--gl);border:1px solid var(--gb)}
.tip-card.blue{background:var(--bl);border:1px solid var(--bb)}
.tip-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;opacity:.6}
.tip-card.amber .tip-lbl{color:var(--amber)}
.tip-card.green .tip-lbl{color:var(--green)}
.tip-card.blue .tip-lbl{color:var(--blue)}

/* ── PHRASES ── */
.phrases-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.ph-chip{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;gap:2px}
.ph-chip span.en{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;font-size:12px;color:var(--t2);transition:all .15s}
.ph-chip span.en:active,.ph-chip span.en.playing{background:var(--gl);color:var(--green);border-color:var(--gb)}
.ph-chip span.zh{font-size:10px;color:var(--amber)}

/* ── STORY CARD ── */
.story-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.story-toggle{width:100%;padding:11px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:var(--sans)}
.story-toggle .left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text)}
.story-toggle .ctags{display:flex;gap:4px}
.story-toggle .ctag{font-size:10px;padding:2px 6px;background:var(--al);color:var(--amber);border-radius:99px}
.story-toggle .arr{color:var(--t3);font-size:11px;transition:transform .2s}
.story-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border2)}
.story-body p{font-size:13px;color:var(--t2);line-height:1.8;margin-top:12px;font-style:italic}

/* ── PRON ── */
.pron-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.pron-hd{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2)}
.pron-hd h4{font-size:13px;font-weight:600;flex:1}
.pron-body{padding:14px 16px}
.pron-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pbtn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg3);color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.pbtn.listen{border-color:var(--bb);background:var(--bl);color:var(--blue)}
.pbtn.rec{border-color:#e879f9;background:rgba(232,121,249,.12);color:#e879f9}
.pbtn.rec.active{animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.score-ring-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.score-ring{width:80px;height:80px;flex-shrink:0}
.score-ring circle{fill:none;stroke-width:7;stroke-linecap:round}
.score-ring .bg{stroke:#2a2f3d}
.score-ring .fg{stroke:var(--green);stroke-dasharray:201;stroke-dashoffset:201;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .8s ease}
.score-num{position:absolute;width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin-left:0}
.score-info{flex:1}
.score-heard{font-size:12px;color:var(--t3);margin-bottom:4px}
.score-tips{font-size:12px;color:var(--t2);line-height:1.6}

/* ── REVIEW ── */
.review-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--green);text-transform:uppercase}
.rev-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}
.rev-en{font-family:var(--serif);font-size:18px;font-style:italic;margin-bottom:4px}
.rev-ph{font-size:11px;color:var(--t3);margin-bottom:4px}
.rev-zh{font-size:14px;font-weight:600;margin-bottom:6px}
.rev-ex{font-size:12px;color:var(--t2);font-style:italic;border-left:2px solid var(--border);padding-left:8px;margin-bottom:6px}
.rev-foot{display:flex;gap:6px}
.rev-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);background:var(--bg3);color:var(--t2)}
.rev-btn.speak{border-color:var(--gb);background:var(--gl);color:var(--green)}
.rev-btn.saved{border-color:var(--ab);background:var(--al);color:var(--amber)}

/* ── QUIZ ── */
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;margin-bottom:12px}
.q-num{font-size:11px;color:var(--t3);margin-bottom:8px}
.q-text{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:16px}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:12px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;font-family:var(--sans);text-align:left;transition:all .15s}
.q-opt:active{transform:scale(.98)}
.q-opt.correct{border-color:var(--gb);background:var(--gl);color:var(--green)}
.q-opt.wrong{border-color:var(--rl);background:var(--rl);color:var(--red)}
.q-fill{width:100%;padding:12px;border-radius:var(--r2);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;font-family:var(--sans);outline:none}
.q-fill:focus{border-color:var(--blue)}
.q-submit{padding:12px 24px;border-radius:var(--r2);background:var(--blue);border:none;color:#0f1117;font-weight:700;cursor:pointer;font-family:var(--sans);font-size:14px;margin-top:10px;width:100%}
.q-feedback{margin-top:12px;padding:12px 14px;border-radius:var(--r2);font-size:13px;line-height:1.6}
.q-feedback.ok{background:var(--gl);border:1px solid var(--gb);color:var(--green)}
.q-feedback.no{background:var(--rl);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.qsave-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:12px;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);background:var(--bg3);color:var(--t2);margin-top:8px;transition:all .15s}
.qsave-btn.saved{border-color:var(--ab);background:var(--al);color:var(--amber)}

/* ── SAVED / FLASHCARD ── */
.saved-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.saved-hd h2{font-size:16px;font-weight:700;flex:1}
.fc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:32px 20px;text-align:center;margin-bottom:14px;min-height:200px;cursor:pointer;position:relative;transition:transform .15s}
.fc-card:active{transform:scale(.98)}
.fc-front .w-en{font-size:40px}
.fc-back .w-zh{font-size:24px}
.fc-hint{font-size:12px;color:var(--t3);margin-top:16px}
.fc-btns{display:flex;gap:8px}
.fc-btn{flex:1;padding:12px;border-radius:var(--r2);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.fc-btn.know{background:var(--gl);color:var(--green)}
.fc-btn.forgot{background:var(--rl);color:var(--red)}
.saved-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px}
.saved-item .info{flex:1}
.saved-item .en{font-family:var(--serif);font-size:17px;font-style:italic}
.saved-item .zh{font-size:12px;color:var(--t3);margin-top:2px}
.saved-item .actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-btn svg{width:14px;height:14px;stroke:var(--t2);fill:none}

/* ── CHAT ── */
.chat-msgs{margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.bubble{max-width:80%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5}
.bubble.ai{background:var(--bg3);border:1px solid var(--border);border-radius:16px 16px 16px 4px;align-self:flex-start}
.bubble.user{background:var(--bl);border:1px solid var(--bb);color:var(--text);border-radius:16px 16px 4px 16px;align-self:flex-end}
.bubble .zh-trans{font-size:11px;color:var(--t3);margin-top:4px}
.chat-hints{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.hint-pill{padding:6px 12px;border-radius:99px;border:1px solid var(--bb);background:var(--bl);color:var(--blue);font-size:12px;cursor:pointer;font-family:var(--sans)}
.chat-inp-row{display:flex;gap:8px;align-items:center}
.chat-inp{flex:1;padding:10px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;font-family:var(--sans);outline:none}
.chat-inp:focus{border-color:var(--blue)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send svg{width:16px;height:16px;stroke:#0f1117;fill:none}
.chat-mic{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-mic svg{width:16px;height:16px;stroke:var(--t2);fill:none}
.chat-mic.active{background:rgba(232,121,249,.15);border-color:#e879f9}
.chat-mic.active svg{stroke:#e879f9}

/* ── SEARCH ── */
.search-inp-wrap{position:relative;margin-bottom:14px}
.search-inp{width:100%;padding:13px 16px 13px 44px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);font-size:16px;color:var(--text);font-family:var(--sans);outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.search-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:8px}
.search-item .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.search-item .en{font-family:var(--serif);font-size:20px;font-style:italic;flex:1}
.search-item .lv-tag{font-size:11px;padding:2px 8px;border-radius:99px}
.search-item .actions{display:flex;gap:6px}
.search-item .s-btn{padding:4px 10px;border-radius:99px;font-size:12px;cursor:pointer;font-family:var(--sans);border:1px solid;background:none;transition:all .15s}
.search-item .ph-line{font-size:12px;color:var(--t3);margin-bottom:3px}
.search-item .zh-line{font-size:16px;font-weight:600;margin-bottom:4px}
.search-item .ex-line{font-size:13px;color:var(--t2);font-style:italic}
.search-item .story-line{font-size:11px;color:var(--t3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border2)}
.search-empty{text-align:center;padding:48px 16px;color:var(--t3)}
.search-empty .icon{font-size:36px;margin-bottom:12px}
.search-empty p{font-size:14px;line-height:1.7}

/* ── PROGRESS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.stat-val{font-size:28px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--t3)}
.lv-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.lv-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.lv-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:12px}
.lv-fill{height:100%;background:var(--green);border-radius:99px;transition:width .5s}
.lv-chips{display:flex;gap:8px}
.lv-chip{flex:1;padding:8px;border-radius:var(--r2);border:1px solid var(--border);text-align:center;font-size:11px}
.lv-chip.active{border-color:var(--gb);background:var(--gl);color:var(--green)}
.lv-chip.locked{opacity:.4}
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cday{aspect-ratio:1;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3)}
.cday.done{background:var(--gl);color:var(--green)}
.cday.today{background:var(--green);color:#0f1117;font-weight:700}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.settings-section h3{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px}
.set-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.set-row label{font-size:13px;color:var(--t2);flex:1}
.set-inp{padding:6px 10px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--sans);font-size:13px}
.set-btn{padding:7px 14px;border-radius:var(--r2);border:1px solid;font-size:12px;cursor:pointer;font-family:var(--sans)}
.set-btn.green{border-color:var(--gb);background:var(--gl);color:var(--green)}
.set-btn.amber{border-color:var(--ab);background:var(--al);color:var(--amber)}
.set-btn.red{border-color:rgba(248,113,113,.4);background:var(--rl);color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── UTIL ── */
.empty-msg{text-align:center;padding:48px 16px;color:var(--t3);font-size:14px;line-height:1.7}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-top:4px}
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Daily English</div>
    <div class="day-chip" id="top-day">Day 1</div>
    <div class="xp-chip">⭐ <span id="xp-num">0</span></div>
    <div class="acc-btn">

<script>
var WORDS = {
b: [
["able", "ˈeɪbl", "adj.", "有能力的", "She is able to speak three languages.", "她能說三種語言。", "be able to = 能夠。Unable = 不能。", "be able to=能夠/unable to=無法/able-bodied=身體健全", "Maria worked hard every day. After two years, she was able to speak English at her interview. Her boss was impressed.", "職場,學習"],
["about", "əˈbaʊt", "prep.", "大約；關於", "This book is about space exploration.", "這本書是關於太空探索的。", "About = 關於或大約。What about = 如何？", "talk about=談論/worry about=擔心/about to=即將/how about=如何", "Tom asked about the new café. His friend said it opens at about 8am. Simple questions start great adventures.", "日常,對話"],
["accept", "əkˈsɛpt", "v.", "接受", "She accepted the job offer without hesitation.", "她毫不猶豫地接受了那份工作。", "Accept = 主動接受。Accept a challenge = 接受挑戰。", "accept an offer=接受邀約/accept responsibility=承擔責任/widely accepted=廣泛認可", "After weeks of interviews, David got the call. He took a deep breath and said, I accept. Deciding was the hardest part.", "職場,商業"],
["accident", "ˈæksɪdənt", "n.", "意外；事故", "Luckily, no one was hurt in the accident.", "幸運的是，沒有人在意外中受傷。", "By accident = 意外地。Traffic accident = 車禍。", "by accident=意外地/car accident=車禍/minor accident=小事故", "Sarah spilled coffee on her laptop by accident. Her data was backed up. Crisis avoided! Always back up your work.", "日常,警示"],
["active", "ˈæktɪv", "adj.", "積極的；活躍的", "He stays active by cycling to work every day.", "他每天騎自行車上班，保持活躍。", "Active lifestyle = 活躍的生活方式。Physically active = 身體活躍的。", "stay active=保持活躍/active lifestyle=積極生活/physically active=身體活躍", "The doctor told Mr. Chen to stay active. He joined a morning walking group. Six months later, he had new friends and better health.", "健康,運動"],
["address", "ˈædrɛs", "n./v.", "地址；處理", "Please send it to my home address.", "請寄到我的住家地址。", "Address a problem = 處理問題。Email address = 電子郵件地址。", "home address=住家地址/email address=電子郵件/address the issue=處理問題", "The CEO stepped on stage to address the employees. Together, she said, we will find solutions. Leadership means showing up.", "職場,商業"],
["adult", "ˈædʌlt", "n./adj.", "成人；成年的", "This film is for adults only.", "這部電影僅限成人觀看。", "Young adult = 青年成人。Adult education = 成人教育。", "young adult=青年成人/adult education=成人教育/become an adult=成年", "When Jake turned 18, he realized being an adult meant paying bills and making tough decisions. Growing up was harder than he imagined.", "日常,生活"],
["advice", "ədˈvaɪs", "n.", "建議", "My grandmother always gives the best life advice.", "我祖母總是給出最好的人生建議。", "Advice 不可數。Give advice = 給建議。Ask for advice = 徵求建議。", "give advice=給建議/take advice=接受建議/ask for advice=徵求建議/follow advice=遵從建議", "Lisa was nervous about her new job. She called her mentor. Just be yourself and ask questions, he said. Best advice she ever received.", "職場,溝通"],
["afraid", "əˈfreɪd", "adj.", "害怕的", "Do not be afraid to make mistakes when learning.", "學習時不要害怕犯錯。", "Be afraid of = 害怕某事物。I am afraid = 恐怕。", "be afraid of=害怕/afraid to ask=不敢問/not afraid=不害怕", "When Amy started learning English, she was afraid of speaking. After months of practice, she raised her hand and answered perfectly. Fear disappeared.", "學習,情感"],
["age", "eɪdʒ", "n./v.", "年齡；老化", "What is the average age of your team members?", "你的團隊成員的平均年齡是幾歲？", "Age group = 年齡群體。Middle age = 中年。Come of age = 成年。", "age group=年齡群體/middle age=中年/come of age=成年/age well=優雅老去", "At 70, she enrolled in her first university course. Age is just a number, she said. She graduated at 73. Never too old to start.", "生活,激勵"],
["agree", "əˈɡriː", "v.", "同意", "I completely agree with your suggestion.", "我完全同意你的建議。", "Agree with = 同意某人。Agree on = 對某事達成一致。", "agree with=同意某人/agree on=就某事同意/strongly agree=強烈同意/disagree=不同意", "At the meeting, both teams finally agreed on a plan. A difficult negotiation was over. Agreement feels like relief.", "職場,商業"],

["opportunity", "ˌɒpəˈtjuːnɪti", "n.", "機會", "Opportunity does not knock twice — open the door fast.", "機會不會敲兩次門——快開門。", "Seize an opportunity = 抓住機會. Golden opportunity = 千載難逢. Miss an opportunity = 錯失機會.", "seize the opportunity=抓住機會/golden opportunity=千載難逢/window of opportunity=機會之窗/equal opportunity=平等機會", "She was rejected from her dream company three times. The fourth time, she walked in with a portfolio solving their biggest problem. They hired her on the spot.", "職場,激勵,商業"],
["order", "ˈɔːrdər", "v./n.", "點餐；命令；秩序", "May I take your order or do you need more time?", "我可以幫您點餐了嗎，還是您需要更多時間？", "In order = 整齊的。Out of order = 故障。Order online = 線上訂購。", "in order=整齊/out of order=故障/place an order=下訂單/order online=線上訂購", "The restaurant was packed. The waiter apologized for the wait. No rush, the customer said. His patience made the waiter relax. Kindness creates better service.", "餐飲,日常,社交"],
["own", "oʊn", "v./adj.", "擁有；自己的", "You must own your mistakes before you can grow from them.", "你必須承認你的錯誤，才能從中成長。", "On your own = 靠自己。Own up = 承認錯誤。Come into your own = 發揮所長。", "on your own=靠自己/own up to=承認/come into your own=發揮所長/homeowner=房屋擁有者", "She started her own business with $500 and a laptop. The day she paid her own bills from her own company, she felt more alive than ever. Owning transforms you.", "商業,激勵,生活"],
["party", "ˈpɑːrti", "n.", "派對；聚會；政黨", "The best parties are the ones with good people not decorations.", "最好的派對是有好朋友的，不是裝飾品。", "Party time = 派對時間。Political party = 政黨。Throw a party = 舉辦派對。", "party time=派對時間/political party=政黨/throw a party=舉辦派對/dinner party=晚宴", "She threw a farewell party for her favorite colleague. Simple food, homemade decorations. But heartfelt speeches made everyone cry. Simple gatherings beat big events.", "社交,日常,情感"],
["pay", "peɪ", "v.", "支付；注意", "It always pays to be honest even when it is hard.", "誠實總是值得的，即使很困難。", "Pay attention = 注意。Pay back = 還錢。Pay it forward = 善意傳遞。", "pay attention=注意/pay back=還錢/pay off=值得/pay it forward=善意傳遞/pay the price=付出代價", "A stranger once paid for her coffee. Ten years later, every Friday, she paid for the person behind her in line. Pay it forward is a beautiful chain reaction.", "日常,社會,激勵"],
["people", "ˈpiːpl", "n.", "人；人們", "The right people in your life can change everything.", "生命中對的人可以改變一切。", "People-watching = 觀察人群。People person = 擅長與人相處的人。Young people = 年輕人。", "people-watching=觀察人群/people person=善交際的人/young people=年輕人/people skills=人際技巧", "She was exceptional with people. She remembered names and made everyone feel valued. That skill took her further than any degree or certificate.", "社交,職場"],
["place", "pleɪs", "n.", "地方；場所", "The best place in the world is wherever you feel at home.", "世界上最好的地方是任何讓你感到像在家的地方。", "Take place = 發生。In place of = 代替。Feel out of place = 感到格格不入。", "take place=發生/in place of=代替/marketplace=市場/birthplace=出生地/feel out of place=格格不入", "She had lived in twelve cities in fifteen years. Eventually, she realized home was not a place — it was a feeling she carried with her everywhere.", "旅遊,哲學,生活"],
["plan", "plæn", "n./v.", "計畫", "Plan your work then work your plan.", "計劃你的工作，然後執行你的計劃。", "Plan ahead = 提前計劃。Game plan = 策略。Back-up plan = 備用計劃。", "plan ahead=提前計劃/game plan=策略/back-up plan=備用計劃/change of plans=計劃有變", "They planned the perfect camping trip. Then it rained for three days. They made a fire and told stories. Ruined plans make the best memories.", "旅遊,日常,激勵"],
["practice", "ˈpræktɪs", "v./n.", "練習；實踐", "Practice is not the thing you do once you are good. It is the thing that makes you good.", "練習不是你好了之後做的事，而是讓你變好的事。", "Practice makes perfect = 熟能生巧。Daily practice = 每日練習。Put into practice = 付諸實踐。", "practice makes perfect=熟能生巧/daily practice=每日練習/put into practice=付諸實踐", "He practiced the speech 50 times before giving it once. His colleagues laughed. On stage, he was flawless. How are you so confident? I am prepared, not confident.", "學習,運動,職場"],
["prepare", "prɪˈpɛr", "v.", "準備", "By failing to prepare you are preparing to fail.", "未能準備，就是準備失敗。", "Preparation = 準備。Well-prepared = 準備充分的。Prepare for the worst = 為最壞情況做準備。", "preparation=準備/well-prepared=準備充分/prepare for the worst=為最壞準備/prepare in advance=提前準備", "She arrived at the negotiation with 30 pages of research and a clear bottom line. Her counterpart had none. She walked out with exactly what she wanted.", "職場,商業"],
["problem", "ˈprɒbləm", "n.", "問題；難題", "Every problem has a solution — sometimes it just takes time.", "每個問題都有解決方案——有時候只需要時間。", "No problem = 沒問題。Problem-solving = 解決問題。Root cause = 根本原因。", "no problem=沒問題/problem-solving=解決問題/root cause=根本原因/tackle a problem=解決問題", "The plumber could not find the leak. He made tea, sat down, and thought differently. In ten minutes, he found it. Stepping back from a problem can solve it faster.", "日常,職場,哲學"],
["protect", "prəˈtɛkt", "v.", "保護；防護", "We must protect the environment for future generations.", "我們必須為後代保護環境。", "Protection = 保護。Protective = 保護的。Environmental protection = 環境保護。", "protection=保護/protective=保護的/self-protection=自我保護/environmental protection=環境保護", "The ranger spent twenty years protecting the national park. He caught poachers and planted trees. When he retired, the forest was three times denser. One person protects so much.", "環境,社會,激勵"],
["question", "ˈkwɛstʃən", "n.", "問題", "There are no stupid questions — only unasked ones.", "沒有愚蠢的問題——只有沒有問出口的問題。", "Ask a question = 提問。Good question = 好問題。Raise a question = 提出問題。", "ask a question=提問/good question=好問題/open question=開放性問題/raise a question=提出問題", "The student was afraid to ask. When she finally raised her hand, three classmates whispered, I was wondering that too. Questions create connection.", "教育,溝通"],
["ready", "ˈrɛdi", "adj.", "準備好的", "Success comes to those who are ready when opportunity knocks.", "成功屬於那些在機會來臨時已做好準備的人。", "Get ready = 做準備. Born ready = 天生準備好的. Ready to go = 準備出發.", "get ready=做準備/born ready=天生準備好的/ready to go=準備出發/ready for anything=隨時準備好", "The scout motto is Be prepared. Not just for bad things, but for opportunities. When the role opened unexpectedly, she was ready. She got the dream job.", "職場,生活,激勵"],
["remember", "rɪˈmɛmbər", "v.", "記得；記住", "Remember that progress is better than perfection.", "記住進步比完美更重要。", "Remind = 提醒。Memorable = 令人難忘的。Remember to vs remember doing = 記得做 vs 記得曾做過.", "remind=提醒/in memory of=紀念/remember to=記得做/memorable=難忘的/worth remembering=值得記住", "The old teacher handed back every student first essay at graduation. I kept them all, she said. Look how far you have come. That moment made everyone cry.", "教育,情感,激勵"],
["restaurant", "ˈrɛstərɒnt", "n.", "餐廳", "The best restaurants are the ones with heart not stars.", "最好的餐廳是有心意的，不是有星星的。", "Fine dining = 精緻餐廳. Fast food restaurant = 快餐廳. Book a table = 訂桌位.", "book a restaurant=訂餐廳/fine dining=精緻餐飲/fast food=快餐/local restaurant=在地餐廳", "The tiny local restaurant had no social media — just great food made with love. Word of mouth kept it full every night for 30 years. Genuine quality is the best marketing.", "飲食,商業"],
["result", "rɪˈzʌlt", "n.", "結果；成果", "The results speak louder than any excuse you can make.", "結果比你能做出的任何藉口都更有說服力。", "As a result = 因此。End result = 最終結果。Get results = 取得成果。", "as a result=因此/end result=最終結果/get results=取得成果/result in=導致", "She did not promise a result. She promised a process. Do the work, she told her team. The results will follow. Three months later, they exceeded all expectations.", "職場,激勵,商業"],
["run", "rʌn", "v.", "跑步；運行；經營", "Run the business like it is your last chance.", "像這是你最後的機會一樣經營業務。", "Run out of = 用完。Run into = 偶遇。In the long run = 從長遠來看。", "run out of=用完/run into=偶遇/in the long run=從長遠看/run a business=經營業務/hit the ground running=快速起步", "She ran her first marathon at 50. Nobody believed she could. At mile 20, something shifted. She crossed the finish line sobbing. I have been running my whole life. Never this far.", "運動,激勵"],
["safe", "seɪf", "adj.", "安全的；安全", "Always make sure your children are safe online.", "始終確保你的孩子在網路上是安全的。", "Play it safe = 保守行事. Safety first = 安全第一. Safe and sound = 安然無恙.", "play it safe=保守行事/safety first=安全第一/safe and sound=安然無恙/on the safe side=以防萬一", "She had always played it safe. Then she decided to take one risk. It did not work out, but she learned more from that one failure than from ten safe choices.", "生活,安全,哲學"],
["save", "seɪv", "v.", "拯救；存；節省", "Save a little every day — it adds up to a lot.", "每天存一點點——積少成多。", "Save money = 存錢. Save time = 節省時間. Lifesaver = 救命恩人.", "save money=存錢/save time=節省時間/lifesaver=救命恩人/save the day=解救局面", "Instead of buying coffee every day, Anna started making it at home. By year end, she had saved enough for a flight to Europe. Small savings create big adventures.", "金融,日常,生活"],
["school", "skuːl", "n.", "學校", "School teaches you facts. Life teaches you wisdom.", "學校教你知識。生活教你智慧。", "Go to school = 上學. Old school = 老派的. School of thought = 思想流派.", "go to school=上學/old school=老派的/school of thought=思想流派/after school=放學後", "He hated school as a kid. Now at 45, he teaches there. Why? Because I remember feeling like I did not belong. I do not want you to feel that.", "教育,社會,激勵"],
["serious", "ˈsɪəriəs", "adj.", "嚴肅的；嚴重的", "Take your health seriously before illness forces you to.", "在疾病強迫你之前認真對待你的健康。", "Dead serious = 非常認真的. Take seriously = 認真對待. Serious condition = 嚴重的病況.", "dead serious=非常認真/take seriously=認真對待/serious business=嚴肅的事/serious condition=嚴重病況", "He said it as a joke. But his colleague took it seriously and implemented the idea. Three months later, it saved the company $200,000. Ideas are free. Taking them seriously is the work.", "職場,健康,溝通"],
["share", "ʃɛr", "v.", "分享", "The joy you share doubles; the pain you share halves.", "你分享的快樂加倍；你分享的痛苦減半。", "Share a meal = 共餐. Market share = 市場份額. Fair share = 公平的份額.", "share a meal=共餐/market share=市場份額/fair share=公平份額/share your story=分享你的故事", "In the hardest months, she started sharing her struggles online. She expected silence. Instead, thousands replied: Me too. Sharing pain multiplies comfort.", "溝通,社交,商業"],
["simple", "ˈsɪmpl", "adj.", "簡單的；樸素的", "Simple living is not a step backward — it is a step forward.", "簡單的生活不是退步——而是進步。", "Simply = 簡單地。Simplify = 簡化。Keep it simple = 保持簡單。", "keep it simple=保持簡單/simplify your life=簡化生活/simple life=簡單生活/simply put=簡單來說", "The best business advice she ever got: If you cannot explain it simply, you do not understand it well enough. She simplified every presentation after that.", "哲學,商業,生活"],
["sleep", "sliːp", "v./n.", "睡覺；睡眠", "Quality sleep is as important as diet and exercise.", "優質睡眠和飲食、運動一樣重要。", "Fall asleep = 入睡. Oversleep = 睡過頭. Beauty sleep = 美容覺.", "fall asleep=入睡/oversleep=睡過頭/beauty sleep=美容覺/sleep on it=睡一覺再決定", "Before every big decision, she followed one rule: sleep on it. Never decide when angry or excited, her mentor said. After a night sleep, answers were always clearer.", "健康,生活,哲學"],
["smile", "smaɪl", "v./n.", "微笑", "A smile is the shortest distance between two people.", "微笑是兩個人之間最短的距離。", "Smile at = 對...微笑. Keep smiling = 保持微笑. Big smile = 燦爛的微笑.", "smile at=對...微笑/keep smiling=保持微笑/big smile=燦爛微笑/smile through pain=強作微笑", "She lost her job, apartment, and relationship in one month. Walking home in the rain, a child waved from a window. She waved back and smiled. Sometimes that is enough.", "情感,社交,激勵"],
["solve", "sɒlv", "v.", "解決；解答", "The best problem-solvers stay calm when others panic.", "最好的問題解決者在別人恐慌時保持冷靜。", "Solution = 解決方案. Solve a puzzle = 解謎. Problem-solver = 問題解決者.", "find a solution=找到解決方案/problem-solver=問題解決者/solve the mystery=解謎/creative solution=創意解法", "For weeks, the engineers could not solve it. Then a summer intern quietly said, What if we tried this? It worked. The best solutions often come from the least expected people.", "職場,科學,激勵"],
["special", "ˈspɛʃəl", "adj.", "特別的；特殊的", "Everyone has something special to offer the world.", "每個人都有特別的東西可以貢獻給世界。", "Specialty = 專長. Special offer = 特別優惠. One of a kind = 獨一無二.", "specialty=專長/special offer=特別優惠/nothing special=沒什麼特別/feel special=感到特別", "The waitress memorized her regular customer order, remembered his wife name, and asked about his kids. Nothing special — just attention. He brought his whole team there every Friday.", "餐飲,服務,社交"],
["spend", "spɛnd", "v.", "花費；花時間", "Spend money on experiences not things.", "把錢花在體驗上，而不是東西上。", "Spend wisely = 明智消費. Spend time = 花時間. Well-spent = 花得值得.", "spend wisely=明智消費/spend time=花時間/well-spent=花得值得/overspend=超支", "She spent her bonus on a trip with her aging parents. Not a car, not furniture. The photos from that trip are now her most treasured possessions.", "金融,家庭,哲學"],
["start", "stɑːrt", "v./n.", "開始", "The hardest part of any journey is the very first start.", "任何旅程中最難的部分是最開始的那一步。", "Fresh start = 全新開始. Start over = 重新開始. Head start = 領先優勢.", "fresh start=全新開始/start over=重新開始/head start=領先優勢/start small=從小做起", "She had failed three businesses. Every failure was data, she said. At her fourth start, she knew exactly what not to do. Experience was her head start.", "商業,激勵"],
["stop", "stɒp", "v.", "停止；阻止", "Do not stop learning — the world is always changing.", "不要停止學習——世界在不斷變化。", "Non-stop = 不停地. Stop and smell the roses = 停下來欣賞生活. Full stop = 句號.", "non-stop=不停地/stop what you are doing=停下來/full stop=句號/bus stop=公車站", "She stopped halfway through her PhD. Not because she failed. Because she asked why she was doing it and could not answer. Stopping bravely is sometimes more courageous.", "哲學,教育,生活"],
["story", "ˈstɔːri", "n.", "故事", "Everyone has a story worth telling and worth hearing.", "每個人都有值得講述和值得傾聽的故事。", "Story-telling = 說故事. Short story = 短篇故事. Side of the story = 一方的說法.", "story-telling=說故事/short story=短篇故事/the whole story=整個故事/success story=成功故事", "The new CEO did not show charts. She told her own story of failure, doubt, and growth. By the end, every person in the room was leaning forward, inspired.", "溝通,激勵"],
["strong", "strɒŋ", "adj.", "強壯的；堅強的", "You are stronger than you think always.", "你總是比你想象的更堅強。", "Strength = 力量. Stay strong = 保持堅強. Inner strength = 內在力量.", "stay strong=保持堅強/inner strength=內在力量/play to your strengths=發揮強項/grow stronger=變得更強", "After her husband left, everyone said, Stay strong. She was tired of hearing it. Real strength was not pretending not to hurt. It was feeling it and continuing anyway.", "情感,心理,激勵"],
["student", "ˈstjuːdənt", "n.", "學生", "The best students never stop being students.", "最好的學生永遠不會停止做學生。", "Student loan = 學生貸款. Exchange student = 交換生. Honor student = 優等生.", "student loan=學生貸款/exchange student=交換生/honor student=優等生/student of life=終身學習者", "He was 72 and sat in the front row of every lecture. Why do you still come? a young student asked. Because I am still a student, he said. That is the best thing to be.", "教育,激勵"],
["study", "ˈstʌdi", "v./n.", "學習；書房", "Study not to pass tests but to understand the world.", "學習不是為了通過考試，而是為了理解世界。", "Study hard = 努力讀書. Study group = 讀書小組. Case study = 案例研究.", "study hard=努力讀書/study group=讀書小組/case study=案例研究/independent study=自主學習", "She studied not because she had to but because every book opened a new world. At 30, knowledge was her power. She became the first in her family with a PhD.", "教育,激勵"],
["success", "səkˈsɛs", "n.", "成功", "True success is doing what you love and helping others.", "真正的成功是做你熱愛的事並幫助他人。", "Successful = 成功的. Succeed = 成功（動詞）. Success story = 成功故事.", "successful=成功的/succeed=成功/success story=成功故事/measure of success=成功的衡量標準", "She defined success not by money but by impact. At 60, she had taught thousands of students. Her students were her success story. Define your own success.", "哲學,生活,激勵"],
["support", "səˈpɔːrt", "v./n.", "支持；支撐", "She supported her team through every difficult moment.", "她在每一個困難時刻支持她的團隊。", "Moral support = 精神支持. Emotional support = 情感支持. Support system = 支持系統.", "moral support=精神支持/emotional support=情感支持/support system=支持系統/show support=表達支持", "When she failed, her mentor did not offer solutions. He offered presence. Just knowing someone believed in her was enough to get her back on her feet.", "職場,心理,社交"],
["sure", "ʃʊər", "adj.", "確定的；確信的", "Make sure you check your work before submitting.", "確保在提交前檢查你的工作。", "Make sure = 確保. For sure = 肯定地. Not sure = 不確定.", "make sure=確保/for sure=肯定地/not sure=不確定/sure thing=當然", "I am not sure I can do this, she said. That is exactly why you should try, her mentor replied. Doubt is not a stop sign. It is a starting point.", "激勵,職場,哲學"],
["surprise", "sərˈpraɪz", "n./v.", "驚喜；使驚訝", "Life is full of wonderful surprises if you stay open.", "如果你保持開放，生活充滿了美妙的驚喜。", "Surprise party = 驚喜派對. Take by surprise = 使措手不及. No surprise = 不意外.", "surprise party=驚喜派對/take by surprise=使措手不及/no surprise=不意外/pleasant surprise=愉快的驚喜", "She had been working in silence for months. Then the announcement came — she had won the award. The genuine surprise on her face won everyone in the room over.", "日常,情感"],
["take", "teɪk", "v.", "拿；帶；需要", "Take one step at a time and you will reach your goal.", "一次邁一步，你就會達到你的目標。", "Take care = 照顧好自己. Take action = 採取行動. Take a chance = 冒險.", "take care=照顧/take action=採取行動/take a chance=冒險/take it easy=放輕鬆/take turns=輪流", "Take it one day at a time, her doctor said. She did. Day 1 was impossible. Day 30 was different. Day 90 changed her life. Small steps are not small — they are everything.", "生活,健康,激勵"],
["talk", "tɔːk", "v.", "說話；談話；演講", "Actions speak louder than words but honest talk builds trust.", "行動勝於言辭，但誠實的溝通建立信任。", "Small talk = 閒聊. Talk show = 脫口秀. Talk things through = 徹底討論.", "small talk=閒聊/talk show=脫口秀/talk things through=徹底討論/give a talk=做演講", "After years of avoiding the issue, the two brothers finally sat down and talked. Three hours of raw honesty later, they hugged for the first time in years.", "溝通,家庭,心理"],
["teach", "tiːtʃ", "v.", "教導", "The best way to learn is to teach someone else.", "學習的最好方式是教別人。", "Teacher = 老師. Teaching = 教學. Teach by example = 以身作則.", "teacher=老師/teaching=教學/self-taught=自學的/teach by example=以身作則/lead by example=以身作則", "She never gave her students answers. She gave them better questions. Twenty years later, her graduates were doctors, engineers, and artists.", "教育,激勵"],
["technology", "tɛkˈnɒlədʒi", "n.", "科技；技術", "Technology is a tool — how we use it defines us.", "科技是一種工具——我們如何使用它定義了我們。", "High-tech = 高科技. Tech company = 科技公司. Technology addiction = 科技成癮.", "high-tech=高科技/tech company=科技公司/cutting-edge technology=尖端技術/technology addiction=科技成癮", "The grandmother learned to video call so she could see her grandchildren abroad. Technology is just love made visible, her granddaughter wrote. She framed it.", "科技,家庭,社會"],
["time", "taɪm", "n.", "時間", "Time is the one thing you can never get back.", "時間是你永遠無法拿回的一樣東西。", "On time = 準時. Free time = 空閒時間. Time flies = 時光飛逝.", "on time=準時/free time=空閒時間/time flies=時光飛逝/quality time=優質時光/in the nick of time=千鈞一髮", "Every Saturday morning, he put away his phone and spent quality time with his daughter. Years later, those were the memories she cherished most. Time given is love.", "家庭,哲學"],
["today", "təˈdeɪ", "adv./n.", "今天", "Do something today that your future self will thank you for.", "今天做一些讓你未來的自己感謝你的事情。", "Today is the day = 今天就是那一天. Today special = 今日特餐.", "today is the day=今天就是那天/make the most of today=充分利用今天/today special=今日特別/seize the day=把握今天", "The best time to plant a tree was 20 years ago. The second best time is today. She planted her tree. It grew. So did she.", "哲學,激勵,日常"],
["together", "təˈɡɛðər", "adv.", "一起；共同", "We are stronger when we work together toward one goal.", "我們朝著一個目標共同努力時更強大。", "Work together = 一起工作. Get it together = 振作起來. All together = 一起.", "work together=一起工作/get it together=振作起來/all together=全部一起/stronger together=團結更有力", "Five strangers were stranded in a snowstorm. By morning, they had dug each other out, shared food, and exchanged numbers. Together, they had survived. Together, they had thrived.", "社交,激勵,社會"],
["travel", "ˈtrævəl", "v./n.", "旅行", "Travel is the only thing you buy that makes you richer.", "旅行是你購買的唯一能讓你變得更富有的東西。", "Travel agency = 旅行社. Travel light = 輕裝旅行. Solo travel = 單獨旅行.", "travel agency=旅行社/travel light=輕裝旅行/solo travel=單獨旅行/travel bug=旅行癮", "She sold her car, rented out her apartment, and traveled alone for a year. Scary? Yes. Worth it? Absolutely. She came back with confidence and clarity about her future.", "旅遊,生活,激勵"],
["try", "traɪ", "v.", "嘗試；努力", "You will never know unless you try.", "除非你嘗試，否則你永遠不會知道。", "Try again = 再試一次. Try your best = 盡力而為. Give it a try = 試試看.", "try again=再試一次/try your best=盡力而為/give it a try=試試看/worth a try=值得一試", "She tried and failed. Then tried again. Then again. On her fifth attempt, she succeeded. I did not fail four times, she said. I learned four times.", "激勵,生活"],
["trust", "trʌst", "v./n.", "信任；相信", "Trust is built in drops but lost in buckets.", "信任是一滴一滴地建立，但一桶桶地失去的。", "Trustworthy = 值得信任的. Trust your gut = 相信直覺. Blind trust = 盲目信任.", "trustworthy=值得信任的/trust your gut=相信直覺/breach of trust=違背信任/earn trust=贏得信任", "She gave the new hire her biggest account. Colleagues were shocked. Two years later, it was the best decision she made. Trust, given first, creates trust in return.", "職場,社交,哲學"],
["truth", "truːθ", "n.", "真相；真理", "The truth may hurt but lies destroy.", "真相可能傷人，但謊言卻毀滅一切。", "Tell the truth = 說實話. Face the truth = 面對真相. The whole truth = 全部真相.", "tell the truth=說實話/face the truth=面對真相/the whole truth=全部真相/truth hurts=真相傷人", "I do not know, the expert said at the conference. Silence fell. Then applause. In a room full of confident claims, admitting uncertainty was the most respected thing said all day.", "溝通,哲學,職場"],
["understand", "ˌʌndərˈstænd", "v.", "了解；明白", "Seek first to understand then to be understood.", "先尋求理解，然後再尋求被理解。", "Misunderstand = 誤解. Mutual understanding = 相互理解.", "misunderstand=誤解/mutual understanding=相互理解/come to understand=逐漸理解/make yourself understood=表達清楚", "Before she responded to criticism, she asked: Help me understand what you mean. That one sentence changed every difficult conversation she ever had.", "溝通,職場,心理"],
["use", "juːz", "v.", "使用；利用", "Use your time wisely — it is your most valuable resource.", "明智地使用你的時間——它是你最寶貴的資源。", "Useful = 有用的. Use up = 用完. Make use of = 利用.", "useful=有用的/use up=用完/make use of=利用/put to good use=善加利用", "She kept every random skill she had learned. Each seemed useless at the time. But in her career, every single one came in useful eventually. Learn everything.", "學習,職場"],
["vacation", "veɪˈkeɪʃən", "n.", "假期；休假", "A vacation is not just a break — it is an investment in yourself.", "假期不只是休息——而是對自己的投資。", "On vacation = 在度假. Summer vacation = 暑假. Take a vacation = 放假.", "on vacation=在度假/summer vacation=暑假/take a vacation=放假/vacation mode=度假模式", "She had not taken a vacation in three years. When she finally did, she sat by the sea and did nothing. Ideas came. Energy returned. She solved problems she had struggled with for months.", "健康,職場,旅遊"],
["value", "ˈvæljuː", "n./v.", "價值；重視", "Know your worth and then add tax. Know your values.", "了解你的價值，然後加稅。了解你的價值觀。", "Core value = 核心價值. Value for money = 物超所值. Add value = 增加價值.", "core values=核心價值/value for money=物超所值/add value=增加價值/family values=家庭價值觀", "When offered more money to break her principles, she said no. Values are not values if you only hold them when it is convenient, she answered. They hired her immediately.", "哲學,職場,商業"],
["visit", "ˈvɪzɪt", "v./n.", "拜訪；參觀", "Visit the people who matter before they are gone.", "在重要的人離開之前去拜訪他們。", "Visitor = 訪客. Pay a visit = 拜訪. Return visit = 回訪.", "visitor=訪客/pay a visit=拜訪/return visit=回訪/museum visit=博物館參觀", "Every year, she visited her old neighborhood. Some things changed. Most stayed the same. She always left with a memory reawakened and a gratitude renewed.", "旅遊,社交,情感"],
["voice", "vɔɪs", "n.", "聲音；發言", "Your voice matters — use it for those who have none.", "你的聲音很重要——為那些沒有發言權的人發聲。", "Voice message = 語音訊息. Raise your voice = 提高聲音. Find your voice = 找到自己的聲音.", "find your voice=找到自己的聲音/raise your voice=提高聲音/voice your opinion=表達意見/voiceless=沒有聲音的", "She was the quietest person in every room for years. Then one day her idea was taken without credit. She stood up and said, That was my idea. That was the day she found her voice.", "職場,社會,激勵"],
["wait", "weɪt", "v.", "等待", "Good things come to those who wait — and those who act.", "好事降臨於那些等待的人——以及那些行動的人。", "Can not wait = 迫不及待. Worth the wait = 值得等待. Wait and see = 等著瞧.", "can not wait=迫不及待/worth the wait=值得等待/wait and see=等著瞧/wait your turn=等候輪到", "The restaurant had a two-hour wait. They almost left. But they stayed. The meal was extraordinary. She still talks about it fifteen years later. The best things are worth waiting for.", "日常,飲食,哲學"],
["wake", "weɪk", "v.", "醒來；喚醒", "She wakes up early every morning to exercise before work.", "她每天早上都早起在上班前運動。", "Wake up = 醒來. Wake-up call = 警醒. Wide awake = 完全清醒.", "wake up=醒來/wake-up call=警醒/wide awake=完全清醒/wake someone up=叫醒某人", "He got a wake-up call when the doctor said his health was declining. That was the moment he changed everything — diet, sleep, exercise. Sometimes bad news is the best news.", "健康,日常"],
["walk", "wɔːk", "v./n.", "走路；散步", "A short walk outside can completely change your mood.", "短暫的戶外散步可以完全改變你的心情。", "Walk the talk = 言行一致. Take a walk = 去散步. Walk away = 離開.", "walk the talk=言行一致/take a walk=去散步/walk away=離開/walk of life=人生歷程", "After every argument, she would walk around the block once before responding. By the time she returned, she was calm. The walk saved a thousand relationships.", "健康,日常,心理"],
["want", "wɒnt", "v.", "想要", "What you want and what you need are often different things.", "你想要的和你需要的往往是不同的事情。", "Want to = 想要. Want more = 想要更多. All I want = 我所想要的一切.", "want to=想要/want more=想要更多/all I want=我所想要的/what do you want=你想要什麼", "She asked her team: What do you want from this job? Not what she expected. But the answers helped her create a place where everyone wanted to stay.", "職場,心理,溝通"],
["watch", "wɒtʃ", "v./n.", "觀看；手錶", "Watch how successful people spend their time.", "觀察成功的人是如何度過他們的時間的。", "Watch out = 小心. Watch over = 看守. Keep watch = 保持警覺.", "watch out=小心/watch over=看守/keep watch=保持警覺/closely watched=被密切關注", "He watched his father build the business from nothing. He watched him fail and rebuild. When it was his turn, he knew what to do. Watching can teach everything.", "家庭,生活,激勵"],
["weather", "ˈwɛðər", "n.", "天氣", "The weather is unpredictable so always carry an umbrella.", "天氣難以預測，所以總要帶一把傘。", "Fair weather = 晴天或見好就收的人. Under the weather = 身體不適. Weather the storm = 度過難關.", "fair weather=晴天/under the weather=身體不適/weather the storm=度過難關/stormy weather=暴風雨", "They had planned an outdoor wedding. It rained. They laughed, danced in the rain, and took the most beautiful photos. Weather the unexpected. It makes the best stories.", "旅遊,日常,激勵"],
["win", "wɪn", "v.", "贏；獲勝", "Win with grace and lose with dignity.", "優雅地贏，有尊嚴地輸。", "Winner = 勝利者. Winning streak = 連勝. Win-win = 雙贏.", "winning streak=連勝/win-win situation=雙贏/winner's mindset=勝者心態/win people over=說服人", "He lost the competition. But he was first to congratulate the winner and smile genuinely. A year later, the winner recommended him for the best job of his career.", "運動,職場,哲學"],
["wonderful", "ˈwʌndərfəl", "adj.", "極好的；美妙的", "It was a wonderful experience I will never forget.", "這是一次我永遠不會忘記的美妙經歷。", "Wonderful news = 好消息. Wonderfully = 極好地. Full of wonder = 充滿好奇.", "wonderful news=好消息/wonderfully done=做得極好/full of wonder=充滿好奇/it was wonderful=非常美好", "The concert was wonderful but what made it magical was sharing it with her daughter for the first time. The music was the same. The company made it extraordinary.", "娛樂,家庭,藝術"],
["work", "wɜːrk", "v./n.", "工作；運作", "Work smart not just hard — efficiency matters.", "聰明地工作，不只是努力工作——效率很重要。", "Teamwork = 團隊合作. Work-life balance = 工作生活平衡. Networking = 建立人脈.", "teamwork=團隊合作/work-life balance=工作生活平衡/networking=建立人脈/overwork=過勞", "She worked 80-hour weeks and burned out. She learned to delegate and rest. Working less made her more productive. Work smarter is real advice worth taking.", "職場,健康"],
["world", "wɜːrld", "n.", "世界", "One person really can change the world — it happens daily.", "一個人真的可以改變世界——這每天都在發生。", "World record = 世界紀錄. World-class = 世界級的. Around the world = 環遊世界.", "world record=世界紀錄/world-class=世界級的/around the world=環遊世界/world view=世界觀", "The small village school had almost no resources. But the teacher there produced graduates who became doctors and diplomats. One good teacher can change a whole world.", "社會,教育,激勵"],
["worry", "ˈwʌri", "v.", "擔心；憂慮", "Worrying is like paying interest on a debt you may not owe.", "擔心就像為你可能不欠的債務支付利息。", "Do not worry = 別擔心. Worrier = 愛擔心的人. Needless worry = 不必要的擔心.", "do not worry=別擔心/worrier=愛擔心的人/constant worry=持續擔心/overcome worry=克服擔心", "She worried about everything. Her therapist gave her one task: write down every worry and check back in a month. After 30 days, not one had come true. She still writes them.", "心理,健康,哲學"],
["write", "raɪt", "v.", "寫；書寫", "Write your goals down — it makes them real.", "把你的目標寫下來——這讓它們變得真實。", "Writing = 寫作. Writer = 作家. Write back = 回信.", "writing=寫作/writer's block=寫作瓶頸/write back=回信/write off=報廢/handwriting=手寫", "She kept a journal for thirty years. When her children read it after she passed, they discovered a woman they never fully knew — brave, funny, and endlessly hopeful.", "語言,藝術,生活"],
["year", "jɪər", "n.", "年；一年", "Every year you are given 365 chances to start again.", "每一年，你都有365次重新開始的機會。", "Year-round = 全年的. Year after year = 年復一年. Milestone year = 重要的年份.", "year after year=年復一年/year-round=全年的/this time last year=去年此時/milestone year=重要年份", "At the end of every year, she wrote down three things: what she learned, what she released, and what she would carry forward. That 30-minute ritual shaped the next 12 months.", "生活,哲學,激勵"],
["young", "jʌŋ", "adj.", "年輕的", "Age is just a number — being young is a mindset.", "年齡只是一個數字——年輕是一種心態。", "Youth = 青春. Young at heart = 永保年輕心態. Young professional = 年輕職業人士.", "youth=青春/young at heart=永保年輕心態/young professional=年輕專業人士/stay young=保持年輕", "He was the oldest person in the marathon. Also the loudest. He helped two younger runners finish. How are you still so young at heart? they asked. I never stopped playing.", "運動,激勵,哲學"],
["escape", "ɪˈskeɪp", "v./n.", "逃脫；逃避", "Books have always been her escape from daily stress.", "書籍一直是她逃離日常壓力的方式。", "Escape from = 從...逃脫。Fire escape = 防火梯。Escape route = 逃跑路線。", "escape from=從...逃脫/fire escape=防火梯/escape route=逃跑路線/narrow escape=死裡逃生", "When work overwhelmed her, she opened a novel. Within minutes, she was somewhere else entirely. Reading is the cheapest escape there is.", "日常,心理,教育"],
["event", "ɪˈvɛnt", "n.", "事件；活動", "The company organized a team-building event last Friday.", "公司上週五舉辦了一個團隊建設活動。", "Major event = 重大事件。In the event of = 萬一。Event planning = 活動策劃。", "major event=重大事件/in the event of=萬一/event planning=活動策劃/upcoming event=即將舉行的活動", "The annual event brought together 500 employees from twelve countries. By the end, people who had only emailed each other for years finally had faces to put to names.", "社交,職場,文化"],
["exercise", "ˈɛksərsaɪz", "n./v.", "運動；練習", "She exercises for thirty minutes every single morning.", "她每天早上都運動三十分鐘。", "Exercise routine = 運動習慣。Mental exercise = 腦力訓練。Exercise your rights = 行使你的權利。", "exercise routine=運動習慣/mental exercise=腦力訓練/exercise your rights=行使權利/regular exercise=規律運動", "The doctor said ten minutes of walking daily would help. He started there. Three months later, he was running 5km. Tiny starts make massive changes.", "健康,運動,激勵"],
["expect", "ɪkˈspɛkt", "v.", "期待；預期", "Do not expect things to change if you do not change.", "如果你不改變，不要期待事情會改變。", "Expectation = 期待（名詞）。Unexpected = 意外的。Exceed expectations = 超出預期。", "expectation=期待/unexpected=意外的/exceed expectations=超出預期/meet expectations=達到期望", "She exceeded every expectation placed on her — not to impress others, but because she expected more from herself than anyone else did.", "激勵,職場,心理"],
["eye", "aɪ", "n.", "眼睛；眼光", "Keep your eyes open — opportunities appear when you look.", "保持眼睛張開——機會在你看的時候出現。", "Eye contact = 眼神接觸。Keep an eye on = 留意。In the eyes of = 在...看來。", "eye contact=眼神接觸/keep an eye on=留意/catch someone's eye=引人注意/bird's-eye view=鳥瞰", "She made eye contact with everyone she spoke to. It made people feel seen and heard. That simple habit made her the most trusted person in any room.", "溝通,社交"],
["face", "feɪs", "v./n.", "面對；臉", "Face your fears — they are rarely as big as they seem.", "面對你的恐懼——它們很少像看起來那麼大。", "Face up to = 勇於面對。Lose face = 丟臉。Face the music = 承擔後果。", "face up to=勇於面對/lose face=丟臉/face the music=承擔後果/poker face=撲克臉", "Standing at the edge of the cliff, she faced her fear of heights. She jumped. The water was cold and perfect. Fear faced is fear finished.", "激勵,運動,心理"],
["fact", "fækt", "n.", "事實", "In fact, learning a language takes years of daily practice.", "事實上，學習一門語言需要多年的每日練習。", "In fact = 事實上。Matter of fact = 事實問題。Face the facts = 面對現實。", "in fact=事實上/matter of fact=事實問題/fact-check=事實核查/fun fact=有趣事實", "He presented the facts clearly, without emotion. The audience could not argue with reality. Facts, presented calmly, are always more persuasive than passion.", "溝通,教育,社會"],
["figure", "ˈfɪɡər", "n./v.", "數字；人物；想清楚", "I need to figure out the best solution to this problem.", "我需要想清楚這個問題的最佳解決方案。", "Figure out = 弄清楚。Key figure = 關鍵人物。Figure of speech = 修辭。", "figure out=弄清楚/key figure=關鍵人物/public figure=公眾人物/go figure=真令人費解", "After hours of staring at the data, she finally figured it out. The answer was simple — she had been asking the wrong question all along. Always question your questions.", "職場,學習,哲學"],
["finally", "ˈfaɪnəli", "adv.", "最終；終於", "She finally finished writing her first novel at 58.", "她終於在58歲時完成了她的第一部小說。", "Final = 最終的。Finals = 決賽。Finalize = 敲定。", "finalize=敲定/final decision=最終決定/final exam=期末考/semi-final=準決賽", "He finally called after a month of silence. She answered. 'I am sorry,' he said simply. Three words, sincerely said, can finally close years of distance.", "情感,激勵,日常"],
["fire", "faɪər", "n./v.", "火；開除；激發", "Her passion for education fired up every student she met.", "她對教育的熱情激發了她遇到的每一個學生。", "Catch fire = 著火。Under fire = 受到批評。Fire up = 激起熱情。", "catch fire=著火/under fire=受批評/fire up=激起熱情/campfire=營火/fire alarm=火警", "When he was fired, he thought it was the worst day of his life. Two years later, running his own successful company, he realized it was the best.", "職場,激勵"],
["fit", "fɪt", "adj./v.", "合適的；健康的；適合", "She stays fit by cycling to work every single day.", "她每天騎自行車上班保持健康。", "Keep fit = 保持健康。Fit in = 融入。Survival of the fittest = 適者生存。", "keep fit=保持健康/fit in=融入/survival of the fittest=適者生存/fit for purpose=適合目的", "The newcomer did not fit in at first. She was too direct, too enthusiastic. By the end of the year, everyone wanted to work like her. Sometimes not fitting in is fitting perfectly.", "健康,職場,社交"],
["fix", "fɪks", "v.", "修理；固定", "She fixed the leaking pipe herself without calling a plumber.", "她自己修好了漏水的管道，沒有叫水管工。", "Quick fix = 臨時解決方案。Fix your eyes on = 盯著看。Stuck in a fix = 陷入困境。", "quick fix=臨時解決/fix your eyes on=盯著看/in a fix=陷入困境/fix the problem=解決問題", "She fixed small problems immediately instead of letting them grow. That habit kept her house, her health, and her relationships in far better shape than most.", "日常,生活,哲學"],

["join", "dʒɔɪn", "v.", "加入；連接", "Join a community of learners and you will grow faster.", "加入一個學習者社群，你會成長得更快。", "Join forces = 聯手。Join the club = 大家都一樣。Join in = 參與進來。", "join forces=聯手/join the club=大家都這樣/join in=參與/join a team=加入團隊", "She joined the running club thinking it was just exercise. She found community, accountability, and some of her closest friendships. Joining things gives you more than you join for.", "社交,運動,社區"],
["just", "dʒʌst", "adv.", "剛剛；只是；正好", "She just passed the exam — with the highest score in the class.", "她剛剛通過了考試——以班級中最高分。", "Just in case = 以防萬一。Just in time = 恰好及時。Just do it = 就去做吧。", "just in case=以防萬一/just in time=恰好及時/just do it=就去做/just enough=剛剛好", "He was just about to give up when the email arrived. The timing was so perfect that he laughed. The universe, he decided, has excellent timing. Just keep going.", "日常,激勵"],
["key", "kiː", "n./adj.", "鑰匙；關鍵的", "Consistency is the key to mastering any new skill.", "持之以恆是掌握任何新技能的關鍵。", "Key point = 關鍵點。Off-key = 走調。Keynote = 主題演講。", "key point=關鍵點/keynote=主題演講/key factor=關鍵因素/lock and key=上鎖", "She lost her house key and instead of panicking, spent the delay noticing her neighborhood for the first time. Sometimes losing the key opens a different door.", "日常,激勵,哲學"],
["kick", "kɪk", "v.", "踢；開始", "It is time to kick off the new project with the whole team.", "是時候和整個團隊啟動新項目了。", "Kick off = 開始/開球。Kick back = 放鬆。Kick a habit = 戒掉習慣。", "kick off=開始/kick back=放鬆/kick a habit=戒掉習慣/sidekick=助手/kickstart=啟動", "The project kicked off with everyone's best intentions and nobody's plans. Three weeks in, they were lost. Lesson: kick off your projects with both energy and a clear direction.", "職場,運動"],
["land", "lænd", "v./n.", "著陸；土地", "She landed her dream job after months of hard work.", "她在幾個月的努力工作後得到了她的夢想工作。", "Landlord = 房東。Land a deal = 拿下交易。Landing = 著陸。", "landlord=房東/land a deal=拿下交易/landing=著陸/mainland=大陸/dream land=夢境", "When the plane landed, she realized she had crossed the world alone for the first time. Standing in the arrivals hall, she had never felt more capable. New lands make new people.", "旅遊,激勵"],
["last", "læst", "adj./v.", "最後的；持續", "The relationships that last are those built on honesty.", "持久的關係是建立在誠實基礎上的。", "At last = 終於。Last but not least = 最後但同樣重要的。Make it last = 讓它持久。", "at last=終於/last but not least=最後同樣重要/make it last=讓它持久/last resort=最後手段", "She made things that were meant to last — furniture, friendships, promises. In a world of disposable everything, her commitment to lasting things made her rare.", "生活,哲學,激勵"],
["later", "ˈleɪtər", "adv.", "之後；稍後", "Do it now — later becomes never more quickly than you think.", "現在就做——稍後變成永不比你想的更快。", "Later on = 之後。Sooner or later = 遲早。See you later = 再見。", "later on=之後/sooner or later=遲早/see you later=再見/latest=最新的", "He kept saying he would start later. Later became months. Months became years. One day, his 'later' project had to be started by someone else. Start now, even imperfectly.", "激勵,生活,時間管理"],
["layer", "ˈleɪər", "n.", "層次；層", "Good characters in stories have many layers to discover.", "好的故事人物有許多層次可以發現。", "Layer by layer = 一層一層地。Multiple layers = 多個層次。Outer layer = 外層。", "layer by layer=一層一層/multiple layers=多個層次/outer layer=外層/hidden layer=隱藏層", "Peel back the layers of any complex problem and you find simpler ones underneath. She was exceptional because she never stopped peeling until she found the root.", "科學,哲學,教育"],
["letter", "ˈlɛtər", "n.", "信件；字母", "She still writes a handwritten letter to her mother every week.", "她每週仍然給她的母親寫一封手寫信。", "Cover letter = 求職信。Open letter = 公開信。To the letter = 嚴格按照。", "cover letter=求職信/open letter=公開信/to the letter=嚴格按照/letter of recommendation=推薦信", "He received a handwritten letter from a stranger who had read his article. She said it had changed her life. He had almost not published it. Sharing your work matters.", "溝通,社交"],
["level", "ˈlɛvəl", "n./adj.", "水平；層次；平的", "Take your English to the next level with consistent practice.", "通過持之以恆的練習把你的英語帶到下一個水平。", "Level up = 升級。On a level = 誠實地說。Level the playing field = 創造公平競爭。", "level up=升級/level-headed=頭腦冷靜的/on a level=誠實地/level the playing field=公平競爭", "She was level-headed in every crisis, never escalating, never panicking. People around her felt safer just because she was present. Calmness is the highest form of leadership.", "職場,激勵"],
["light", "laɪt", "n./adj./v.", "光；輕的；點燃", "Be the light in someone's dark day — it costs nothing.", "成為某人黑暗一天裡的光——這不花任何代價。", "In a new light = 以新的眼光。Light up = 照亮。Green light = 同意/綠燈。", "in a new light=以新眼光/light up=照亮/green light=同意/light-hearted=輕鬆的/shed light on=闡明", "The small act of kindness lit up his whole week. He paid it forward. The chain of brightness that followed could never be traced back to its source. Light multiplies.", "社交,哲學,情感"],
["likely", "ˈlaɪkli", "adj.", "可能的", "Success is more likely when you focus on one thing at a time.", "當你一次專注於一件事時，成功更有可能。", "Most likely = 最有可能。Unlikely = 不太可能（反義）。Very likely = 非常可能。", "most likely=最有可能/unlikely=不太可能/it's likely that=很有可能/likely outcome=可能的結果", "She seemed the most unlikely candidate for the award — she was new, young, and unknown. That made the win even more powerful. Likely and worthy are not the same thing.", "日常,激勵,哲學"],
["limit", "ˈlɪmɪt", "n./v.", "限制", "Push your limits a little further each week.", "每週把你的限制再推進一點點。", "Set a limit = 設定限制。No limits = 無限制。Within limits = 在限制範圍內。", "set a limit=設定限制/push the limits=突破限制/speed limit=速限/no limits=無限制", "She never told herself what she couldn't do. She only told herself what she hadn't done yet. Removing the word 'can't' from her vocabulary changed what was possible.", "激勵,運動,哲學"],
["link", "lɪŋk", "n./v.", "連結；鏈接", "Everything is connected — every cause has a linked effect.", "一切都是相連的——每個原因都有相連的效果。", "Link between = 之間的連結。Broken link = 斷開的連結。Missing link = 缺失的環節。", "link between=之間的連結/missing link=缺失的環節/weak link=薄弱環節/strong link=強連結", "The researcher found the link between sleep and learning almost by accident. One discovery linked to another. Science is mostly following interesting threads to unexpected places.", "科學,教育,科技"],
["live", "lɪv", "v.", "活；居住", "Live fully today — not for yesterday or tomorrow.", "充分活在今天——不是為了昨天或明天。", "Live and learn = 活到老學到老。Live up to = 達到期望。Live it up = 盡情享受。", "live and learn=活到老學到老/live up to=達到期望/live it up=盡情享受/live in the moment=活在當下", "She stopped saving experiences for special occasions. She lit candles on Tuesday nights, wore her best clothes to the supermarket. Living fully every day was the point.", "哲學,生活,激勵"],
["long", "lɒŋ", "adj.", "長的；久的", "The long way is often the most direct path to mastery.", "漫長的道路往往是通往精通最直接的路徑。", "Long shot = 希望渺茫的事。Long run = 長期來看。As long as = 只要。", "long shot=希望渺茫/long run=長期來看/as long as=只要/long-term=長期的/think long-term=長遠思考", "'In the long run,' her mentor said, 'every shortcut costs you.' She ignored the advice once. It cost her a year to fix. She never ignored it again. Long-term thinking wins.", "激勵,哲學,生活"],
["look", "lʊk", "v.", "看；看起來", "Look at your life as if you were describing it to a friend.", "把你的生活看作是你在向朋友描述它的樣子。", "Look forward to = 期待。Look up to = 崇敬。Overlook = 忽略。", "look forward to=期待/look up to=崇敬/overlook=忽略/look on the bright side=往好處想", "She looked at the problem differently from everyone else. Where they saw obstacles, she saw puzzles. That habit of looking differently made her the most creative person in any room.", "哲學,生活,激勵"],
["lose", "luːz", "v.", "失去；輸", "Lose gracefully and you will win respect every time.", "優雅地失去，你每次都會贏得尊重。", "Lose your way = 迷路。Lose track of time = 忘記時間。Nothing to lose = 沒什麼可失去的。", "lose your way=迷路/lose track of time=忘了時間/nothing to lose=沒什麼可失去/lose yourself in=沉浸在", "He lost the competition. Then he congratulated the winner genuinely and asked what she had done differently. She told him. He won the next one. Losing well is a superpower.", "運動,職場,激勵"],
["loud", "laʊd", "adj.", "響亮的；大聲的", "Actions are always louder than words — every single time.", "行動永遠比言語響亮——每一次都是。", "Out loud = 大聲地。Think out loud = 把想法說出來。Actions speak louder = 行動勝於言語。", "think out loud=把想法說出來/actions speak louder=行動勝言語/out loud=大聲地/loud and clear=清清楚楚", "She was not the loudest person in the room. But when she spoke, everyone listened. What you say matters. How often you say things matters less than how clearly you say them.", "溝通,激勵"],
["luck", "lʌk", "n.", "運氣", "Luck is what happens when preparation meets opportunity.", "運氣是準備遇到機會時發生的事情。", "Good luck = 好運。Lucky break = 幸運的機會。Push your luck = 冒險過頭。", "good luck=好運/lucky break=幸運機會/push your luck=冒險過頭/beginner's luck=初學者的好運", "They called her lucky. She had applied to the same scholarship for four years. On the fourth attempt, she was awarded it. She had made her own luck by simply not stopping.", "激勵,生活,哲學"],
["market", "ˈmɑːrkɪt", "n.", "市場", "Understanding your market is the foundation of any business.", "了解你的市場是任何業務的基礎。", "Market research = 市場研究。Stock market = 股票市場。Target market = 目標市場。", "market research=市場研究/stock market=股票市場/target market=目標市場/farmer's market=農夫市集", "She went to the farmers market every Saturday. Not for the groceries, but for the conversations. Local markets are where community is practiced, not just produced.", "商業,社區,飲食"],
["match", "mætʃ", "n./v.", "比賽；相配", "Find work that matches your values, not just your skills.", "找到與你的價值觀相符的工作，不只是你的技能。", "Perfect match = 完美搭配。Match up = 配對。On the match = 相稱。", "perfect match=完美搭配/match up=配對/no match for=比不上/meet your match=遇到對手", "She was always looking for the right match — in work, in city, in relationships. When she stopped searching and started building, everything aligned. The match was in her own making.", "社交,職場,生活"],
["matter", "ˈmætər", "n./v.", "事情；重要", "At the end of the day, only a few things truly matter.", "在一天結束的時候，只有少數幾件事真正重要。", "It doesn't matter = 沒關係。What matters is = 重要的是。Subject matter = 主題內容。", "it doesn't matter=沒關係/what matters is=重要的是/subject matter=主題內容/grey matter=灰質（大腦）", "On his deathbed, he was asked what mattered most. He said: 'The people I loved and the moments I was fully present.' He had known all along. Most of us do.", "哲學,家庭,激勵"],
["message", "ˈmɛsɪdʒ", "n.", "訊息；信息", "The most powerful messages are often the most simple ones.", "最有力的信息往往是最簡單的。", "Send a message = 傳訊息。Text message = 簡訊。Get the message = 明白了。", "send a message=傳訊息/text message=簡訊/get the message=明白了/voice message=語音訊息", "She wrote the email seventeen times. Then deleted everything and wrote three sentences. The recipient replied immediately: 'Finally, clarity.' Simplicity is the best message.", "溝通,科技,日常"],
["mind", "maɪnd", "n./v.", "思維；注意", "The mind is like a garden — what you feed it grows.", "思維就像花園——你餵它什麼，它就長什麼。", "Change your mind = 改變主意。Open mind = 開放的思維。Peace of mind = 心安。", "change your mind=改變主意/open mind=開放思維/peace of mind=心安/never mind=不要緊/mindset=思維方式", "She protected her mental diet as carefully as her physical one. No negative news before bed. No comparisons. No complaints without solutions. Her mind became her greatest asset.", "心理,健康,激勵"],
["miss", "mɪs", "v.", "思念；錯過", "She misses her hometown but loves where she is now.", "她思念她的家鄉，但也喜愛她現在的地方。", "Miss out on = 錯過。Near miss = 差點發生。You are missed = 我們想念你。", "miss out on=錯過/near miss=差點/you are missed=我們想念你/miss the point=沒有理解重點", "He missed the flight and thought the day was ruined. The next plane seated him next to a mentor who changed his career. Missing sometimes means arriving exactly right.", "旅遊,激勵,日常"],
["moment", "ˈmoʊmənt", "n.", "時刻；片刻", "Be fully present in this moment — it will not come again.", "在這個時刻完全在場——它不會再來。", "In a moment = 馬上。At this moment = 此刻。Spur of the moment = 一時衝動。", "in a moment=馬上/at this moment=此刻/spur of the moment=一時衝動/live in the moment=活在當下", "He photographed everything, trying to capture moments. Then one day, he put the camera down and just watched the sunset. The best moments cannot be stored. Only felt.", "哲學,生活,藝術"],
["move", "muːv", "v.", "移動；搬家；感動", "The first move is always the hardest — but you must make it.", "第一步總是最難的——但你必須邁出它。", "Make a move = 採取行動。Move on = 向前走。Movie = 電影。", "make a move=採取行動/move on=向前走/move forward=向前推進/emotional move=感人的舉動", "She was moved to tears not by the grand gesture but by the small, daily ones — coffee made just right, a door held open, a name remembered. The small moves matter most.", "情感,生活,社交"],
["natural", "ˈnætʃərəl", "adj.", "自然的；天生的", "Learning feels more natural when you genuinely enjoy it.", "當你真正享受學習時，學習感覺更自然。", "Natural talent = 天賦。Naturally = 自然地。Nature vs nurture = 先天與後天。", "natural talent=天賦/naturally=自然地/natural disaster=自然災害/come naturally=自然而然地", "She was told she had a natural talent for languages. What they did not see was the three hours of daily practice behind the apparent natural ease. Talent is practice made invisible.", "自然,教育,激勵"],
["offer", "ˈɒfər", "v./n.", "提供；邀約", "She offered to help without being asked — that is rare.", "她主動提出幫忙，沒有被要求——那很少見。", "Job offer = 工作邀約。Make an offer = 提出邀約。Special offer = 特別優惠。", "job offer=工作邀約/make an offer=提出邀約/special offer=特別優惠/best offer=最好的條件", "She offered her expertise freely for years before anyone paid her for it. When they finally did, the rate was extraordinary. Generosity compounds.", "職場,商業,激勵"],
["opinion", "əˈpɪnjən", "n.", "意見；看法", "Your opinion only matters if you are willing to listen to others'.", "你的意見只有在你願意聆聽他人意見時才重要。", "In my opinion = 在我看來。Public opinion = 公眾輿論。Second opinion = 第二意見。", "in my opinion=在我看來/public opinion=公眾輿論/second opinion=第二意見/opinion poll=民意調查", "She never stated opinions as facts. Instead she said: 'In my view...' That simple framing invited dialogue instead of defense. Conversations improved dramatically.", "溝通,社交,哲學"],
["pain", "peɪn", "n.", "疼痛；痛苦", "No pain, no gain — but choose your pain wisely.", "沒有痛，沒有收穫——但要明智地選擇你的痛苦。", "Painless = 無痛的。Painkiller = 止痛藥。Growing pains = 成長的痛苦。", "painless=無痛的/painkiller=止痛藥/growing pains=成長的痛苦/be a pain=討人厭", "The athlete's pain was daily and deliberate. She chose it because she chose the goal. Chosen pain is completely different from imposed pain. Choose your hard.", "運動,健康,激勵"],
["paper", "ˈpeɪpər", "n.", "紙；論文", "She published her first research paper at the age of twenty-two.", "她在二十二歲時發表了她的第一篇研究論文。", "On paper = 理論上。Research paper = 研究論文。Paper trail = 書面記錄。", "on paper=理論上/research paper=研究論文/paper trail=書面記錄/scratch paper=草稿紙", "On paper, the plan was perfect. In practice, three things went wrong immediately. The team who could adapt won. On-paper thinking has its limits. Reality has its own.", "教育,商業,科學"],
["park", "pɑːrk", "n./v.", "公園；停車", "She clears her head by walking through the park every evening.", "她每天晚上通過在公園散步來清空思緒。", "National park = 國家公園。Car park = 停車場。Park the idea = 暫時擱置想法。", "national park=國家公園/car park=停車場/park the idea=暫時擱置/park bench=公園長椅", "The happiest people in the city were not in the restaurants or shops. They were in the park — walking, talking, sitting on benches. Nature is always free and always healing.", "自然,生活,健康"],
["pass", "pæs", "v.", "通過；傳遞", "Time passes quickly when you are doing meaningful work.", "當你做有意義的工作時，時間過得很快。", "Pass on = 傳遞/放棄。Overpassing = 超越。Let it pass = 算了。", "pass on=傳遞或放棄/let it pass=算了/pass the test=通過考試/pass the time=打發時間", "She passed on the opportunity three times before finally saying yes. On the fourth, something felt different. She took it. It was the best decision of her career. Timing matters.", "日常,激勵"],
["patient", "ˈpeɪʃənt", "adj./n.", "有耐心的；病患", "Be patient with yourself — you are learning something hard.", "對自己有耐心——你在學習困難的東西。", "Patience = 耐心（名詞）。Patient care = 病患照護。Try your patience = 考驗你的耐心。", "patience=耐心/patient care=病患照護/be patient=要有耐心/test your patience=考驗耐心", "She could not understand why she was not improving faster. Her teacher said: 'You plant a tree once and water it daily. You don't dig it up to check the roots.' Be patient.", "教育,醫療,激勵"],
["perfect", "ˈpɜːrfɪkt", "adj.", "完美的", "Done is better than perfect — start before you are ready.", "完成勝過完美——在你準備好之前就開始。", "Perfectly = 完美地。Perfectionist = 完美主義者。Imperfect = 不完美的。", "perfectly=完美地/perfectionist=完美主義者/strive for perfection=追求完美/perfect timing=完美時機", "She spent years waiting to be perfect before starting. Then a mentor said: 'Ship it imperfect. Fix it after.' She launched. She fixed. She succeeded. Done beats perfect every time.", "激勵,職場,心理"],
["person", "ˈpɜːrsn", "n.", "人；個人", "Be the kind of person you needed when you were younger.", "成為你年輕時所需要的那種人。", "In person = 親自。Right person = 合適的人。People person = 擅長與人相處的人。", "in person=親自/right person=合適的人/people person=善交際的人/become a better person=變得更好", "She asked herself each morning: 'What kind of person do I want to be today?' That question, made daily, gradually shaped a person she was genuinely proud of being.", "哲學,激勵,生活"],
["phone", "foʊn", "n.", "電話", "She puts her phone away during every meal with her family.", "她在與家人用餐時把手機放下。", "Phone call = 電話。On the phone = 在電話上。Smartphone = 智慧型手機。", "phone call=電話/on the phone=在電話上/smartphone=智慧型手機/no-phone zone=禁止手機區", "He put his phone face-down at dinner for one week. By the end, his children were talking more than they had in months. The phone was not the problem. The attention was.", "家庭,科技,日常"],
["picture", "ˈpɪktʃər", "n.", "照片；圖像；情況", "Look at the big picture before worrying about the small details.", "在擔心小細節之前先看大局。", "Big picture = 全局。Paint a picture = 描述情況。Picture perfect = 完美無瑕。", "big picture=全局/paint a picture=描述情況/picture perfect=完美無瑕/get the picture=明白了", "She always saw the big picture. While others argued over details, she mapped the destination. That quality — seeing the whole — made her the natural leader of every group she joined.", "溝通,職場,藝術"],
["positive", "ˈpɒzɪtɪv", "adj.", "積極的；正面的", "A positive mind finds opportunities in every situation.", "積極的思維在每個情況中都能找到機會。", "Positive thinking = 正面思考。Stay positive = 保持積極。Test positive = 測試陽性。", "positive thinking=正面思考/stay positive=保持積極/positive impact=積極的影響/false positive=假陽性", "She was not blindly optimistic — she was constructively positive. She acknowledged problems and then immediately looked for solutions. That habit is what set her apart.", "心理,健康,激勵"],
["possible", "ˈpɒsɪbl", "adj.", "可能的", "Everything seems impossible until someone makes it possible.", "一切在有人使它成為可能之前都似乎是不可能的。", "Make possible = 使成為可能。As soon as possible = 盡快。Possibility = 可能性（名詞）。", "make possible=使成為可能/as soon as possible=盡快/explore possibilities=探索可能性/barely possible=勉強可能", "She refused to believe in impossible. Not naively, but systematically — she broke down every 'impossible' into smaller possibles. That method made her achieve what others gave up on.", "激勵,哲學"],
["present", "ˈprɛznt", "adj./n./v.", "現在的；禮物；呈現", "Be fully present — your full attention is the greatest gift.", "完全在場——你全部的注意力是最大的禮物。", "Present tense = 現在式。Presentation = 呈現（名詞）。In the present = 在當下。", "present tense=現在式/presentation=演示/in the present=在當下/be present=在場/gift and present=禮物", "She gave nothing materially expensive. But she gave her full presence — no phones, no distractions — to everyone she was with. People felt it. It was more valuable than any gift.", "家庭,溝通,哲學"],
["price", "praɪs", "n.", "價格", "Everything has a price — including doing nothing at all.", "一切都有代價——包括什麼都不做。", "Price tag = 價格標籤。At any price = 不惜任何代價。Half price = 半價。", "price tag=價格標籤/at any price=不惜任何代價/half price=半價/asking price=要求價格", "She asked the price of everything. Not because she was cheap, but because knowing value made her an excellent negotiator. Price is what you pay. Value is what you get.", "商業,金融,日常"],
["produce", "prəˈdjuːs", "v.", "生產；製造", "When you produce good work consistently, opportunities follow.", "當你持續生產好的工作時，機會就會跟隨。", "Producer = 生產者。Production = 生產（名詞）。Productive = 有生產力的。", "producer=生產者/production=生產/productive=有生產力的/mass produce=大量生產", "She produced work consistently, not in bursts of inspiration. Day by day, piece by piece. Looking back after a year, she had produced more than she thought possible.", "商業,激勵,藝術"],
["prove", "pruːv", "v.", "證明", "You do not need to prove yourself to everyone — just to yourself.", "你不需要向每個人證明自己——只要向自己證明就夠了。", "Prove a point = 證明一個觀點。Proven = 已被證明的。Disprove = 反駁（反義）。", "prove a point=證明觀點/proven=已被證明的/prove yourself=證明自己/beyond doubt=無可置疑", "She stopped trying to prove herself to critics and started proving things to herself. Within a year, the external validation followed. Funny how that works.", "激勵,心理,職場"],
["pull", "pʊl", "v.", "拉；吸引", "Pull yourself together and face the challenge head-on.", "振作起來，直接面對挑戰。", "Pull through = 撐過去。Pull off = 成功完成。Pull your weight = 盡自己的責任。", "pull through=撐過去/pull off=成功完成/pull your weight=盡責任/pull together=齊心協力", "The team was exhausted and behind schedule. Then their leader said simply: 'Pull together. We can do this.' They did. The power of those four words still surprises her.", "職場,激勵"],
