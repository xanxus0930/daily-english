["implement", "ˈɪmplɪmɛnt", "v.", "實施；執行", "A plan is worthless until you implement it — so just start.", "計劃在實施之前毫無價值——所以就開始吧。", "Implementation = 實施（名詞）。Roll out = 推出/實施。", "implementation=實施/implement a strategy=執行策略/roll out=推出/implement changes=執行變更", "The team spent months planning. Then one manager said: We have planned long enough. Let us implement and learn from doing. That shift changed everything.", "職場,商業"],
["improve", "ɪmˈpruːv", "v.", "改進；改善", "Small daily improvements lead to remarkable long-term results.", "每天的微小改進帶來長期的顯著成果。", "Improvement = 改進（名詞）。Room for improvement = 改善空間。", "improvement=改進/room for improvement=改善空間/self-improvement=自我提升/show improvement=顯示改善", "The athlete did not improve dramatically overnight. She improved 1% every day. After one year, she was 37 times better. Improvement is math before it is magic.", "運動,激勵"],
["influence", "ˈɪnfluəns", "n./v.", "影響；影響力", "Use your influence to lift others not to impress them.", "用你的影響力來提升他人，而不是給他人留下深刻印象。", "Influence = 影響力（名詞）。Influential = 有影響力的。", "influential=有影響力的/sphere of influence=影響範圍/have influence over=對...有影響力", "She never sought to be influential. She just helped anyone who asked. Twenty years later, former students called her the most influential person in their lives.", "職場,社會"],
["initiative", "ɪˈnɪʃɪətɪv", "n.", "主動性；倡議", "Take initiative without being asked — that is how leaders emerge.", "不需要被要求就主動採取行動——這就是領導者如何出現的。", "Show initiative = 展現主動性。On your own initiative = 主動地。", "show initiative=展現主動性/on your own initiative=主動地/lack of initiative=缺乏主動性", "She did not wait to be asked. She saw a problem and fixed it. Her manager noticed. Not because she told him — but because the problem was gone.", "職場,激勵"],
["innovate", "ˈɪnəveɪt", "v.", "創新", "Companies that do not innovate eventually disappear.", "不創新的公司最終會消失。", "Innovation = 創新（名詞）。Innovative = 創新的。Disruptive innovation = 顛覆性創新。", "innovation=創新/innovative=創新的/disruptive innovation=顛覆性創新/culture of innovation=創新文化", "The innovation did not come from the R and D team. It came from a customer complaint. Someone asked: What if we fixed that? Two months later, it was the company flagship feature.", "商業,科技"],
["inspire", "ɪnˈspaɪər", "v.", "激勵；鼓舞", "The best leaders inspire through actions not just words.", "最好的領導者通過行動而非只是言語來激勵他人。", "Inspiration = 靈感（名詞）。Inspiring = 激勵人心的。", "inspiration=靈感/inspiring=激勵人心的/source of inspiration=靈感來源/be inspired by=受...激勵", "She never wrote a motivational speech. She just showed up every day and gave her best. Thirty years later, hundreds of people said she was the reason they succeeded.", "職場,激勵"],
["interview", "ˈɪntərvjuː", "n./v.", "面試；採訪", "Prepare for interviews by practicing answers out loud.", "通過大聲練習答案來準備面試。", "Job interview = 工作面試。Interview skills = 面試技巧。", "job interview=工作面試/panel interview=小組面試/mock interview=模擬面試/interview skills=面試技巧", "She prepared for the interview by researching the company, practicing her answers, and preparing thoughtful questions. She got the job. Preparation is not luck — it is strategy.", "職場"],
["invest", "ɪnˈvɛst", "v.", "投資；投入", "Invest in yourself — it is the best return you will ever get.", "投資自己——這是你能得到的最好回報。", "Investment = 投資（名詞）。Investor = 投資者。Return on investment = 投資回報。", "investment=投資/investor=投資者/return on investment=投資回報/invest in yourself=投資自己", "She spent her bonus on a course instead of a vacation. Two years later, that course had tripled her income. Investing in skills always pays compounding interest.", "金融,生活"],
["involve", "ɪnˈvɒlv", "v.", "包含；使參與", "Good decisions involve everyone affected by those decisions.", "好的決策包含了那些受到這些決策影響的所有人。", "Involvement = 參與（名詞）。Involved = 相關的。", "involvement=參與/get involved=參與/deeply involved=深度參與/involve others=讓他人參與", "She made the decision alone and it failed. Next time, she involved her team from the start. The plan was better and everyone owned the result. Involve early.", "職場,溝通"],
["launch", "lɔːntʃ", "v./n.", "發射；推出", "Every successful product started with someone daring to launch.", "每一個成功的產品都始於有人敢於推出。", "Product launch = 產品發布。Launch a campaign = 推出活動。", "product launch=產品發布/launch a campaign=推出活動/soft launch=軟性推出", "The product was not perfect. She launched it anyway. Customers found problems she had never imagined. She fixed them. Version 2 was loved. Launch fast, improve always.", "商業,科技"],
["leadership", "ˈliːdərʃɪp", "n.", "領導力；領導", "Leadership is not about being in charge — it is about caring.", "領導力不是關於負責——而是關於關心。", "Leader = 領導者。Lead = 領導（動詞）。Thought leadership = 思想領導力。", "leader=領導者/leadership skills=領導技能/thought leadership=思想領導力/lead by example=以身作則", "She was not the loudest in the room. But when she spoke, everyone listened. Her leadership came from listening deeply and acting decisively. Quiet can be powerful.", "職場,社會"],
["manage", "ˈmænɪdʒ", "v.", "管理；設法做到", "How you manage your time reflects your values.", "你如何管理時間反映了你的價值觀。", "Manager = 經理。Management = 管理。Time management = 時間管理。", "time management=時間管理/manage a team=管理團隊/manage stress=管理壓力/project management=項目管理", "She managed a team of 30 with almost no experience. But she listened well, admitted mistakes, and trusted her people. The team thrived. Management is trust, not control.", "職場,商業"],
["negotiate", "nɪˈɡoʊʃieɪt", "v.", "協商談判", "Everything is negotiable — the question is how well you prepare.", "一切都是可以商量的——問題是你準備得有多好。", "Negotiation = 談判（名詞）。Win-win negotiation = 雙贏談判。", "negotiation=談判/win-win=雙贏/negotiate terms=協商條款/hard to negotiate=難以協商", "Both sides had dug in hard. Then a junior member said: What if we both get something? That reframe closed the deal in one hour. Reframing is the best negotiation tool.", "商業,職場"],
["objective", "əbˈdʒɛktɪv", "n./adj.", "目標；客觀的", "State your objective clearly before starting any project.", "在開始任何項目之前清楚地說明你的目標。", "Objective = 目標（名詞）。Objectively = 客觀地。Long-term objective = 長期目標。", "long-term objective=長期目標/business objective=業務目標/objectively speaking=客觀地說", "She started every meeting with one slide: what is our objective today? It saved hours of aimless discussion. Clarity of objective creates efficiency of execution.", "職場,商業"],
["opportunity", "ˌɒpəˈtjuːnɪti", "n.", "機會", "Opportunity does not announce itself — you have to notice it.", "機會不會自我宣告——你必須注意它。", "Seize an opportunity = 抓住機會。Create your own opportunity = 創造自己的機會。", "seize the opportunity=抓住機會/window of opportunity=機會之窗/equal opportunity=平等機會/create opportunity=創造機會", "She was rejected from her dream company three times. The fourth time, she presented a plan showing how she would solve their biggest problem. They hired her on the spot.", "職場,激勵"],
["outcome", "ˈaʊtkʌm", "n.", "結果；成果", "Focus on the process not just the desired outcome.", "專注於過程，而不只是期望的結果。", "Desired outcome = 期望的結果。Positive outcome = 積極的結果。", "desired outcome=期望結果/positive outcome=積極結果/focus on outcomes=專注成果", "She stopped measuring success by outcomes alone. She started measuring by the quality of her process. The outcomes improved as a result. Process creates results.", "職場,哲學"],
["perform", "pərˈfɔːrm", "v.", "執行；表演；表現", "Under pressure is when you really see how someone performs.", "在壓力下才是你真正看到一個人如何表現的時候。", "Performance = 表現（名詞）。High-performing = 高績效的。Performer = 表演者。", "performance=表現/high-performing=高績效的/performance review=績效評估/perform under pressure=在壓力下表現", "She was at her best under pressure. When deadlines tightened, her focus sharpened. Not everyone performs well under pressure — she had trained herself to.", "職場,運動"],
["persevere", "ˌpɜːrsɪˈvɪər", "v.", "堅持；不屈不撓", "Persevere when things get hard — that is when others quit.", "在事情變困難時堅持——那是別人放棄的時候。", "Perseverance = 毅力（名詞）。Persevering = 堅持不懈的。", "perseverance=毅力/persevering=堅持不懈/never give up=永不放棄/against all odds=克服重重困難", "She failed the entrance exam three times. She took it a fourth time and passed. People asked how. I just refused to accept no as a permanent answer, she said.", "激勵,教育"],
["pressure", "ˈprɛʃər", "n.", "壓力；施壓", "Some people thrive under pressure while others crumble.", "有些人在壓力下茁壯成長，而其他人則崩潰。", "Under pressure = 在壓力下。Peer pressure = 同伴壓力。Pressure cooker = 壓力鍋。", "under pressure=在壓力下/peer pressure=同伴壓力/work under pressure=在壓力下工作/high-pressure situation=高壓情況", "The best leaders she had worked under had one thing in common: they never passed pressure down. They absorbed it and gave their teams clarity. That is real leadership.", "職場,心理"],
["priority", "praɪˈɒrɪti", "n.", "優先事項", "If everything is a priority nothing is a priority.", "如果每件事都是優先事項，那麼什麼都不是優先事項。", "Top priority = 首要優先事項。Set priorities = 設定優先次序。", "top priority=首要優先/set priorities=設定優先次序/prioritize=排列優先次序/competing priorities=相互競爭的優先事項", "She had 20 tasks. She crossed out 15 and worked on 5. By the end of the week, those 5 were done well. The other 15 were less urgent than she had thought.", "職場,時間管理"],
["process", "ˈprɒsɛs", "n./v.", "過程；處理", "Trust the process even when you cannot see the results yet.", "即使你還看不到結果，也要相信過程。", "Step-by-step process = 逐步過程。Streamlined process = 精簡的過程。", "step-by-step process=逐步過程/streamlined process=精簡過程/due process=正當程序/process improvement=流程改進", "She did not think about the goal every day. She thought about the process — what habits and actions would lead there. Six months later, the goal had arrived.", "職場,哲學,激勵"],
["productive", "prəˈdʌktɪv", "adj.", "有生產力的；高效的", "Being busy and being productive are not the same thing.", "忙碌和有生產力並不是同一件事。", "Productivity = 生產力（名詞）。Unproductive = 無生產力的。", "productivity=生產力/unproductive=無生產力/highly productive=高度生產力/productivity hack=提高效率的技巧", "She worked 4 hours a day and produced more than colleagues working 10. Productive work is intentional work. Busyness is often a way to avoid what matters.", "職場,生活"],
["professional", "prəˈfɛʃənl", "adj.", "專業的", "Always maintain professional behavior even under pressure.", "即使在壓力下也要保持專業行為。", "Professionalism = 專業精神。Professional development = 職業發展。", "professionalism=專業精神/professional development=職業發展/unprofessional=不專業/look professional=看起來專業", "He lost the deal but thanked the client warmly and asked for feedback. A month later, the client called back. That was the most professional rejection I have seen.", "職場,商業"],
["progress", "ˈprɒɡrɛs", "n./v.", "進步；進展", "Progress is more important than perfection — just keep moving.", "進步比完美更重要——只要繼續前進。", "Make progress = 取得進步。Track progress = 追蹤進度。", "make progress=取得進步/track progress=追蹤進度/slow progress=緩慢進步/significant progress=顯著進步", "She measured herself not against others but against where she was yesterday. That small shift in measurement changed everything. Progress is a personal metric.", "激勵,生活"],
["propose", "prəˈpoʊz", "v.", "提議；求婚", "Before you propose a solution make sure you understand the problem.", "在你提議解決方案之前，確保你了解問題。", "Proposal = 提案（名詞）。Business proposal = 商業提案。", "proposal=提案/business proposal=商業提案/propose a solution=提議解決方案/counter-proposal=反提案", "She did not send a CV. She sent a five-page proposal showing how she would grow their business in 90 days. They called her the same afternoon. Show what you can do.", "商業,職場"],
["recommend", "ˌrɛkəˈmɛnd", "v.", "推薦", "I highly recommend reading before making any big decision.", "我強烈推薦在做任何重大決定之前閱讀。", "Recommendation = 推薦（名詞）。Highly recommended = 強力推薦。", "highly recommend=強力推薦/letter of recommendation=推薦信/act on recommendation=依推薦行動", "She asked the local what he actually ate at. He took her there himself. Best meal of her trip. Local recommendations always beat tourist guidebooks.", "旅遊,餐飲"],
["reliable", "rɪˈlaɪəbl", "adj.", "可靠的", "The most valuable team members are the reliable ones.", "最有價值的團隊成員是可靠的人。", "Reliability = 可靠性（名詞）。Unreliable = 不可靠的。", "reliability=可靠性/unreliable=不可靠的/consistently reliable=一貫可靠/reliable source=可靠來源", "He was not the most talented but he showed up, followed through, and never needed reminding. After three years, he was promoted above everyone who had outperformed him in interviews.", "職場,性格"],
["resolve", "rɪˈzɒlv", "v.", "解決；決心", "Stay calm and you will always find a way to resolve conflicts.", "保持冷靜，你總會找到解決衝突的方法。", "Resolution = 解決方案（名詞）。Conflict resolution = 衝突解決。", "resolution=解決方案/conflict resolution=衝突解決/resolve a dispute=解決爭端/resolve issues=解決問題", "The two teams had not spoken in months. She called one meeting, gave each side five minutes, and asked one question: What do you both want? The conflict resolved in two hours.", "職場,溝通"],
["resource", "ˈriːsɔːrs", "n.", "資源", "Lack of resources is not the problem — lack of creativity is.", "缺乏資源不是問題——缺乏創造力才是。", "Human resources = 人力資源。Resource management = 資源管理。", "human resources=人力資源/resource management=資源管理/natural resources=自然資源/allocate resources=分配資源", "She had the smallest budget in the department but the most creative team. They did more with less than anyone else. Constraints are just creative fuel.", "商業,職場"],
["responsible", "rɪˈspɒnsɪbl", "adj.", "負責任的", "Being responsible means owning your outcomes good or bad.", "負責任意味著承擔你的結果，好的或壞的。", "Responsibility = 責任（名詞）。Hold accountable = 追究責任。", "responsibility=責任/hold accountable=追究責任/responsible for=負責/take responsibility=承擔責任", "When the mistake was discovered, she was the first to say: That was my error. Here is how I am fixing it. Trust in her doubled overnight. Owning errors builds respect.", "職場,社會"],
["revenue", "ˈrɛvɪnjuː", "n.", "收入；收益", "Revenue is important but profit is what keeps businesses alive.", "收入很重要，但利潤才是讓企業存活的東西。", "Revenue stream = 收入來源。Generate revenue = 創造收入。", "revenue stream=收入來源/generate revenue=創造收入/annual revenue=年收入/revenue growth=收入增長", "The startup focused on revenue from day one. Not users. Not traffic. Revenue. That one decision forced them to build something people actually paid for.", "商業"],
["schedule", "ˈskɛdʒuːl", "n./v.", "時間表；安排", "Schedule your priorities or others will schedule your time.", "安排你的優先事項，否則他人會安排你的時間。", "On schedule = 按時。Behind schedule = 落後進度。Flexible schedule = 彈性時間表。", "on schedule=按時/behind schedule=落後進度/schedule a meeting=安排會議/flexible schedule=彈性時間表", "Her calendar had zero empty slots. Then her doctor said: Schedule rest like meetings. Otherwise rest never happens. She blocked two hours every Sunday. It changed everything.", "職場,健康"],
["skill", "skɪl", "n.", "技能；技術", "Every skill you develop is an investment that compounds.", "你培養的每一個技能都是一項複利投資。", "Skill set = 技能組合。Soft skills = 軟技能。Hard skills = 硬技能。", "skill set=技能組合/soft skills=軟技能/hard skills=硬技能/develop a skill=培養技能", "She spent one hour every day learning a new skill. After five years, her skill set was so unique that she was the only person in the world who could do what she did.", "教育,職場,激勵"],
["solution", "səˈluːʃən", "n.", "解決方案", "Every problem has a solution — your job is to find it.", "每個問題都有解決方案——你的工作是找到它。", "Find a solution = 找到解決方案。Practical solution = 實際的解決方案。", "find a solution=找到解決方案/practical solution=實際解決方案/creative solution=創意解法/long-term solution=長期解決方案", "She never brought a problem to her manager without a proposed solution. After one year, she was the most trusted person on the team. Own problems. Bring solutions.", "職場,哲學"],
["strategy", "ˈstrætɪdʒi", "n.", "策略", "A good strategy does not answer everything — it focuses on the right things.", "好的策略不能回答一切——它聚焦於正確的事情。", "Strategic = 策略性的。Long-term strategy = 長期策略。", "long-term strategy=長期策略/strategic planning=策略規劃/competitive strategy=競爭策略/execute strategy=執行策略", "She did not have more resources than competitors. She just focused more carefully. That discipline made her the market leader in three years. Strategy beats resources.", "商業,職場"],
["succeed", "səkˈsiːd", "v.", "成功", "You are more likely to succeed if you help others succeed first.", "如果你首先幫助他人成功，你就更有可能成功。", "Success = 成功（名詞）。Successful = 成功的。Successor = 繼承者。", "success=成功/successful=成功的/successor=繼承者/recipe for success=成功的秘訣", "She helped every junior colleague who asked. Twenty years later, those colleagues were CEOs and directors who gave her opportunities nobody else had access to. Help others succeed.", "職場,激勵"],
["sustainable", "səˈsteɪnəbl", "adj.", "可持續的", "Build habits and systems that are sustainable long-term.", "建立可長期持續的習慣和系統。", "Sustainability = 可持續性（名詞）。Sustainable growth = 可持續增長。", "sustainability=可持續性/sustainable growth=可持續增長/environmentally sustainable=環境可持續", "She did not sprint toward her goal. She built systems she could maintain forever. Slow, sustainable progress beat the short bursts of motivation that burned out everyone else.", "生活,環境,激勵"],
["talent", "ˈtælənt", "n.", "才能；天賦", "Talent is the starting point — hard work is what matters most.", "才能是起點——努力工作才是最重要的。", "Talented = 有才華的。Natural talent = 天生才華。Talent show = 才藝秀。", "talented=有才華的/natural talent=天生才華/talent show=才藝秀/develop talent=培養才能", "He was not the most talented player. But he was the first to arrive and last to leave every practice. Talent is common. Commitment to developing it is rare.", "運動,教育,激勵"],
["team", "tiːm", "n.", "團隊", "A great team is made of people who make each other better.", "一個偉大的團隊由讓彼此變得更好的人組成。", "Teamwork = 團隊合作。Team player = 有團隊精神的人。", "teamwork=團隊合作/team player=有團隊精神的人/team spirit=團隊精神/build a team=建立團隊", "She built her team not by finding the most talented people but by finding people who made each other better. Chemistry beat credentials every time.", "職場,商業"],
["transparent", "trænsˈpærənt", "adj.", "透明的；坦誠的", "Transparent leadership builds far more trust than secrecy.", "透明的領導力建立比保密更多的信任。", "Transparency = 透明度（名詞）。Be transparent about = 對...保持透明。", "transparency=透明度/be transparent about=對...保持透明/lack of transparency=缺乏透明度", "She told her team exactly why the decision was made, even when it was not her choice. People felt respected and informed. Transparency is the fastest way to build trust.", "職場,溝通"],
["urgent", "ˈɜːrdʒənt", "adj.", "緊急的", "Not everything urgent is important. Distinguish carefully.", "不是所有緊急的事都重要。要仔細區分。", "Urgency = 緊迫性（名詞）。Mark as urgent = 標記為緊急。", "urgency=緊迫性/mark as urgent=標記為緊急/urgent care=緊急護理/create urgency=製造緊迫感", "The manager opened every email marked urgent. Most were not. She started filtering ruthlessly. Her stress dropped by half. Urgency is often manufactured.", "職場,健康"],
["vision", "ˈvɪʒən", "n.", "願景；視力", "A clear vision is worth more than a detailed plan.", "清晰的願景比詳細的計劃更有價值。", "Visionary = 有遠見的人。Long-term vision = 長期願景。", "visionary=有遠見的人/long-term vision=長期願景/shared vision=共同願景/vision board=願景板", "The CEO spent three days writing a one-page vision statement. Every decision after that was measured against it. Clarity of vision makes thousands of decisions easy.", "商業,職場"],
["agenda", "əˈdʒɛndə", "n.", "議程；動機", "Please review the agenda before tomorrow's meeting.", "請在明天的會議前查閱議程。", "Set the agenda = 設定議程。Hidden agenda = 隱藏的動機。Meeting agenda = 會議議程。", "set the agenda=設定議程/hidden agenda=隱藏動機/meeting agenda=會議議程/agenda item=議程項目", "She always sent the agenda 48 hours in advance. Meetings that previously ran over time now ended early. Preparation multiplied meeting efficiency by three.", "職場,商業"],
["allocate", "ˈæləkeɪt", "v.", "分配；撥款", "Allocate your best hours to your most important work.", "把你最好的時間分配給你最重要的工作。", "Allocation = 分配（名詞）。Resource allocation = 資源分配。Time allocation = 時間分配。", "resource allocation=資源分配/time allocation=時間分配/budget allocation=預算分配/allocate resources=分配資源", "The project failed not from lack of effort but from poor resource allocation. Everyone was busy. Nobody was working on the critical path. Allocation is strategy made visible.", "職場,商業"],
["assess", "əˈsɛs", "v.", "評估", "Honestly assess your strengths and weaknesses regularly.", "定期誠實地評估你的優缺點。", "Assessment = 評估（名詞）。Self-assessment = 自我評估。Performance assessment = 績效評估。", "assessment=評估/self-assessment=自我評估/performance assessment=績效評估/risk assessment=風險評估", "Before every project, she assessed risks comprehensively. Her team thought she was pessimistic. Her projects consistently delivered on time and budget. Assessment is not pessimism — it is preparation.", "職場,教育"],
["assumption", "əˈsʌmpʃən", "n.", "假設；前提", "Dangerous assumptions are the ones you make without realizing.", "危險的假設是你在沒有意識到的情況下做出的。", "Make an assumption = 做出假設。False assumption = 錯誤假設。Challenge assumptions = 挑戰假設。", "make an assumption=做出假設/false assumption=錯誤假設/challenge assumptions=挑戰假設/assumption-free=無假設", "The strategy was built on three assumptions that turned out to be wrong. She learned: always write your assumptions down explicitly before planning. Invisible assumptions are invisible risks.", "商業,哲學,職場"],
["benchmark", "ˈbɛntʃmɑːrk", "n./v.", "基準；對標", "Use industry benchmarks to measure your team's performance.", "使用行業基準來衡量你的團隊績效。", "Set a benchmark = 設定基準。Benchmark against = 與...對標。Industry benchmark = 行業基準。", "set a benchmark=設定基準/benchmark against=與...對標/performance benchmark=績效基準/world-class benchmark=世界級基準", "She benchmarked her company against the best in the world, not just her industry. The gap was larger than expected. That discomfort drove three years of exceptional improvement.", "商業,職場"],
["brand", "brænd", "n.", "品牌", "Your personal brand is what people say when you leave the room.", "你的個人品牌是人們在你離開房間後說的話。", "Brand identity = 品牌識別。Brand loyalty = 品牌忠誠度。Rebrand = 重新品牌定位。", "brand identity=品牌識別/brand loyalty=品牌忠誠度/rebrand=重塑品牌/personal brand=個人品牌", "She built the brand on one principle: never over-promise. Every customer expectation was exceeded. Brand loyalty followed not from marketing but from consistent delivery.", "商業,職場"],
["candidate", "ˈkændɪdɪt", "n.", "候選人；應徵者", "She was the strongest candidate by every objective measure.", "她在每一個客觀衡量標準上都是最強的候選人。", "Job candidate = 求職者。Top candidate = 最佳候選人。Front-runner = 領先候選人。", "job candidate=求職者/top candidate=最佳候選人/qualified candidate=合格候選人/ideal candidate=理想人選", "The hiring committee was divided. Then one manager said: 'Forget the CV. Who would you most want to face a crisis with?' The vote became unanimous.", "職場,商業"],
["capacity", "kəˈpæsɪti", "n.", "能力；容量", "She is working at full capacity and needs support now.", "她在全力運轉，現在需要支持。", "At full capacity = 全力運轉。Build capacity = 建立能力。Storage capacity = 儲存容量。", "at full capacity=全力運轉/build capacity=建立能力/mental capacity=心理能力/capacity building=能力建設", "Good managers monitor team capacity like engineers monitor engine capacity. Running people at 100% long-term is not sustainable. It is a recipe for failure, not success.", "職場,商業,健康"],
["competency", "ˈkɒmpɪtənsi", "n.", "能力；技能", "Map your core competencies before entering any new market.", "在進入任何新市場之前先規劃你的核心能力。", "Core competency = 核心能力。Technical competency = 技術能力。Competency framework = 能力框架。", "core competency=核心能力/technical competency=技術能力/competency gap=能力差距/build competency=建立能力", "The company tried to expand into areas outside their core competency. They failed expensively. Returning to what they did best, they thrived. Know where your mastery lives.", "商業,職場"],
["competitive", "kəmˈpɛtɪtɪv", "adj.", "競爭的；有競爭力的", "Stay competitive by constantly improving what you offer.", "通過不斷改進你提供的東西來保持競爭力。", "Competitive advantage = 競爭優勢。Highly competitive = 高度競爭的。Competitive pricing = 競爭性定價。", "competitive advantage=競爭優勢/highly competitive=高度競爭/competitive pricing=競爭性定價/stay competitive=保持競爭力", "She built a competitive advantage nobody else could copy: trust. Competitors could match her price or quality. Nobody could replicate fifteen years of relationships built on integrity.", "商業,職場"],
["consensus", "kənˈsɛnsəs", "n.", "共識", "Build consensus before committing to any major decision.", "在做出任何重大決定之前建立共識。", "Reach a consensus = 達成共識。Consensus-building = 建立共識。By consensus = 通過共識。", "reach a consensus=達成共識/consensus building=建立共識/general consensus=普遍共識/lack of consensus=缺乏共識", "The team made decisions by consensus for everything. Decision-making slowed to a crawl. She introduced a new rule: small decisions by one person, big ones by all. Speed returned.", "職場,溝通"],
["constraint", "kənˈstreɪnt", "n.", "限制；約束", "Constraints often lead to more creative solutions.", "限制往往導致更有創意的解決方案。", "Budget constraint = 預算限制。Time constraint = 時間限制。Work within constraints = 在限制內工作。", "budget constraint=預算限制/time constraint=時間限制/resource constraint=資源限制/creative constraint=創意約束", "The team complained about their limited budget. The manager reframed it: 'You have limited resources and unlimited creativity. Go.' They produced the company's best product ever.", "商業,職場,創意"],
["contract", "ˈkɒntrækt", "n.", "合同；契約", "Read every contract carefully before you sign anything.", "在簽署任何東西之前仔細閱讀每份合同。", "Sign a contract = 簽合同。Breach of contract = 違約。Service contract = 服務合同。", "sign a contract=簽合同/breach of contract=違約/service contract=服務合同/contract negotiation=合同談判", "She read contracts differently from others — not to find escape clauses, but to understand obligations. That thoroughness made her the most trusted partner in her industry.", "商業,法律"],
["coordinate", "koʊˈɔːrdɪneɪt", "v.", "協調", "Someone needs to coordinate the three teams' efforts.", "需要有人協調三個團隊的努力。", "Coordination = 協調（名詞）。Cross-functional coordination = 跨部門協調。Well-coordinated = 協調良好的。", "coordination=協調/cross-functional=跨部門/well-coordinated=協調良好/coordinate efforts=協調努力", "Without coordination, three teams worked on the same problem simultaneously. After she stepped in to coordinate, they divided the work and solved it in a third of the time.", "職場,商業"],
["corporate", "ˈkɔːrpərɪt", "adj.", "企業的；公司的", "Corporate culture determines whether talented people stay or leave.", "企業文化決定了有才能的人是留下還是離開。", "Corporate culture = 企業文化。Corporate governance = 公司治理。Corporate values = 企業價值觀。", "corporate culture=企業文化/corporate governance=公司治理/corporate values=企業價值觀/corporate ladder=職業階梯", "She declined the corporate job for the startup. Five years later, the corporate offer was ten times bigger because of her startup experience. Sometimes the less obvious path accelerates fastest.", "商業,職場"],
["criteria", "kraɪˈtɪəriə", "n.", "標準；條件", "What criteria do you use to evaluate success?", "你用什麼標準來評估成功？", "Meet the criteria = 符合標準。Evaluation criteria = 評估標準。Selection criteria = 選擇標準。", "meet the criteria=符合標準/evaluation criteria=評估標準/selection criteria=選擇標準/clear criteria=明確標準", "She judged every opportunity by the same three criteria: alignment with values, growth potential, impact on people. That clarity made decision-making fast and consistent.", "商業,哲學,職場"],
["demographic", "ˌdɛməˈɡræfɪk", "n./adj.", "人口的；人口統計", "Our target demographic is urban professionals aged 25-40.", "我們的目標人群是25-40歲的城市專業人士。", "Target demographic = 目標人群。Demographic shift = 人口轉變。Demographic data = 人口數據。", "target demographic=目標人群/demographic shift=人口轉變/demographic data=人口數據", "She noticed the demographic shift three years before competitors did. That early observation allowed her company to pivot before the change became obvious. Watching demographics is a superpower.", "商業,社會"],
["differentiate", "ˌdɪfəˈrɛnʃieɪt", "v.", "區分；使差異化", "You must clearly differentiate your offering from competitors.", "你必須清楚地使你的產品與競爭對手區分開來。", "Product differentiation = 產品差異化。Differentiated = 差異化的。Point of differentiation = 差異化點。", "product differentiation=產品差異化/point of difference=差異點/differentiated approach=差異化方法", "She asked her customers what made them choose her over competitors. The answer surprised her — it was not the product but the relationship. That answer reshaped her entire business model.", "商業,職場"],
["diligent", "ˈdɪlɪdʒənt", "adj.", "勤奮的；認真的", "The most diligent worker is not always the most productive.", "最勤奮的工作者不一定是最有生產力的。", "Diligence = 勤奮（名詞）。Diligently = 勤奮地。Hard-working = 努力工作的（同義）。", "diligence=勤奮/diligently=勤奮地/due diligence=盡職調查/diligent worker=勤奮的工作者", "She was the most diligent person in the office — first in, last out. But her output was average. She realized diligence needed direction. Working hard and working smart are not the same.", "職場,激勵"],
["disrupt", "dɪsˈrʌpt", "v.", "顛覆；干擾", "The startup set out to disrupt the entire financial industry.", "這家新創公司著手顛覆整個金融行業。", "Disruption = 顛覆（名詞）。Disruptive = 顛覆性的。Market disruption = 市場顛覆。", "disruption=顛覆/disruptive=顛覆性的/market disruption=市場顛覆/disruptive technology=顛覆性技術", "The industry laughed at the idea. Then it disrupted them completely. Every major disruption in history was dismissed by the people it eventually displaced. Take the disruptors seriously.", "商業,科技"],
["diverse", "daɪˈvɜːrs", "adj.", "多元的；不同的", "A diverse team produces more creative solutions consistently.", "多元化的團隊持續產生更有創意的解決方案。", "Diversity = 多元化（名詞）。Inclusive and diverse = 包容且多元。Cultural diversity = 文化多元性。", "diversity=多元化/cultural diversity=文化多元/diverse perspective=多元視角/build a diverse team=建立多元團隊", "The homogeneous team kept making the same kind of mistake. When she diversified the team — backgrounds, thinking styles, experience — the blind spots disappeared.", "商業,社會,職場"],
["document", "ˈdɒkjumənt", "n./v.", "文件；記錄", "Document every decision so you can learn from the outcomes.", "記錄每一個決定，以便你能從結果中學習。", "Documentation = 文件記錄（名詞）。Well-documented = 有充分記錄的。Document management = 文件管理。", "documentation=文件記錄/well-documented=有充分記錄/document management=文件管理/official document=官方文件", "She documented everything — decisions, reasoning, outcomes. When the same problem appeared two years later, the documentation saved days of rework. Writing things down is compounding thinking.", "職場,教育"],
["dominate", "ˈdɒmɪneɪt", "v.", "主導；主宰", "She dominated her market through consistency and quality.", "她通過一致性和品質主導了她的市場。", "Market dominance = 市場主導地位。Dominant = 主導的。Domination = 主宰（名詞）。", "market dominance=市場主導/dominant=主導的/domination=主宰/dominant player=主導者", "The company that dominated by lowering prices eventually lost to one that dominated through trust. Price is the weakest competitive advantage. Trust is the strongest.", "商業,運動"],
["emerge", "ɪˈmɜːrdʒ", "v.", "出現；浮現", "Strong leaders emerge in times of genuine uncertainty.", "強大的領導者在真正不確定的時候出現。", "Emerging market = 新興市場。Emergence = 出現（名詞）。Emerge stronger = 更強大地出現。", "emerging market=新興市場/emerge stronger=更強大地出現/newly emerging=新興的/pattern emerging=模式浮現", "She entered the emerging market when it was too small to be interesting to large competitors. When they finally noticed, she was already entrenched. Early entry into emerging spaces wins.", "商業,社會"],
["equity", "ˈɛkwɪti", "n.", "公平；股本", "Build equity in everything — relationships, reputation, skills.", "在一切事物中建立股本——關係、聲譽、技能。", "Equity stake = 股份。Brand equity = 品牌資產。Home equity = 房屋淨值。", "equity stake=股份/brand equity=品牌資產/home equity=房屋淨值/equity investment=股權投資", "She negotiated for equity, not just salary. Three years later, the company was acquired. The equity check changed her entire life trajectory. Always negotiate for ownership.", "商業,金融"],
["estimate", "ˈɛstɪmɪt", "v.", "估計；估算", "Always estimate conservatively and deliver beyond expectations.", "永遠保守估計並超越預期交付。", "Estimate time = 估計時間。Rough estimate = 大略估計。Cost estimate = 費用估計。", "estimate time=估計時間/rough estimate=大略估計/cost estimate=費用估計/ballpark estimate=大致估算", "She always doubled her time estimates for projects. She was always late anyway — but only by 10% instead of 100%. Teams that are honest about estimates build trust faster than optimistic ones.", "職場,商業"],
["exceed", "ɪkˈsiːd", "v.", "超過；超越", "Always aim to exceed what is expected of you.", "總是致力於超越對你的期望。", "Exceed expectations = 超越期望。Exceed the limit = 超出限制。Exceed targets = 超出目標。", "exceed expectations=超越期望/exceed the limit=超出限制/exceed targets=超出目標/far exceed=大幅超過", "She set her team's targets at what she believed was the ceiling, then watched them exceed it every quarter. She learned: people consistently surprise you upward when given the chance.", "職場,激勵"],
["execute", "ˈɛksɪkjuːt", "v.", "執行；實施", "Great strategy means nothing without great execution.", "沒有出色的執行，偉大的策略毫無意義。", "Execution = 執行（名詞）。Flawless execution = 完美執行。Execute the plan = 執行計劃。", "execution=執行/flawless execution=完美執行/execute the plan=執行計劃/poor execution=執行不善", "The idea was average. The execution was extraordinary. They won. The competitor had a better idea and mediocre execution. They lost. Execution beats ideas in the real world.", "商業,職場"],
["expertise", "ˌɛkspɜːrˈtiːz", "n.", "專業知識；專長", "Build deep expertise in one area before going broad.", "在廣泛發展之前先在一個領域建立深厚的專業知識。", "Domain expertise = 領域專長。Develop expertise = 培養專長。Expert = 專家。", "domain expertise=領域專長/develop expertise=培養專長/call on expertise=調用專長/expertise gap=專長差距", "She spent ten years building expertise in one narrow field. Then she was the only person in the world who could solve certain problems. Narrowness creates uniqueness. Uniqueness creates value.", "職場,教育"],
["facilitate", "fəˈsɪlɪteɪt", "v.", "促進；便利", "Her role was to facilitate collaboration between teams.", "她的角色是促進團隊之間的合作。", "Facilitator = 促進者。Facilitation = 促進（名詞）。Facilitate discussion = 促進討論。", "facilitator=促進者/facilitation=促進/facilitate discussion=促進討論/facilitate change=促進改變", "She transformed from 'answer-giver' to 'question-asker.' Her meetings went from directives to dialogues. She discovered that facilitating thinking produced better results than telling people what to think.", "職場,教育,溝通"],
["forecast", "ˈfɔːrkæst", "n./v.", "預測；預報", "Accurate forecasting requires data, judgment, and humility.", "準確的預測需要數據、判斷和謙遜。", "Sales forecast = 銷售預測。Weather forecast = 天氣預報。Forecast accuracy = 預測準確性。", "sales forecast=銷售預測/weather forecast=天氣預報/forecast accuracy=預測準確性/demand forecast=需求預測", "Her forecasts were always conservative. She was proven right 80% of the time. That accuracy built credibility. Accuracy over optimism is always the winning forecasting philosophy.", "商業,科學"],
["generate", "ˈdʒɛnəreɪt", "v.", "產生；生成", "The campaign generated three times more revenue than expected.", "該活動產生了比預期多三倍的收入。", "Generate revenue = 產生收入。Generate ideas = 產生想法。Revenue generation = 收入產生。", "generate revenue=產生收入/generate ideas=產生想法/revenue generation=收入產生/generate leads=產生潛在客戶", "She generated ideas not by waiting for inspiration but by scheduling two hours per week for creative thinking. Ideas on demand. The schedule created the conditions for breakthrough.", "商業,創意"],
["goal-oriented", "ˈɡoʊl ˈɔːriəntɪd", "adj.", "目標導向的", "Hire goal-oriented people and remove the obstacles in their way.", "雇用目標導向的人並清除他們路上的障礙。", "Results-driven = 以結果為導向的。Outcome-focused = 以結果為中心的。Objective-based = 基於目標的。", "results-driven=以結果為導向/outcome-focused=以結果為中心/set clear goals=設定明確目標", "He defined success for his team clearly: not activity, but outcomes. That shift from measuring hours to measuring results transformed everything about how the team worked.", "職場,激勵"],
["incentive", "ɪnˈsɛntɪv", "n.", "激勵；誘因", "Align incentives with behaviors you want to encourage.", "將激勵措施與你想鼓勵的行為對齊。", "Financial incentive = 財務激勵。Create incentives = 創造激勵。Incentive program = 激勵計劃。", "financial incentive=財務激勵/create incentives=創造激勵/incentive program=激勵計劃/align incentives=對齊激勵", "She redesigned the incentive structure to reward collaboration, not individual performance. Within two quarters, the team's collective output doubled. What you reward, you get more of.", "商業,職場"],
["innovative", "ˈɪnəveɪtɪv", "adj.", "創新的", "The most innovative companies create cultures that welcome failure.", "最具創新性的公司創造歡迎失敗的文化。", "Innovation = 創新（名詞）。Innovate = 創新（動詞）。Groundbreaking innovation = 突破性創新。", "innovation=創新/innovate=創新/groundbreaking=突破性的/innovative approach=創新方法/disruptive innovation=顛覆性創新", "She gave every team member one afternoon per week for non-directed innovation. Most produced nothing. A few produced ideas that became the company's best products. The math worked.", "商業,科技,創意"],
["insight", "ˈɪnsaɪt", "n.", "洞察力；見解", "Deep customer insights transform average products into great ones.", "深刻的客戶洞察將普通產品轉化為優秀產品。", "Gain insight = 獲得洞察。Key insight = 關鍵見解。Business insight = 商業洞察。", "gain insight=獲得洞察/key insight=關鍵見解/actionable insight=可行的洞察/market insight=市場洞察", "The market research report was 200 pages. Her one insight — distilled from reading it carefully — was worth millions. The ability to find the one insight in 200 pages is rare and valuable.", "商業,教育"],
["integrity", "ɪnˈtɛɡrɪti", "n.", "誠信；正直", "Integrity means doing the right thing when no one is watching.", "誠信意味著在沒有人看到的時候做正確的事。", "Act with integrity = 以誠信行事。Integrity check = 誠信審查。Organizational integrity = 組織誠信。", "act with integrity=以誠信行事/integrity check=誠信審查/organizational integrity=組織誠信/personal integrity=個人誠信", "Clients chose her over cheaper options every time. When asked why, they said the same thing: integrity. They knew what she said was what she would do. That predictability was priceless.", "職場,商業,哲學"],
["justify", "ˈdʒʌstɪfaɪ", "v.", "證明正當；辯護", "Always be able to justify your decisions with clear reasoning.", "永遠能夠用清晰的推理來證明你的決定是正當的。", "Justification = 理由（名詞）。Unjustifiable = 無法辯護的。Justify a decision = 證明決定合理。", "justification=理由/unjustifiable=無法辯護/justify a decision=證明決定合理/can't justify=無法辯護", "She required every significant expenditure to come with a written justification. Not to block spending but to clarify thinking. Writing the justification often revealed the expenditure was unnecessary.", "職場,商業"],
["leverage", "ˈliːvərɪdʒ", "n./v.", "槓桿；利用", "Leverage your existing relationships to open new opportunities.", "利用你現有的關係來開拓新的機會。", "Financial leverage = 財務槓桿。Leverage resources = 利用資源。Use leverage = 使用槓桿。", "financial leverage=財務槓桿/leverage resources=利用資源/leverage your network=利用人脈/create leverage=創造槓桿", "She never tried to do everything herself. She leveraged other people's expertise, networks, and resources. That multiplication effect made one person feel like a whole team.", "商業,職場"],
["maintain", "meɪnˈteɪn", "v.", "維持；保持", "Maintain your standards even when it would be easier not to.", "即使不這樣做更容易，也要維持你的標準。", "Maintenance = 維護（名詞）。Well-maintained = 維護良好的。Maintain quality = 維持品質。", "maintenance=維護/well-maintained=維護良好/maintain quality=維持品質/self-maintenance=自我維護", "The company grew so fast that quality slipped. Customers noticed. The CEO paused growth to maintain standards. The pause cost short-term revenue but saved long-term trust.", "商業,職場"],
["maximize", "ˈmæksɪmaɪz", "v.", "最大化", "Maximize impact by focusing on your highest-value activities.", "通過專注於你最高價值的活動來最大化影響。", "Maximize efficiency = 最大化效率。Maximize returns = 最大化回報。Maximize potential = 最大化潛能。", "maximize efficiency=最大化效率/maximize returns=最大化回報/maximize potential=最大化潛能/maximize value=最大化價值", "She stopped trying to maximize everything. Instead, she maximized the few things that mattered most and let the rest be adequate. Selective maximization is a superpower.", "商業,職場"],
["measure", "ˈmɛʒər", "n./v.", "措施；衡量", "What gets measured gets managed — be intentional about what you measure.", "被衡量的東西被管理——有意識地衡量你所測量的東西。", "Performance measure = 績效衡量。Take measures = 採取措施。Measure progress = 衡量進展。", "performance measure=績效衡量/take measures=採取措施/measure progress=衡量進展/measurement tool=衡量工具", "She changed what she measured. Old: hours worked. New: customer satisfaction. New: team wellbeing. New: outcomes delivered. What you measure shapes what you become as an organization.", "商業,職場"],
["mentor", "ˈmɛntər", "n./v.", "導師；輔導", "A good mentor accelerates your growth by years.", "一個好的導師可以加速你的成長多年。", "Mentorship = 導師制度（名詞）。Mentor someone = 輔導某人。Seek a mentor = 尋找導師。", "mentorship=導師制度/mentor someone=輔導某人/seek a mentor=尋找導師/reverse mentoring=反向導師", "She had three mentors — one ahead of her in career, one her equal in experience, one younger with different skills. Each gave her perspectives she could never have seen alone.", "職場,教育"],
["milestone", "ˈmaɪlstoʊn", "n.", "里程碑；重要時刻", "Celebrate every milestone — they fuel the energy for the next one.", "慶祝每一個里程碑——它們為下一個加油。", "Hit a milestone = 達到里程碑。Project milestone = 項目里程碑。Career milestone = 職業里程碑。", "hit a milestone=達到里程碑/project milestone=項目里程碑/career milestone=職業里程碑/mark a milestone=標記里程碑", "She stopped only to celebrate two milestones: beginning and completion. The team burned out. She added celebrations for every intermediate milestone. Energy and commitment transformed.", "職場,商業,激勵"],
["momentum", "moʊˈmɛntəm", "n.", "動能；勢頭", "Build momentum through small wins before tackling bigger challenges.", "在應對更大挑戰之前通過小勝利建立動能。", "Gain momentum = 積累動能。Lose momentum = 失去勢頭。Maintain momentum = 保持動能。", "gain momentum=積累動能/lose momentum=失去勢頭/maintain momentum=保持動能/build momentum=建立動能", "Every project has an early phase where momentum is fragile. She protected that phase fiercely — no distractions, no pivots. Once momentum was established, the project became unstoppable.", "商業,職場,激勵"],
["motivate", "ˈmoʊtɪveɪt", "v.", "激勵；驅使", "You motivate people by connecting their work to something meaningful.", "你通過將他們的工作與有意義的東西聯繫起來來激勵人們。", "Motivation = 激勵（名詞）. Motivating = 激勵人心的。Self-motivated = 自我激勵的。", "motivation=激勵/motivating=激勵人心的/self-motivated=自我激勵/intrinsic motivation=內在激勵", "She stopped trying to motivate through fear or reward. Instead, she helped each person connect their daily work to a bigger purpose. Intrinsic motivation, she discovered, is the only kind that lasts.", "職場,教育,激勵"],
["network", "ˈnɛtwɜːrk", "n./v.", "人脈；建立人際網絡", "Your network is your net worth — build it with genuine care.", "你的人脈就是你的淨資產——用真誠的關心來建立它。", "Networking = 建立人脈。Network event = 人脈活動。Professional network = 專業人脈。", "networking=建立人脈/network event=人脈活動/professional network=專業人脈/expand your network=擴展人脈", "She networked by giving — articles, introductions, feedback — long before asking for anything. When she needed help, the response was overwhelming. Generosity is the best networking strategy.", "職場,社交"],
["optimize", "ˈɒptɪmaɪz", "v.", "優化", "Optimize your systems before trying to optimize your effort.", "在嘗試優化你的努力之前先優化你的系統。", "Optimization = 優化（名詞）。Process optimization = 流程優化。Optimize performance = 優化績效。", "optimization=優化/process optimization=流程優化/optimize performance=優化績效/cost optimization=成本優化", "She spent one week mapping her workflow in detail. Then optimized it ruthlessly. The same output began taking half the time. Working harder on an optimized system beats harder work on a broken one.", "商業,科技,職場"],
["outsource", "ˈaʊtsɔːrs", "v.", "外包", "Outsource what you are not excellent at and reinvest the time.", "外包你不擅長的事情並重新投資節省的時間。", "Outsourcing = 外包（名詞）。Outsource tasks = 外包任務。Strategic outsourcing = 策略性外包。", "outsourcing=外包/outsource tasks=外包任務/strategic outsourcing=策略性外包/core vs non-core=核心與非核心", "She outsourced every non-core function the moment she could afford it. Each outsourced task freed four hours per week. Those hours, reinvested into her strengths, multiplied her output dramatically.", "商業,職場"],
["performance", "pərˈfɔːrməns", "n.", "績效；表現", "High performance requires both clarity of role and support to succeed.", "高績效需要角色的清晰度和成功的支持。", "High performance = 高績效。Performance review = 績效評估。Performance gap = 績效差距。", "high performance=高績效/performance review=績效評估/performance gap=績效差距/measure performance=衡量績效", "She held performance conversations monthly, not annually. Issues were addressed before they became entrenched. Feedback given promptly changes behavior. Annual reviews merely document it.", "職場,商業"],
["pipeline", "ˈpaɪplaɪn", "n.", "管道；流程", "Always maintain a healthy pipeline of opportunities.", "永遠保持健康的機會流程。", "Sales pipeline = 銷售管道。Leadership pipeline = 領導力培養管道。Pipeline of talent = 人才培育管道。", "sales pipeline=銷售管道/leadership pipeline=領導力管道/pipeline of talent=人才培育/full pipeline=充實的管道", "When sales were strong, she still filled the pipeline. When others were celebrating, she was planting. The harvest she always had was the result of seeds she planted during the feast.", "商業,職場"],
["pitch", "pɪtʃ", "n./v.", "推介；音調", "Perfect your pitch until it fits inside sixty seconds.", "完善你的推介，直到它能在六十秒內完成。", "Sales pitch = 銷售推介。Pitch deck = 推介簡報。Make a pitch = 做一個推介。", "sales pitch=銷售推介/pitch deck=推介簡報/make a pitch=做推介/elevator pitch=電梯演講", "She practiced her pitch 200 times before the investor meeting. Walking in, she was calm. The investors said later: 'We have never seen someone so prepared.' 200 repetitions produce effortless confidence.", "商業,溝通"],
["productivity", "ˌprɒdʌkˈtɪvɪti", "n.", "生產力", "True productivity is doing the right things, not just more things.", "真正的生產力是做正確的事情，而不只是做更多的事情。", "Boost productivity = 提升生產力。Personal productivity = 個人生產力。Productivity tool = 生產力工具。", "boost productivity=提升生產力/personal productivity=個人生產力/productivity hack=生產力技巧/peak productivity=峰值生產力", "She measured her productivity by outcome, not activity. She worked fewer hours than her peers but produced more. Not because she worked harder — because she worked on the right things.", "職場,生活"],
["profile", "ˈproʊfaɪl", "n.", "簡介；側面", "Build your professional profile before you need it.", "在你需要它之前建立你的職業簡介。", "High profile = 高知名度。Risk profile = 風險狀況。Customer profile = 客戶簡介。", "high profile=高知名度/risk profile=風險狀況/customer profile=客戶簡介/raise your profile=提升知名度", "She built her public profile during the good years. When her company faced a crisis, the credibility she had built absorbed the impact. Reputation is insurance built before the claim is needed.", "商業,職場"],
["project", "ˈprɒdʒɛkt", "n.", "項目；工程", "Break every large project into small, achievable daily steps.", "將每個大項目分解成小的、可實現的每日步驟。", "Project management = 項目管理。On track = 在正軌上。Project scope = 項目範圍。", "project management=項目管理/on track=在正軌上/project scope=項目範圍/side project=側面項目", "Her side project started as a weekend experiment. She showed it to three friends. They showed their friends. Six months later, it had become her main business. Side projects deserve serious attention.", "商業,職場"],
["prototype", "ˈproʊtəˌtaɪp", "n.", "原型", "Build a prototype quickly and test it before full investment.", "快速建立一個原型，在全面投資之前進行測試。", "Rapid prototype = 快速原型。Prototype testing = 原型測試。Build a prototype = 建立原型。", "rapid prototype=快速原型/prototype testing=原型測試/build a prototype=建立原型/working prototype=可運作原型", "She built the prototype in one weekend. It was rough, ugly, and incomplete. But it was enough to show investors the concept. The perfect version came after the imperfect prototype found the funding.", "科技,商業"],
["scalable", "ˈskeɪləbl", "adj.", "可擴展的", "Build processes that are scalable from day one.", "從第一天起就建立可擴展的流程。", "Scale up = 擴大規模。Scalability = 可擴展性（名詞）。Highly scalable = 高度可擴展的。", "scale up=擴大規模/scalability=可擴展性/highly scalable=高度可擴展/scale a business=擴大業務", "She designed every system as if it would serve a million customers, when she had a hundred. When scale came, nothing broke. Building for scale early is far cheaper than rebuilding under pressure.", "商業,科技"],
["stakeholder", "ˈsteɪkhoʊldər", "n.", "利益相關者", "Identify all stakeholders early and communicate with them regularly.", "盡早識別所有利益相關者並定期與他們溝通。", "Key stakeholder = 關鍵利益相關者。Stakeholder management = 利益相關者管理。Internal stakeholder = 內部利益相關者。", "key stakeholder=關鍵利益相關者/stakeholder management=利益相關者管理/engage stakeholders=讓利益相關者參與", "The project failed not from poor execution but from poor stakeholder management. Three key people felt excluded from decisions. Including them cost nothing. Excluding them cost everything.", "商業,職場"],
["tactical", "ˈtæktɪkl", "adj.", "戰術的；策略性的", "Tactical decisions support the larger strategic direction.", "戰術決策支持更大的策略方向。", "Tactical approach = 戰術方法。Tactical thinking = 戰術思維。Strategic and tactical = 策略與戰術。", "tactical approach=戰術方法/tactical thinking=戰術思維/tactical retreat=戰術撤退/tactical decision=戰術決策", "She was a strategic thinker who could also execute tactically. That rare combination — seeing both the forest and the trees — made her the most complete leader in her organization.", "職場,商業"],
["target", "ˈtɑːrɡɪt", "n./v.", "目標；針對", "Set realistic targets and then exceed them systematically.", "設定現實的目標，然後系統地超越它們。", "Hit the target = 達到目標。Target audience = 目標受眾。On target = 在目標上。", "hit the target=達到目標/target audience=目標受眾/on target=在目標上/moving target=移動目標", "She broke annual targets into weekly ones. At week 52, she had either hit 52 small targets or learned from 52 specific failures. Both outcomes were better than one annual reckoning.", "商業,職場"],
["upgrade", "ˈʌpɡreɪd", "v./n.", "升級", "Upgrade your skills before your role requires it.", "在你的職位需要之前升級你的技能。", "System upgrade = 系統升級。Skill upgrade = 技能升級。Upgrade your thinking = 升級你的思維。", "system upgrade=系統升級/skill upgrade=技能升級/upgrade your thinking=升級你的思維/constant upgrade=持續升級", "She upgraded her technical skills every two years, staying ahead of changes in her field. While peers scrambled to catch up with new tools, she was already proficient. Proactive upgrading creates unfair advantages.", "科技,職場"],
["validate", "ˈvælɪdeɪt", "v.", "驗證；確認", "Validate your assumptions before investing significant resources.", "在投入大量資源之前驗證你的假設。", "Validation = 驗證（名詞）。Customer validation = 客戶驗證。Market validation = 市場驗證。", "validation=驗證/customer validation=客戶驗證/market validation=市場驗證/seek validation=尋求驗證", "She spent three weeks validating the idea with potential customers before building anything. The feedback changed the product completely. Validation before building is the most efficient path to success.", "商業,科技"],
["venture", "ˈvɛntʃər", "n./v.", "冒險；企業", "The bravest thing she ever did was venture into the unknown.", "她做過的最勇敢的事情就是冒險進入未知領域。", "Venture capital = 創業投資。Joint venture = 合資企業。Venture into = 冒險進入。", "venture capital=創業投資/joint venture=合資企業/venture into=冒險進入/calculated venture=有計算的冒險", "The venture failed financially. But it succeeded in teaching her more about business in one year than ten years in a stable job. Failed ventures are the most expensive and valuable education.", "商業,激勵"],
["workshop", "ˈwɜːrkʃɒp", "n.", "研討會；工作坊", "She ran a workshop that transformed how the team communicated.", "她舉辦了一個研討會，改變了團隊的溝通方式。", "Run a workshop = 舉辦工作坊。Workshop facilitator = 工作坊引導者。Skills workshop = 技能研討會。", "run a workshop=舉辦工作坊/workshop facilitator=工作坊引導者/skills workshop=技能研討會/interactive workshop=互動工作坊", "She made every workshop interactive: no slides for more than ten minutes, movement, discussion, application. Attendance became something people fought for. Learning environments should feel nothing like school.", "職場,教育"],
],
a: [
["articulate", "ɑːrˈtɪkjuleɪt", "v./adj.", "清晰表達；口齒伶俐的", "She articulated her position clearly and persuasively.", "她清晰且有說服力地表達了她的立場。", "Articulation = 表達（名詞）。Well-articulated = 表達清晰的。", "well-articulated=表達清晰/inarticulate=表達不清/articulate your thoughts=表達想法", "The young lawyer was nervous, but when she started speaking, the room fell silent. Her ability to articulate complex ideas simply was her greatest power.", "職場,溝通"],
["ambiguous", "æmˈbɪɡjuəs", "adj.", "模糊的；含義不清的", "Avoid ambiguous instructions — be specific and clear always.", "避免模糊的指示——要始終具體和清晰。", "Ambiguity = 模糊性（名詞）。Remove ambiguity = 消除模糊。", "ambiguity=模糊性/remove ambiguity=消除模糊/morally ambiguous=道德上模糊的", "The project failed not because the goal was wrong — but because it was ambiguous. Everyone interpreted it differently. Remove ambiguity before you begin.", "職場,溝通"],
["analyze", "ˈænəlaɪz", "v.", "深度分析", "Before proposing solutions you must analyze root causes deeply.", "在提出解決方案之前，你必須深入分析根本原因。", "Analysis = 分析（名詞）。Critical analysis = 批判性分析。", "critical analysis=批判性分析/root cause analysis=根本原因分析/analyze thoroughly=徹底分析", "She did not accept the first explanation. She dug three levels deeper to find the real cause. That discipline of deep analysis saved the company from repeating the mistake.", "商業,科學"],
["coherent", "koʊˈhɪərənt", "adj.", "連貫的；有條理的", "A coherent argument is more persuasive than a complex one.", "連貫的論點比複雜的論點更有說服力。", "Coherence = 連貫性（名詞）。Incoherent = 不連貫的（反義）。", "coherence=連貫性/incoherent=不連貫/logically coherent=邏輯連貫/coherent strategy=連貫策略", "The report had excellent data but no coherent narrative. She spent three days restructuring — not the data, just the story. The board said yes immediately. Narrative is power.", "職場,溝通"],
["compelling", "kəmˈpɛlɪŋ", "adj.", "令人信服的；引人注目的", "A compelling argument changes how people see the world.", "令人信服的論點改變人們看待世界的方式。", "Compelling evidence = 有力證據。Compelling story = 引人入勝的故事。", "compelling argument=有力論點/compelling evidence=有力證據/compelling story=引人入勝的故事", "Her pitch was so compelling that investors did not just fund her — they asked to be involved. A great story creates momentum that data alone never can.", "商業,溝通"],
["contemplate", "ˈkɒntɛmpleɪt", "v.", "深思；考慮", "Before acting contemplate the consequences of your choices.", "在行動之前，深思你選擇的後果。", "Contemplation = 沉思（名詞）。Contemplative = 沉思的。", "contemplation=沉思/contemplative=沉思的/contemplate options=考慮選項", "He took three days to contemplate the offer. His friends thought he was overthinking. He was not. When he accepted, he had already played out every scenario. Slow decisions beat fast regrets.", "哲學,生活"],
["conviction", "kənˈvɪkʃən", "n.", "信念；定罪", "Act with conviction and others will follow your lead.", "以信念行動，其他人將跟隨你的引領。", "Deep conviction = 深刻信念。Conviction in beliefs = 對信念的確信。", "deep conviction=深刻信念/act with conviction=以信念行動/strength of conviction=信念的力量", "She had no money, no connections, and no guarantee of success. What she had was conviction. That alone convinced the first investor. Conviction is contagious.", "激勵,商業,哲學"],
["discern", "dɪˈsɜːrn", "v.", "辨別；洞察", "Leaders must discern what is important from what is urgent.", "領導者必須辨別什麼是重要的，什麼是緊急的。", "Discernment = 辨別力（名詞）。Discerning = 有洞察力的。", "discernment=辨別力/discerning=有洞察力的/discern patterns=辨別模式", "The data showed many signals. She discerned the three that mattered. Her team acted on those three alone. Six months later, she had been right about all of them.", "商業,哲學"],
["dilemma", "dɪˈlɛmə", "n.", "兩難；困境", "Every great moral story begins with an impossible dilemma.", "每一個偉大的道德故事都始於一個不可能的兩難困境。", "Ethical dilemma = 道德困境。Face a dilemma = 面對兩難。", "ethical dilemma=道德困境/face a dilemma=面對兩難/resolve a dilemma=解決困境", "She faced a dilemma: reveal the mistake and lose the client, or stay silent and keep the contract. She revealed it. The client respected her integrity and stayed.", "哲學,職場"],
["empirical", "ɪmˈpɪrɪkl", "adj.", "基於實證的", "Good policy must be based on empirical evidence not ideology.", "好的政策必須基於實證，而非意識形態。", "Empirically = 以實證的方式。Empirical research = 實證研究。", "empirical research=實證研究/empirically proven=有實證的/evidence-based=基於證據/empirical data=實證數據", "For years, the practice was dismissed as folk wisdom. Then empirical research confirmed what people had known for generations. Science catches up to lived experience.", "科學,社會"],
["eloquent", "ˈɛləkwənt", "adj.", "雄辯的；表達流暢的", "An eloquent speaker makes complex ideas feel simple and clear.", "雄辯的演說者使複雜的想法感覺簡單明了。", "Eloquence = 雄辯（名詞）。Eloquently = 雄辯地。", "eloquence=雄辯/speak eloquently=雄辯地說/eloquent prose=流暢的散文", "She was not born eloquent. She prepared every speech for 50 hours. By the time she stood up, the words flowed naturally. Eloquence is prepared, not inherited.", "溝通,教育"],
["ethical", "ˈɛθɪkl", "adj.", "符合道德的", "All long-term success depends on ethical foundations.", "所有長期的成功都依賴於道德基礎。", "Ethics = 道德（名詞）。Unethical = 不道德的。Business ethics = 商業道德。", "ethics=道德/unethical=不道德的/business ethics=商業道德/ethical dilemma=道德困境", "When the shortcut would have been profitable, she chose the ethical path. It cost her that quarter. It built her reputation for a decade. Ethics is a long-term investment.", "商業,哲學"],
["inevitable", "ɪnˈɛvɪtəbl", "adj.", "不可避免的", "Change is inevitable — your response to it is your choice.", "變化是不可避免的——你對它的反應是你的選擇。", "Inevitably = 不可避免地。Unavoidable = 無法避免的。", "inevitably=不可避免地/unavoidable=無法避免的/inevitable change=不可避免的變化/seems inevitable=似乎不可避免", "Is failure inevitable? the student asked. No, said the professor. But growth is impossible without it. That reframe changed how the entire class thought about risk.", "哲學,教育"],
["nuance", "ˈnjuːɑːns", "n.", "細微差別", "The best communicators are masters of nuance and tone.", "最好的溝通者是細微差別和語氣的大師。", "Nuanced = 細緻入微的。Miss the nuance = 錯過細微之處。", "nuanced=細緻入微/miss the nuance=錯過細節/cultural nuance=文化差異/subtle nuance=微妙差別", "The diplomat had studied not just the language but its nuances — the pauses, the tone shifts. That sensitivity helped her close negotiations that others could not.", "溝通,文化"],
["paradigm", "ˈpærədaɪm", "n.", "典範；範式", "Every major breakthrough challenges an existing paradigm.", "每一個重大突破都挑戰著現有的典範。", "Paradigm shift = 典範轉移。Challenge the paradigm = 挑戰既有模式。", "paradigm shift=典範轉移/challenge the paradigm=挑戰既有觀念/new paradigm=新典範/old paradigm=舊模式", "The old paradigm said workers needed to be in offices to be productive. The pandemic shattered it. A new paradigm is now being built from evidence, not assumption.", "科學,社會,商業"],
["perspective", "pərˈspɛktɪv", "n.", "觀點；看法；視角", "Changing your perspective changes the problem you are looking at.", "改變你的視角改變了你所看到的問題。", "From a different perspective = 從不同角度。Gain perspective = 獲得觀點。", "from a different perspective=從不同角度/gain perspective=獲得觀點/shift perspective=轉換觀點/broad perspective=廣泛視角", "She brought in an outsider to review the project. Within one hour, the outsider spotted what the team had been blind to for months. Fresh perspective is invaluable.", "哲學,商業"],
["pragmatic", "præɡˈmætɪk", "adj.", "務實的；實際的", "Be idealistic about goals but pragmatic about methods.", "對目標要有理想，對方法要務實。", "Pragmatism = 實用主義（名詞）。Pragmatically = 務實地。", "pragmatism=實用主義/pragmatically=務實地/pragmatic approach=務實方法/idealistic=理想主義的", "She was idealistic about the mission but pragmatic about execution. That rare combination — knowing the why and being flexible about the how — made her extraordinary.", "哲學,職場"],
["profound", "prəˈfaʊnd", "adj.", "深刻的；深遠的", "The most profound lessons come from the hardest experiences.", "最深刻的教訓來自最艱難的經歷。", "Profoundly = 深刻地。Profound impact = 深遠影響。", "profoundly=深刻地/profound impact=深遠影響/profound insight=深刻洞見/profound change=深刻變化", "The book changed one chapter at a time. By the last page, she had a profound shift in how she saw the world. Some books do not inform you — they transform you.", "哲學,教育"],
["resilient", "rɪˈzɪlɪənt", "adj.", "有韌性的；有恢復力的", "Resilient people do not avoid hardship — they grow through it.", "有韌性的人不迴避艱難——他們通過艱難成長。", "Resilience = 韌性（名詞）。Build resilience = 建立韌性。", "resilience=韌性/build resilience=建立韌性/mental resilience=心理韌性/bounce back=恢復", "She was knocked down three times before she succeeded. Each time she asked: What is this teaching me? That question is what made her resilient. Failure is tuition.", "心理,激勵"],
["rhetoric", "ˈrɛtərɪk", "n.", "修辭；言辭", "Empty rhetoric loses to honest simplicity every time.", "空洞的言辭每次都輸給誠實的簡單。", "Rhetorical question = 修辭問題。Political rhetoric = 政治言辭。", "rhetorical question=反問/political rhetoric=政治言辭/empty rhetoric=空洞言辭/powerful rhetoric=有力言辭", "The voters were tired of rhetoric without results. The candidate who spoke plainly about real problems won by a landslide. Substance always outlasts style.", "社會,溝通"],
["scrutinize", "ˈskruːtɪnaɪz", "v.", "仔細審查；細察", "Scrutinize every assumption before committing to a plan.", "在承諾一個計劃之前，仔細審查每一個假設。", "Scrutiny = 審查（名詞）。Under scrutiny = 在審查之下。", "scrutiny=審查/under scrutiny=在審查之下/close scrutiny=仔細審查/withstand scrutiny=經得起審查", "She scrutinized the contract clause by clause. Her lawyer thought she was paranoid. That one scrutinized clause saved her company from a disastrous obligation.", "商業,法律"],
["sophisticated", "səˈfɪstɪkeɪtɪd", "adj.", "複雜的；精緻的；老練的", "Sophisticated problems require sophisticated thinking and patience.", "複雜的問題需要複雜的思考和耐心。", "Sophistication = 精緻（名詞）。Unsophisticated = 不精緻的（反義）。", "sophistication=精緻/highly sophisticated=高度複雜的/sophisticated approach=複雜的方法", "The solution was elegant precisely because it was simple. Sophistication, she said, is knowing when not to add complexity. The best engineers remove features, not add them.", "科技,商業,哲學"],
["systemic", "sɪˈstɛmɪk", "adj.", "系統性的；體制性的", "Systemic problems require systemic solutions not quick fixes.", "系統性問題需要系統性解決方案，而不是快速修復。", "Systematically = 有系統地。System-wide = 系統範圍內的。", "systemic change=系統性改變/systemic problem=系統性問題/address systemically=系統性處理/root cause=根本原因", "The engineer kept fixing the same machine. A colleague asked: What if the problem is systemic — not the machine, but the process? It was. One question saved millions.", "社會,商業,科學"],
["tenacious", "tɪˈneɪʃəs", "adj.", "頑強的；堅持不懈的", "The most tenacious people are not fearless — they are determined.", "最頑強的人不是無畏的——他們是有決心的。", "Tenacity = 頑強（名詞）。Tenaciously = 頑強地。", "tenacity=頑強/tenaciously=頑強地/tenacious spirit=頑強的精神", "She was rejected 50 times before her first yes. Some called it stubbornness. She called it belief. Tenacity is what separates those who make it from those who almost did.", "激勵,商業"],
["transparent", "trænsˈpærənt", "adj.", "透明的；坦誠的", "Transparent communication builds faster and deeper trust.", "透明的溝通建立更快更深的信任。", "Transparency = 透明度（名詞）。Be transparent about = 對...保持透明。", "transparency=透明度/be transparent about=坦誠地/radical transparency=極度透明/lack of transparency=缺乏透明度", "She told her team exactly why every decision was made, even when it was not her choice. People felt respected. Transparency is the fastest trust-building tool available.", "職場,溝通"],
["unprecedented", "ʌnˈprɛsɪdɛntɪd", "adj.", "前所未有的；空前的", "This unprecedented situation requires unprecedented creativity.", "這種前所未有的情況需要前所未有的創造力。", "An unprecedented level = 前所未有的程度。Face unprecedented challenges = 面對前所未有的挑戰。", "unprecedented level=前所未有的程度/historically unprecedented=歷史上前所未有/face unprecedented challenges=面對空前挑戰", "The crisis was unprecedented. No playbook existed. She gathered her team and said: We write the playbook now. What we decide this week will define the company for decades.", "商業,社會"],
["versatile", "ˈvɜːrsətaɪl", "adj.", "多才多藝的；多用途的", "The most valuable employees are versatile generalists who specialize.", "最有價值的員工是專精於一事的多面手。", "Versatility = 多才多藝（名詞）。Versatile skill set = 多樣化技能組合。", "versatility=多才多藝/versatile skill set=多樣化技能/jack of all trades=萬事通", "She could design, code, and present. Each skill amplified the others. Her versatility made her not just employable but irreplaceable.", "職場,激勵"],
["vulnerable", "ˈvʌlnərəbl", "adj.", "脆弱的；易受傷的", "True connection requires being vulnerable with another person.", "真正的連結需要對另一個人展示脆弱。", "Vulnerability = 脆弱（名詞）。Make vulnerable = 使脆弱。", "vulnerability=脆弱/show vulnerability=展示脆弱/emotionally vulnerable=情感脆弱/strength in vulnerability=脆弱中的力量", "She shared her failures at the all-hands meeting. The room went silent, then erupted in applause. Her vulnerability gave everyone else permission to be human. Leadership is not armor.", "職場,心理,社會"],
["wisdom", "ˈwɪzdəm", "n.", "智慧", "Knowledge tells you what to do. Wisdom tells you when and why.", "知識告訴你做什麼。智慧告訴你何時以及為什麼。", "Words of wisdom = 智慧語錄。Conventional wisdom = 傳統觀點。", "words of wisdom=智慧語錄/conventional wisdom=傳統觀點/gain wisdom=獲得智慧/wisdom of experience=經驗的智慧", "At 85, she was asked the secret to a good life. Be curious. Be kind. Keep moving. Laugh especially at yourself. Four sentences. A lifetime of wisdom.", "哲學,生活,激勵"],
["analytical", "ˌænəˈlɪtɪkl", "adj.", "分析性的；善於分析的", "Analytical thinking transforms raw data into actionable strategy.", "分析性思維將原始數據轉化為可行策略。", "Analytical framework = 分析框架。Highly analytical = 高度分析性的。Analytical approach = 分析方法。", "analytical framework=分析框架/highly analytical=高度分析性/analytical approach=分析方法/analytical mindset=分析思維", "She developed her analytical framework over twenty years: separate facts from interpretations, test every assumption, quantify uncertainty. That framework made her the most reliable strategic thinker in any room.", "科學,職場,教育"],
["autonomous", "ɔːˈtɒnəməs", "adj.", "自主的；獨立的", "Autonomous decision-making requires deep alignment with values.", "自主決策需要與價值觀深度一致。", "Autonomy = 自主性（名詞）。Autonomous system = 自主系統。Operate autonomously = 自主運作。", "autonomy=自主性/autonomous system=自主系統/operate autonomously=自主運作/semi-autonomous=半自主", "She hired for attitude and values, then gave complete autonomy. Her team made better decisions than she would have made centrally. Trust in autonomous teams is not abdication — it is the highest form of leadership.", "職場,哲學,科技"],
["catalyst", "ˈkætəlɪst", "n.", "催化劑；推動者", "The pandemic was the catalyst for permanent organizational change.", "疫情是永久性組織變革的催化劑。", "Act as a catalyst = 充當催化劑。Catalytic = 催化的。Catalyze change = 催化變革。", "act as a catalyst=充當催化劑/catalytic=催化的/catalyze change=催化變革/economic catalyst=經濟催化劑", "She positioned herself as a catalyst rather than a controller — sparking reactions between people and ideas rather than directing them. Catalysts accelerate what was already possible.", "商業,科學,激勵"],
["circumvent", "ˌsɜːrkəmˈvɛnt", "v.", "規避；繞過", "Creative teams find ways to circumvent unnecessary bureaucracy.", "有創意的團隊找到規避不必要官僚主義的方法。", "Circumvention = 規避（名詞）。Circumvent rules = 規避規則。Circumvent obstacles = 繞過障礙。", "circumvention=規避/circumvent rules=規避規則/circumvent obstacles=繞過障礙/legitimately circumvent=合法規避", "She was careful to distinguish between circumventing harmful obstacles and circumventing necessary safeguards. That distinction — knowing which rules protect and which merely obstruct — was a form of ethical intelligence.", "商業,哲學,社會"],
["consolidate", "kənˈsɒlɪdeɪt", "v.", "整合；鞏固", "Consolidate gains before pushing into new territory.", "在推進到新領域之前先鞏固成果。", "Consolidation = 整合（名詞）。Consolidate power = 鞏固權力。Market consolidation = 市場整合。", "consolidation=整合/consolidate power=鞏固權力/market consolidation=市場整合/consolidate position=鞏固地位", "She knew when to expand and when to consolidate. That judgment — knowing which phase the business was in — separated her from founders who either expanded too early or consolidated too late.", "商業,職場"],
["contradictory", "ˌkɒntrəˈdɪktəri", "adj.", "矛盾的", "The evidence was contradictory, requiring careful analysis.", "證據是矛盾的，需要仔細分析。", "Contradiction = 矛盾（名詞）。Contradictory evidence = 矛盾的證據。Contradict = 反駁（動詞）。", "contradiction=矛盾/contradictory evidence=矛盾證據/internal contradiction=內部矛盾/resolve contradictions=解決矛盾", "The data sets were contradictory. Most analysts chose the data that confirmed their hypothesis. She chose to understand the contradiction. That investigation produced the breakthrough.", "科學,哲學,教育"],
["cultivate", "ˈkʌltɪveɪt", "v.", "培養；耕種", "Cultivate patience — it is the rarest and most useful virtue.", "培養耐心——它是最罕見也最有用的美德。", "Cultivation = 培養（名詞）。Cultivate relationships = 培養關係。Cultivate talent = 培養人才。", "cultivation=培養/cultivate relationships=培養關係/cultivate talent=培養人才/cultivate habits=培養習慣", "She cultivated one important relationship per month with complete attention — no agenda, genuine interest. After a decade, those cultivated relationships were the entire architecture of her success.", "社交,激勵,農業"],
["deliberate", "dɪˈlɪbərɪt", "adj./v.", "刻意的；深思熟慮", "Every choice she made was deliberate — nothing was accidental.", "她做的每一個選擇都是刻意的——沒有什麼是偶然的。", "Deliberate practice = 刻意練習。Deliberation = 深思熟慮（名詞）。Act deliberately = 刻意行動。", "deliberate practice=刻意練習/deliberation=深思熟慮/act deliberately=刻意行動/deliberate choice=刻意選擇", "Research shows that deliberate practice — focused, uncomfortable, with immediate feedback — produces mastery far faster than casual repetition. Ten thousand hours of deliberate practice creates expertise. Ten thousand hours of comfortable practice creates habit.", "教育,科學,激勵"],
["discourse", "ˈdɪskɔːrs", "n.", "話語；論述", "Public discourse shapes culture more than law or policy.", "公共話語比法律或政策更能塑造文化。", "Academic discourse = 學術話語。Public discourse = 公共話語。Discourse analysis = 話語分析。", "academic discourse=學術話語/public discourse=公共話語/discourse analysis=話語分析/shape discourse=塑造話語", "She changed the discourse in her field by asking different questions. Not 'how do we grow faster' but 'how do we grow better.' Different questions produce different answers and ultimately different futures.", "社會,學術,哲學"],
["epistemology", "ɪˌpɪstɪˈmɒlədʒi", "n.", "認識論", "Epistemology asks: how do we know what we think we know?", "認識論問：我們怎麼知道我們以為我們知道的事情？", "Epistemological = 認識論的。Theory of knowledge = 知識理論。Epistemic humility = 認識論謙遜。", "epistemological=認識論的/epistemic humility=認識論謙遜/theory of knowledge=知識理論", "The most dangerous people, she believed, were those who had never considered epistemology — who had never asked 'how do I know this is true?' That question, asked honestly, dismantles certainty and builds wisdom.", "哲學,學術,教育"],
["exacerbate", "ɪɡˈzæsərbeɪt", "v.", "加劇；使惡化", "Poor communication exacerbates every conflict significantly.", "溝通不良會顯著加劇每一個衝突。", "Exacerbation = 加劇（名詞）。Exacerbate a problem = 使問題惡化。Further exacerbate = 進一步加劇。", "exacerbation=加劇/exacerbate a problem=使問題惡化/further exacerbate=進一步加劇", "She watched the manager's response exacerbate the team's anxiety rather than calm it. She noted: in crises, leaders must be aware that their emotional state amplifies through every person they lead.", "溝通,職場,社會"],
["ideology", "ˌaɪdiˈɒlədʒi", "n.", "意識形態", "Rigid ideology prevents you from seeing reality clearly.", "僵化的意識形態阻止你清楚地看到現實。", "Political ideology = 政治意識形態。Ideological = 意識形態的。Challenge ideology = 挑戰意識形態。", "political ideology=政治意識形態/ideological=意識形態的/challenge ideology=挑戰意識形態/dominant ideology=主流意識形態", "She had principles but no ideology. She would update her views when evidence demanded it. That epistemic flexibility — changing your mind because of evidence, not in spite of it — was her greatest intellectual virtue.", "哲學,政治,社會"],
["implicit", "ɪmˈplɪsɪt", "adj.", "隱性的；暗含的", "Examine your implicit assumptions before they shape your decisions.", "在隱性假設塑造你的決定之前審視它們。", "Implicit bias = 隱性偏見。Implicit trust = 隱性信任。Make implicit explicit = 使隱性變顯性。", "implicit bias=隱性偏見/implicit trust=隱性信任/make implicit explicit=使隱性變顯性/implicit assumption=隱性假設", "She ran annual workshops on implicit bias. Not as a moral exercise but as a practical one. Bias makes bad decisions. Understanding it makes better ones. The business case for self-examination is overwhelming.", "心理,社會,教育"],
["inherent", "ɪnˈhɪərənt", "adj.", "固有的；內在的", "There is an inherent tension between speed and quality.", "速度和品質之間存在固有的張力。", "Inherently = 本質上。Inherent risk = 固有風險。Inherent value = 固有價值。", "inherently=本質上/inherent risk=固有風險/inherent value=固有價值/inherent limitation=固有限制", "She accepted the inherent limitations of her approach rather than pretending they did not exist. Clients trusted her analysis precisely because she always named what her method could not see.", "哲學,商業,科學"],
["innovation", "ˌɪnəˈveɪʃən", "n.", "創新", "True innovation solves a real human problem in a new way.", "真正的創新以新方式解決真實的人類問題。", "Disruptive innovation = 顛覆性創新。Innovation culture = 創新文化。Foster innovation = 培養創新。", "disruptive innovation=顛覆性創新/innovation culture=創新文化/foster innovation=培養創新/incremental innovation=漸進式創新", "The most significant innovations in her industry came not from the largest R&D budgets but from the teams with the highest psychological safety. People innovate where they feel safe to fail.", "商業,科技,社會"],
["interdisciplinary", "ˌɪntəˌdɪsɪˈplɪnəri", "adj.", "跨學科的", "The best solutions emerge from interdisciplinary thinking.", "最好的解決方案來自跨學科思維。", "Interdisciplinary approach = 跨學科方法。Cross-disciplinary = 跨學科的。Multidisciplinary = 多學科的。", "interdisciplinary approach=跨學科方法/cross-disciplinary=跨學科/multidisciplinary team=多學科團隊", "She hired outside her field deliberately. The software engineer brought systems thinking to the marketing problem. The artist saw patterns the analysts missed. Interdisciplinary teams solve problems that disciplinary ones cannot see.", "教育,科學,商業"],
["manifestation", "ˌmænɪfɛˈsteɪʃən", "n.", "體現；表現", "Success is the manifestation of daily discipline over years.", "成功是多年日常紀律的體現。", "Manifest = 體現（動詞）。Outward manifestation = 外在表現。Physical manifestation = 物理體現。", "manifest=體現/outward manifestation=外在表現/manifestation of values=價值觀的體現", "She understood that culture is not what companies say but what employees experience. Culture is the lived manifestation of values, not their proclamation. You see it in the small daily behaviors.", "社會,哲學,商業"],
["meticulous", "mɪˈtɪkjʊləs", "adj.", "一絲不苟的；細心的", "Meticulous attention to detail separates good from great work.", "對細節一絲不苟的關注將好的工作與偉大的工作區分開來。", "Meticulously = 一絲不苟地。Meticulous planning = 細心規劃。Meticulous research = 嚴謹研究。", "meticulously=一絲不苟地/meticulous planning=細心規劃/meticulous research=嚴謹研究/meticulous craftsman=精益求精的工匠", "Her meticulous documentation seemed obsessive to colleagues. When the project was acquired, the detailed records reduced due diligence time by 80%. Her meticulousness was not perfectionism — it was foresight.", "職場,教育,商業"],
["narrative", "ˈnærətɪv", "n.", "敘事；故事", "The narrative you tell about your situation shapes your experience.", "你對自己情況的敘事塑造了你的體驗。", "Change the narrative = 改變敘事。Dominant narrative = 主流敘事。Personal narrative = 個人敘事。", "change the narrative=改變敘事/dominant narrative=主流敘事/personal narrative=個人敘事/counter-narrative=反敘事", "She understood that every company crisis is partly a narrative crisis. The facts matter. How they are framed matters more. She was not spinning — she was ensuring the full truth was told in its proper context.", "溝通,社會,商業"],

var S = {
  g: function(k, def) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; } },
  s: function(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  get xp()     { return this.g('de_xp', 0); },      set xp(v)     { this.s('de_xp', v); },
  get wv()     { return this.g('de_wv', 0); },      set wv(v)     { this.s('de_wv', v); },
  get days()   { return this.g('de_days', []); },   set days(v)   { this.s('de_days', v); },
  get saved()  { return this.g('de_saved', []); },  set saved(v)  { this.s('de_saved', v); },
  get maxDay() { return this.g('de_maxday', 0); },  set maxDay(v) { this.s('de_maxday', v); },
  get accent() { return this.g('de_accent', 'us'); },set accent(v){ this.s('de_accent', v); }
};

var lv = 'b';
var todayWords = [];
var reviewWords = [];
var wIdx = 0;
var currentAccent = S.accent;

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function getStartDate() {
  var v = localStorage.getItem('de_start');
  return v ? v : '2025-01-01';
}
function getDay() {
  var start = new Date(getStartDate());
  var now = new Date();
  var diff = Math.floor((now - start) / 86400000) + 1;
  return Math.max(1, diff);
}
function getDaysForLv(l) {
  var bank = WORDS[l] || [];
  return Math.ceil(bank.length / 15);
}
function isUnlocked(l) {
  if (l === 'b') return true;
  var bDays = getDaysForLv('b');
  if (l === 'i') return S.maxDay >= bDays;
  if (l === 'a') return S.maxDay >= bDays + getDaysForLv('i');
  return false;
}
function getActiveLv() {
  if (isUnlocked('a')) return 'a';
  if (isUnlocked('i')) return 'i';
  return 'b';
}
function initDaily() {
  lv = getActiveLv();
  var bank = WORDS[lv] || [];
  var PER = 15;
  var day = getDay();
  var off = (day - 1);
  var start = (off * PER) % Math.max(1, bank.length);
  todayWords = [];
  for (var i = 0; i < PER; i++) todayWords.push(bank[(start + i) % bank.length]);
  var rOff = Math.max(0, off - 3);
  var rStart = (rOff * PER) % Math.max(1, bank.length);
  reviewWords = [];
  for (var i = 0; i < PER; i++) reviewWords.push(bank[(rStart + i) % bank.length]);
  // Track day
  var today = new Date().toISOString().slice(0,10);
  var days = S.days;
  if (days.indexOf(today) < 0) { days.push(today); S.days = days; }
  if (day > S.maxDay) S.maxDay = day;
  wIdx = 0;
}

// ══════════════════════════════════════════════
// ACCENT / TTS
// ══════════════════════════════════════════════
function setAccent(a) {
  currentAccent = a;
  S.accent = a;
  document.getElementById('acc-us').className = a === 'us' ? 'on' : '';
  document.getElementById('acc-uk').className = a === 'uk' ? 'on' : '';
}
function getBestVoice(lang) {
  var voices = speechSynthesis.getVoices();
  var matches = voices.filter(function(v) { return v.lang.startsWith(lang); });
  return matches[0] || null;
}
function speak(text, rate) {
  if (!text) return;
  speechSynthesis.cancel();
  var lang = currentAccent === 'uk' ? 'en-GB' : 'en-US';
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = rate || 0.9;
  var v = getBestVoice(lang);
  if (v) utt.voice = v;
  speechSynthesis.speak(utt);
}

// ══════════════════════════════════════════════
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 2000);
}
function addXP(n) {
  S.xp = S.xp + n;
  document.getElementById('xp-num').textContent = S.xp;
}

function renderWord() {
  var w = todayWords[wIdx % todayWords.length];
  if (!w) return;
  var idx = (wIdx % todayWords.length) + 1;
  var tot = todayWords.length;
  document.getElementById('widx').textContent = idx;
  document.getElementById('wtot').textContent = tot;
  document.getElementById('wprog-fill').style.width = Math.round(idx/tot*100) + '%';
  document.getElementById('top-day').textContent = 'Day ' + getDay();
  document.getElementById('bd-lv').textContent = {b:'初級',i:'中級',a:'高級'}[lv];
  // Context tags from ctags field (index 9)
  var ctags = (w[9] || w[2] || '').split(',');
  document.getElementById('wtags').innerHTML = ctags.slice(0,3).map(function(t){
    return '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--t3);border:1px solid var(--border)">' + t.trim() + '</span>';
  }).join('');
  document.getElementById('wword').textContent = w[0];
  document.getElementById('wph').textContent = w[1];
  document.getElementById('wpos').textContent = w[2];
  document.getElementById('wzh').textContent = w[3];
  document.getElementById('wex').textContent = '"' + w[4] + '"';
  document.getElementById('wexzh').textContent = w[5];
  document.getElementById('wtip').textContent = w[6] || '';
  // Phrases (index 7): "phrase=中文/phrase2=中文2"
  var phCard = document.getElementById('phrases-card');
  var phEl = document.getElementById('wphrases');
  phEl.innerHTML = '';
  if (w[7]) {
    phCard.style.display = '';
    var phrases = w[7].split('/');
    phrases.forEach(function(p) {
      var parts = p.split('=');
      var en = parts[0] ? parts[0].trim() : '';
      var zh = parts[1] ? parts[1].trim() : '';
      if (!en) return;
      var chip = document.createElement('div');
      chip.className = 'ph-chip';
      var enSpan = document.createElement('span');
      enSpan.className = 'en';
      enSpan.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>' + en;
      chip.appendChild(enSpan);
      if (zh) {
        var zhSpan = document.createElement('span');
        zhSpan.className = 'zh';
        zhSpan.textContent = zh;
        chip.appendChild(zhSpan);
      }
      chip.onclick = (function(e, s) { return function() { speak(e, 0.85); s.className = 'en playing'; setTimeout(function(){ s.className='en'; }, 1500); }; })(en, enSpan);
      phEl.appendChild(chip);
    });
  } else {
    phCard.style.display = 'none';
  }
  // Story (index 8)
  var stCard = document.getElementById('story-card');
  if (w[8]) {
    stCard.style.display = '';
    document.getElementById('wstory').textContent = w[8];
    document.getElementById('ctags-inline').innerHTML = ctags.slice(0,2).map(function(t){
      return '<span class="ctag">' + t.trim() + '</span>';
    }).join('');
    document.getElementById('story-body').style.display = 'none';
    document.getElementById('story-arr').textContent = '展開 ▼';
  } else {
    stCard.style.display = 'none';
  }
  // Save button
  var saved = S.saved;
  var isSaved = saved.some(function(s){ return s.en === w[0] && s.lv === lv; });
  document.getElementById('savebtn').className = 'wbtn' + (isSaved ? ' saved' : '');
  document.getElementById('savetxt').textContent = isSaved ? '已儲存 ✓' : '儲存';
  // Reset pron result
  document.getElementById('pron-result').style.display = 'none';
}

function nextW() {
  wIdx++;
  S.wv = S.wv + 1;
  addXP(3);
  renderWord();
}
function prevW() {
  wIdx = Math.max(0, wIdx - 1);
  renderWord();
}

  toast('🔊 朗讀例句');
