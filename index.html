["admirable", "ˈædmɪrəbl", "adj.", "令人欽佩的", "Admirable people do what is right even when no one is watching.", "令人欽佩的人即使在沒有人看的時候也做正確的事情。", "Admirably=令人欽佩地。Worthy of admiration=值得欽佩的。Admirable quality=令人欽佩的品質。", "admirably=令人欽佩地/worthy of admiration=值得欽佩/admirable quality=令人欽佩的品質/truly admirable=真正令人欽佩", "She did admirable things quietly — helped without telling anyone, kept promises no one would have known she broke, maintained standards when lowering them would have been invisible. Character is what you do in the dark.", "哲學,激勵"],
["adolescence", "ˌædəˈlɛsns", "n.", "青春期；青少年時期", "The lessons of adolescence are often the lessons of a lifetime.", "青春期的教訓往往是一生的教訓。", "Adolescent=青少年（名詞/形容詞）。During adolescence=在青春期。Adolescent development=青少年發展。", "adolescent=青少年/during adolescence=在青春期/adolescent development=青少年發展/adolescent behavior=青少年行為", "She treated her adolescent years not as something to escape but as a formative archive. Every painful memory had shaped something in her. The awkward years, she realized, were the most important years.", "教育,心理,社會"],
["adventure", "ədˈvɛntʃər", "n.", "冒險；奇遇", "Life is an adventure for those who choose to see it that way.", "生活是一場冒險，對那些選擇這樣看待它的人來說。", "Adventurous=有冒險精神的。Go on an adventure=踏上冒險之旅。Adventure awaits=冒險等待著。", "adventurous=有冒險精神的/go on an adventure=踏上冒險/adventure awaits=冒險等待/spirit of adventure=冒險精神", "She approached her career as an adventure rather than a ladder. Unexpected directions were detours, not failures. Each unfamiliar territory expanded the map of what was possible for her.", "激勵,旅遊,哲學"],
["affirmation", "ˌæfərˈmeɪʃən", "n.", "肯定；確認", "Affirmations work when they are specific, believable, and action-oriented.", "當肯定是具體的、可信的且以行動為導向時，它們才有效。", "Positive affirmation=積極肯定。Affirm=肯定（動詞）。Self-affirmation=自我肯定。", "positive affirmation=積極肯定/affirm=肯定/self-affirmation=自我肯定/daily affirmation=每日肯定", "She replaced vague affirmations with specific evidence of capability: not 'I am confident' but 'I have handled fifteen difficult conversations and improved each time.' Evidence-based affirmation is more powerful than wishful thinking.", "心理,激勵"],
["architecture", "ˈɑːrkɪtɛktʃər", "n.", "架構；建築", "The architecture of your day determines the quality of your life.", "你一天的架構決定了你生活的品質。", "Information architecture=信息架構。System architecture=系統架構。Architectural design=建築設計。", "information architecture=信息架構/system architecture=系統架構/architectural design=建築設計/underlying architecture=底層架構", "She designed her day with the same care an architect designs a building — where would the light fall, where would the energy flow, where would rest and work balance each other? Design your day deliberately.", "生活,設計,激勵"],
["aspiration", "ˌæspəˈreɪʃən", "n.", "抱負；渴望", "Your aspirations tell you more about your values than your achievements do.", "你的抱負比你的成就更能說明你的價值觀。", "Have aspirations=有抱負。High aspiration=遠大抱負。Career aspiration=職業抱負。", "have aspirations=有抱負/high aspiration=遠大抱負/career aspiration=職業抱負/fulfill aspirations=實現抱負", "She wrote her aspirations on paper every year. Not goals — aspirations: who she wanted to become, what she wanted to contribute, how she wanted to be remembered. The writing made them real.", "激勵,生活,哲學"],
["assurance", "əˈʃʊərəns", "n.", "保證；確信", "Quiet assurance comes from repeated evidence of your own capability.", "平靜的確信來自於你自己能力的反復證據。", "Give assurance=給予保證。Self-assurance=自我確信。Quality assurance=品質保證。", "give assurance=給予保證/self-assurance=自我確信/quality assurance=品質保證/with assurance=充滿確信地", "She had quiet self-assurance not from arrogance but from evidence. She had done hard things before. She knew she could do hard things again. Confidence built on evidence is the most stable kind.", "心理,激勵,職場"],
["breadth", "brɛdθ", "n.", "廣度；寬度", "Combine breadth of knowledge with depth of expertise for maximum impact.", "結合廣泛的知識和深度的專業知識以獲得最大影響力。", "Breadth of knowledge=知識廣度。Breadth of experience=經驗廣度。In breadth=在廣度上。", "breadth of knowledge=知識廣度/breadth of experience=經驗廣度/depth and breadth=深度和廣度/remarkable breadth=非凡的廣度", "She was remarkable for the breadth of her interests — art, science, philosophy, business. Those seemingly unrelated domains fed each other constantly, producing insights that specialists could never generate alone.", "教育,職場,激勵"],
["breakthrough", "ˈbreɪkθruː", "n.", "突破", "Breakthroughs happen just past where most people stop.", "突破發生在大多數人停下來的地方之後。", "Major breakthrough=重大突破。Achieve a breakthrough=取得突破。Scientific breakthrough=科學突破。", "major breakthrough=重大突破/achieve a breakthrough=取得突破/scientific breakthrough=科學突破/personal breakthrough=個人突破", "She mapped her breakthrough: ten months of visible nothing, then three weeks of rapid progress that looked sudden from outside. The breakthrough had been building invisibly the entire time she appeared to be stuck.", "激勵,科學,教育"],
["captivate", "ˈkæptɪveɪt", "v.", "迷住；吸引", "Captivate your audience by being genuinely interested in them.", "通過真正對他們感興趣來吸引你的聽眾。", "Captivating=迷人的。Captivated by=被...迷住。Captivate attention=吸引注意力。", "captivating=迷人的/captivated by=被...迷住/captivate attention=吸引注意力/hold captive=使著迷", "She captivated audiences not through performance but through presence. She looked at them, genuinely curious about what they were thinking. That attention, pointed back at them, was the most compelling thing in the room.", "溝通,社交,藝術"],
["contribution", "ˌkɒntrɪˈbjuːʃən", "n.", "貢獻", "Your unique contribution is the intersection of what you love, what you're good at, and what the world needs.", "你獨特的貢獻是你熱愛的、你擅長的和世界需要的交叉點。", "Make a contribution=做出貢獻。Significant contribution=重大貢獻。Contribution to society=對社會的貢獻。", "make a contribution=做出貢獻/significant contribution=重大貢獻/contribution to society=對社會的貢獻/valuable contribution=有價值的貢獻", "She spent years asking: what is mine to give? Not what can I do — what is uniquely mine to contribute? The question, sat with honestly, eventually produced the most focused and fulfilling work of her life.", "激勵,哲學,社會"],
["decisive", "dɪˈsaɪsɪv", "adj.", "果斷的；決定性的", "Be decisive when clarity warrants it and deliberate when it does not.", "當清晰度允許時要果斷，當不允許時要深思熟慮。", "Decisiveness=果斷（名詞）。Decisive action=果斷行動。Indecisive=猶豫不決的（反義）。", "decisiveness=果斷/decisive action=果斷行動/indecisive=猶豫不決/decisive moment=決定性時刻", "She was decisive not from impulsiveness but from preparation. She had thought through scenarios in advance, so when decisions arrived, she was ready. Preparation is what makes decisiveness look like confidence.", "職場,激勵,哲學"],
["deficiency", "dɪˈfɪʃənsi", "n.", "不足；缺陷", "Acknowledge your deficiencies honestly — denial prevents the growth you need.", "誠實地承認你的不足——否認阻礙了你所需要的成長。", "Address deficiency=解決不足。Nutritional deficiency=營養不足。Overcome deficiency=克服不足。", "address deficiency=解決不足/nutritional deficiency=營養不足/overcome deficiency=克服不足/identify deficiency=識別不足", "She listed her deficiencies as clearly as she listed her strengths. Not from self-criticism but from strategy. What you acknowledge you can address. What you deny you cannot.", "教育,激勵,心理"],
["dependable", "dɪˈpɛndəbl", "adj.", "可靠的；值得信賴的", "Be dependable in small things and you will be trusted with large ones.", "在小事上可靠，你將被信任去做大事。", "Dependability=可靠性（名詞）。Highly dependable=高度可靠的。Dependably=可靠地。", "dependability=可靠性/highly dependable=高度可靠/dependably=可靠地/count on=依靠", "She was dependable in a world of people who were good at their best and unreliable at their most challenged. The people who needed things done when things got hard always called her first.", "職場,激勵,社交"],
["destiny", "ˈdɛstɪni", "n.", "命運；天命", "Your destiny is shaped by your daily decisions, not by forces outside your control.", "你的命運是由你的日常決定塑造的，而不是由你控制之外的力量。", "Shape your destiny=塑造你的命運。Sense of destiny=命運感。Control your destiny=掌控你的命運。", "shape your destiny=塑造命運/sense of destiny=命運感/control your destiny=掌控命運/meet your destiny=走向命運", "She did not believe in fixed destiny. She believed in shaped destiny — the daily accumulation of choices, habits, and commitments that collectively determined who she would become. Every day was a vote.", "哲學,激勵"],
["dignity", "ˈdɪɡnɪti", "n.", "尊嚴", "Treat everyone with dignity regardless of circumstances — it costs nothing.", "無論情況如何，以尊嚴對待每個人——它不需要任何代價。", "Human dignity=人的尊嚴。With dignity=有尊嚴地。Dignity of work=工作的尊嚴。", "human dignity=人的尊嚴/with dignity=有尊嚴地/dignity of work=工作的尊嚴/preserve dignity=保持尊嚴", "She treated every person she encountered with the same dignity — not as a strategy but as a moral practice. That unconditional respect made her the kind of leader people followed without being asked.", "哲學,社會,職場"],
["diligence", "ˈdɪlɪdʒəns", "n.", "勤勉；勤奮", "Diligence without direction is busyness; diligence with direction is progress.", "沒有方向的勤勉是忙碌；有方向的勤勉是進步。", "Show diligence=表現出勤勉。Due diligence=盡職調查。Remarkable diligence=非凡的勤勉。", "show diligence=表現出勤勉/due diligence=盡職調查/remarkable diligence=非凡的勤勉/hard-working diligence=努力的勤勉", "She combined diligence with direction: she worked hard, and she worked hard at the right things. The combination was rarer than either alone. Most people had one. She had both.", "激勵,職場"],
["discovery", "dɪˈskʌvəri", "n.", "發現", "The greatest discoveries begin with a question, not an answer.", "最偉大的發現始於一個問題，而不是一個答案。", "Self-discovery=自我發現。Accidental discovery=意外發現。Discovery process=發現過程。", "self-discovery=自我發現/accidental discovery=意外發現/discovery process=發現過程/moment of discovery=發現的時刻", "She treated every experiment as a discovery waiting to happen — not 'will this work?' but 'what will I learn?' That reframe converted even failures into productive explorations.", "科學,教育,激勵"],
["distinction", "dɪˈstɪŋkʃən", "n.", "區別；卓越", "Make the distinction between busy and productive — they are not the same.", "區分忙碌和有生產力——它們不是同一件事。", "Draw a distinction=做出區別。Fine distinction=細微的區別。Without distinction=不加區別地。", "draw a distinction=做出區別/fine distinction=細微的區別/important distinction=重要區別/distinction between=之間的區別", "She made fine distinctions that others blurred: between confidence and arrogance, between assertive and aggressive, between persistence and stubbornness. Fine distinctions, she believed, are the source of good judgment.", "教育,溝通,哲學"],
["diversify", "daɪˈvɜːrsɪfaɪ", "v.", "多元化；多樣化", "Diversify your skills the way investors diversify their portfolios.", "像投資者多元化投資組合一樣多元化你的技能。", "Diversification=多元化（名詞）。Highly diversified=高度多元化的。Diversify income=多元化收入。", "diversification=多元化/highly diversified=高度多元化/diversify income=多元化收入/diversify skills=多元化技能", "She diversified her income streams, her skill set, and her professional relationships deliberately. That diversification meant no single change could destabilize her position. Resilience requires redundancy.", "商業,金融,激勵"],
["dynamic", "daɪˈnæmɪk", "adj.", "充滿活力的；動態的", "Stay dynamic — stagnation is the beginning of decline.", "保持充滿活力——停滯不前是衰退的開始。", "Dynamic change=動態變化。Group dynamics=群體動態。Dynamism=活力（名詞）。", "dynamic change=動態變化/group dynamics=群體動態/dynamism=活力/dynamic environment=動態環境", "She brought dynamic energy to every project — not manufactured enthusiasm, but genuine drive rooted in purpose. That authentic energy was contagious in a way that performed excitement never could be.", "職場,激勵"],
["empathy", "ˈɛmpəθi", "n.", "同理心", "Empathy is not agreement — it is understanding before judgment.", "同理心不是贊同——它是判斷之前的理解。", "Show empathy=表達同理心。Empathetic=有同理心的（形容詞）。Lack of empathy=缺乏同理心。", "show empathy=表達同理心/empathetic=有同理心的/lack of empathy=缺乏同理心/practice empathy=練習同理", "She was empathetic not from softness but from intelligence. Understanding how someone else experienced the world allowed her to communicate, lead, and connect in ways that empathy-absent people simply could not access.", "溝通,社交,心理"],
["endurance", "ɪnˈdjʊərəns", "n.", "耐力；毅力", "Endurance is more important than speed for achieving meaningful long-term goals.", "對於實現有意義的長期目標，耐力比速度更重要。", "Physical endurance=體力耐力。Mental endurance=心理耐力。Test of endurance=耐力測試。", "physical endurance=體力耐力/mental endurance=心理耐力/test of endurance=耐力測試/build endurance=建立耐力", "She built endurance through small, regular challenges. Not marathons from the start — short runs extended gradually. That patient building of capacity meant that when the real marathon came, she was ready.", "運動,激勵,心理"],
["entrepreneurship", "ˌɒntrəprəˈnɜːrʃɪp", "n.", "創業精神；企業家精神", "Entrepreneurship is the discipline of creating value where it did not exist before.", "創業精神是在之前不存在的地方創造價值的紀律。", "Entrepreneur=創業家（名詞）。Entrepreneurial=有創業精神的。Social entrepreneurship=社會創業。", "entrepreneur=創業家/entrepreneurial=有創業精神的/social entrepreneurship=社會創業/spirit of entrepreneurship=創業精神", "She applied entrepreneurial thinking not to a startup but to every job she held — asking: how can I create more value than this role currently creates? That mindset made her indispensable in every organization she joined.", "商業,激勵"],
["excellence", "ˈɛksələns", "n.", "卓越；優秀", "Pursue excellence not for the recognition but because you cannot accept less from yourself.", "追求卓越不是為了認可，而是因為你不能接受自己更少。", "Strive for excellence=追求卓越。Standard of excellence=卓越標準。Achieve excellence=達到卓越。", "strive for excellence=追求卓越/standard of excellence=卓越標準/achieve excellence=達到卓越/culture of excellence=卓越文化", "She created a culture of excellence by modeling it — not demanding it. Her own standards were visible and high. People around her found themselves rising to match them without being asked.", "職場,激勵"],
["exception", "ɪkˈsɛpʃən", "n.", "例外", "Make no exception to your core principles — that is what makes them principles.", "對你的核心原則不做例外——那是使它們成為原則的東西。", "Without exception=沒有例外。Make an exception=做個例外。Exception to the rule=規則的例外。", "without exception=沒有例外/make an exception=做個例外/exception to the rule=規則的例外/notable exception=值得注意的例外", "She applied her ethical standards without exception. The one time she considered making an exception — just this once, just this small thing — she recognized the pattern and did not bend. Principles are tested by exceptions.", "哲學,激勵"],
["exhaustion", "ɪɡˈzɔːstʃən", "n.", "精疲力竭", "Chronic exhaustion is a signal that something needs to change, not a badge of honor.", "長期的精疲力竭是需要改變某些東西的信號，而不是榮譽徽章。", "Near exhaustion=接近精疲力竭。Overcome exhaustion=克服疲憊。Exhausted=精疲力竭的（形容詞）。", "near exhaustion=接近精疲力竭/overcome exhaustion=克服疲憊/signs of exhaustion=精疲力竭的跡象/creative exhaustion=創意枯竭", "She had worn her exhaustion like a medal for years. Then she got sick. The forced rest showed her what rest had been hiding from her: she had been running from silence because silence had questions she was not ready to answer.", "健康,心理,生活"],
["exploration", "ˌɛkspləˈreɪʃən", "n.", "探索", "Allow time for exploration — not all valuable work is directed work.", "留出探索的時間——並非所有有價值的工作都是有方向的工作。", "Space for exploration=探索的空間。Intellectual exploration=知識探索。Exploration of ideas=想法的探索。", "space for exploration=探索的空間/intellectual exploration=知識探索/exploration of ideas=想法的探索/encourage exploration=鼓勵探索", "She protected Friday afternoons for exploration — no meetings, no deliverables, just following curiosity. Twelve of her best ideas over a decade came from those unscheduled Friday afternoons.", "教育,創意,激勵"],
["flaw", "flɔː", "n.", "缺陷；瑕疵", "Know your flaws — not to be limited by them but to account for them.", "了解你的缺陷——不是為了被它們限制，而是為了考慮到它們。", "Fatal flaw=致命缺陷。Human flaw=人的缺陷。Acknowledge flaws=承認缺陷。", "fatal flaw=致命缺陷/human flaw=人的缺陷/acknowledge flaws=承認缺陷/embrace your flaws=接受你的缺陷", "She listed her flaws honestly and built systems to compensate for them. She was impatient — so she scheduled cooling-off periods before sending any difficult message. Self-knowledge is the basis of self-management.", "心理,激勵,職場"],
["flourish", "ˈflʌrɪʃ", "v.", "繁榮；茁壯成長", "People flourish when given clarity, trust, and meaningful work.", "當人們獲得清晰度、信任和有意義的工作時，他們就會茁壮成長。", "Flourishing=蓬勃發展的。Flourish in=在...中茁壯成長。Allow to flourish=讓...繁榮。", "flourishing=蓬勃發展的/flourish in=在...中茁壯/allow to flourish=讓...繁榮/conditions to flourish=繁榮的條件", "She created conditions for her team to flourish: clear expectations, genuine trust, work connected to purpose. Then she stepped back. In those conditions, people did things she had never imagined they were capable of.", "職場,激勵,生活"],
["fluent", "ˈfluːənt", "adj.", "流利的；熟練的", "Become fluent in the language of the people you want to serve.", "在你想要服務的人的語言上變得流利。", "Fluency=流利（名詞）。Speak fluently=流利地說。Fluent in=在...方面流利。", "fluency=流利/speak fluently=流利地說/fluent in=在...流利/near-fluent=接近流利", "She became fluent not just in languages but in the vocabulary of every domain she entered — absorbing terminology, reading primary sources, learning the hidden grammar of each new world. Fluency unlocks belonging.", "教育,語言,激勵"],
["formation", "fɔːrˈmeɪʃən", "n.", "形成；培養", "Character formation happens in the ordinary moments, not the extraordinary ones.", "性格培養發生在普通的時刻，而不是非凡的時刻。", "In formation=在形成中。Character formation=性格形成。Formation of habits=習慣的形成。", "in formation=在形成中/character formation=性格形成/formation of habits=習慣的形成/early formation=早期形成", "She understood that who she was being formed by what she repeatedly did — small choices accumulated into character. Every mundane day was formation. She paid attention accordingly.", "哲學,教育,激勵"],
["fortunate", "ˈfɔːrtʃənɪt", "adj.", "幸運的", "Be fortunate enough to know what you want — then work for it relentlessly.", "幸運地知道你想要什麼——然後無情地為之工作。", "Fortunately=幸運地。Fortunate circumstances=幸運的情況。Count yourself fortunate=認為自己幸運。", "fortunately=幸運地/fortunate circumstances=幸運的情況/count yourself fortunate=認為自己幸運/fortunate enough=幸運地足夠", "She felt fortunate not because things had gone well but because she had learned to find value in how they had gone, regardless. That reframe — fortunate in learning, not just in outcome — made gratitude available everywhere.", "激勵,哲學"],
["gratitude", "ˈɡrætɪtjuːd", "n.", "感謝；感恩", "Gratitude, practiced as a discipline, reshapes how you experience everything.", "作為紀律練習的感恩，重塑了你體驗一切的方式。", "Express gratitude=表達感謝。Sense of gratitude=感恩之情。Profound gratitude=深切的感謝。", "express gratitude=表達感謝/sense of gratitude=感恩之情/profound gratitude=深切的感謝/gratitude practice=感恩練習", "She kept a gratitude journal not because someone told her to but because she had discovered it worked. The practice, maintained for years, had genuinely shifted her baseline from wanting to appreciating.", "心理,健康,激勵"],
["guidance", "ˈɡaɪdəns", "n.", "指導；引導", "Seek guidance from those who have been where you want to go.", "向已經去過你想去的地方的人尋求指導。", "Offer guidance=提供指導。Under the guidance of=在...的指導下。Career guidance=職業指導。", "offer guidance=提供指導/under the guidance of=在...的指導下/career guidance=職業指導/seek guidance=尋求指導", "She sought guidance proactively — not waiting to be mentored but asking specific questions of specific people she admired. Each conversation left her with one concrete thing to try. Guidance applied beats guidance received.", "教育,激勵,職場"],
["harmony", "ˈhɑːrməni", "n.", "和諧", "Seek harmony not by avoiding tension but by integrating different perspectives.", "通過整合不同的視角而不是迴避張力來尋求和諧。", "In harmony=和諧地。Create harmony=創造和諧。Work in harmony=和諧地工作。", "in harmony=和諧地/create harmony=創造和諧/work in harmony=和諧地工作/inner harmony=內心和諧", "She created harmony in her team not by eliminating disagreement but by making it productive. When different perspectives collided constructively, the result was better than what any single perspective could produce alone.", "職場,社交,哲學"],
["horizon", "həˈraɪzn", "n.", "地平線；視野", "Expand your horizons to see possibilities that your current perspective hides.", "擴展你的視野，看到你當前視角所隱藏的可能性。", "Broaden horizons=拓展視野。On the horizon=在地平線上。New horizons=新的視野。", "broaden horizons=拓展視野/on the horizon=在地平線上/new horizons=新的視野/expand horizons=擴展視野", "She traveled not for tourism but for horizon expansion — to encounter realities so different from her own that she could not help but question her assumptions. Travel as epistemological practice.", "旅遊,教育,哲學"],
["imagination", "ɪˌmædʒɪˈneɪʃən", "n.", "想象力", "Imagination is how you practice the future before it arrives.", "想象力是你在未來到來之前練習它的方式。", "Creative imagination=創意想象力。Imagination at work=想象力在發揮作用。Fire the imagination=激發想象力。", "creative imagination=創意想象力/imagination at work=想象力在發揮/fire the imagination=激發想象力/unlimited imagination=無限的想象力", "She used imagination as a tool — not for escapism, but for preparation. She imagined difficult conversations before having them, challenges before facing them, successes before achieving them. Imagination is rehearsal.", "教育,激勵,創意"],
["implementation", "ɪmˌplɪmɛnˈteɪʃən", "n.", "實施；執行", "Great implementation of a good idea beats poor implementation of a great one.", "好想法的卓越實施勝過偉大想法的糟糕實施。", "Phase of implementation=實施階段。Implementation plan=實施計劃。Successful implementation=成功實施。", "phase of implementation=實施階段/implementation plan=實施計劃/successful implementation=成功實施/poor implementation=糟糕的實施", "She was known for implementation — not brilliant ideas, but flawless execution of reasonable ones. That reliability was rarer and more valuable than the insight that generated the ideas in the first place.", "商業,職場,激勵"],
["improvement", "ɪmˈpruːvmənt", "n.", "改善；進步", "Improvement is not a destination — it is the direction in which you choose to travel.", "改善不是目的地——它是你選擇旅行的方向。", "Room for improvement=有改善空間。Continuous improvement=持續改善。Dramatic improvement=顯著改善。", "room for improvement=有改善空間/continuous improvement=持續改善/dramatic improvement=顯著改善/self-improvement=自我改善", "She never called herself good enough. Not from self-criticism but from love of improvement. The gap between where she was and where she could be was not anxiety-inducing — it was interesting.", "激勵,教育"],
["independence", "ˌɪndɪˈpɛndəns", "n.", "獨立", "Independence of thought is a discipline that requires constant practice.", "思想的獨立是一種需要不斷練習的紀律。", "Financial independence=財務獨立。Declare independence=宣布獨立。Spirit of independence=獨立精神。", "financial independence=財務獨立/declare independence=宣布獨立/spirit of independence=獨立精神/foster independence=培養獨立", "She fostered independence in everyone around her — not dependence on her, but independence from her. Her greatest professional achievement was the team that performed better when she was absent than when she was present.", "激勵,教育,職場"],
["instinct", "ˈɪnstɪŋkt", "n.", "本能；直覺", "Train your instincts with experience, then trust them under pressure.", "用經驗訓練你的本能，然後在壓力下信任它們。", "Trust your instincts=信任你的直覺。Follow instinct=跟隨本能。Gut instinct=直覺。", "trust your instincts=信任直覺/follow instinct=跟隨本能/gut instinct=直覺/sharp instinct=敏銳的本能", "She had learned to trust her instincts because she had spent years training them — exposing herself to diverse situations, getting feedback, and comparing outcomes to predictions. Instinct is compressed expertise.", "心理,激勵,教育"],
["investment", "ɪnˈvɛstmənt", "n.", "投資", "The best investment you can make is in yourself — the returns are permanent.", "你能做的最好的投資是投資自己——回報是永久的。", "Long-term investment=長期投資。Return on investment=投資回報。Wise investment=明智的投資。", "long-term investment=長期投資/return on investment=投資回報/wise investment=明智的投資/personal investment=個人投資", "She treated learning as investment, not cost. Every book, course, and experience was capital being deployed. The portfolio she built over twenty years was the most valuable thing she owned — and nothing could take it from her.", "金融,教育,激勵"],
["judgment", "ˈdʒʌdʒmənt", "n.", "判斷力；審判", "Sound judgment develops through accumulated experience and honest reflection.", "良好的判斷力是通過積累的經驗和誠實的反思發展起來的。", "Exercise judgment=行使判斷。Good judgment=良好判斷。Judgment call=判斷決定。", "exercise judgment=行使判斷/good judgment=良好判斷/judgment call=判斷決定/poor judgment=糟糕的判斷", "She logged her judgment calls and tracked their outcomes. After two years, she could see patterns in where her judgment was reliable and where it needed calibration. Judgment, like any skill, can be deliberately improved.", "職場,教育,激勵"],
["justification", "ˌdʒʌstɪfɪˈkeɪʃən", "n.", "理由；正當化", "Do not rationalize — when something is wrong, no justification makes it right.", "不要合理化——當某件事是錯誤的時，沒有任何理由能使它正確。", "Seek justification=尋求理由。Without justification=沒有理由。Moral justification=道德理由。", "seek justification=尋求理由/without justification=沒有理由/moral justification=道德理由/post-hoc justification=事後合理化", "She watched herself for rationalization — the dangerous habit of finding reasons for decisions already made on other grounds. The discipline of questioning her own justifications was one of the most valuable thinking skills she had developed.", "哲學,心理"],
["limitations", "ˌlɪmɪˈteɪʃənz", "n.", "局限性；限制", "Know your limitations without being defined by them.", "了解你的局限性，但不要被它們所定義。", "Work within limitations=在局限中工作。Overcome limitations=克服局限。Accept limitations=接受局限。", "work within limitations=在局限中工作/overcome limitations=克服局限/accept limitations=接受局限/push past limitations=突破局限", "She mapped her limitations as carefully as she mapped her strengths. That honest cartography — knowing where the edges were — meant she could operate right up to them and ask for help exactly where she needed it.", "教育,激勵,哲學"],
["loyalty", "ˈlɔɪəlti", "n.", "忠誠", "Build loyalty through consistent care, not through occasional grand gestures.", "通過一致的關心而不是偶爾的盛大姿態來建立忠誠。", "Brand loyalty=品牌忠誠度。Customer loyalty=客戶忠誠度。Loyal following=忠實的追隨者。", "brand loyalty=品牌忠誠度/customer loyalty=客戶忠誠度/loyal following=忠實的追隨者/mutual loyalty=相互忠誠", "She earned loyalty not by being important but by being dependable. People knew she would show up, follow through, and keep confidences. That reliability, consistent over years, made her irreplaceable in every circle she joined.", "社交,職場,激勵"],
["management", "ˈmænɪdʒmənt", "n.", "管理；管理層", "Self-management is the foundation of all other management skills.", "自我管理是所有其他管理技能的基礎。", "Time management=時間管理。Project management=專案管理。Management style=管理風格。", "time management=時間管理/project management=專案管理/management style=管理風格/self-management=自我管理", "She was an extraordinary manager not because she controlled but because she enabled. She removed obstacles, provided resources, gave clarity, and then trusted people to execute. Management as service, not as supervision.", "職場,激勵"],
["maturity", "məˈtjʊərɪti", "n.", "成熟；成熟度", "Maturity is knowing when to act quickly and when to wait.", "成熟是知道何時迅速行動以及何時等待。", "Emotional maturity=情感成熟。Reach maturity=達到成熟。Maturity level=成熟度。", "emotional maturity=情感成熟/reach maturity=達到成熟/maturity level=成熟度/act with maturity=以成熟態度行動", "She demonstrated maturity not by having all the answers but by being comfortable with not having them. That comfort with ambiguity — the hallmark of genuine maturity — made her decisions more reliable and her relationships deeper.", "心理,教育,激勵"],
["meaning", "ˈmiːnɪŋ", "n.", "意義", "People do not burn out from hard work — they burn out from meaningless work.", "人們不是因為努力工作而精疲力竭——他們是因為無意義的工作而精疲力竭。", "Find meaning=找到意義。Search for meaning=尋找意義。Full of meaning=充滿意義。", "find meaning=找到意義/search for meaning=尋找意義/full of meaning=充滿意義/create meaning=創造意義", "She redesigned her work to be meaningful to herself before making it efficient. Efficiency applied to meaningless work just produces meaningless work faster. Meaning first, then efficiency.", "激勵,哲學,職場"],
["mentality", "mɛnˈtælɪti", "n.", "心態；思維方式", "Your mentality about difficulty determines whether it grows you or defeats you.", "你對困難的心態決定了它是讓你成長還是讓你失敗。", "Growth mentality=成長心態。Fixed mentality=固定心態。Winning mentality=勝利心態。", "growth mentality=成長心態/fixed mentality=固定心態/winning mentality=勝利心態/abundance mentality=豐盛心態", "She had cultivated a growth mentality so thoroughly that she genuinely could not encounter a failure without immediately asking: what can I learn from this? The question was automatic, not effortful.", "心理,激勵,教育"],
["mission", "ˈmɪʃən", "n.", "使命；任務", "A clear mission simplifies every difficult decision.", "清晰的使命簡化了每一個困難的決定。", "Mission statement=使命聲明。Fulfill a mission=完成使命。On a mission=在執行任務中。", "mission statement=使命聲明/fulfill a mission=完成使命/on a mission=在執行任務/personal mission=個人使命", "She had a personal mission statement, written and reviewed annually. When opportunities appeared, she held them against the mission: does this take me toward or away from what I am here to do? The filter was powerful.", "激勵,職場,哲學"],
["aggregate", "ˈæɡrɪɡɪt", "v.", "聚集；匯總", "Small daily improvements aggregate into extraordinary annual results.", "每天微小的進步聚集成每年非凡的結果。", "In aggregate=總計。Aggregate data=匯總數據。Aggregate effect=累積效果。", "in aggregate=總計/aggregate data=匯總數據/aggregate effect=累積效果/on aggregate=加總起來", "She focused on the aggregate effect of daily habits rather than on individual days. A single day mattered little. Three hundred sixty-five days of the same habit produced results that looked like magic from outside.", "激勵,教育,商業"],
["anticipation", "ænˌtɪsɪˈpeɪʃən", "n.", "預期；期待", "In anticipation of difficulty, prepare. In difficulty itself, execute.", "預期困難時，準備。在困難本身時，執行。", "With anticipation=帶著期待。Build anticipation=建立期待。In anticipation=預先。", "with anticipation=帶著期待/build anticipation=建立期待/in anticipation=預先/sense of anticipation=預期感", "She prepared for her presentations in anticipation of the hardest questions. When those questions came, she answered them fluently. The audience experienced her fluency as genius. She knew it was preparation.", "職場,激勵"],
["candid", "ˈkændɪd", "adj.", "坦率的；直言的", "Be candid about what you don't know — it builds more trust than false certainty.", "對你不知道的事情坦率——它比虛假的確定性建立更多信任。", "Candidly=坦率地。Candid feedback=坦率的反饋。Be candid with=對...坦率。", "candidly=坦率地/candid feedback=坦率的反饋/be candid with=對...坦率/candid assessment=坦率的評估", "She was candid with her team about uncertainty, about limitations, about what she didn't know. That honesty made them trust her completely when she was confident. You earn the right to certainty by being honest about doubt.", "溝通,職場,激勵"],
["capability", "ˌkeɪpəˈbɪlɪti", "n.", "能力；才能", "Expand your capabilities before the world demands it.", "在世界需要之前擴展你的能力。", "Core capability=核心能力。Build capability=建立能力。Capability gap=能力差距。", "core capability=核心能力/build capability=建立能力/capability gap=能力差距/unique capability=獨特的能力", "She treated capability-building as a continuous process, not a one-time event. New capabilities added regularly created a compound of skills that grew more valuable with each addition.", "職場,教育,激勵"],
["capital", "ˈkæpɪtl", "n.", "資本；首都", "Build social capital as deliberately as you build financial capital.", "像建立金融資本一樣刻意地建立社會資本。", "Human capital=人力資本。Social capital=社會資本。Capital investment=資本投資。", "human capital=人力資本/social capital=社會資本/capital investment=資本投資/intellectual capital=知識資本", "She invested in social capital long before she needed to draw on it. Relationships built during good times were available during difficult ones. The most resilient people have the richest social balance sheets.", "商業,社交,金融"],
["categorize", "ˈkætɪɡəraɪz", "v.", "分類；歸類", "Categorize inputs before acting on them — not all noise deserves the same response.", "在對它們採取行動之前對輸入進行分類——並非所有噪音都值得相同的回應。", "Categorization=分類（名詞）。Clearly categorize=清楚分類。Difficult to categorize=難以分類。", "categorization=分類/clearly categorize=清楚分類/difficult to categorize=難以分類/auto-categorize=自動分類", "She categorized incoming requests into four buckets: urgent+important, urgent only, important only, neither. Most things were neither. Understanding the matrix changed how she allocated her most limited resource: focused attention.", "職場,教育"],
["collaboration", "kəˌlæbəˈreɪʃən", "n.", "合作；協作", "Deep collaboration produces outcomes that no individual could achieve alone.", "深度合作產生任何個人都無法單獨實現的結果。", "Foster collaboration=培養合作。Cross-functional collaboration=跨職能合作。Spirit of collaboration=合作精神。", "foster collaboration=培養合作/cross-functional collaboration=跨職能合作/spirit of collaboration=合作精神/effective collaboration=有效合作", "She built collaboration not through mandates but through conditions — shared purpose, mutual trust, and processes that made working together easier than working alone. Collaboration follows infrastructure, not intention.", "職場,激勵,商業"],
["commitment", "kəˈmɪtmənt", "n.", "承諾；投入", "Your level of commitment determines your level of achievement.", "你的承諾水平決定了你的成就水平。", "Make a commitment=做出承諾。Lack of commitment=缺乏承諾。Commitment to quality=對品質的承諾。", "make a commitment=做出承諾/lack of commitment=缺乏承諾/commitment to quality=對品質的承諾/long-term commitment=長期承諾", "She made commitments slowly and honored them completely. The asymmetry — careful in making, meticulous in keeping — was noticed by everyone who had worked with her. Commitment, fully honored, is the rarest form of respect.", "激勵,職場,哲學"],
["competence", "ˈkɒmpɪtəns", "n.", "能力；勝任", "Competence earns the right to be trusted with larger responsibilities.", "能力贏得了被信任承擔更大責任的權利。", "Core competence=核心能力。Level of competence=能力水平。Develop competence=發展能力。", "core competence=核心能力/level of competence=能力水平/develop competence=發展能力/demonstrate competence=展示能力", "She built competence visibly — through delivered results, through asking good questions, through handling difficult situations well. Competence builds quietly and announces itself in moments of difficulty.", "職場,教育,激勵"],
["complexity", "kəmˈplɛksɪti", "n.", "複雜性", "Navigate complexity by finding the simple structure within it.", "通過找到其中的簡單結構來駕馭複雜性。", "Manage complexity=管理複雜性。Hidden complexity=隱藏的複雜性。Reduce complexity=降低複雜性。", "manage complexity=管理複雜性/hidden complexity=隱藏的複雜性/reduce complexity=降低複雜性/navigate complexity=駕馭複雜性", "She had a gift for finding simple structure inside complexity. That gift — developed through years of patient analysis — made her explanations accessible to people who would otherwise have been lost.", "教育,職場,商業"],
["comprehension", "ˌkɒmprɪˈhɛnʃən", "n.", "理解；領悟", "Deep comprehension comes from engagement, not from passive consumption.", "深刻的理解來自於參與，而不是被動的消費。", "Test comprehension=測試理解。Reading comprehension=閱讀理解。Beyond comprehension=超出理解。", "test comprehension=測試理解/reading comprehension=閱讀理解/beyond comprehension=超出理解/level of comprehension=理解水平", "She read slowly and understood deeply, rather than reading quickly and understanding superficially. One book fully comprehended was worth ten books skimmed. Depth of comprehension determined the value of any learning.", "教育,激勵"],
["congruence", "ˈkɒŋɡruəns", "n.", "一致性；吻合", "When your actions match your values, that congruence creates inner peace.", "當你的行動符合你的價值觀時，那種一致性創造了內心的平靜。", "Achieve congruence=達到一致性。Congruent with=與...一致。Lack of congruence=缺乏一致性。", "achieve congruence=達到一致性/congruent with=與...一致/lack of congruence=缺乏一致性/inner congruence=內在一致性", "She aimed for congruence between who she was at work and who she was everywhere else. The exhaustion of maintaining different versions of herself had been a warning sign she finally heeded. Authenticity is congruence lived.", "哲學,心理,激勵"],
["conscious", "ˈkɒnʃəs", "adj.", "有意識的；自覺的", "Make conscious choices rather than defaulting to unconscious patterns.", "做出有意識的選擇，而不是默認無意識的模式。", "Consciously=有意識地。Conscious effort=有意識的努力。Self-conscious=自我意識的。", "consciously=有意識地/conscious effort=有意識的努力/self-conscious=自我意識的/raise consciousness=提高意識", "She brought conscious attention to patterns she had been running automatically. The examination did not eliminate the patterns — but it gave her a choice about them. Consciousness is the prerequisite of choice.", "心理,哲學,教育"],
["conservation", "ˌkɒnsəˈveɪʃən", "n.", "保護；節約", "Conservation of energy is as important as generation of energy.", "能量的保護和能量的產生一樣重要。", "Energy conservation=能量節約。Wildlife conservation=野生動物保護。Conservation effort=保護努力。", "energy conservation=能量節約/wildlife conservation=野生動物保護/conservation effort=保護努力/natural conservation=自然保護", "She practiced conservation of her attention as carefully as an environmentalist practices conservation of natural resources. Both were finite, irreplaceable, and easily depleted by those who did not take them seriously.", "環境,生活,哲學"],
["consistency", "kənˈsɪstənsi", "n.", "一致性；始終如一", "Consistency over time is the only proof of character.", "時間上的一致性是性格的唯一證明。", "Remarkable consistency=非凡的一致性。With consistency=一致地。Lack of consistency=缺乏一致性。", "remarkable consistency=非凡的一致性/with consistency=一致地/lack of consistency=缺乏一致性/consistent delivery=一致的交付", "People called her trustworthy. What they meant was: consistent. She did what she said she would, every time, without exception. Consistency, sustained over years, becomes the most credible form of communication.", "激勵,職場,哲學"],
["constructive", "kənˈstrʌktɪv", "adj.", "建設性的", "Constructive criticism aims at improvement, not at the person being criticized.", "建設性的批評旨在改善，而不是針對被批評的人。", "Constructively=建設性地。Constructive approach=建設性方法。Constructive feedback=建設性反饋。", "constructively=建設性地/constructive approach=建設性方法/constructive feedback=建設性反饋/constructive dialogue=建設性對話", "She gave criticism constructively — specific about the behavior, silent about the person, focused on the improvement she wanted to see. That discipline made her feedback welcomed rather than dreaded.", "溝通,教育,職場"],
["contemplation", "ˌkɒntɛmˈpleɪʃən", "n.", "深思；沉思", "Contemplation before decision prevents most regrets.", "決定之前的深思可以防止大多數後悔。", "In contemplation=在沉思中。Deep contemplation=深度沉思。Moment of contemplation=沉思的時刻。", "in contemplation=在沉思中/deep contemplation=深度沉思/moment of contemplation=沉思的時刻/contemplative practice=沉思練習", "She built contemplation into her week — not meditation, just sitting with important questions without rushing to answers. The quality of decisions made after genuine contemplation was measurably better than those made in haste.", "哲學,生活,心理"],
["continuous", "kənˈtɪnjuəs", "adj.", "持續的；連續的", "Continuous learning is the minimum viable maintenance of relevance.", "持續學習是保持相關性的最低可行維護。", "Continuously=持續地。Continuous improvement=持續改善。Non-stop=不停止的（同義）。", "continuously=持續地/continuous improvement=持續改善/continuous learning=持續學習/continuous effort=持續努力", "She treated learning as a continuous background process — not a once-a-year event. Every week added something: a book, an article, a conversation, an experiment. The accumulation was invisible and enormous.", "教育,激勵"],
["convergence", "kənˈvɜːrdʒəns", "n.", "融合；趨同", "Innovation lives at the convergence of disciplines, not within any single one.", "創新存在於學科的融合處，而不在任何單一學科中。", "Point of convergence=融合點。Where ideas converge=想法融合的地方。Seek convergence=尋求融合。", "point of convergence=融合點/where ideas converge=想法融合之處/convergence of interests=利益融合/technology convergence=技術融合", "She deliberately worked at the convergence of her fields. The unique combination she occupied — understood by few others — became her most defensible professional position. Intersections are rarer and more valuable than centers.", "教育,商業,創意"],
["coordination", "koʊˌɔːrdɪˈneɪʃən", "n.", "協調；配合", "Coordination multiplies individual effort into collective output.", "協調將個人努力倍增為集體產出。", "Coordinate=協調（動詞）。Lack of coordination=缺乏協調。In coordination with=與...協調。", "coordinate=協調/lack of coordination=缺乏協調/in coordination with=與...協調/effective coordination=有效協調", "She was known as the person who made coordination look effortless. The invisible work of aligning people, timelines, and resources before the work began made the visible work proceed without friction.", "職場,溝通,激勵"],
["cycle", "ˈsaɪkl", "n.", "循環；週期", "Understand the cycles in your work and you will stop fighting the downturns.", "理解你工作中的循環，你就會停止與低迷期作鬥爭。", "Cycle through=循環經歷。Virtuous cycle=良性循環。Break the cycle=打破循環。", "cycle through=循環經歷/virtuous cycle=良性循環/break the cycle=打破循環/vicious cycle=惡性循環", "She worked with her creative cycles rather than against them. She scheduled demanding creative work during the peaks of her cycle and administrative tasks during the troughs. Rhythm, not constant effort, was her secret.", "生活,職場,健康"],
["deliberation", "dɪˌlɪbəˈreɪʃən", "n.", "深思熟慮；慎重考慮", "Add deliberation to your process for consequential decisions.", "在重大決定的過程中增加深思熟慮。", "After deliberation=深思熟慮之後。Careful deliberation=謹慎的考慮。Period of deliberation=考慮期。", "after deliberation=深思熟慮之後/careful deliberation=謹慎考慮/period of deliberation=考慮期/without deliberation=不加考慮", "She was known for careful deliberation on important questions — resisting the social pressure to decide immediately, taking the time her judgment required. That patience, often uncomfortable to others, produced decisions that held up.", "哲學,職場,教育"],
["empowerment", "ɪmˈpaʊərmənt", "n.", "賦能；授權", "Empowerment is giving people the information, authority, and support to act.", "賦能是給人們採取行動所需的信息、權力和支持。", "Self-empowerment=自我賦能。Create empowerment=創造賦能。Sense of empowerment=賦能感。", "self-empowerment=自我賦能/create empowerment=創造賦能/sense of empowerment=賦能感/economic empowerment=經濟賦能", "She created empowerment by giving her team information and authority simultaneously. Information without authority is frustrating. Authority without information is reckless. Both together creates genuine empowerment.", "職場,社會,激勵"],
["engagement", "ɪnˈɡeɪdʒmənt", "n.", "投入；參與", "Deep engagement with your work is both the method and the reward.", "對你的工作深度投入既是方法也是回報。", "Employee engagement=員工投入度。Drive engagement=驅動參與。Full engagement=完全投入。", "employee engagement=員工投入度/drive engagement=驅動參與/full engagement=完全投入/level of engagement=投入程度", "She measured team health by engagement — not by output, not by hours, but by the quality of presence people brought to their work. High engagement, she had found, preceded high output. Get the engagement right first.", "職場,激勵,教育"],
["equilibrium", "ˌiːkwɪˈlɪbriəm", "n.", "平衡；均衡", "Seek dynamic equilibrium rather than static balance — life is motion.", "尋求動態平衡而不是靜態平衡——生命是運動。", "Maintain equilibrium=保持平衡。Find equilibrium=找到平衡。Dynamic equilibrium=動態平衡。", "maintain equilibrium=保持平衡/find equilibrium=找到平衡/dynamic equilibrium=動態平衡/upset equilibrium=打破平衡", "She found equilibrium not by avoiding disruption but by developing the capacity to return to center quickly after being disrupted. Equilibrium was not a state she reached. It was a skill she practiced.", "哲學,生活,心理"],
["flexibility", "ˌflɛksɪˈbɪlɪti", "n.", "靈活性；彈性", "Mental flexibility is the most future-proof skill you can develop.", "心理靈活性是你能培養的最能應對未來的技能。", "Build flexibility=建立靈活性。Cognitive flexibility=認知靈活性。Strategic flexibility=戰略靈活性。", "build flexibility=建立靈活性/cognitive flexibility=認知靈活性/strategic flexibility=戰略靈活性/demand flexibility=需求靈活性", "She trained her mental flexibility deliberately — exposing herself to perspectives she disagreed with, changing her mind publicly, trying approaches that were foreign to her natural style. Flexibility, like physical flexibility, requires regular stretching.", "教育,激勵,職場"],
["flourishing", "ˈflʌrɪʃɪŋ", "adj.", "蓬勃發展的；繁榮的", "A flourishing life requires both meaning and pleasure.", "繁榮的生活既需要意義也需要樂趣。", "Flourishing society=蓬勃發展的社會。Create flourishing=創造繁榮。Conditions for flourishing=繁榮的條件。", "flourishing society=蓬勃發展的社會/create flourishing=創造繁榮/conditions for flourishing=繁榮的條件/truly flourishing=真正繁榮", "She designed her life around the conditions she had found to produce flourishing in herself: meaningful work, strong relationships, sufficient autonomy, physical health. Not all were always present. But she tended all of them.", "生活,哲學,激勵"],
["foresight", "ˈfɔːrsaɪt", "n.", "先見之明；遠見", "Develop foresight by studying history and extrapolating current trends forward.", "通過研究歷史並將當前趨勢向前推斷來培養先見之明。", "With foresight=有先見之明地。Remarkable foresight=非凡的先見之明。Lack of foresight=缺乏遠見。", "with foresight=有先見之明地/remarkable foresight=非凡的先見之明/lack of foresight=缺乏遠見/exercise foresight=發揮遠見", "She was known for foresight — seeing what was coming before others could. Her method was not mysterious: she read voraciously, examined patterns carefully, and thought longer into the future than most people found comfortable.", "商業,教育,哲學"],
["forge", "fɔːrdʒ", "v.", "鍛造；建立", "Forge your character in small daily choices, not in grand dramatic moments.", "在每天的小選擇中鍛造你的性格，而不是在宏大的戲劇性時刻。", "Forge ahead=勇往直前。Forge a path=開闢道路。Forge relationships=建立關係。", "forge ahead=勇往直前/forge a path=開闢道路/forge relationships=建立關係/forge character=鍛造性格", "She forged her path not by following the map provided but by making one as she went. Each decision added a new road to the map. Over time, her unique path became a route others followed.", "激勵,哲學"],
["admit", "ədˈmɪt", "v.", "承認；接受", "Admitting you were wrong is not a sign of weakness — it is a sign of intelligence.", "承認你是錯誤的不是軟弱的表現——而是智慧的表現。", "Admit a mistake=承認錯誤。Hard to admit=難以承認。Admit defeat=承認失敗。", "admit a mistake=承認錯誤/hard to admit=難以承認/admit defeat=承認失敗/openly admit=坦然承認", "She admitted mistakes publicly and specifically: what she had done, why it was wrong, what she was doing differently. That template — acknowledgment without excuse — built more trust than any unblemished performance ever could.", "溝通,激勵,職場"],
["ambitious", "æmˈbɪʃəs", "adj.", "有抱負的；雄心勃勃的", "Be ambitious in your goals and patient in your timeline.", "在目標上有抱負，在時間線上有耐心。", "Wildly ambitious=極度有抱負的。Ambitiously=有抱負地。Ambitious plan=雄心勃勃的計劃。", "wildly ambitious=極度有抱負的/ambitiously=有抱負地/ambitious plan=雄心勃勃的計劃/ambitious target=雄心勃勃的目標", "She was ambitious in a specific way: not for status or recognition, but for impact. That distinction — ambition directed toward contribution rather than position — kept her motivated through the parts of the work that offered neither.", "激勵,職場,哲學"],
["belief", "bɪˈliːf", "n.", "信念", "Your beliefs about your capabilities determine those capabilities more than the capabilities themselves.", "你對自己能力的信念比能力本身更能決定那些能力。", "Core belief=核心信念。Belief system=信念體系。Challenge beliefs=挑戰信念。", "core belief=核心信念/belief system=信念體系/challenge beliefs=挑戰信念/deeply held belief=深植的信念", "She examined her core beliefs about herself every few years. Some were enabling — accurate and useful. Some were limiting — inaccurate and destructive. Identifying and replacing the limiting ones produced more growth than any skill she developed.", "心理,哲學,激勵"],
["blank", "blæŋk", "adj./n.", "空白的；空白", "A blank page is not a problem — it is an invitation.", "空白頁不是問題——它是邀請。", "Draw a blank=什麼也想不起來。Blank slate=白板；全新開始。Blank check=空白支票。", "draw a blank=什麼也想不起/blank slate=白板/blank check=空白支票/fill in the blank=填空", "She loved blank pages. Others found them paralyzing. She had learned that a blank page was pure possibility — the most open state anything could be in. She started with gratitude, not anxiety.", "藝術,教育,哲學"],
["bridge", "brɪdʒ", "v.", "橋接；連接", "Bridge the gap between intention and action with specific commitments.", "用具體的承諾橋接意圖和行動之間的差距。", "Build a bridge=建立橋樑。Bridge differences=彌合分歧。Cross the bridge=跨越橋樑。", "build a bridge=建立橋樑/bridge differences=彌合分歧/cross the bridge=跨越橋樑/bridge the gap=縮小差距", "She was skilled at bridging differences between people — finding the common ground that made collaboration possible even where values or styles diverged. Bridge-building is both a skill and a service.", "溝通,職場,社交"],
["center", "ˈsɛntər", "v.", "使以...為中心；保持專注", "Center yourself before any important interaction or decision.", "在任何重要的互動或決定之前讓自己保持專注。", "Re-center=重新專注。Keep centered=保持專注。Center of gravity=重力中心。", "re-center=重新專注/keep centered=保持專注/center of gravity=重力中心/stay centered=保持中心", "She had a centering practice — three deep breaths, two minutes of stillness — before any significant conversation or decision. That brief ritual moved her from reactive to responsive, from distracted to present.", "心理,激勵,生活"],
["champion", "ˈtʃæmpiən", "v.", "支持；倡導", "Champion the ideas and people you believe in, even without a guarantee of success.", "支持你相信的想法和人，即使沒有成功的保證。", "Champion a cause=支持一項事業。Become a champion=成為捍衛者。Stand up for=支持（同義）。", "champion a cause=支持事業/become a champion=成為捍衛者/stand up for=支持/champion others=支持他人", "She championed her team members' ideas publicly — in meetings, in presentations, in conversations with leadership. That advocacy — generous and specific — made her the person her team fought hardest to succeed for.", "職場,溝通,激勵"],
["charitable", "ˈtʃærɪtəbl", "adj.", "慈善的；寬容的", "Be charitable in your interpretations of others' behavior.", "對他人行為的解釋保持寬容。", "Charitable interpretation=寬容的解釋。Act charitably=慈善地行動。Charitable assumption=寬容的假設。", "charitable interpretation=寬容的解釋/act charitably=慈善地行動/charitable assumption=寬容的假設/give the benefit of doubt=給予信任", "She interpreted others' actions charitably by default. Not naively — she updated her interpretation when evidence warranted. But her starting assumption was benign. That charity made her easy to trust and easy to collaborate with.", "哲學,社交,溝通"],
["climax", "ˈklaɪmæks", "n.", "高峰；頂點", "Prepare for the climax while maintaining effort during the ordinary.", "為高峰做準備，同時在平凡中保持努力。", "Reach a climax=達到高峰。Build to a climax=建立到頂點。Dramatic climax=戲劇性的高潮。", "reach a climax=達到高峰/build to a climax=建立到頂點/dramatic climax=戲劇性高潮/career climax=職業高峰", "She worked on the ordinary days with the same seriousness she brought to peak moments. That consistency meant the climax moments — when they arrived — drew on a reservoir of preparation rather than a surge of last-minute effort.", "激勵,藝術"],
["compare", "kəmˈpɛər", "v.", "比較", "Compare yourself only to who you were yesterday.", "只與昨天的自己比較。", "Compare and contrast=比較和對比。Favorably compare=有利地比較。Compare notes=交換意見。", "compare and contrast=比較和對比/favorably compare=有利地比較/compare notes=交換意見/compare progress=比較進度", "She had trained herself to compare herself only to her past self. Comparing to others produced either false comfort or destructive envy. Comparing to herself produced honest information and motivated growth.", "哲學,激勵,心理"],
["compassion", "kəmˈpæʃən", "n.", "同情；憐憫", "Compassion for others begins with compassion for yourself.", "對他人的同情始於對自己的同情。", "Show compassion=表達同情。Act with compassion=以同情行動。Compassionate=富有同情心的（形容詞）。", "show compassion=表達同情/act with compassion=以同情行動/compassionate=富有同情心的/self-compassion=自我同情", "She showed compassion not as a performance but as a practice — present even when difficult, genuine even when inconvenient. People who received her compassion consistently described it as unlike anything they had experienced before. Presence makes compassion real.", "社交,心理,哲學"],
["competent", "ˈkɒmpɪtənt", "adj.", "有能力的；勝任的", "Become competent in what matters, not in everything.", "在重要的事情上變得有能力，而不是在一切事情上。", "Highly competent=高度有能力的。Competently=有能力地。Competent professional=有能力的專業人士。", "highly competent=高度有能力的/competently=有能力地/competent professional=有能力的專業人士/prove competent=證明有能力", "She focused on becoming deeply competent in a small number of areas rather than superficially competent in many. The depth created irreplaceability. The selectivity created focus. Both created results.", "職場,教育,激勵"],
["completion", "kəmˈpliːʃən", "n.", "完成", "The discipline of completion is rarer than the ability to begin.", "完成的紀律比開始的能力更為罕見。", "Bring to completion=帶到完成。Near completion=接近完成。Completion rate=完成率。", "bring to completion=帶到完成/near completion=接近完成/completion rate=完成率/satisfaction of completion=完成的滿足感", "She valued completion over perfection. A finished imperfect thing could be improved. An unfinished perfect idea contributed nothing. Her completion rate was the metric she trusted most about her own reliability.", "激勵,職場"],
["concentration", "ˌkɒnsənˈtreɪʃən", "n.", "集中；濃度", "Deep concentration is a skill in decline and a capability in demand.", "深度集中是一種正在衰退的技能，也是一種需求旺盛的能力。", "Power of concentration=集中的力量。Lose concentration=失去集中。Full concentration=完全集中。", "power of concentration=集中的力量/lose concentration=失去集中/full concentration=完全集中/deep concentration=深度集中", "She guarded her concentration like a rare resource — because it was. In a world of infinite distraction, the ability to hold sustained attention on one important thing had become the most valuable professional skill available.", "教育,激勵,職場"],
["confession", "kənˈfɛʃən", "n.", "承認；告白", "Honest confession of mistakes is the shortest path to repair.", "對錯誤的誠實承認是修復的最短路徑。", "Make a confession=做出承認。Public confession=公開承認。Without confession=沒有承認。", "make a confession=做出承認/public confession=公開承認/without confession=沒有承認/personal confession=個人承認", "She confessed mistakes quickly and specifically — naming what she had done, not minimizing it, not explaining it away. That clean acknowledgment, without the burden of justification, cleared air that defensiveness would have muddied for weeks.", "溝通,心理,激勵"],
["consideration", "kənˌsɪdəˈreɪʃən", "n.", "考慮；體貼", "Give every important decision genuine consideration before committing.", "在承諾之前對每個重要決定給予真正的考慮。", "Take into consideration=考慮到。Show consideration=表現體貼。Under consideration=在考慮中。", "take into consideration=考慮到/show consideration=表現體貼/under consideration=在考慮中/give consideration=給予考慮", "She was thoughtful in her consideration of others — anticipating their needs, respecting their time, acknowledging their contributions. That consideration was not strategic. It was just who she had decided to be.", "溝通,社交,職場"],
["creativity", "kriˌeɪˈtɪvɪti", "n.", "創造力", "Creativity is the combination of existing elements in ways nobody else has tried.", "創造力是以沒有其他人嘗試過的方式組合現有元素。", "Boost creativity=提升創造力。Encourage creativity=鼓勵創造力。Creative spark=創意火花。", "boost creativity=提升創造力/encourage creativity=鼓勵創造力/creative spark=創意火花/natural creativity=自然的創造力", "She fed her creativity by consuming across disciplines — art, science, philosophy, history. Each domain contributed patterns and metaphors that transferred to her own. Creativity is the art of intelligent borrowing.", "藝術,教育,商業"],
["determination", "dɪˌtɜːrmɪˈneɪʃən", "n.", "決心；毅力", "Determination is the one advantage that cannot be bought, outsourced, or inherited.", "決心是唯一不能被購買、外包或繼承的優勢。", "Show determination=表現出決心。Iron determination=堅定的決心。With great determination=帶著極大的決心。", "show determination=表現出決心/iron determination=堅定的決心/with great determination=帶著極大的決心/determination to succeed=成功的決心", "She was the most determined person in any room. Not loudly — quietly. Her determination was visible only in outcomes: consistent delivery, long follow-through, and the absence of the abandoned projects that littered others' histories.", "激勵,哲學"],
["dialogue", "ˈdaɪəlɒɡ", "n.", "對話；交流", "Seek dialogue over debate — understanding over winning.", "尋求對話而非辯論——尋求理解而非獲勝。", "Open dialogue=開放對話。Productive dialogue=有成效的對話。Start a dialogue=開始對話。", "open dialogue=開放對話/productive dialogue=有成效的對話/start a dialogue=開始對話/honest dialogue=誠實的對話", "She chose dialogue over debate in every important disagreement. Debate aims to win; dialogue aims to understand. Dialogue produced better decisions, more durable agreements, and stronger relationships than any debate she had ever won.", "溝通,哲學,職場"],
["diversity", "daɪˈvɜːrsɪti", "n.", "多樣性", "Diversity of thought is the most valuable and most overlooked form of diversity.", "思想的多樣性是最有價值也是最被忽視的多樣性形式。", "Celebrate diversity=慶祝多樣性。Value diversity=重視多樣性。Diversity of opinion=意見的多樣性。", "celebrate diversity=慶祝多樣性/value diversity=重視多樣性/diversity of opinion=意見的多樣性/cognitive diversity=認知多樣性", "She assembled teams with cognitive diversity as a priority — people who thought differently, not just people who looked different. The friction of diverse thinking, managed well, produced better outcomes than comfortable consensus.", "職場,社會,教育"],
["enlighten", "ɪnˈlaɪtn", "v.", "啟迪；教導", "Enlighten without condescending — share what you know as a gift, not a lecture.", "不要高傲地啟迪他人——把你所知道的作為禮物分享，而不是講座。", "Enlightening=啟迪性的。Feel enlightened=感到受啟迪。Enlighten others=啟迪他人。", "enlightening=啟迪性的/feel enlightened=感到受啟迪/enlighten others=啟迪他人/self-enlightenment=自我啟迪", "She shared knowledge with humility — as one learner sharing with another, not as an expert dispensing from on high. That stance made people want to learn from her. Information shared with humility is received with gratitude.", "教育,溝通,哲學"],
["accuse", "əˈkjuːz", "v.", "指控", "Accuse only when evidence is clear and the cause is just.", "只在證據清晰且原因正當時才指控。", "False accusation=誣告。Accuse wrongly=錯誤指控。Face accusations=面對指控。", "false accusation=誣告/accuse wrongly=錯誤指控/face accusations=面對指控/formal accusation=正式指控", "She paused before accusing, even when certain. What would the accusation cost? What would it accomplish? Those questions filtered justified responses from reactive ones.", "溝通,哲學"],
["apologize", "əˈpɒlədʒaɪz", "v.", "道歉", "Apologize specifically and without conditions — vague apologies heal nothing.", "具體且無條件地道歉——模糊的道歉什麼都治不好。", "Sincerely apologize=誠摯地道歉。Formal apology=正式道歉。Apologize first=率先道歉。", "sincerely apologize=誠摯地道歉/formal apology=正式道歉/apologize first=率先道歉/full apology=完整的道歉", "She had mastered the specific apology: naming what she had done, acknowledging the impact, committing to change. No 'but'. No 'if you felt'. Just ownership. People who received such apologies almost always felt completely repaired.", "溝通,社交,哲學"],
["argument", "ˈɑːrɡjəmənt", "n.", "論點；爭論", "Make your best argument and remain genuinely open to being wrong.", "提出你最好的論點，並真正保持對錯誤的開放態度。", "Present an argument=提出論點。Counter-argument=反論。Win an argument=贏得爭論。", "present an argument=提出論點/counter-argument=反論/win an argument=贏得爭論/compelling argument=有力的論點", "She presented her arguments completely and listened to counter-arguments with genuine openness. Not debating to win, but reasoning to find truth. The difference showed in the quality of her conclusions.", "溝通,教育,哲學"],
["author", "ˈɔːθər", "v.", "著作；創作", "Author your own life rather than living someone else's script.", "著作你自己的生活，而不是按照別人的劇本生活。", "Author of your fate=命運的主宰。Co-author=共同著作。Be the author=成為作者。", "author of your fate=命運的主宰/co-author=共同著作/be the author=成為作者/author of change=改變的創作者", "She chose to author her own path — making deliberate choices about her values, her goals, and her methods, rather than drifting along the current of others' expectations.", "激勵,哲學,教育"],
["beginning", "bɪˈɡɪnɪŋ", "n.", "開始；起點", "Every beginning is uncomfortable — that discomfort is the cost of entry, not a sign to stop.", "每一個開始都是不舒服的——那種不舒服是入場費，而不是停止的信號。", "At the beginning=在開始時。New beginning=新的開始。Beginning of the end=末日的開始。", "at the beginning=在開始時/new beginning=新的開始/beginning of the end=末日的開始/humble beginning=謙遜的起點", "She loved beginnings — that terrifying moment of not-yet-knowing, of incompetence about to become competence. She had learned to recognize the discomfort of a beginning as excitement wearing a mask.", "激勵,教育,哲學"],
["cautious", "ˈkɔːʃəs", "adj.", "謹慎的", "Be cautious about irreversible decisions and bold about reversible ones.", "對不可撤銷的決定要謹慎，對可撤銷的決定要大膽。", "Exercise caution=謹慎行事。Cautiously=謹慎地。Overly cautious=過於謹慎的。", "exercise caution=謹慎行事/cautiously=謹慎地/overly cautious=過於謹慎的/proceed with caution=謹慎地進行", "She applied asymmetric caution: irreversible, high-stakes decisions received maximum caution. Small, reversible choices received minimum. Most people apply the same caution to everything and end up both slow and undifferentiated.", "職場,哲學,激勵"],
["comfort", "ˈkʌmfərt", "v.", "安慰；使舒適", "Step out of comfort regularly and return to it deliberately.", "定期走出舒適圈，有意識地回到它。", "Offer comfort=給予安慰。Comfort zone=舒適圈。Find comfort=找到安慰。", "offer comfort=給予安慰/comfort zone=舒適圈/find comfort=找到安慰/seek comfort=尋求安慰", "She used her comfort zone as a base camp, not a permanent residence. She ventured out from it regularly, took on challenges, and returned to it for recovery. That cycle — stretch and restore — was her growth rhythm.", "激勵,心理,生活"],
["compassionate", "kəmˈpæʃənɪt", "adj.", "富有同情心的", "Be compassionate about human limitations — including your own.", "對人類的局限性富有同情心——包括你自己的。", "Deeply compassionate=深刻同情的。Compassionate response=有同情心的回應。Act compassionately=富有同情心地行動。", "deeply compassionate=深刻同情的/compassionate response=有同情心的回應/act compassionately=富有同情心地行動/compassionate leader=有同情心的領導者", "She was compassionate about imperfection — in others and in herself. Not as an excuse but as an acknowledgment: humans are imperfect, effort deserves recognition, and kindness is often more productive than judgment.", "哲學,心理,社交"],
["concrete", "ˈkɒŋkriːt", "adj.", "具體的；實際的", "Make feedback concrete, not general — general feedback changes nothing.", "讓反饋具體，而不是籠統——籠統的反饋什麼都改變不了。", "Concrete example=具體例子。Concrete plan=具體計劃。Make concrete=使具體化。", "concrete example=具體例子/concrete plan=具體計劃/make concrete=使具體化/concrete action=具體行動", "She was known for giving concrete feedback — not 'be more confident' but 'when you present data, make eye contact with the audience for the first thirty seconds.' Specific is actionable. General is just noise.", "溝通,職場,教育"],
["airport", "ˈɛrpɔːrt", "n.", "機場", "We arrived at the airport two hours before the flight.", "我們在班機起飛前兩小時到達機場。", "Air+port→飛機的港口。", "at the airport=在機場/airport taxi=機場計程車/airport lounge=機場貴賓室", "She dragged her suitcase through the crowded airport. Her flight was delayed. She bought coffee and found a quiet corner to read.", "旅遊,交通,出行"],
["apartment", "əˈpɑːrtmənt", "n.", "公寓", "She rents a small apartment near the city center.", "她在市中心附近租了一間小公寓。", "Apart+ment→分開的單元→公寓。", "apartment building=公寓大樓/studio apartment=套房/rent an apartment=租公寓", "Moving into her first apartment felt like freedom. The rooms were tiny but all hers. She spent the first night eating takeout on the floor.", "住房,日常,城市"],
["awful", "ˈɔːfəl", "adj.", "糟糕的", "The weather was awful during our vacation.", "我們度假期間天氣很糟糕。", "Awful→充滿敬畏→古義敬畏，今義糟透了。", "awful weather=惡劣天氣/feel awful=感覺很差/awful mistake=嚴重錯誤", "The hotel was awful—the bed squeaked, the shower ran cold. But they laughed about it the whole way home.", "情緒,旅遊,日常"],
["bake", "beɪk", "v.", "烘烤", "She loves to bake cookies on weekends.", "她喜歡在週末烤餅乾。", "Bake→放進烤箱加熱。", "bake a cake=烤蛋糕/freshly baked=新鮮烘焙/bake bread=烤麵包", "The kitchen smelled of warm cinnamon. Grandma was baking again. Every Sunday she turned flour into something magical.", "飲食,家居,家庭"],
["band", "bænd", "n.", "樂隊；帶子", "The band played until midnight.", "樂隊一直演奏到午夜。", "Band→綁在一起的人。", "rock band=搖滾樂隊/band together=團結/rubber band=橡皮筋", "Five friends formed a band in a garage. They practiced every weekend. Three years later, they played their first real concert.", "音樂,藝術,社交"],
["basement", "ˈbeɪsmənt", "n.", "地下室", "The old boxes are stored in the basement.", "舊箱子放在地下室。", "Base+ment→房子底部→地下室。", "basement floor=地下層/in the basement=在地下室/basement apartment=地下室公寓", "He set up his art studio in the basement. It was quiet and cool. Best workspace he had ever had.", "家居,藝術,日常"],
["beat", "biːt", "v./n.", "打敗；節拍", "Our team beat the other team by two points.", "我們隊以兩分擊敗對方。", "Beat→用力打→節奏也是打拍子。", "beat a record=打破紀錄/heart beat=心跳/beat the deadline=趕在截止前完成", "The drums set the beat and the crowd moved together. Music turned strangers into one. That night felt like home.", "音樂,運動,激勵"],
["boil", "bɔɪl", "v.", "煮沸；煮", "Boil the eggs for ten minutes for hard-boiled.", "把雞蛋煮十分鐘就全熟了。", "Boil→水滾動冒泡的樣子。", "boil water=燒水/boiling point=沸點/hard-boiled=全熟", "The water began to boil. She added pasta and set the timer. Simple meals made with care taste the best.", "飲食,家居,日常"],
["boring", "ˈbɔːrɪŋ", "adj.", "無聊的", "The lecture was so boring that students fell asleep.", "演講太無聊了，學生們都睡著了。", "Bore+ing→像被鑽洞一樣難受→無聊。", "boring meeting=無聊的會議/so boring=超級無聊/boring routine=乏味的例行", "She used to call everything boring. Then she ran out of things to scroll. She picked up a book instead—it changed everything.", "情緒,娛樂,個人成長"],

    ["among", "əˈmʌŋ", "prep.", "在…之中", "She felt at home among people who loved books.", "她在愛書的人群中感到如魚得水。", "Among→在三個或更多事物的中間。", "among friends=在朋友之中/among the best=名列前茅/among others=其中包括", "Among the fifty applications, hers stood out immediately. Not because it was loudest. Because it was most honest.", "社交,日常,職場"],

    ["analysis", "əˈnæləsɪs", "n.", "分析", "Her analysis of the problem revealed an unexpected solution.", "她對問題的分析揭示了一個意想不到的解決方案。", "Ana+lysis→把事物解開研究→分析。", "data analysis=數據分析/in-depth analysis=深入分析/market analysis=市場分析", "She trusted her analysis more than her gut, until one day her gut was right and the analysis was wrong. Now she uses both.", "商業,學術,個人成長"],
    ["anyone", "ˈɛniˌwʌn", "pron.", "任何人", "Is there anyone here who speaks Mandarin?", "這裡有人會說普通話嗎？", "Any+one→不特定的任何一個人。", "anyone can=任何人都能/not anyone=不是隨便誰/anyone else=其他任何人", "She believed anyone could learn anything given time and support. She had been told this once and it changed her life.", "教育,激勵,社交"],
    ["anything", "ˈɛniˌθɪŋ", "pron.", "任何事", "She would do anything to protect her family.", "她願意做任何事來保護她的家人。", "Any+thing→不特定的任何一件事。", "anything but=一點也不/anything goes=什麼都可以/anything else=還有什麼", "He said he would do anything to get the role. She gave him a task no one wanted. He did it perfectly.", "日常,激勵,溝通"],
    ["around", "əˈraʊnd", "prep./adv.", "在...附近；大約", "She explored the area around the hotel on her first morning.", "她在第一天早上探索了飯店附近的區域。", "Around→在某個點的周圍或大概的時間。", "around the corner=就在附近/get around=四處走動/around midnight=大約午夜", "She had been walking around the same block. Then she turned a corner she had never turned before. That street changed everything.", "旅遊,日常,個人成長"],
    ["article", "ˈɑːrtɪkəl", "n.", "文章；物品", "She published an article that was read by a million people.", "她發表了一篇被百萬人閱讀的文章。", "Article→分段的書面作品→文章。", "news article=新聞文章/write an article=寫文章/article of clothing=一件衣物", "He wrote the article in two hours. It took him ten years of experience to write it that fast.", "媒體,教育,職場"],
    ["artist", "ˈɑːrtɪst", "n.", "藝術家；藝人", "She became an artist by practicing every single day.", "她通過每天練習成為了一位藝術家。", "Art+ist→從事藝術創作的人→藝術家。", "visual artist=視覺藝術家/street artist=街頭藝術家/artist studio=藝術家工作室", "He called himself a hobbyist for years. Then a stranger called him an artist. He started using the word. The work improved immediately.", "藝術,個人成長,激勵"],
    ["attack", "əˈtæk", "v./n.", "攻擊；著手處理", "She attacked the problem with fresh energy every morning.", "她每天早上以新的活力積極應對這個問題。", "Attack→以強烈力量衝向某目標。", "panic attack=恐慌發作/attack a problem=積極應對問題/heart attack=心臟病發", "They expected her to retreat. Instead she attacked the challenge head-on.", "激勵,個人成長,職場"],
    ["attorney", "əˈtɜːrni", "n.", "律師；代理人", "She hired an attorney to review the contract.", "她聘請了一位律師來審查合約。", "Attorney→代表他人的法律代理人。", "defense attorney=辯護律師/power of attorney=授權書/attorney general=司法部長", "She didn't sign until her attorney reviewed it. The attorney found three clauses worth renegotiating.", "法律,商業,職場"],
    ["audience", "ˈɔːdiəns", "n.", "觀眾；聽眾", "She spoke to an audience of five hundred people without notes.", "她不用筆記向五百人演講。", "Audi→聆聽的群體→觀眾。", "target audience=目標受眾/live audience=現場觀眾/audience engagement=觀眾參與", "She had prepared for the audience. But the first laugh surprised her. After that, she forgot to be nervous.", "溝通,藝術,職場"],
    ["away", "əˈweɪ", "adv.", "離開；遠處", "She needed to get away from the city for a few days.", "她需要離開城市幾天。", "Away→離開某個位置，去往別處。", "run away=逃跑/right away=立刻/far away=遙遠的/give away=贈送", "He worked without stopping until she said: go away for a weekend. When he came back, the answer was waiting for him.", "日常,旅遊,個人成長"],
    ["consider", "kənˈsɪdər", "v.", "考慮；認為", "She considered every angle before making any major decision.", "她在做任何重大決定之前都考慮每個角度。", "Consider→仔細思考某件事的各個方面。", "consider options=考慮選項/seriously consider=認真考慮/all things considered=綜合考慮", "He rushed. She considered. In the short run, he moved faster. In the long run, her decisions aged better.", "個人成長,教育,職場"],
    ["contact", "ˈkɒntækt", "n./v.", "聯繫；接觸", "She kept in contact with every mentor she had ever had.", "她與每一位曾有過的導師保持聯繫。", "Con+tact→兩者相互接觸→聯繫。", "make contact=建立聯繫/stay in contact=保持聯繫/contact information=聯絡資訊", "He had two hundred contacts and felt alone. She had twenty and felt held. Quality of connection beats quantity.", "社交,職場,個人成長"],
    ["freedom", "ˈfriːdəm", "n.", "自由", "She worked hard for years so she could have freedom later.", "她努力工作多年，以便以後能夠擁有自由。", "Free+dom→處於自由狀態的境況→自由。", "financial freedom=財務自由/personal freedom=個人自由/freedom of speech=言論自由", "He bought things to feel free. She built skills to be free. One freedom fades. The other compounds.", "個人成長,激勵,社會"],
    ["intend", "ɪnˈtɛnd", "v.", "打算；意圖", "She intended every word she said and meant every promise she made.", "她說的每一句話都是有意為之，每一個承諾都是認真的。", "In+tend→把思想拉向目標→打算。", "intend to=打算/well-intended=出於好意/original intention=最初的意圖", "He acted without intending harm. But harm came anyway. Intention matters. Impact matters more.", "溝通,個人成長,日常"],
    ["responsibility", "rɪˌspɒnsɪˈbɪlɪti", "n.", "責任", "She took responsibility before being asked and earned trust before it was given.", "她在被要求之前承擔責任，在信任被給予之前贏得了信任。", "Respons+ibility→能夠做出回應的能力→責任。", "take responsibility=承擔責任/personal responsibility=個人責任/responsibility to others=對他人的責任", "He blamed the team. She took responsibility. They had the same outcome. Only one of them grew from it.", "職場,個人成長,激勵"],
    ["weakness", "ˈwiːknəs", "n.", "弱點；軟弱", "Knowing your weakness is a strength.", "了解你的弱點是一種力量。", "Weak+ness→缺乏力量的狀態→弱點。", "acknowledge weakness=承認弱點/turn weakness into strength=化弱為強/greatest weakness=最大弱點", "She named her weaknesses in the interview. The panel was surprised. Then impressed. Honesty about limitations signals self-awareness.", "個人成長,職場,激勵"],
    ["apparent", "əˈpærənt", "adj.", "明顯的；表面上的", "It was apparent that she had prepared well.", "很明顯她準備得很充分。", "Appear+ant→看起來如此→明顯的。", "become apparent=變得明顯/apparent reason=明顯的原因/seemingly apparent=表面上明顯", "He thought the problem was hidden. She pointed to it and said: it's apparent. Sometimes the answer is right there, unhidden.", "溝通,日常,個人成長"],
    ["appointment", "əˈpɔɪntmənt", "n.", "約定；任命", "She arrived five minutes early for every appointment.", "她每次約定都提前五分鐘到達。", "Appoint+ment→被指定的時間→約定。", "make an appointment=預約/keep an appointment=赴約/appointment time=約定時間", "She treated her appointment with herself—her writing hour—with the same respect as any meeting. That's why it happened.", "日常,習慣,職場"],
    ["arrest", "əˈrɛst", "v./n.", "逮捕；阻止", "The police arrested the suspect near the train station.", "警察在火車站附近逮捕了嫌疑人。", "Ar+rest(停止)→強制停止→逮捕。", "under arrest=被逮捕/arrest development=阻礙發展/cardiac arrest=心臟驟停", "The city had changed since the arrest. People spoke more openly. Sometimes one event shifts everything.", "法律,社會,城市"],
    ["athlete", "ˈæθliːt", "n.", "運動員", "She was a dedicated athlete who trained twice a day.", "她是一位每天訓練兩次的敬業運動員。", "Athlet+e→參加競賽的人→運動員。", "professional athlete=職業運動員/elite athlete=精英運動員/amateur athlete=業餘運動員", "He had never thought of himself as an athlete. Then he ran his first race. Something shifted. Labels change when you do the work.", "運動,健康,個人成長"],
    ["attend", "əˈtɛnd", "v.", "出席；照顧", "She attended every seminar she could find on the topic.", "她參加了她能找到的每一個關於這個主題的研討會。", "At+tend(延伸)→把注意力延伸到→出席。", "attend a meeting=出席會議/attend school=上學/attend to=照料", "He skipped the optional ones. She attended everything. By the end of the year, the gap between them was significant.", "教育,職場,習慣"],
    ["bother", "ˈbɒðər", "v./n.", "打擾；麻煩", "Don't bother him when he's in deep focus.", "當他深度專注時不要打擾他。", "Bother→讓人感到煩惱或不安。", "bother someone=打擾某人/can't be bothered=懶得去做/don't bother=不必了", "She said don't bother. He bothered anyway. The extra effort was noticed. The relationship deepened. Effort speaks.", "社交,日常,個人成長"],
    ["broadcast", "ˈbrɔːdkæst", "v./n.", "廣播；播出", "The news was broadcast live around the world.", "這條新聞向全世界進行了現場廣播。", "Broad(廣)+cast(投)→向廣闊範圍投送→廣播。", "live broadcast=現場直播/broadcast news=播報新聞/radio broadcast=無線電廣播", "She started a podcast that reached three people. Then thirty. Then thirty thousand. Broadcast what you know. The audience finds you.", "媒體,科技,商業"],
    ["burden", "ˈbɜːrdən", "n./v.", "負擔；使…有負擔", "She carried the burden quietly but it showed in her exhaustion.", "她悄悄承受著負擔，但從她的疲憊中可以看出。", "Burden→沉重的載荷，難以搬運。", "heavy burden=沉重的負擔/financial burden=財務負擔/share the burden=分擔負擔", "She had been carrying the burden alone for months. When she finally shared it, the burden didn't disappear—but it got lighter.", "情緒,健康,個人成長"],
    ["calculate", "ˈkælkjuleɪt", "v.", "計算；估計", "She calculated the risk carefully before investing.", "她在投資前仔細計算了風險。", "Calcul+ate→用算盤計算→計算。", "calculate the cost=計算成本/calculated risk=經過計算的冒險/miscalculate=計算錯誤", "He guessed. She calculated. In the short term, they got similar results. In the long term, her accuracy compounded.", "數學,商業,個人成長"],
    ["campus", "ˈkæmpəs", "n.", "校園；園區", "She loved the quiet of the campus early in the morning.", "她喜愛早晨校園的寧靜。", "Campus→拉丁文'田野'→大學的開放空間→校園。", "university campus=大學校園/campus life=校園生活/on campus=在校園內", "He had taken the campus for granted for four years. On graduation day he walked slowly. The familiar becomes precious when you know you're leaving.", "教育,社交,回憶"],
    ["casual", "ˈkæʒuəl", "adj.", "隨意的；非正式的", "She preferred casual meetings over formal presentations.", "她更喜歡隨意的會議而不是正式的報告。", "Casual→像意外事件一樣隨機的→隨意的。", "casual conversation=閒聊/casual dress=休閒服裝/casual attitude=隨意的態度", "The casual conversation after the meeting produced better ideas than the structured session before it. Informality unlocks honesty.", "社交,職場,溝通"],
    ["ceremony", "ˈsɛrɪməni", "n.", "儀式；典禮", "The graduation ceremony was short but meaningful.", "畢業典禮很短，但很有意義。", "Cerem+ony→正式的儀式行為。", "graduation ceremony=畢業典禮/opening ceremony=開幕式/wedding ceremony=婚禮", "She almost skipped the ceremony. Then she went. The moment they called her name, she was glad she had. Some moments need witnessing.", "節日,教育,家庭"],
    ["certificate", "sərˈtɪfɪkɪt", "n.", "證書；證明", "She earned a certificate in data analysis to boost her resume.", "她獲得了數據分析證書以提升她的履歷。", "Certifi+cate→讓某事被認證的文件→證書。", "birth certificate=出生證明/certificate program=證書課程/award a certificate=頒發證書", "She had the skill but not the certificate. Getting it changed nothing internally. But it opened three new doors. The world still runs on signals.", "教育,職場,個人成長"],
    ["charity", "ˈtʃærɪti", "n.", "慈善；善意", "She donated ten percent of her income to charity every year.", "她每年將收入的百分之十捐給慈善機構。", "Char(親愛)+ity→對他人的慷慨之愛→慈善。", "donate to charity=捐給慈善機構/charity work=慈善工作/act of charity=慈善行為", "He gave when he had more. She gave when she had less. The amount differed. The habit did not.", "社會,金融,個人成長"],
    ["cheat", "tʃiːt", "v./n.", "欺騙；作弊", "She refused to cheat even when she could have gotten away with it.", "即使能僥倖逃脫，她也拒絕作弊。", "Cheat→用不誠實的方式獲取優勢。", "cheat on a test=考試作弊/cheat yourself=欺騙自己/feel cheated=感到被騙", "He cheated and got the grade. She earned it. Years later, only one of them knew how to solve the problem.", "教育,個人成長,倫理"],
    ["citizen", "ˈsɪtɪzən", "n.", "公民；市民", "A good citizen contributes more than they take.", "一個好公民付出的多於他們得到的。", "Cit+izen→城市裡居住的人→公民。", "global citizen=世界公民/citizen journalism=公民新聞/senior citizen=老年公民", "She didn't wait for the government. She organized her neighbors. Being a citizen is active, not passive.", "社會,政治,個人成長"],
    ["commercial", "kəˈmɜːrʃəl", "adj./n.", "商業的；廣告", "She turned a passion project into a commercial success.", "她把一個熱情項目變成了商業成功。", "Commerc+ial→與買賣相關的→商業的。", "commercial success=商業成功/commercial break=廣告時間/commercial district=商業區", "She had resisted going commercial for years. Then she found a way to scale without losing the soul. Both can coexist.", "商業,行銷,個人成長"],
    ["commission", "kəˈmɪʃən", "n./v.", "委託；佣金", "She was commissioned to paint a mural for the new library.", "她被委託為新圖書館繪製一幅壁畫。", "Com+mission(任務)→被指派的任務→委託。", "earn a commission=賺取佣金/commission artwork=委託藝術品/on commission=按佣金計算", "He worked on commission and loved the freedom. She worked on salary and loved the stability. Both were right for their personalities.", "商業,藝術,職場"],
    ["competition", "ˌkɒmpɪˈtɪʃən", "n.", "競爭；比賽", "She entered the competition not to win but to measure herself.", "她參加比賽不是為了贏，而是為了衡量自己。", "Compete+ition→競爭的行為→競爭。", "face competition=面對競爭/fair competition=公平競爭/win a competition=贏得比賽", "The competition was fierce. She didn't study the competitors—she studied herself. That was the entire strategy.", "商業,運動,個人成長"],
    ["complaint", "kəmˈpleɪnt", "n.", "投訴；抱怨", "She handled every customer complaint as an opportunity to improve.", "她把每一個客戶投訴都視為改善的機會。", "Complain+t→提出不滿的行動→投訴。", "file a complaint=提出投訴/customer complaint=客戶投訴/without complaint=毫無怨言", "Most ignored the complaints. She read every one. Each contained a truth the product team needed to hear.", "商業,溝通,個人成長"],
    ["concept", "ˈkɒnsɛpt", "n.", "概念；觀念", "She could explain any concept simply because she understood it deeply.", "她能簡單地解釋任何概念，因為她深刻理解了它。", "Con+cept(拿取)→一起拿取的想法→概念。", "key concept=關鍵概念/abstract concept=抽象概念/core concept=核心概念", "If you can't explain the concept simply, you don't understand it yet. She used this as her standard.", "教育,溝通,學術"],
    ["congratulate", "kənˈɡrætʃuleɪt", "v.", "祝賀", "She congratulated others generously and without envy.", "她慷慨地祝賀他人，毫無嫉妒。", "Con+gratulate(感謝)→一起表達感謝→祝賀。", "congratulate on=為…道賀/warmly congratulate=衷心祝賀/be congratulated=受到祝賀", "She congratulated her competitor on the win. It surprised everyone. It surprised no one who knew her. Grace is a practice.", "社交,個人成長,情緒"],
    ["container", "kənˈteɪnər", "n.", "容器；貨櫃", "She used a container to store leftover soup in the fridge.", "她用容器把剩湯存放在冰箱裡。", "Contain+er→能夠裝東西的物品→容器。", "storage container=儲存容器/shipping container=貨運集裝箱/container garden=容器花園", "She traveled with only one small container of necessities. Everything else she bought when she needed it. Constraints teach priorities.", "家居,旅遊,日常"],
    ["contest", "ˈkɒntɛst", "n./v.", "比賽；爭論", "She entered the writing contest and placed second on her first try.", "她參加了寫作比賽，第一次嘗試就獲得了第二名。", "Con+test(證明)→一起測試誰更好→比賽。", "enter a contest=參加比賽/contest results=比賽結果/no contest=毫無爭議", "He won the contest at his peak. She entered when she was just beginning. Both experienced the same growth. Competition accelerates it.", "教育,藝術,激勵"],
    ["controversy", "ˈkɒntrəvɜːrsi", "n.", "爭議；論戰", "Her research sparked controversy and that meant it mattered.", "她的研究引發了爭議，這意味著它很重要。", "Contra+versy(轉)→轉向反對→爭議。", "spark controversy=引發爭議/controversial topic=有爭議的話題/avoid controversy=避免爭議", "She had avoided controversy for years. Then she published the truth. The controversy was loud. The truth was louder.", "社會,學術,個人成長"],
    ["corporation", "ˌkɔːrpəˈreɪʃən", "n.", "公司；法人", "She left the corporation to start something she believed in.", "她離開了公司，去創辦她相信的東西。", "Corp+oration→像一個法人實體的大型組織→公司。", "multinational corporation=跨國公司/large corporation=大公司/corporate structure=公司結構", "The corporation had given her stability. Leaving gave her meaning. Both had value at different stages.", "商業,職場,個人成長"],
    ["creature", "ˈkriːtʃər", "n.", "生物；人", "She was a creature of habit who found comfort in routine.", "她是一個在例行公事中找到舒適的習慣性動物。", "Create+ure→被創造出來的東西→生物。", "living creature=生物/creature of habit=習慣的動物/sea creature=海洋生物", "The creatures in the tide pool ignored her. She sat and watched for an hour. The ocean teaches patience without a word.", "自然,動物,個人成長"],
    ["critic", "ˈkrɪtɪk", "n.", "批評者；評論家", "She took feedback from critics as seriously as praise from fans.", "她把批評者的反饋和粉絲的讚美同樣認真對待。", "Crit+ic→做出判斷的人→批評者。", "art critic=藝術評論家/inner critic=內心的批評聲音/harsh critic=嚴厲的批評者", "He feared the critics and never showed his work. She listened to the critics and used every comment. One of them improved.", "藝術,個人成長,激勵"],
    ["decade", "ˈdɛkeɪd", "n.", "十年", "A decade of small daily actions built something extraordinary.", "十年的每日小行動建立了非凡的成就。", "Dec(十)+ade→十年的時間段。", "over a decade=十多年/last decade=過去十年/decade of change=十年的變化", "He wanted results in a year. She planned for a decade. Her timeline was uncomfortable. Her results were undeniable.", "時間,個人成長,激勵"],
    ["decrease", "dɪˈkriːs", "v./n.", "減少；降低", "She decreased her screen time and her sleep improved significantly.", "她減少了螢幕時間，睡眠品質顯著提升。", "De+crease(增長)→朝減少方向移動→減少。", "decrease in=減少/significant decrease=顯著減少/gradual decrease=逐漸降低", "He tried to add more. She tried to decrease the unnecessary. Both sought better results. Only one approach worked.", "健康,商業,個人成長"],
    ["defeat", "dɪˈfiːt", "v./n.", "打敗；失敗", "She turned every defeat into a lesson she wouldn't forget.", "她把每次失敗都變成她不會忘記的教訓。", "De+feat(完成)→讓對方的行動無法完成→打敗。", "suffer a defeat=遭受失敗/accept defeat=接受失敗/defeat the odds=打敗逆境", "The defeat was total and public. She thanked those who had won. Then she went home and worked twice as hard.", "激勵,個人成長,運動"],
