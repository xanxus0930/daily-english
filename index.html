["kick", "kɪk", "v.", "踢；開始", "It is time to kick off the new project with the whole team.", "是時候和整個團隊啟動新項目了。", "Kick off = 開始/開球。Kick back = 放鬆。Kick a habit = 戒掉習慣。", "kick off=開始/kick back=放鬆/kick a habit=戒掉習慣/sidekick=助手/kickstart=啟動", "The project kicked off with everyone's best intentions and nobody's plans. Three weeks in, they were lost. Lesson: kick off your projects with both energy and a clear direction.", "職場,運動"],
["land", "lænd", "v./n.", "著陸；土地", "She landed her dream job after months of hard work.", "她在幾個月的努力工作後得到了她的夢想工作。", "Landlord = 房東。Land a deal = 拿下交易。Landing = 著陸。", "landlord=房東/land a deal=拿下交易/landing=著陸/mainland=大陸/dream land=夢境", "When the plane landed, she realized she had crossed the world alone for the first time. Standing in the arrivals hall, she had never felt more capable. New lands make new people.", "旅遊,激勵"],
["last", "læst", "adj./v.", "最後的；持續", "The relationships that last are those built on honesty.", "持久的關係是建立在誠實基礎上的。", "At last = 終於。Last but not least = 最後但同樣重要的。Make it last = 讓它持久。", "at last=終於/last but not least=最後同樣重要/make it last=讓它持久/last resort=最後手段", "She made things that were meant to last — furniture, friendships, promises. In a world of disposable everything, her commitment to lasting things made her rare.", "生活,哲學,激勵"],
["later", "ˈleɪtər", "adv.", "之後；稍後", "Do it now — later becomes never more quickly than you think.", "現在就做——稍後變成永不比你想的更快。", "Later on = 之後。Sooner or later = 遲早。See you later = 再見。", "later on=之後/sooner or later=遲早/see you later=再見/latest=最新的", "He kept saying he would start later. Later became months. Months became years. One day, his 'later' project had to be started by someone else. Start now, even imperfectly.", "激勵,生活,時間管理"],
["layer", "ˈleɪər", "n.", "層次；層", "Good characters in stories have many layers to discover.", "好的故事人物有許多層次可以發現。", "Layer by layer = 一層一層地。Multiple layers = 多個層次。Outer layer = 外層。", "layer by layer=一層一層/multiple layers=多個層次/outer layer=外層/hidden layer=隱藏層", "Peel back the layers of any complex problem and you find simpler ones underneath. She was exceptional because she never stopped peeling until she found the root.", "科學,哲學,教育"],
["letter", "ˈlɛtər", "n.", "信件；字母", "She still writes a handwritten letter to her mother every week.", "她每週仍然給她的母親寫一封手寫信。", "Cover letter = 求職信。Open letter = 公開信。To the letter = 嚴格按照。", "cover letter=求職信/open letter=公開信/to the letter=嚴格按照/letter of recommendation=推薦信", "He received a handwritten letter from a stranger who had read his article. She said it had changed her life. He had almost not published it. Sharing your work matters.", "溝通,社交"],
["level", "ˈlɛvəl", "n./adj.", "水平；層次；平的", "Take your English to the next level with consistent practice.", "通過持之以恆的練習把你的英語帶到下一個水平。", "Level up = 升級。On a level = 誠實地說。Level the playing field = 創造公平競爭。", "level up=升級/level-headed=頭腦冷靜的/on a level=誠實地/level the playing field=公平競爭", "She was level-headed in every crisis, never escalating, never panicking. People around her felt safer just because she was present. Calmness is the highest form of leadership.", "職場,激勵"],
["light", "laɪt", "n./adj./v.", "光；輕的；點燃", "Be the light in someone's dark day — it costs nothing.", "成為某人黑暗一天裡的光——這不花任何代價。", "In a new light = 以新的眼光。Light up = 照亮。Green light = 同意/綠燈。", "in a new light=以新眼光/light up=照亮/green light=同意/light-hearted=輕鬆的/shed light on=闡明", "The small act of kindness lit up his whole week. He paid it forward. The chain of brightness that followed could never be traced back to its source. Light multiplies.", "社交,哲學,情感"],
["likely", "ˈlaɪkli", "adj.", "可能的", "Success is more likely when you focus on one thing at a time.", "當你一次專注於一件事時，成功更有可能。", "Most likely = 最有可能。Unlikely = 不太可能（反義）。Very likely = 非常可能。", "most likely=最有可能/unlikely=不太可能/it's likely that=很有可能/likely outcome=可能的結果", "She seemed the most unlikely candidate for the award — she was new, young, and unknown. That made the win even more powerful. Likely and worthy are not the same thing.", "日常,激勵,哲學"],
["limit", "ˈlɪmɪt", "n./v.", "限制", "Push your limits a little further each week.", "每週把你的限制再推進一點點。", "Set a limit = 設定限制。No limits = 無限制。Within limits = 在限制範圍內。", "set a limit=設定限制/push the limits=突破限制/speed limit=速限/no limits=無限制", "She never told herself what she couldn't do. She only told herself what she hadn't done yet. Removing the word 'can't' from her vocabulary changed what was possible.", "激勵,運動,哲學"],
["link", "lɪŋk", "n./v.", "連結；鏈接", "Everything is connected — every cause has a linked effect.", "一切都是相連的——每個原因都有相連的效果。", "Link between = 之間的連結。Broken link = 斷開的連結。Missing link = 缺失的環節。", "link between=之間的連結/missing link=缺失的環節/weak link=薄弱環節/strong link=強連結", "The researcher found the link between sleep and learning almost by accident. One discovery linked to another. Science is mostly following interesting threads to unexpected places.", "科學,教育,科技"],
["live", "lɪv", "v.", "活；居住", "Live fully today — not for yesterday or tomorrow.", "充分活在今天——不是為了昨天或明天。", "Live and learn = 活到老學到老。Live up to = 達到期望。Live it up = 盡情享受。", "live and learn=活到老學到老/live up to=達到期望/live it up=盡情享受/live in the moment=活在當下", "She stopped saving experiences for special occasions. She lit candles on Tuesday nights, wore her best clothes to the supermarket. Living fully every day was the point.", "哲學,生活,激勵"],
["long", "lɒŋ", "adj.", "長的；久的", "The long way is often the most direct path to mastery.", "漫長的道路往往是通往精通最直接的路徑。", "Long shot = 希望渺茫的事。Long run = 長期來看。As long as = 只要。", "long shot=希望渺茫/long run=長期來看/as long as=只要/long-term=長期的/think long-term=長遠思考", "'In the long run,' her mentor said, 'every shortcut costs you.' She ignored the advice once. It cost her a year to fix. She never ignored it again. Long-term thinking wins.", "激勵,哲學,生活"],
["look", "lʊk", "v.", "看；看起來", "Look at your life as if you were describing it to a friend.", "把你的生活看作是你在向朋友描述它的樣子。", "Look forward to = 期待。Look up to = 崇敬。Overlook = 忽略。", "look forward to=期待/look up to=崇敬/overlook=忽略/look on the bright side=往好處想", "She looked at the problem differently from everyone else. Where they saw obstacles, she saw puzzles. That habit of looking differently made her the most creative person in any room.", "哲學,生活,激勵"],
["lose", "luːz", "v.", "失去；輸", "Lose gracefully and you will win respect every time.", "優雅地失去，你每次都會贏得尊重。", "Lose your way = 迷路。Lose track of time = 忘記時間。Nothing to lose = 沒什麼可失去的。", "lose your way=迷路/lose track of time=忘了時間/nothing to lose=沒什麼可失去/lose yourself in=沉浸在", "He lost the competition. Then he congratulated the winner genuinely and asked what she had done differently. She told him. He won the next one. Losing well is a superpower.", "運動,職場,激勵"],
["loud", "laʊd", "adj.", "響亮的；大聲的", "Actions are always louder than words — every single time.", "行動永遠比言語響亮——每一次都是。", "Out loud = 大聲地。Think out loud = 把想法說出來。Actions speak louder = 行動勝於言語。", "think out loud=把想法說出來/actions speak louder=行動勝言語/out loud=大聲地/loud and clear=清清楚楚", "She was not the loudest person in the room. But when she spoke, everyone listened. What you say matters. How often you say things matters less than how clearly you say them.", "溝通,激勵"],
["luck", "lʌk", "n.", "運氣", "Luck is what happens when preparation meets opportunity.", "運氣是準備遇到機會時發生的事情。", "Good luck = 好運。Lucky break = 幸運的機會。Push your luck = 冒險過頭。", "good luck=好運/lucky break=幸運機會/push your luck=冒險過頭/beginner's luck=初學者的好運", "They called her lucky. She had applied to the same scholarship for four years. On the fourth attempt, she was awarded it. She had made her own luck by simply not stopping.", "激勵,生活,哲學"],
["market", "ˈmɑːrkɪt", "n.", "市場", "Understanding your market is the foundation of any business.", "了解你的市場是任何業務的基礎。", "Market research = 市場研究。Stock market = 股票市場。Target market = 目標市場。", "market research=市場研究/stock market=股票市場/target market=目標市場/farmer's market=農夫市集", "She went to the farmers market every Saturday. Not for the groceries, but for the conversations. Local markets are where community is practiced, not just produced.", "商業,社區,飲食"],
["match", "mætʃ", "n./v.", "比賽；相配", "Find work that matches your values, not just your skills.", "找到與你的價值觀相符的工作，不只是你的技能。", "Perfect match = 完美搭配。Match up = 配對。On the match = 相稱。", "perfect match=完美搭配/match up=配對/no match for=比不上/meet your match=遇到對手", "She was always looking for the right match — in work, in city, in relationships. When she stopped searching and started building, everything aligned. The match was in her own making.", "社交,職場,生活"],
["matter", "ˈmætər", "n./v.", "事情；重要", "At the end of the day, only a few things truly matter.", "在一天結束的時候，只有少數幾件事真正重要。", "It doesn't matter = 沒關係。What matters is = 重要的是。Subject matter = 主題內容。", "it doesn't matter=沒關係/what matters is=重要的是/subject matter=主題內容/grey matter=灰質（大腦）", "On his deathbed, he was asked what mattered most. He said: 'The people I loved and the moments I was fully present.' He had known all along. Most of us do.", "哲學,家庭,激勵"],
["message", "ˈmɛsɪdʒ", "n.", "訊息；信息", "The most powerful messages are often the most simple ones.", "最有力的信息往往是最簡單的。", "Send a message = 傳訊息。Text message = 簡訊。Get the message = 明白了。", "send a message=傳訊息/text message=簡訊/get the message=明白了/voice message=語音訊息", "She wrote the email seventeen times. Then deleted everything and wrote three sentences. The recipient replied immediately: 'Finally, clarity.' Simplicity is the best message.", "溝通,科技,日常"],
["mind", "maɪnd", "n./v.", "思維；注意", "The mind is like a garden — what you feed it grows.", "思維就像花園——你餵它什麼，它就長什麼。", "Change your mind = 改變主意。Open mind = 開放的思維。Peace of mind = 心安。", "change your mind=改變主意/open mind=開放思維/peace of mind=心安/never mind=不要緊/mindset=思維方式", "She protected her mental diet as carefully as her physical one. No negative news before bed. No comparisons. No complaints without solutions. Her mind became her greatest asset.", "心理,健康,激勵"],
["miss", "mɪs", "v.", "思念；錯過", "She misses her hometown but loves where she is now.", "她思念她的家鄉，但也喜愛她現在的地方。", "Miss out on = 錯過。Near miss = 差點發生。You are missed = 我們想念你。", "miss out on=錯過/near miss=差點/you are missed=我們想念你/miss the point=沒有理解重點", "He missed the flight and thought the day was ruined. The next plane seated him next to a mentor who changed his career. Missing sometimes means arriving exactly right.", "旅遊,激勵,日常"],
["moment", "ˈmoʊmənt", "n.", "時刻；片刻", "Be fully present in this moment — it will not come again.", "在這個時刻完全在場——它不會再來。", "In a moment = 馬上。At this moment = 此刻。Spur of the moment = 一時衝動。", "in a moment=馬上/at this moment=此刻/spur of the moment=一時衝動/live in the moment=活在當下", "He photographed everything, trying to capture moments. Then one day, he put the camera down and just watched the sunset. The best moments cannot be stored. Only felt.", "哲學,生活,藝術"],
["move", "muːv", "v.", "移動；搬家；感動", "The first move is always the hardest — but you must make it.", "第一步總是最難的——但你必須邁出它。", "Make a move = 採取行動。Move on = 向前走。Movie = 電影。", "make a move=採取行動/move on=向前走/move forward=向前推進/emotional move=感人的舉動", "She was moved to tears not by the grand gesture but by the small, daily ones — coffee made just right, a door held open, a name remembered. The small moves matter most.", "情感,生活,社交"],
["natural", "ˈnætʃərəl", "adj.", "自然的；天生的", "Learning feels more natural when you genuinely enjoy it.", "當你真正享受學習時，學習感覺更自然。", "Natural talent = 天賦。Naturally = 自然地。Nature vs nurture = 先天與後天。", "natural talent=天賦/naturally=自然地/natural disaster=自然災害/come naturally=自然而然地", "She was told she had a natural talent for languages. What they did not see was the three hours of daily practice behind the apparent natural ease. Talent is practice made invisible.", "自然,教育,激勵"],
["offer", "ˈɒfər", "v./n.", "提供；邀約", "She offered to help without being asked — that is rare.", "她主動提出幫忙，沒有被要求——那很少見。", "Job offer = 工作邀約。Make an offer = 提出邀約。Special offer = 特別優惠。", "job offer=工作邀約/make an offer=提出邀約/special offer=特別優惠/best offer=最好的條件", "She offered her expertise freely for years before anyone paid her for it. When they finally did, the rate was extraordinary. Generosity compounds.", "職場,商業,激勵"],
["opinion", "əˈpɪnjən", "n.", "意見；看法", "Your opinion only matters if you are willing to listen to others'.", "你的意見只有在你願意聆聽他人意見時才重要。", "In my opinion = 在我看來。Public opinion = 公眾輿論。Second opinion = 第二意見。", "in my opinion=在我看來/public opinion=公眾輿論/second opinion=第二意見/opinion poll=民意調查", "She never stated opinions as facts. Instead she said: 'In my view...' That simple framing invited dialogue instead of defense. Conversations improved dramatically.", "溝通,社交,哲學"],
["pain", "peɪn", "n.", "疼痛；痛苦", "No pain, no gain — but choose your pain wisely.", "沒有痛，沒有收穫——但要明智地選擇你的痛苦。", "Painless = 無痛的。Painkiller = 止痛藥。Growing pains = 成長的痛苦。", "painless=無痛的/painkiller=止痛藥/growing pains=成長的痛苦/be a pain=討人厭", "The athlete's pain was daily and deliberate. She chose it because she chose the goal. Chosen pain is completely different from imposed pain. Choose your hard.", "運動,健康,激勵"],
["paper", "ˈpeɪpər", "n.", "紙；論文", "She published her first research paper at the age of twenty-two.", "她在二十二歲時發表了她的第一篇研究論文。", "On paper = 理論上。Research paper = 研究論文。Paper trail = 書面記錄。", "on paper=理論上/research paper=研究論文/paper trail=書面記錄/scratch paper=草稿紙", "On paper, the plan was perfect. In practice, three things went wrong immediately. The team who could adapt won. On-paper thinking has its limits. Reality has its own.", "教育,商業,科學"],
["park", "pɑːrk", "n./v.", "公園；停車", "She clears her head by walking through the park every evening.", "她每天晚上通過在公園散步來清空思緒。", "National park = 國家公園。Car park = 停車場。Park the idea = 暫時擱置想法。", "national park=國家公園/car park=停車場/park the idea=暫時擱置/park bench=公園長椅", "The happiest people in the city were not in the restaurants or shops. They were in the park — walking, talking, sitting on benches. Nature is always free and always healing.", "自然,生活,健康"],
["pass", "pæs", "v.", "通過；傳遞", "Time passes quickly when you are doing meaningful work.", "當你做有意義的工作時，時間過得很快。", "Pass on = 傳遞/放棄。Overpassing = 超越。Let it pass = 算了。", "pass on=傳遞或放棄/let it pass=算了/pass the test=通過考試/pass the time=打發時間", "She passed on the opportunity three times before finally saying yes. On the fourth, something felt different. She took it. It was the best decision of her career. Timing matters.", "日常,激勵"],
["patient", "ˈpeɪʃənt", "adj./n.", "有耐心的；病患", "Be patient with yourself — you are learning something hard.", "對自己有耐心——你在學習困難的東西。", "Patience = 耐心（名詞）。Patient care = 病患照護。Try your patience = 考驗你的耐心。", "patience=耐心/patient care=病患照護/be patient=要有耐心/test your patience=考驗耐心", "She could not understand why she was not improving faster. Her teacher said: 'You plant a tree once and water it daily. You don't dig it up to check the roots.' Be patient.", "教育,醫療,激勵"],
["perfect", "ˈpɜːrfɪkt", "adj.", "完美的", "Done is better than perfect — start before you are ready.", "完成勝過完美——在你準備好之前就開始。", "Perfectly = 完美地。Perfectionist = 完美主義者。Imperfect = 不完美的。", "perfectly=完美地/perfectionist=完美主義者/strive for perfection=追求完美/perfect timing=完美時機", "She spent years waiting to be perfect before starting. Then a mentor said: 'Ship it imperfect. Fix it after.' She launched. She fixed. She succeeded. Done beats perfect every time.", "激勵,職場,心理"],
["person", "ˈpɜːrsn", "n.", "人；個人", "Be the kind of person you needed when you were younger.", "成為你年輕時所需要的那種人。", "In person = 親自。Right person = 合適的人。People person = 擅長與人相處的人。", "in person=親自/right person=合適的人/people person=善交際的人/become a better person=變得更好", "She asked herself each morning: 'What kind of person do I want to be today?' That question, made daily, gradually shaped a person she was genuinely proud of being.", "哲學,激勵,生活"],
["phone", "foʊn", "n.", "電話", "She puts her phone away during every meal with her family.", "她在與家人用餐時把手機放下。", "Phone call = 電話。On the phone = 在電話上。Smartphone = 智慧型手機。", "phone call=電話/on the phone=在電話上/smartphone=智慧型手機/no-phone zone=禁止手機區", "He put his phone face-down at dinner for one week. By the end, his children were talking more than they had in months. The phone was not the problem. The attention was.", "家庭,科技,日常"],
["picture", "ˈpɪktʃər", "n.", "照片；圖像；情況", "Look at the big picture before worrying about the small details.", "在擔心小細節之前先看大局。", "Big picture = 全局。Paint a picture = 描述情況。Picture perfect = 完美無瑕。", "big picture=全局/paint a picture=描述情況/picture perfect=完美無瑕/get the picture=明白了", "She always saw the big picture. While others argued over details, she mapped the destination. That quality — seeing the whole — made her the natural leader of every group she joined.", "溝通,職場,藝術"],
["positive", "ˈpɒzɪtɪv", "adj.", "積極的；正面的", "A positive mind finds opportunities in every situation.", "積極的思維在每個情況中都能找到機會。", "Positive thinking = 正面思考。Stay positive = 保持積極。Test positive = 測試陽性。", "positive thinking=正面思考/stay positive=保持積極/positive impact=積極的影響/false positive=假陽性", "She was not blindly optimistic — she was constructively positive. She acknowledged problems and then immediately looked for solutions. That habit is what set her apart.", "心理,健康,激勵"],
["possible", "ˈpɒsɪbl", "adj.", "可能的", "Everything seems impossible until someone makes it possible.", "一切在有人使它成為可能之前都似乎是不可能的。", "Make possible = 使成為可能。As soon as possible = 盡快。Possibility = 可能性（名詞）。", "make possible=使成為可能/as soon as possible=盡快/explore possibilities=探索可能性/barely possible=勉強可能", "She refused to believe in impossible. Not naively, but systematically — she broke down every 'impossible' into smaller possibles. That method made her achieve what others gave up on.", "激勵,哲學"],
["present", "ˈprɛznt", "adj./n./v.", "現在的；禮物；呈現", "Be fully present — your full attention is the greatest gift.", "完全在場——你全部的注意力是最大的禮物。", "Present tense = 現在式。Presentation = 呈現（名詞）。In the present = 在當下。", "present tense=現在式/presentation=演示/in the present=在當下/be present=在場/gift and present=禮物", "She gave nothing materially expensive. But she gave her full presence — no phones, no distractions — to everyone she was with. People felt it. It was more valuable than any gift.", "家庭,溝通,哲學"],
["price", "praɪs", "n.", "價格", "Everything has a price — including doing nothing at all.", "一切都有代價——包括什麼都不做。", "Price tag = 價格標籤。At any price = 不惜任何代價。Half price = 半價。", "price tag=價格標籤/at any price=不惜任何代價/half price=半價/asking price=要求價格", "She asked the price of everything. Not because she was cheap, but because knowing value made her an excellent negotiator. Price is what you pay. Value is what you get.", "商業,金融,日常"],
["produce", "prəˈdjuːs", "v.", "生產；製造", "When you produce good work consistently, opportunities follow.", "當你持續生產好的工作時，機會就會跟隨。", "Producer = 生產者。Production = 生產（名詞）。Productive = 有生產力的。", "producer=生產者/production=生產/productive=有生產力的/mass produce=大量生產", "She produced work consistently, not in bursts of inspiration. Day by day, piece by piece. Looking back after a year, she had produced more than she thought possible.", "商業,激勵,藝術"],
["prove", "pruːv", "v.", "證明", "You do not need to prove yourself to everyone — just to yourself.", "你不需要向每個人證明自己——只要向自己證明就夠了。", "Prove a point = 證明一個觀點。Proven = 已被證明的。Disprove = 反駁（反義）。", "prove a point=證明觀點/proven=已被證明的/prove yourself=證明自己/beyond doubt=無可置疑", "She stopped trying to prove herself to critics and started proving things to herself. Within a year, the external validation followed. Funny how that works.", "激勵,心理,職場"],
["pull", "pʊl", "v.", "拉；吸引", "Pull yourself together and face the challenge head-on.", "振作起來，直接面對挑戰。", "Pull through = 撐過去。Pull off = 成功完成。Pull your weight = 盡自己的責任。", "pull through=撐過去/pull off=成功完成/pull your weight=盡責任/pull together=齊心協力", "The team was exhausted and behind schedule. Then their leader said simply: 'Pull together. We can do this.' They did. The power of those four words still surprises her.", "職場,激勵"],
["push", "pʊʃ", "v.", "推；推動", "Push yourself a little beyond your comfort zone each day.", "每天把自己推到舒適圈稍微之外。", "Push forward = 向前推進。Push back = 反對。Push the limits = 突破限制。", "push forward=向前推進/push back=反對/push the limits=突破限制/push yourself=挑戰自己", "She felt the resistance every morning — the comfortable option was to stay in bed. She pushed herself up anyway. That daily push was the foundation of everything she built.", "運動,激勵,生活"],
["reach", "riːtʃ", "v.", "到達；達到", "Keep going — you are closer to your goal than you think.", "繼續前進——你比你想的更接近你的目標。", "Reach out = 聯繫。Within reach = 伸手可及。Reach your potential = 發揮你的潛力。", "reach out=聯繫/within reach=伸手可及/reach your potential=發揮潛力/far-reaching=影響深遠", "She reached out to the mentor she had admired for years with a two-sentence email. He replied. That one email changed the trajectory of her entire career. Reaching out is free.", "職場,激勵,社交"],
["read", "riːd", "v.", "閱讀", "The more you read, the more you see the world clearly.", "你閱讀得越多，你就越清楚地看到世界。", "Read between the lines = 看弦外之音。Well-read = 博覽群書的。Read up on = 研讀。", "read between the lines=看弦外之音/well-read=博覽群書/read up on=研讀/reading habit=閱讀習慣", "He read for thirty minutes before bed instead of scrolling. After six months, he had consumed twenty books. His thinking sharpened. His conversations deepened. Reading is a superpower.", "教育,激勵"],
["real", "riːl", "adj.", "真實的；現實的", "Keep it real — authenticity is the most powerful communication tool.", "保持真實——真實性是最有力的溝通工具。", "For real = 真的。Real world = 現實世界。Keep it real = 保持真實。", "for real=真的/real world=現實世界/keep it real=保持真實/real talk=真心話", "In every presentation, she shared a real failure alongside the successes. The audience always leaned forward at those moments. Real vulnerability earns real trust.", "溝通,激勵,社交"],
["reason", "ˈriːzən", "n.", "原因；理由", "The reason behind your goal determines how far you will go.", "你目標背後的原因決定了你能走多遠。", "Good reason = 好理由。Without reason = 無緣無故。Reason out = 推理出。", "good reason=好理由/without reason=無緣無故/season for a reason=有原因/reason to believe=相信的理由", "She asked 'why' five times before accepting any strategy. By the fifth why, they usually found the real reason. Real reasons are always hidden under obvious ones.", "哲學,商業,職場"],
["receive", "rɪˈsiːv", "v.", "接收；收到", "Learning to receive help gracefully is as important as giving it.", "優雅地接受幫助與給予同樣重要。", "Receive feedback = 接受回饋。On the receiving end = 在接受一方。Receiver = 接收者。", "receive feedback=接受回饋/on the receiving end=在接受一方/receive a compliment=接受讚美/receive support=接受支持", "He could give endlessly but struggled to receive. When he finally accepted help, the relationship deepened. Receiving gracefully is a gift to the giver.", "社交,心理,溝通"],
["relate", "rɪˈleɪt", "v.", "相關聯；理解", "I can really relate to the struggles you described today.", "我真的能理解你今天描述的掙扎。", "Relatable = 容易產生共鳴的。Relate to = 與...有關聯。Related = 相關的。", "relatable=容易共鳴的/relate to=與...有關聯/related=相關的/relate your experience=分享你的經歷", "She made her presentations relatable by starting with a personal story. People who had tuned out instantly re-engaged. Relatability is the bridge between speaker and audience.", "溝通,教育"],
["repeat", "rɪˈpiːt", "v.", "重複", "Repeat what works until it becomes effortless habit.", "重複有效的事情，直到它成為輕鬆的習慣。", "Repeat customer = 回頭客。Repeat after me = 跟我說。Don't repeat mistakes = 不要重複錯誤。", "repeat customer=回頭客/repeat after me=跟我說/on repeat=一直重複/repeat offender=慣犯", "History repeats itself only to those who do not learn from it. She studied every failure carefully, extracting every lesson. Her history never repeated.", "教育,哲學,激勵"],
["respect", "rɪˈspɛkt", "n./v.", "尊重", "Respect is not given — it is earned through consistent action.", "尊重不是給的——它是通過持之以恆的行動贏得的。", "Self-respect = 自尊。Show respect = 表示尊重。Mutual respect = 相互尊重。", "self-respect=自尊/show respect=表示尊重/mutual respect=相互尊重/earn respect=贏得尊重", "She treated the janitor and the CEO with exactly the same respect. People noticed. That consistency of character became her most recognized and respected quality.", "社會,職場,激勵"],
["return", "rɪˈtɜːrn", "v.", "返回；回報", "She returned to her hometown and found it completely new.", "她回到她的家鄉，發現它完全是全新的。", "Return on investment = 投資回報。Return a favor = 回報恩情。Point of no return = 不歸點。", "return on investment=投資回報/return a favor=回報恩情/point of no return=不歸點/tax return=報稅", "Every year she returned to the village where she grew up. Each time, she understood her past differently. Distance makes retrospection clearer. Return to origins to understand directions.", "旅遊,家庭,哲學"],
["ride", "raɪd", "v./n.", "騎；搭乘", "Ride the waves of change instead of fighting against them.", "乘著變化的浪潮而不是對抗它們。", "Take a ride = 搭乘。Ride it out = 撐過去。Give a ride = 讓某人搭便車。", "take a ride=搭乘/ride it out=撐過去/give a ride=讓人搭便車/rough ride=艱難的旅程", "The entrepreneurial journey was a rough ride — highs and lows in the same week. She learned to ride both without being defined by either. Emotional stability is a business skill.", "旅遊,商業,激勵"],
["right", "raɪt", "adj./n.", "正確的；權利", "Doing the right thing is rarely the easy thing.", "做正確的事很少是容易的事。", "Right away = 馬上。Human rights = 人權。In the right = 佔理的一方。", "right away=馬上/human rights=人權/in the right=佔理/right choice=正確選擇/do right by=公平對待", "He did the right thing even when no one was watching. His integrity was consistent whether seen or unseen. That consistency is what eventually made him trusted by everyone.", "社會,哲學,激勵"],
["risk", "rɪsk", "n./v.", "風險；冒險", "Calculate the risk — then take it anyway.", "計算風險——然後還是去冒險。", "Risk taker = 冒險者。At risk = 處於風險中。Calculated risk = 有計算的冒險。", "risk taker=冒險者/at risk=處於風險中/calculated risk=有計算的冒險/risk management=風險管理", "She analyzed every risk before taking it. Others called her cautious. What they saw as caution was actually precision — she took every risk that made sense. Smart risk beats blind risk.", "商業,激勵,哲學"],
["road", "roʊd", "n.", "道路", "The road to success is always under construction.", "通往成功的道路永遠在建設中。", "Road trip = 公路旅行。Off the beaten road = 走非常規的路。Down the road = 未來。", "road trip=公路旅行/off the beaten road=走非常規路/down the road=未來/rocky road=崎嶇之路", "She drove the long road home alone and had the most important conversation of her life — with herself. Sometimes the road you need is the one you take in solitude.", "旅遊,激勵,哲學"],
["role", "roʊl", "n.", "角色；職責", "Define your role clearly — ambiguity creates confusion.", "清晰地定義你的角色——模糊會造成混亂。", "Role model = 榜樣。Lead role = 主要角色。Role-play = 角色扮演。", "role model=榜樣/lead role=主要角色/role-play=角色扮演/take on a role=承擔角色", "She did not seek the leadership role. It found her because she was already doing the work. Leaders are recognized, not appointed. Do the role before you have the title.", "職場,教育,激勵"],
["room", "ruːm", "n.", "房間；空間", "There is always room to grow if you are willing to look.", "如果你願意尋找，就總是有成長的空間。", "Room for improvement = 有改善的空間。Make room = 騰出空間。Wiggle room = 彈性空間。", "room for improvement=有改善的空間/make room=騰出空間/wiggle room=彈性空間/classroom=教室", "She made room in her schedule for one thing that had no productivity value — a daily walk with no destination. That empty room in her day gave everything else more meaning.", "生活,心理,日常"],
["rule", "ruːl", "n./v.", "規則；統治", "Know the rules so well you can break them effectively.", "把規則了解得如此透徹，以至於你能夠有效地打破它們。", "As a rule = 通常。Golden rule = 黃金法則。Rule out = 排除。", "as a rule=通常/golden rule=黃金法則/rule out=排除/bend the rules=通融規則", "She followed the rules until she understood why each one existed. Then she knew which ones to follow rigidly and which ones could be bent creatively. Wisdom is knowing the difference.", "社會,教育,哲學"],
["seat", "siːt", "n.", "座位", "Take a seat and stay as long as you need to feel better.", "坐下來，待到你感覺好一些為止。", "Take a seat = 請坐。Seat belt = 安全帶。Hot seat = 受壓力的位置。", "take a seat=請坐/seat belt=安全帶/hot seat=受壓力/in the driver's seat=掌握主導權", "She always took the seat closest to the door in new situations — ready to leave, but already in the room. Over time, she moved closer to the center. Growth is a seating arrangement.", "日常,心理"],
["send", "sɛnd", "v.", "發送；寄送", "Send a handwritten note — it means so much more than a text.", "寄一張手寫便條——它比一條簡訊有意義得多。", "Send out = 發出。Send for = 派人去取。Sender = 寄件人。", "send out=發出/send for=派人取/sender=寄件人/send a message=傳遞訊息", "She sent a thank-you note after every meeting. Her peers called it old-fashioned. Her clients called it memorable. Every deal she sought, she got. Details differentiate.", "職場,溝通,社交"],
["sense", "sɛns", "n./v.", "感覺；意識到", "Good business sense is mostly just good common sense applied.", "好的商業判斷大多是良好常識的應用。", "Make sense = 有道理。Common sense = 常識。Sense of humor = 幽默感。", "make sense=有道理/common sense=常識/sense of humor=幽默感/sense of direction=方向感", "She had an unusual sense of humor — she could find lightness in difficulty without dismissing the difficulty. That quality made her the person everyone wanted beside them.", "溝通,心理,日常"],
["serve", "sɜːrv", "v.", "服務；供應", "The greatest leaders understand that their role is to serve.", "最偉大的領導者明白他們的角色是服務。", "Customer service = 客戶服務。Serve a purpose = 有其目的。First served = 先到先得。", "customer service=客戶服務/serve a purpose=有其目的/first come first served=先到先得/public servant=公務員", "He led with the philosophy: how can I serve the people around me? That orientation — giving before taking — made him the most sought-after mentor in his industry.", "職場,哲學,社會"],
["set", "sɛt", "v./n.", "設定；套組", "Set your intention each morning before the day sets it for you.", "每天早上設定你的意圖，在白天為你設定它之前。", "Mindset = 思維方式。Set the tone = 定調。Offset = 抵消。", "mindset=思維方式/set the tone=定調/set a goal=設定目標/offset=抵消/ready set go=準備好，出發", "She set her environment up for success before relying on willpower. Healthy food visible. Gym bag packed. Books beside the bed. Systems beat motivation every single time.", "激勵,生活"],
["short", "ʃɔːrt", "adj.", "短的；矮的", "Life is too short for long explanations of bad ideas.", "生命太短暫，不能花時間詳細解釋壞主意。", "Short cut = 捷徑。Short-term = 短期的。Short of money = 缺錢。", "short cut=捷徑/short-term=短期/short of money=缺錢/in short=簡而言之/short notice=短時間通知", "In short: stop waiting for perfect conditions. In short: start imperfect. In short: adjust as you go. Three short truths she kept on her wall for twenty years.", "激勵,生活,溝通"],
["show", "ʃoʊ", "v.", "展示；顯示", "Show your work — the process is as impressive as the result.", "展示你的工作——過程和結果一樣令人印象深刻。", "Show up = 出現。Show off = 炫耀。Show of hands = 舉手表決。", "show up=出現/show off=炫耀/show of hands=舉手表決/show your true colors=展示真實面目", "She showed up every day — not just on the days she felt inspired. Showing up consistently, on the hard days especially, was the entire secret to her success.", "激勵,職場"],
["sign", "saɪn", "n./v.", "標誌；簽名", "She signed the contract without reading it once — a costly mistake.", "她沒有讀過就簽了合同——一個代價高昂的錯誤。", "Sign up = 報名。Road sign = 路標。Sign of the times = 時代的標誌。", "sign up=報名/road sign=路標/sign of the times=時代的標誌/warning sign=警告標誌", "He noticed the warning signs early but ignored them. By the time he acted, the problem was three times larger. Signs exist to help. We only see them after we learn to look.", "日常,職場,社會"],
["since", "sɪns", "prep./conj.", "自從；因為", "She has been learning English every day since she was twelve.", "她從十二歲起每天都在學英語。", "Ever since = 從那以後一直。Since then = 從那時起。Long since = 很久以前。", "ever since=從那以後一直/since then=從那時起/long since=很久以前", "He made the decision and never looked back since. Not because things became easy, but because the decision was made. Decisiveness is freedom. Indecision is its own prison.", "日常,哲學,激勵"],
["sit", "sɪt", "v.", "坐；位於", "Sometimes the best thing you can do is just sit quietly.", "有時候你能做的最好的事情就是靜靜地坐著。", "Sit back = 放鬆。Babysit = 照看小孩。Sit-in = 靜坐抗議。", "sit back=放鬆/babysit=照看小孩/sit with it=接受它/sit tight=靜靜等待", "She learned to sit with discomfort instead of immediately resolving it. That tolerance of uncertainty made her the most decisive person in her team — because she had thought it through.", "心理,哲學"],
["situation", "ˌsɪtʃuˈeɪʃən", "n.", "情況", "Every situation teaches you something — look for the lesson.", "每個情況都教你一些東西——尋找其中的教訓。", "Situation comedy = 情境喜劇。Sticky situation = 困境。Size up a situation = 評估情況。", "sticky situation=困境/size up a situation=評估情況/situation comedy=情境喜劇/handle a situation=應對情況", "She never described a situation as a problem. She called them situations. The language shift changed her entire approach — and her entire outcome.", "職場,溝通,心理"],
["slow", "sloʊ", "adj.", "慢的", "Slow down to speed up — rushing creates more mistakes than haste saves.", "放慢速度以加速——倉促造成的錯誤比搶時間節省的更多。", "Slow and steady = 慢而穩。Slow down = 放慢。In slow motion = 慢動作。", "slow and steady=慢而穩/slow down=放慢/in slow motion=慢動作/slow burn=緩慢但持續", "She did everything slowly and deliberately. People thought she was inefficient. Then they saw the quality of her output — and the speed at which it was done right the first time.", "生活,職場,激勵"],
["so", "soʊ", "conj.", "所以；如此", "It hurts now so it will hurt less later — that is growth.", "現在很痛，所以之後就不那麼痛了——那就是成長。", "So far = 到目前為止。So long = 再見/如此之長。So what = 那又怎樣。", "so far=到目前為止/so long=再見/so what=那又怎樣/and so on=等等", "She was nervous, so she prepared more. She was doubtful, so she practiced more. Every 'so' was a trigger to action. That habit turned anxiety into energy.", "日常,激勵"],
["solid", "ˈsɒlɪd", "adj.", "固體的；穩固的", "Build a solid foundation and everything else becomes easier.", "建立穩固的基礎，其他一切都會變得更容易。", "Solid plan = 穩固的計劃。Solid performance = 穩定的表現。Solid as a rock = 堅如磐石。", "solid plan=穩固計劃/solid performance=穩定表現/solid as a rock=堅如磐石/solid foundation=穩固基礎", "Before launching, she spent three months building a solid foundation — skills, network, product knowledge. Competitors launched faster and failed faster. Solid beats flashy every time.", "職場,激勵,商業"],
["soon", "suːn", "adv.", "很快；不久", "Start soon — good timing is always right now.", "盡快開始——好的時機永遠是現在。", "As soon as = 一旦。Sooner or later = 遲早。Better late than never = 遲做比不做強。", "as soon as=一旦/sooner or later=遲早/better late than never=遲做好過不做/none too soon=剛好及時", "She thought she would start soon. Soon became a year. A year became five. Then someone younger did exactly what she had planned. Start now. Soon is expensive.", "激勵,生活"],
["sort", "sɔːrt", "v./n.", "整理；種類", "Sort through the noise and focus on what truly matters.", "整理噪音，專注於真正重要的事情。", "Sort out = 解決。All sorts of = 各種各樣的。Sort of = 有點。", "sort out=解決/all sorts of=各種各樣的/sort of=有點/sort through=整理", "He sorted through his tasks every Sunday. Nothing urgent consumed him during the week that had not been anticipated. Sorting is not procrastination — it is clarity.", "職場,生活"],
["speak", "spiːk", "v.", "說話；發言", "Speak your truth kindly — the world needs honest voices.", "溫和地說出你的真相——世界需要誠實的聲音。", "Speak up = 大聲說。Speak out = 公開表達。Actions speak louder = 行動勝言語。", "speak up=大聲說/speak out=公開表達/speak your mind=直說你的想法/speak volumes=說明很多", "He finally spoke up in the meeting after months of silence. His idea changed the direction of the entire project. Every silent room contains brilliant ideas. Create space to speak.", "溝通,職場"],
["speed", "spiːd", "n.", "速度", "Speed without direction is just fast confusion.", "沒有方向的速度只是快速的混亂。", "Speed up = 加快。At full speed = 全速。Speed limit = 速限。", "speed up=加快/at full speed=全速/speed limit=速限/speed read=快速閱讀/up to speed=跟上進度", "She slowed down when everyone else was speeding up. That choice — to be deliberate when the world rushed — made her the most accurate and trusted person on the team.", "日常,職場,哲學"],
["spot", "spɒt", "n./v.", "地點；發現", "She has a talent for spotting opportunities others walk right past.", "她有發現他人錯過的機會的天賦。", "Spot on = 完全正確。On the spot = 當場。Blind spot = 盲點。", "spot on=完全正確/on the spot=當場/blind spot=盲點/tourist spot=旅遊景點", "He spotted her talent before she did. 'You are extraordinary,' he told her. She smiled politely and did not believe him. Three years later, she finally did. See what others see in you.", "職場,旅遊,激勵"],

["step", "stɛp", "n./v.", "步驟；腳步", "The first step is always the most difficult one to take.", "第一步總是最難邁出的。", "Step by step = 一步一步地。Step up = 提升。Next step = 下一步。", "step by step=一步一步地/step up=提升/next step=下一步/take a step back=退一步", "She broke every goal into the smallest possible steps. Starting felt easy. By the time she noticed difficulty, she had too much momentum to stop. Small steps beat giant leaps.", "激勵,生活"],
["stick", "stɪk", "v.", "堅持；黏附", "Stick to your values even when it would be easier not to.", "即使不這樣做更容易，也要堅守你的價值觀。", "Stick to = 堅持。Stick with = 繼續支持。Stick out = 突出。", "stick to=堅持/stick with=繼續支持/stick out=突出/stick to your guns=堅持立場", "She stuck with the project when everyone else quit. Not from stubbornness — from a clear-eyed belief that it was worth seeing through. Conviction and stubbornness look the same until the end.", "激勵,職場"],

["suggest", "səˈdʒɛst", "v.", "建議；暗示", "She gently suggested a better approach without criticizing the old one.", "她溫和地建議了一個更好的方法，而不批評舊的方法。", "Suggestion = 建議（名詞）。Open to suggestions = 歡迎建議。Make a suggestion = 提出建議。", "suggestion=建議/open to suggestions=歡迎建議/make a suggestion=提出建議/gentle suggestion=溫和建議", "He never ordered. He suggested. 'What if we tried...' 'Have you considered...' The result was the same, but the team felt ownership. Suggesting creates buy-in. Ordering creates compliance.", "溝通,職場,教育"],

["tend", "tɛnd", "v.", "傾向；照料", "We tend to overestimate what we can do in a day.", "我們往往高估了我們一天能做的事情。", "Tendency = 傾向（名詞）。Tend to = 傾向於。Attend = 出席/照顧（相關字）。", "tendency=傾向/tend to=傾向於/tend a garden=照料花園/tend to overlook=傾向於忽略", "She tended her friendships like a garden — regular attention, genuine care, patient through seasons. Her relationships thrived while others wilted from neglect. Tending creates abundance.", "社交,自然"],
["test", "tɛst", "n./v.", "測試；考驗", "Life tests you not to stop you but to show you who you are.", "生活考驗你不是為了阻止你，而是為了顯示你是誰。", "Pass the test = 通過測試。Test of time = 時間的考驗。Try and test = 嘗試與測試。", "pass the test=通過測試/test of time=時間的考驗/put to the test=付諸考驗/field test=實地測試", "He failed the test five times. Each time he understood more. On the sixth attempt, he did not just pass — he aced it. Some of us need more tests to find the lesson inside.", "教育,激勵"],
["than", "ðæn", "conj.", "比", "Doing something imperfectly is better than doing nothing perfectly.", "不完美地做某事比完美地什麼都不做要好。", "More than = 多於。Other than = 除了。No sooner... than = 剛...就...。", "more than=多於/other than=除了/better than nothing=聊勝於無/no sooner than=剛...就", "She'd rather do it imperfectly than not at all. That attitude launched ten projects, all messy, all valuable. Done and imperfect beats perfect and never started every time.", "日常,激勵"],
["think", "θɪŋk", "v.", "思考", "Think before you speak and speak only what you mean.", "說話前先思考，只說你真正的意思。", "Think outside the box = 跳出框框思考。Think twice = 三思而後行。Think tank = 智庫。", "think outside the box=跳出框框/think twice=三思而後行/think tank=智庫/deep thinking=深度思考", "She carved out two hours each week for uninterrupted thinking — no devices, no meetings. Her colleagues called it wasteful. Her results called it essential. Thinking time pays.", "教育,職場,哲學"],

["yet", "jɛt", "adv.", "還；已經", "She has not reached her goal yet, but she is getting close.", "她還沒有達到她的目標，但她越來越接近了。", "Not yet = 還沒。Yet to come = 即將到來。And yet = 然而。", "not yet=還沒/yet to come=即將到來/and yet=然而/the best is yet to come=最好的還在後面", "She had not succeeded yet. But 'yet' was the most important word in that sentence. Yet implies possibility. Yet says: the story is not over. Yet is the most hopeful word in English.", "激勵,日常"],
["zero", "ˈzɪəroʊ", "n.", "零；起點", "Every great success started from exactly zero.", "每一個偉大的成功都從確切的零開始。", "Zero tolerance = 零容忍。From zero = 從零開始。Zero in on = 集中在...上。", "zero tolerance=零容忍/from zero=從零開始/zero in on=集中在/ground zero=起點/zero waste=零廢棄物", "He started from zero — no money, no network, no experience. That equality of origin, he later said, was his greatest advantage: nothing to protect, everything to build.", "激勵,商業"],
["abroad", "əˈbrɔːd", "adv.", "在國外", "She studied abroad for two years and changed completely.", "她在國外學習了兩年，整個人改變了。", "Go abroad=出國。Study abroad=出國留學。From abroad=來自海外。", "go abroad=出國/study abroad=出國留學/live abroad=住在海外/market abroad=海外市場", "She packed one suitcase and moved abroad alone at twenty-two. She knew nobody. By thirty, she had a network spanning twelve countries. Discomfort, accepted, becomes the world.", "旅遊,教育,激勵"],
["absence", "ˈæbsəns", "n.", "缺席；不在", "Her absence from the meeting was noticed immediately.", "她缺席會議被立即注意到了。", "In the absence of=在缺乏...的情況下。Absence makes the heart grow fonder=距離產生美。Leave of absence=留職停薪。", "in the absence of=缺乏/leave of absence=留職停薪/conspicuous absence=明顯缺席", "His long absence made the team realize how much he had contributed. Only when something disappears do we understand its value. Presence is invisible until it becomes absence.", "職場,情感,日常"],
["account", "əˈkaʊnt", "n./v.", "帳戶；說明；占", "She opened a savings account the day she got her first job.", "她找到第一份工作的那天就開了儲蓄帳戶。", "Account for=說明原因；占比例。Bank account=銀行帳戶。Take into account=考慮到。", "account for=說明/bank account=銀行帳戶/take into account=考慮到/savings account=儲蓄帳戶", "She took every penny into account. Her spreadsheet was detailed and ruthless. At 40, she had more savings than peers who earned twice as much. Tracking is the foundation of financial freedom.", "金融,日常,激勵"],
["accurate", "ˈækjərɪt", "adj.", "準確的", "Always aim for accurate information before acting on assumptions.", "在根據假設行動之前，永遠追求準確的信息。", "Accuracy=準確性。Inaccurate=不準確的。Accurate estimate=準確的估計。", "accuracy=準確性/inaccurate=不準確的/highly accurate=高度準確/accurate data=準確數據", "She was not the fastest analyst in the team, but she was the most accurate. When her numbers said one thing, everyone listened. Speed without accuracy is noise. Accuracy without speed is still wisdom.", "職場,科學,教育"],
["allow", "əˈlaʊ", "v.", "允許；讓", "Allow yourself to be a beginner — that is where growth starts.", "允許自己成為初學者——那是成長的起點。", "Allow for=考慮到；留有餘地。Allowance=零用錢；津貼。Not allowed=不被允許。", "allow for=考慮到/not allowed=不被允許/allowance=津貼/allow time=留出時間", "She allowed herself one day per month to do nothing productive — no goals, no tasks, just wandering. Those unstructured days consistently produced her best ideas. Permission is productive.", "生活,激勵,哲學"],
["announce", "əˈnaʊns", "v.", "宣布；公告", "She announced the change with clarity and genuine compassion.", "她清晰而真誠地宣布了這一改變。", "Announcement=公告（名詞）。Announce publicly=公開宣布。Make an announcement=發佈公告。", "announcement=公告/announce publicly=公開宣布/make an announcement=發佈公告/surprise announcement=驚喜公告", "The announcement was made to the whole team simultaneously. No leaks, no rumors beforehand. That fairness — everyone hearing the same thing at the same time — preserved trust through a difficult change.", "職場,溝通"],
["approve", "əˈpruːv", "v.", "批准；贊成", "You do not need everyone to approve of your choices.", "你不需要每個人都贊成你的選擇。", "Approval=批准（名詞）。Seek approval=尋求批准。Approved=已批准的。", "approval=批准/seek approval=尋求批准/stamp of approval=認可印章/self-approval=自我認可", "She stopped seeking approval from people who did not have her best interests in mind. That boundary — selective validation — freed enormous energy she redirected toward her work.", "心理,激勵,哲學"],
["argue", "ˈɑːrɡjuː", "v.", "爭論；主張", "Argue with ideas, not with the person presenting them.", "與想法爭論，而不是與提出想法的人爭論。", "Argument=爭論（名詞）。Argue for=主張。Counter-argument=反論。", "argument=爭論/argue for=主張/counter-argument=反論/heated argument=激烈爭論", "In every debate, she attacked the argument, never the person. That habit made even opponents respect her. The moment you attack the person, you have already lost the argument.", "溝通,哲學,職場"],
["arrange", "əˈreɪndʒ", "v.", "安排；整理", "She arranged the meeting so both parties felt respected.", "她安排會議，讓雙方都感到被尊重。", "Make arrangements=做安排。Arrange a meeting=安排會議。Flower arrangement=插花藝術。", "make arrangements=做安排/arrange a meeting=安排會議/flower arrangement=插花/arrange in order=按順序整理", "She arranged her desk to signal to her brain: this space means focus. The physical arrangement of her environment was as important as any habit she had built. Environment shapes behavior.", "日常,職場"],
["assist", "əˈsɪst", "v.", "協助；幫助", "Assist others without expectation and opportunities will return.", "無條件地協助他人，機會將會回來。", "Assistant=助理（名詞）。Assistance=協助（名詞）。Assist with=協助某事。", "assistant=助理/assistance=協助/technical assistance=技術援助/offer assistance=提供協助", "She built her reputation by assisting people with no obvious benefit to herself. When she finally needed help, hundreds responded. Assistance given freely is the highest-yield investment.", "職場,社交"],
["aware", "əˈwɛər", "adj.", "意識到的；察覺的", "Be aware of your habits — they are quietly shaping your life.", "意識到你的習慣——它們在悄悄地塑造你的生活。", "Awareness=意識（名詞）。Self-aware=自我察覺的。Be aware of=意識到。", "awareness=意識/self-aware=自我察覺/be aware of=意識到/raise awareness=提高意識", "She became aware of a pattern: every time she felt scared, she procrastinated. That simple self-awareness dismantled the procrastination. Naming a behavior is the first step to changing it.", "心理,激勵,教育"],
["balance", "ˈbæləns", "n./v.", "平衡", "True balance is dynamic, not static — it requires constant adjustment.", "真正的平衡是動態的，而不是靜態的——它需要不斷調整。", "Balance work and life=平衡工作和生活。Off balance=失去平衡。Balance sheet=資產負債表。", "work-life balance=工作生活平衡/off balance=失去平衡/balance sheet=資產負債表/bank balance=銀行餘額", "She stopped seeking 'balance' as a permanent state and started treating it like a daily practice of recalibration. That shift from destination to habit changed everything about how she managed her life.", "健康,生活,哲學"],
["barrier", "ˈbæriər", "n.", "障礙；屏障", "Every barrier that slows you down is also teaching you something.", "每一個減慢你速度的障礙也在教你一些東西。", "Break through a barrier=突破障礙。Language barrier=語言障礙。Remove barriers=消除障礙。", "break through a barrier=突破障礙/language barrier=語言障礙/remove barriers=消除障礙/trade barrier=貿易壁壘", "She listed every barrier stopping her. Then she asked: which of these am I actually creating myself? Half the list disappeared. External barriers are real. Internal ones are often more powerful.", "激勵,哲學,教育"],
["basis", "ˈbeɪsɪs", "n.", "基礎；基準", "Build your decisions on a solid basis of facts, not assumptions.", "在事實的堅實基礎上做決定，而不是假設。", "On a daily basis=在每日基礎上。Basis for=...的基礎。On the basis of=根據。", "on a daily basis=每天/on the basis of=根據/solid basis=堅實基礎/form the basis=構成基礎", "She evaluated every major decision on the same three-part basis: aligned with values, based on evidence, reversible if wrong. That framework worked consistently across twenty years.", "職場,教育,哲學"],
["behavior", "bɪˈheɪvjər", "n.", "行為", "Your behavior in small moments reveals your true character.", "你在小時刻的行為揭示了你真實的性格。", "Behavioral=行為的。Bad behavior=不良行為。Model behavior=典範行為。", "behavioral=行為的/bad behavior=不良行為/model behavior=典範行為/change behavior=改變行為", "She did not judge character by what people said about themselves. She watched behavior in small moments — how they treated servers, whether they kept promises, how they reacted when nobody was watching.", "哲學,社交,心理"],
["beyond", "bɪˈɒnd", "prep.", "超越；在...之外", "Push beyond what feels comfortable — that is where growth lives.", "推進到感覺舒適的地方之外——那裡是成長所在。", "Go beyond=超越。Beyond doubt=毫無疑問。Beyond reach=遙不可及。", "go beyond=超越/beyond doubt=毫無疑問/beyond reach=遙不可及/above and beyond=超越職責", "She always went beyond what was expected — not to impress anyone, but because mediocrity felt uncomfortable to her. That internal standard, never announced, made her extraordinary.", "激勵,哲學"],
["borrow", "ˈbɒroʊ", "v.", "借", "Borrow ideas from every field and combine them in your own way.", "從每個領域借鑑想法，以你自己的方式組合它們。", "Borrow money=借錢。Borrow an idea=借鑑想法。Live on borrowed time=活在借來的時間。", "borrow money=借錢/borrow an idea=借鑑想法/borrow from=向...借/live on borrowed time=時日無多", "The greatest innovators were the greatest borrowers. They took ideas from distant fields and combined them in unexpected ways. Original thinking is mostly extraordinary recombination.", "教育,商業,創意"],
["breathe", "briːð", "v.", "呼吸", "Take a deep breath before every important decision.", "在每個重要決定之前深吸一口氣。", "Take a deep breath=深吸一口氣。Breathe easy=放心。Breathe life into=注入活力。", "take a deep breath=深吸一口氣/breathe easy=放心/breathe life into=注入活力/breathing room=喘息空間", "She taught her team to breathe before responding to difficult messages. Two breaths between stimulus and response. That pause, she said, is where your best judgment lives.", "健康,心理,職場"],
["brief", "briːf", "adj./v.", "簡短的；簡報", "Keep your communication brief — people remember less than you think.", "保持你的溝通簡短——人們記住的比你想的少。", "Briefing=簡報（名詞）。In brief=簡言之。Debrief=彙報。", "briefing=簡報/in brief=簡言之/debrief=彙報/brief summary=簡短摘要", "She reduced her 45-minute presentations to 15 minutes. The response was better than ever. Brevity is not a limitation of intelligence. It is the highest demonstration of it.", "溝通,職場,教育"],
["broad", "brɔːd", "adj.", "廣泛的；寬闊的", "Develop broad skills alongside your deep area of expertise.", "在你的深度專業領域旁發展廣泛的技能。", "Broadly=廣泛地。Broad-minded=心胸寬廣的。Broad knowledge=廣泛知識。", "broadly=廣泛地/broad-minded=心胸寬廣/broad knowledge=廣泛知識/broad range=廣泛範圍", "The specialist knew everything about one thing. The generalist knew a little about everything. She knew a lot about one thing and a little about everything else. That T-shape was her competitive edge.", "教育,職場"],
["category", "ˈkætɪɡəri", "n.", "類別；種類", "Don't put yourself in a category — your uniqueness is your value.", "不要把自己歸類——你的獨特性是你的價值。", "Categorize=分類（動詞）。Category leader=類別領導者。Cross-category=跨類別。", "categorize=分類/category leader=類別領導者/cross-category=跨類別/create a category=創建類別", "She refused to be placed in a category. Not from arrogance, but from understanding that categories limit potential. The most extraordinary people transcend every category designed to contain them.", "商業,哲學,激勵"],
["celebrate", "ˈsɛlɪbreɪt", "v.", "慶祝", "Celebrate progress, not just achievement — the journey matters.", "慶祝進步，而不只是成就——旅程很重要。", "Celebration=慶祝（名詞）。Celebrate success=慶祝成功。Celebrate small wins=慶祝小勝利。", "celebration=慶祝/celebrate success=慶祝成功/celebrate small wins=慶祝小勝利/worthy of celebration=值得慶祝", "She marked every meaningful milestone with a small celebration. Not parties — moments of acknowledged completion. Teams who celebrate together build something chemistry alone cannot manufacture.", "社交,職場,激勵"],
["channel", "ˈtʃænl", "n./v.", "頻道；引導", "Channel your energy toward the things you can actually control.", "將你的能量引向你實際上可以控制的事情。", "Communication channel=溝通渠道。Channel your focus=引導你的注意力。Channel anger=引導憤怒。", "communication channel=溝通渠道/channel your focus=引導注意力/channel energy=引導能量/open channel=開放渠道", "She channeled every frustration into learning. Every rejection into resilience. Every failure into data. That relentless rechanelling transformed her from a reactive person into a builder.", "激勵,心理"],
["character", "ˈkærɪktər", "n.", "性格；特點", "Character is built in moments when no one is watching.", "性格是在沒有人看的時候建立的。", "Build character=培養性格。Man of character=有品格的人。Character flaw=性格缺陷。", "build character=培養性格/character flaw=性格缺陷/strong character=強大的性格/character development=性格發展", "The crisis did not build his character — it revealed it. Who he was in ordinary times was who he was in extraordinary ones. Character is not situational. It is foundational.", "哲學,激勵,社交"],
["choice", "tʃɔɪs", "n.", "選擇", "Your choices, accumulated over years, are your biography.", "你的選擇，多年累積，就是你的傳記。", "Make a choice=做出選擇。By choice=出於選擇。Freedom of choice=選擇自由。", "make a choice=做出選擇/by choice=出於選擇/freedom of choice=選擇自由/career choice=職業選擇", "Every morning she chose her attitude before anything else. Not her schedule, not her tasks — her attitude. That prior choice made every subsequent choice cleaner and calmer. Choose first things first.", "哲學,激勵,生活"],
["claim", "kleɪm", "v./n.", "聲稱；索賠", "Only claim credit for what you actually did yourself.", "只為你實際上自己做的事情索取功勞。", "Claim responsibility=承擔責任。Make a claim=提出索賠。Stake a claim=宣示主權。", "claim responsibility=承擔責任/make a claim=提出索賠/stake a claim=宣示主權/false claim=虛假聲稱", "She consistently gave credit to her team and claimed responsibility for failures. That inversion — downward credit, upward accountability — built the deepest loyalty any manager she knew had seen.", "職場,溝通,激勵"],
["clear", "klɪər", "adj./v.", "清楚的；清除", "Be clear about what you want — vague goals produce vague results.", "清楚地知道你想要什麼——模糊的目標產生模糊的結果。", "Clearly=清楚地。Clear your mind=清空思緒。Crystal clear=清晰透徹的。", "clearly=清楚地/clear your mind=清空思緒/crystal clear=清晰透徹/clear the air=消除誤解", "She made her expectations crystal clear — not to control, but to respect. Her team knew exactly what was needed. That clarity removed anxiety and replaced it with productive energy.", "溝通,職場"],
["comment", "ˈkɒmɛnt", "n./v.", "評論；說", "Comment constructively or stay silent — destructive feedback helps no one.", "建設性地評論，或者保持沉默——破壞性的反饋幫助不了任何人。", "Comment on=對...評論。No comment=無可奉告。Leave a comment=留言。", "comment on=對...評論/no comment=無可奉告/leave a comment=留言/constructive comment=建設性評論", "She commented with the question: 'What would make this stronger?' That one reframe — from critique to improvement — transformed how her team responded to feedback sessions.", "溝通,教育,職場"],
["complex", "ˈkɒmplɛks", "adj.", "複雜的", "Complex problems become simple when broken into small parts.", "複雜的問題分解成小部分後就會變得簡單。", "Complexity=複雜性（名詞）。Simplify the complex=簡化複雜。Complex relationship=複雜關係。", "complexity=複雜性/simplify the complex=簡化複雜/complex relationship=複雜關係/complex system=複雜系統", "She had a gift for making the complex simple — not by dumbing it down, but by finding the essential structure inside. That skill, rare and learnable, made her communication extraordinary.", "教育,溝通"],
["concentrate", "ˈkɒnsəntreɪt", "v.", "專注；集中", "Concentrate on one important task until it is done completely.", "專注於一個重要任務，直到它完全完成。", "Concentration=專注（名詞）。Lack of concentration=注意力不集中。Concentrate your efforts=集中努力。", "concentration=專注/lack of concentration=注意力不集中/concentrate on=專注於/full concentration=全神貫注", "In the age of infinite distraction, the ability to concentrate deeply for extended periods became the rarest and most valuable professional skill. She guarded her concentration like a treasure.", "教育,職場,激勵"],
["constant", "ˈkɒnstənt", "adj.", "持續的；不斷的", "In a world of constant change, consistent values are your anchor.", "在一個不斷變化的世界裡，一貫的價值觀是你的錨。", "Constantly=不斷地。Constant effort=持續努力。Constant improvement=持續改進。", "constantly=不斷地/constant effort=持續努力/constant improvement=持續改進/constant change=持續變化", "Change was constant and she made peace with that. What she kept constant were her values, her habits, and her relationships. The stable center allowed her to navigate the moving circumference.", "生活,哲學,激勵"],
["consume", "kənˈsjuːm", "v.", "消耗；消費", "Consume knowledge voraciously and produce it generously.", "貪婪地消耗知識，慷慨地產出知識。", "Consumer=消費者（名詞）。Time-consuming=費時的。Consuming passion=令人著迷的熱情。", "consumer=消費者/time-consuming=費時的/consuming passion=令人著迷的熱情/consume resources=消耗資源", "She was both a voracious consumer and prolific producer of ideas. That combination — absorbing widely and outputting specifically — made her the most intellectually alive person in every conversation.", "教育,商業"],
["context", "ˈkɒntɛkst", "n.", "情境；背景", "Understand the context before judging any situation or person.", "在判斷任何情況或人之前先了解背景。", "Put in context=放入背景。Out of context=斷章取義。Contextual=情境的。", "put in context=放入背景/out of context=斷章取義/historical context=歷史背景/cultural context=文化背景", "She never judged behavior without understanding context. That habit made her the most fair and trusted person in her organization. Context does not excuse everything. But it explains most things.", "溝通,哲學,教育"],
["convenient", "kənˈviːniənt", "adj.", "方便的", "Convenient habits build inconveniently good lives over time.", "方便的習慣隨著時間建立出出奇好的生活。", "Convenience=方便（名詞）。Convenient location=方便的位置。At your convenience=在你方便的時候。", "convenience=方便/convenient location=方便的位置/at your convenience=在你方便時/all-in-one convenience=一站式方便", "The convenient choice was rarely the best one. She consistently chose the harder, more valuable option over the easier, comfortable one. That practice, sustained over years, was called talent by others.", "生活,激勵"],
["cope", "koʊp", "v.", "應對；處理", "She learned to cope with failure by treating it like feedback.", "她通過把失敗當作反饋來學習應對失敗。", "Cope with=應對。Coping mechanism=應對機制。Coping strategy=應對策略。", "cope with=應對/coping mechanism=應對機制/coping strategy=應對策略/unable to cope=無法應對", "The skill was not avoiding stress but coping with it gracefully. She developed specific rituals for difficult moments — movement, breath, perspective. Her coping toolkit was as important as her professional toolkit.", "心理,健康,激勵"],
["core", "kɔːr", "n./adj.", "核心", "Stay true to your core values when everything else shifts.", "當其他一切都在變動時，忠於你的核心價值觀。", "Core value=核心價值。Core skill=核心技能。At the core=在核心。", "core value=核心價值/core skill=核心技能/at the core=在核心/core team=核心團隊", "She returned to her core values whenever confused. Not for comfort, but for navigation. Values are not decoration — they are the compass by which every significant decision is made.", "哲學,激勵,生活"],
["curious", "ˈkjʊəriəs", "adj.", "好奇的", "Stay curious — the moment you stop wondering is the moment you stop growing.", "保持好奇——你停止疑惑的那一刻就是你停止成長的那一刻。", "Curiosity=好奇心（名詞）。Intellectually curious=求知慾強的。Satisfy your curiosity=滿足你的好奇心。", "curiosity=好奇心/intellectually curious=求知慾強/satisfy curiosity=滿足好奇心/stay curious=保持好奇", "She walked into every meeting with one question she genuinely did not know the answer to. That curiosity opened doors that preparation alone could never have. Questions are the best keys.", "教育,激勵,哲學"],
["debt", "dɛt", "n.", "債務；負債", "Emotional debt — favors owed — is harder to repay than money.", "情感債務——欠下的人情——比金錢更難償還。", "Pay off debt=還清債務。In debt=負債。Debt-free=無債的。", "pay off debt=還清債務/in debt=負債/debt-free=無債/national debt=國家債務", "She paid off her debts before investing. The psychological freedom of being debt-free gave her the clarity to make better investment decisions. Clarity of mind requires clarity of financial position.", "金融,激勵"],
["decline", "dɪˈklaɪn", "v./n.", "拒絕；下降", "Learn to decline gracefully — saying no is a form of respect.", "學習優雅地拒絕——說不是一種尊重形式。", "Politely decline=禮貌地拒絕。Economic decline=經濟下降。In decline=在下降。", "politely decline=禮貌拒絕/economic decline=經濟下降/in decline=在下降/sharp decline=急劇下降", "She declined every opportunity that did not align with her three-year plan. People called her picky. She called it focused. The opportunities she did take were extraordinary because she had energy for them.", "職場,激勵,生活"],
["dedicated", "ˈdɛdɪkeɪtɪd", "adj.", "專注的；奉獻的", "The most successful people are rarely the most talented but always the most dedicated.", "最成功的人很少是最有才能的，但永遠是最專注的。", "Dedication=奉獻（名詞）。Dedicated to=致力於。Dedicate yourself=投身於。", "dedication=奉獻/dedicated to=致力於/dedicate yourself=投身於/deeply dedicated=深度投入", "Twenty years of dedication to a craft made her look effortless. What observers saw as natural talent was two decades of daily, deliberate dedication made invisible. Dedication is the magician's secret.", "激勵,教育"],
["define", "dɪˈfaɪn", "v.", "定義；決定", "Define success on your own terms before someone else does it.", "在別人為你定義之前，按照你自己的條件定義成功。", "Definition=定義（名詞）。Self-defined=自我定義的。Redefine=重新定義。", "definition=定義/self-defined=自我定義/redefine=重新定義/define your goals=定義你的目標", "She spent one month defining what a good life meant to her — specifically, measurably. That definition, written down, guided every major decision for fifteen years. Define before you pursue.", "哲學,激勵,生活"],
["deserve", "dɪˈzɜːrv", "v.", "應得", "You deserve the results you work consistently toward.", "你應該得到你持之以恆努力的結果。", "Well-deserved=完全應得的。Deserve better=應得更好的。Deserve credit=應得讚揚。", "well-deserved=完全應得的/deserve better=應得更好/deserve credit=應得讚揚/you deserve it=你應得的", "She stopped waiting to feel worthy and started behaving as if she already deserved her goals. That shift — acting deserving before feeling it — changed everything about her trajectory.", "激勵,心理"],
["despite", "dɪˈspaɪt", "prep.", "儘管", "She succeeded despite every obstacle placed in her way.", "她成功了，儘管路上有各種障礙。", "Despite the odds=儘管可能性不大。Despite the difficulty=儘管困難。In spite of=儘管（同義）。", "despite the odds=儘管可能性不大/despite difficulties=儘管困難/despite failure=儘管失敗", "Despite three rejections, she applied a fourth time. Despite losing the first client, she refined her pitch. Despite failing publicly, she continued publicly. Despite is her favorite conjunction.", "激勵,生活"],
["determine", "dɪˈtɜːrmɪn", "v.", "決定；確定", "Your response to adversity determines more than the adversity itself.", "你對逆境的回應比逆境本身決定更多。", "Determination=決心（名詞）。Determined=下定決心的。Self-determined=自我決定的。", "determination=決心/determined=下定決心/self-determined=自我決定/determine the outcome=決定結果", "She could not always determine what happened to her. But she was absolutely determined to determine how she responded. Response is the last freedom no circumstance can remove.", "激勵,哲學,心理"],
["devote", "dɪˈvoʊt", "v.", "投身於；奉獻", "Devote your best hours to your most important work every day.", "每天將你最好的時間投入到最重要的工作中。", "Devotion=奉獻（名詞）。Devoted=全身心投入的。Devote yourself to=投身於。", "devotion=奉獻/devoted=全身心投入/devote yourself to=投身於/devote time=投入時間", "She devoted her first two hours of every day to deep work, before checking messages or attending meetings. Over a decade, those sacred morning hours became her life's most meaningful output.", "生活,激勵,職場"],
["disability", "ˌdɪsəˈbɪlɪti", "n.", "殘疾；障礙", "Disability often reveals capabilities most people never develop.", "殘疾常常揭示大多數人從未發展的能力。", "Learning disability=學習障礙。Disability rights=殘疾人權利。Physical disability=身體殘疾。", "learning disability=學習障礙/disability rights=殘疾人權利/overcome disability=克服殘疾/ability not disability=能力而非殘疾", "His visual disability forced him to listen with extraordinary attention. That listening shaped his entire career. Constraints we cannot choose often become the foundations of our greatest contributions.", "社會,激勵,健康"],
["disagree", "ˌdɪsəˈɡriː", "v.", "不同意", "Disagree respectfully and your relationships will grow stronger.", "尊重地不同意，你的關係會更加強大。", "Disagreement=分歧（名詞）。Agree to disagree=求同存異。Strong disagreement=強烈反對。", "disagreement=分歧/agree to disagree=求同存異/respectful disagreement=尊重的不同意/healthy disagreement=健康的分歧", "The best teams disagreed loudly in meetings and acted united after decisions. She built that culture deliberately. Dissent inside the room prevents disaster outside it.", "溝通,職場,社交"],
["discipline", "ˈdɪsɪplɪn", "n.", "紀律；學科", "Discipline is doing what needs to be done, even when you do not feel like it.", "紀律是做需要做的事，即使你不想做。", "Self-discipline=自律。Academic discipline=學術學科。Disciplined approach=有紀律的方法。", "self-discipline=自律/academic discipline=學術學科/disciplined approach=有紀律的方法/maintain discipline=保持紀律", "She did not wait for motivation to do hard things. Discipline, she discovered, was the bridge between intention and action. Motivation is the spark. Discipline is the engine.", "激勵,教育,生活"],
["dominant", "ˈdɒmɪnənt", "adj.", "主導的；佔優勢的", "Become the dominant voice by speaking less and listening more.", "通過少說多聽成為主導的聲音。", "Dominant player=主導者。Market dominant=市場主導。Dominant culture=主流文化。", "dominant player=主導者/market dominant=市場主導/dominant culture=主流文化/dominant position=主導地位", "The dominant voice in any meeting, she noticed, was rarely the loudest. It was the most listened-to. Dominance through quality, not volume, was the highest form of influence.", "溝通,商業,職場"],
["doubt", "daʊt", "n./v.", "懷疑", "When in doubt, go back to your values — they never mislead.", "當懷疑時，回到你的價值觀——它們從不誤導。", "Beyond doubt=毫無疑問。Doubt yourself=懷疑自己。Without a doubt=毫無疑問。", "beyond doubt=毫無疑問/without a doubt=毫無疑問/self-doubt=自我懷疑/benefit of the doubt=給予信任", "She had taught herself to treat doubt as information, not instruction. Doubt said: investigate more. It did not say: stop. That reframe turned her most paralyzing emotion into her most useful one.", "心理,激勵,哲學"],
["dramatic", "drəˈmætɪk", "adj.", "戲劇性的；顯著的", "Dramatic results come from undramatic daily habits and work.", "戲劇性的結果來自不戲劇性的日常習慣和工作。", "Dramatically=顯著地。Dramatic change=戲劇性的改變。Drama=戲劇（名詞）。", "dramatically=顯著地/dramatic change=戲劇性改變/drama=戲劇/dramatic improvement=顯著改善", "Her results looked dramatic from the outside. The inside story: five years of daily, unglamorous practice, visible to almost no one. The dramatic is always the long-form sequel to the quiet and consistent.", "激勵,藝術"],
["ensure", "ɪnˈʃʊər", "v.", "確保", "Take extra steps to ensure quality — the extra effort always shows.", "採取額外步驟確保品質——額外的努力總是看得出來。", "Ensure success=確保成功。Ensure quality=確保品質。Ensure safety=確保安全。", "ensure success=確保成功/ensure quality=確保品質/ensure safety=確保安全/ensure compliance=確保合規", "She built checklists not to limit creativity but to ensure nothing important was forgotten. Systems exist to free the mind, not constrain it. Checklists ensure the basics so genius can focus on what's beyond them.", "職場,教育"],
["error", "ˈɛrər", "n.", "錯誤", "Every error is a data point if you are willing to examine it.", "每一個錯誤都是一個數據點，如果你願意檢視它的話。", "Human error=人為錯誤。Error in judgment=判斷失誤。Learn from errors=從錯誤中學習。", "human error=人為錯誤/error in judgment=判斷失誤/learn from errors=從錯誤學習/margin of error=誤差範圍", "She ran monthly error reviews — not blame sessions, but learning sessions. What went wrong? Why? What would we change? That ritual converted organizational errors into permanent improvements.", "職場,教育,科學"],
["establish", "ɪˈstæblɪʃ", "v.", "建立；確立", "Establish your credibility early — it takes years to build and minutes to lose.", "盡早建立你的可信度——需要多年建立，幾分鐘就能失去。", "Well-established=成熟的。Establish a reputation=建立聲譽。Established fact=既定事實。", "well-established=成熟的/establish a reputation=建立聲譽/established fact=既定事實/establish trust=建立信任", "She established her reputation one kept promise at a time. No grand gesture. Just the daily accumulation of doing what she said she would do. Credibility is a jar filled with small consistent deposits.", "職場,社交,激勵"],
["exact", "ɪɡˈzækt", "adj.", "精確的", "Exact language prevents misunderstandings and saves time.", "精確的語言防止誤解並節省時間。", "Exactly=確切地。Exact opposite=正相反。To be exact=確切地說。", "exactly=確切地/exact opposite=正相反/to be exact=確切地說/exact science=精確科學", "She asked for exact numbers rather than approximations in every report. That precision culture, maintained over years, made her team's analysis the most trusted in the organization.", "溝通,職場,教育"],
["examine", "ɪɡˈzæmɪn", "v.", "檢視；審查", "Examine your assumptions regularly — the world changes faster than you do.", "定期檢視你的假設——世界變化比你更快。", "Examination=考試；審查（名詞）。Re-examine=重新審查。Examine closely=仔細審查。", "examination=考試/re-examine=重新審查/examine closely=仔細審查/self-examine=自我審視", "She re-examined her core beliefs every five years. Not to abandon them but to confirm or update them. That intellectual practice kept her worldview current and her decisions aligned with reality.", "哲學,教育,科學"],
["exchange", "ɪksˈtʃeɪndʒ", "n./v.", "交換；交流", "An exchange of ideas is always worth more than a monologue.", "想法的交流永遠比獨白更有價值。", "Exchange ideas=交流想法。Stock exchange=股票交易所。Cultural exchange=文化交流。", "exchange ideas=交流想法/stock exchange=股票交易所/cultural exchange=文化交流/fair exchange=公平交換", "She structured every meeting as an exchange, not a presentation. Two people thinking together produce more than one person presenting to another. Exchange beats broadcast every time.", "溝通,職場,商業"],
["exhaust", "ɪɡˈzɔːst", "v.", "耗盡；精疲力竭", "Exhaust your options mentally before deciding anything is impossible.", "在斷定任何事情不可能之前，先在腦海中窮盡你的選項。", "Exhausted=精疲力竭的。Exhaustion=疲憊（名詞）。Exhaust all possibilities=窮盡所有可能性。", "exhausted=精疲力竭的/exhaustion=疲憊/exhaust options=窮盡選項/exhaust resources=耗盡資源", "When exhausted, she did not push through — she rested deliberately. Recovery was scheduled like meetings. She learned that sustainable output requires strategic rest. Exhaustion is not heroism.", "健康,生活,激勵"],
["expert", "ˈɛkspɜːrt", "n.", "專家", "Become the expert no one else bothered to become.", "成為沒有其他人費心成為的專家。", "Expertise=專業知識（名詞）。Expert opinion=專家意見。Leading expert=頂尖專家。", "expertise=專業知識/expert opinion=專家意見/leading expert=頂尖專家/subject matter expert=主題專家", "She chose the narrowest possible specialty. Everyone said she was limiting herself. Within five years, she was the only person anyone called for that specific expertise. Narrow is not small. It is focused.", "職場,教育"],
["explore", "ɪkˈsplɔːr", "v.", "探索", "Explore ideas without commitment — curiosity before conclusion.", "不帶承諾地探索想法——結論之前先好奇。", "Exploration=探索（名詞）。Explorer=探險家。Explore options=探索選項。", "exploration=探索/explore options=探索選項/explore the world=探索世界/intellectual exploration=知識探索", "She built exploration time into every week — unstructured time to follow curiosity with no agenda. Some called it wasted time. It produced her best ideas, most creative solutions, and deepest learning.", "教育,旅遊,激勵"],
["failure", "ˈfeɪljər", "n.", "失敗", "Failure is feedback in disguise — mine every one for data.", "失敗是偽裝的反饋——從每一個中挖掘數據。", "Fear of failure=對失敗的恐懼。Epic failure=慘敗。Failure rate=失敗率。", "fear of failure=對失敗的恐懼/epic failure=慘敗/failure rate=失敗率/early failure=早期失敗", "She collected failures the way others collected successes. Each one went into a document she called 'What I Learned.' After three years, that document became her most valuable professional asset.", "激勵,教育,商業"],
["fair", "fɛər", "adj.", "公平的", "Be fair to others and even more fair to yourself.", "對他人公平，對自己更加公平。", "Fairly=公平地。Fair deal=公平交易。Fair play=公平競爭。", "fairly=公平地/fair deal=公平交易/fair play=公平競爭/fair chance=公平機會", "She held herself to the same standards she held others to. No exceptions. That consistency — visible and without double standards — was what made people follow her without being asked to.", "哲學,職場,社會"],
["familiar", "fəˈmɪliər", "adj.", "熟悉的", "Make the unfamiliar familiar through repeated exposure and curiosity.", "通過重複接觸和好奇心使陌生的東西變得熟悉。", "Familiarity=熟悉（名詞）。Familiar with=熟悉。Familiar face=熟悉的面孔。", "familiarity=熟悉/familiar with=熟悉/familiar face=熟悉的面孔/make familiar=使熟悉", "She made herself familiar with discomfort through regular small challenges. Over time, the circle of what felt familiar expanded to include things that once seemed impossible.", "心理,激勵,教育"],
["feature", "ˈfiːtʃər", "n./v.", "特點；特色", "Focus on the features that matter to the people you serve.", "專注於對你服務的人重要的特點。", "Feature-rich=功能豐富的。Key feature=關鍵特點。Feature set=功能集合。", "feature-rich=功能豐富/key feature=關鍵特點/stand-out feature=突出特點/product feature=產品功能", "The most beloved product had fewer features than competitors. What it had were the right features, executed perfectly. Less but better is always more than more but mediocre.", "商業,科技,設計"],
["finance", "ˈfaɪnæns", "n.", "財務；金融", "Understand basic finance — it affects every area of your life.", "了解基本財務——它影響你生活的每個領域。", "Financial=財務的。Finance a project=為項目融資。Personal finance=個人理財。", "financial=財務的/finance a project=為項目融資/personal finance=個人理財/finance charge=金融費用", "She spent one weekend studying basic personal finance at 25. That two days of self-education created a financial trajectory that separated her from peers who never learned what money actually does.", "金融,教育"],
["formal", "ˈfɔːrml", "adj.", "正式的", "Formal communication requires more thought than casual conversation.", "正式溝通比隨意對話需要更多思考。", "Formally=正式地。Formal setting=正式環境。Semi-formal=半正式的。", "formally=正式地/formal setting=正式環境/semi-formal=半正式/formal education=正式教育", "She wrote formal emails as carefully as she crafted presentations. She believed every written word was a permanent ambassador for how she thought. Formality, applied thoughtfully, is a form of respect.", "溝通,職場"],
["foundation", "faʊnˈdeɪʃən", "n.", "基礎；基金會", "A strong foundation makes everything built on it more durable.", "強大的基礎使建立在它上面的一切更加持久。", "Build a foundation=建立基礎。Foundation stone=奠基石。Lay the foundation=打基礎。", "build a foundation=建立基礎/foundation stone=奠基石/lay the foundation=打基礎/on a solid foundation=在堅實基礎上", "She spent the first year of her business building infrastructure, not chasing clients. Others grew faster initially. Three years later, her foundation supported scale that left them behind.", "商業,激勵,教育"],
["function", "ˈfʌŋkʃən", "n./v.", "功能；運作", "A team functions best when every member understands their role.", "當每個成員都了解自己的角色時，團隊運作最好。", "Functional=功能性的。Malfunction=故障。Function well=運作良好。", "functional=功能性的/malfunction=故障/function well=運作良好/key function=關鍵功能", "She mapped every team member's function clearly, then ensured they had everything needed to perform it excellently. The leader's job: ensure each function has the resources it needs to work well.", "職場,商業"],
["genuine", "ˈdʒɛnjuɪn", "adj.", "真誠的；真實的", "Genuine care is felt immediately — people can tell the difference.", "真誠的關心立即能被感受到——人們能分辨其中的區別。", "Genuinely=真誠地。Genuine effort=真誠的努力。Genuine interest=真正的興趣。", "genuinely=真誠地/genuine effort=真誠的努力/genuine interest=真正的興趣/genuine article=正品", "She showed genuine interest in every person she met. Not as a strategy but as a habit cultivated over years. People felt it immediately. Genuine curiosity about others is magnetic and rare.", "社交,溝通,激勵"],
["grateful", "ˈɡreɪtfʊl", "adj.", "感激的", "A grateful mind finds abundance where others see scarcity.", "感激的心靈在他人看到匱乏的地方找到豐盛。", "Gratitude=感激（名詞）。Express gratitude=表達感激。Grateful for=為...感激。", "gratitude=感激/express gratitude=表達感激/grateful for=為...感激/grateful heart=感恩的心", "She wrote three things she was grateful for each morning. Not big things — small specific ones. A warm cup of coffee. A kind word. After months, her default state shifted from wanting to appreciating.", "健康,心理,激勵"],
["hesitate", "ˈhɛzɪteɪt", "v.", "猶豫；遲疑", "Don't hesitate when you know what you should do.", "當你知道你應該做什麼時，不要猶豫。", "Hesitation=猶豫（名詞）。Without hesitation=毫不猶豫地。Hesitate to ask=猶豫是否要問。", "hesitation=猶豫/without hesitation=毫不猶豫/don't hesitate=不要猶豫/moment of hesitation=猶豫的時刻", "She trained herself to act within five seconds of deciding. The longer she waited after a decision, the more doubt grew. Action, taken immediately, was the cure for hesitation she had spent years developing.", "心理,激勵"],
["identify", "aɪˈdɛntɪfaɪ", "v.", "識別；辨認", "Identify your strengths early and invest in them deeply.", "盡早識別你的優勢並深入投資它們。", "Identification=識別（名詞）。Identify with=認同。Self-identify=自我認同。", "identification=識別/identify with=認同/self-identify=自我認同/identify problems=識別問題", "She identified the problem no one else was willing to name. The room fell silent. Then, one by one, people nodded. Naming the elephant in the room is the bravest and most useful act in any meeting.", "職場,溝通,激勵"],
["impact", "ˈɪmpækt", "n./v.", "影響；衝擊", "Focus on your impact, not just your activity or effort.", "專注於你的影響，而不只是你的活動或努力。", "Make an impact=產生影響。High-impact=高影響力的。Impact assessment=影響評估。", "make an impact=產生影響/high-impact=高影響力/impact assessment=影響評估/measure impact=衡量影響", "She changed her metric from effort to impact. Same hours, but targeted at the highest-leverage activities. Her output in impact terms tripled within a year with no increase in hours worked.", "職場,激勵,商業"],
["intention", "ɪnˈtɛnʃən", "n.", "意圖；目的", "Act with clear intention — aimless action creates accidental results.", "以清晰的意圖行動——漫無目的的行動創造意外的結果。", "Good intention=好意。Intentional=有意的。State your intention=說明你的意圖。", "good intention=好意/intentional=有意的/set an intention=設定意圖/intention behind=背後的意圖", "She began each day by stating her intention — not tasks, but the quality of presence she wanted to bring. That difference — leading with being over doing — changed the texture of every interaction.", "哲學,生活,激勵"],
["judge", "dʒʌdʒ", "v./n.", "判斷；評判", "Judge yourself by your efforts, not by others' results.", "用你的努力來評判自己，而不是用他人的結果。", "Judgment=判斷（名詞）。Sound judgment=良好判斷力。Pass judgment=做出評判。", "judgment=判斷/sound judgment=良好判斷力/pass judgment=做出評判/don't judge=不要評判", "She judged situations with evidence and people with generosity. That combination — analytical precision about problems, charitable interpretation of people — made her leadership unusually effective.", "哲學,社交,職場"],
["lean", "liːn", "adj./v.", "精簡的；傾斜", "Run a lean operation — waste is the enemy of focus and speed.", "運營精簡——浪費是專注和速度的敵人。", "Lean on=依靠。Lean into=勇於面對。Lean toward=傾向於。", "lean on=依靠/lean into=勇於面對/lean toward=傾向於/lean operation=精簡運營", "She ran a lean team that outperformed divisions three times its size. The secret was not efficiency but selectivity — doing only what mattered, with complete focus, without distraction.", "商業,職場"],
["long-term", "lɒŋ tɜːm", "adj.", "長期的", "Long-term thinking is the most undervalued form of competitive advantage.", "長期思維是最被低估的競爭優勢形式。", "Long-term goal=長期目標。Long-term investment=長期投資。Long-term relationship=長期關係。", "long-term goal=長期目標/long-term investment=長期投資/long-term vision=長期願景/long-term thinking=長期思維", "She made every decision by asking: will I be glad I did this in five years? That filter removed most reactive decisions and replaced them with strategic ones. Long-term questions produce long-term thinking.", "激勵,商業,哲學"],
["loyal", "ˈlɔɪəl", "adj.", "忠誠的", "Build loyalty through consistency — it cannot be purchased.", "通過一致性建立忠誠度——它無法被購買。", "Loyalty=忠誠（名詞）。Brand loyalty=品牌忠誠度。Loyal customer=忠誠客戶。", "loyalty=忠誠/brand loyalty=品牌忠誠度/loyal customer=忠誠客戶/earn loyalty=贏得忠誠", "She was so loyal to the people who had helped her that they never hesitated to help again. Her loyalty was specific, memory-based, and active. Loyalty expressed is loyalty returned.", "社交,職場,商業"],
["master", "ˈmɑːstər", "v./n.", "掌握；大師", "Master the fundamentals before you try to be creative with them.", "在嘗試對基礎知識有創意之前，先掌握它們。", "Masterpiece=傑作。Master a skill=掌握技能。Past master=行家。", "masterpiece=傑作/master a skill=掌握技能/master class=大師課/domain master=領域大師", "She refused to move to advanced techniques before mastering basics. Every great performance she had seen was built on invisible, mastered fundamentals. Mastery is not a destination. It is a relationship with your craft.", "教育,激勵,藝術"],
["method", "ˈmɛθəd", "n.", "方法", "Find the method that works for you and then apply it consistently.", "找到適合你的方法，然後持之以恆地應用它。", "Methodical=有條理的。Scientific method=科學方法。Teaching method=教學方法。", "methodical=有條理的/scientific method=科學方法/teaching method=教學方法/best method=最佳方法", "She tested twelve methods before finding the one that fit her mind. No methodology works for everyone. The work of learning is partly the work of finding your own system.", "教育,激勵,科學"],
["minimal", "ˈmɪnɪməl", "adj.", "最小的；極簡的", "Do the minimal viable version first — then improve based on reality.", "先做最小可行版本——然後根據現實進行改善。", "Minimize=最小化（動詞）。Minimalist=極簡主義者。Minimal effort=最少努力。", "minimize=最小化/minimalist=極簡主義者/minimal effort=最少努力/minimal viable=最小可行", "She stripped everything to its minimal essential and found that the core was smaller and cleaner than all the additions. Subtraction, applied generously, often produces more than addition.", "設計,商業,哲學"],
["model", "ˈmɒdl", "n./v.", "模型；示範", "Model the behavior you want to see in the people around you.", "示範你想在周圍人身上看到的行為。", "Role model=榜樣。Business model=商業模型。Model behavior=典範行為。", "role model=榜樣/business model=商業模型/model behavior=典範行為/mental model=心智模型", "She was aware that she was being observed constantly as a leader. That awareness made her more deliberate. She modeled the behaviors she wanted to see in her team — not perfectly, but visibly.", "職場,激勵,教育"],
["motivation", "ˌmoʊtɪˈveɪʃən", "n.", "動機；動力", "Discover your deepest motivation and it will outlast any obstacle.", "發現你最深層的動機，它將比任何障礙都更持久。", "Intrinsic motivation=內在動機。Motivational=激勵人心的。Lose motivation=失去動力。", "intrinsic motivation=內在動機/motivational=激勵人心/lose motivation=失去動力/find motivation=找到動力", "Her motivation was not external recognition — it was internal standards. When external validation disappeared, she kept working. Intrinsic motivation, she had learned, is the only fuel that doesn't run out.", "激勵,心理,教育"],
["note", "noʊt", "n./v.", "筆記；注意", "Take notes — your future self will thank your present self.", "做筆記——你未來的自己會感謝你現在的自己。", "Take notes=做筆記。Noteworthy=值得注意的。Side note=附帶說明。", "take notes=做筆記/noteworthy=值得注意/side note=附帶說明/note to self=寫給自己的便條", "She took notes in every conversation — not to remember facts, but to demonstrate that she valued what was said. People speak more freely to those who treat their words as worth remembering.", "溝通,教育,社交"],
